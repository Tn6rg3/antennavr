<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simulatore Antenne VR - Quest 3</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script>
    // Componente per mantenere le sfere della stessa dimensione a prescindere dalla distanza
    AFRAME.registerComponent('constant-size', {
      tick: function () {
        var camera = this.el.sceneEl.camera;
        if (!camera) return;
        var distance = camera.position.distanceTo(this.el.object3D.position);
        // Regola questo fattore per decidere la grandezza apparente (es. ~10cm)
        var scale = distance * 0.05; 
        // Evita che diventi enorme se andiamo lontanissimo
        scale = Math.min(Math.max(scale, 0.05), 1.0);
        this.el.object3D.scale.set(scale, scale, scale);
      }
    });

    // Componente principale che gestisce la logica del sistema
    AFRAME.registerComponent('antenna-builder', {
      init: function () {
        this.state = 'PLACE_GROUND_A'; // Stati: PLACE_GROUND_A, PLACE_HEIGHT_A, PLACE_GROUND_B, PLACE_HEIGHT_B, MENU
        this.pointA = { base: null, top: null };
        this.pointB = { base: null, top: null };
        this.currentHeight = 0;

        this.raycasterEl = document.querySelector('#right-controller');
        this.cursorRing = document.querySelector('#cursor-ring');
        this.verticalLine = document.querySelector('#vertical-line');
        this.heightText = document.querySelector('#height-text');
        this.menuUI = document.querySelector('#menu-ui');
        
        // Ascoltatori controller destro (Trigger per confermare, Thumbstick per altezza)
        this.raycasterEl.addEventListener('triggerdown', this.onTriggerDown.bind(this));
        this.raycasterEl.addEventListener('thumbstickmoved', this.onThumbstickMoved.bind(this));

        // Ascoltatore controller sinistro (Tasto Y per il menu)
        document.querySelector('#left-controller').addEventListener('ybuttondown', () => {
          let visible = this.menuUI.getAttribute('visible');
          this.menuUI.setAttribute('visible', !visible);
          if(!visible) {
            // Posiziona il menu di fronte all'utente quando viene aperto
            let camera = document.querySelector('#camera').object3D;
            let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            this.menuUI.object3D.position.copy(camera.position).add(forward.multiplyScalar(0.6));
            this.menuUI.object3D.lookAt(camera.position);
          }
        });
      },

      tick: function () {
        // Aggiorna il cursore sul terreno se stiamo posizionando le basi
        if (this.state === 'PLACE_GROUND_A' || this.state === 'PLACE_GROUND_B') {
          let intersection = this.raycasterEl.components.raycaster.getIntersection(document.querySelector('#ground'));
          if (intersection) {
            this.cursorRing.setAttribute('visible', 'true');
            this.cursorRing.setAttribute('position', intersection.point);
          } else {
            this.cursorRing.setAttribute('visible', 'false');
          }
        }
      },

      onTriggerDown: function () {
        if (this.state === 'PLACE_GROUND_A') {
          this.pointA.base = this.cursorRing.getAttribute('position');
          this.state = 'PLACE_HEIGHT_A';
          this.setupVerticalMode(this.pointA.base);

        } else if (this.state === 'PLACE_HEIGHT_A') {
          this.pointA.top = { x: this.pointA.base.x, y: this.currentHeight, z: this.pointA.base.z };
          this.createMarkerPoint(this.pointA.top, 'red', 'A');
          this.resetVerticalMode();
          this.state = 'PLACE_GROUND_B';

        } else if (this.state === 'PLACE_GROUND_B') {
          this.pointB.base = this.cursorRing.getAttribute('position');
          this.state = 'PLACE_HEIGHT_B';
          this.setupVerticalMode(this.pointB.base);

        } else if (this.state === 'PLACE_HEIGHT_B') {
          this.pointB.top = { x: this.pointB.base.x, y: this.currentHeight, z: this.pointB.base.z };
          this.createMarkerPoint(this.pointB.top, 'blue', 'B');
          this.resetVerticalMode();
          this.drawMainLine();
          this.state = 'IDLE'; // Finito il setup base
        }
      },

      onThumbstickMoved: function (evt) {
        // Regola l'altezza a step di 10cm (0.1m) solo negli stati di altezza
        if (this.state === 'PLACE_HEIGHT_A' || this.state === 'PLACE_HEIGHT_B') {
          // Usa un throttle per evitare che scorra troppo velocemente
          if (Math.abs(evt.detail.y) > 0.5) {
            if (!this.lastThumbTime || Date.now() - this.lastThumbTime > 150) {
              // Y joystick invertito: giù è positivo, su è negativo
              let step = evt.detail.y < 0 ? 0.1 : -0.1; 
              this.currentHeight = Math.max(0, this.currentHeight + step);
              
              // Aggiorna grafica
              let basePos = this.state === 'PLACE_HEIGHT_A' ? this.pointA.base : this.pointB.base;
              this.heightText.setAttribute('position', `${basePos.x} ${this.currentHeight + 0.2} ${basePos.z}`);
              this.heightText.setAttribute('value', `Quota: ${this.currentHeight.toFixed(1)}m`);
              
              let topPos = `${basePos.x} ${this.currentHeight} ${basePos.z}`;
              let basePosStr = `${basePos.x} 0 ${basePos.z}`;
              this.verticalLine.setAttribute('line', `start: ${basePosStr}; end: ${topPos}; color: yellow`);
              
              this.lastThumbTime = Date.now();
            }
          }
        }
      },

      setupVerticalMode: function (basePos) {
        this.cursorRing.setAttribute('visible', 'false');
        this.currentHeight = 0;
        let baseStr = `${basePos.x} 0 ${basePos.z}`;
        this.verticalLine.setAttribute('visible', 'true');
        this.verticalLine.setAttribute('line', `start: ${baseStr}; end: ${baseStr}; color: yellow`);
        this.heightText.setAttribute('visible', 'true');
        this.heightText.setAttribute('position', `${basePos.x} 0.2 ${basePos.z}`);
        this.heightText.setAttribute('value', `Quota: 0.0m`);
      },

      resetVerticalMode: function () {
        this.verticalLine.setAttribute('visible', 'false');
        this.heightText.setAttribute('visible', 'false');
      },

      createMarkerPoint: function (pos, color, label) {
        let el = document.createElement('a-entity');
        el.setAttribute('geometry', 'primitive: sphere; radius: 0.05'); // 10cm diametro base
        el.setAttribute('material', `color: ${color}`);
        el.setAttribute('position', pos);
        el.setAttribute('constant-size', ''); // Usa il componente per la grandezza apparente
        
        // Etichetta testuale
        let textEl = document.createElement('a-text');
        textEl.setAttribute('value', label);
        textEl.setAttribute('align', 'center');
        textEl.setAttribute('position', '0 0.15 0');
        textEl.setAttribute('scale', '0.5 0.5 0.5');
        textEl.setAttribute('look-at', '#camera');
        el.appendChild(textEl);
        
        this.el.sceneEl.appendChild(el);
      },

      drawMainLine: function() {
        let lineEl = document.createElement('a-entity');
        let start = `${this.pointA.top.x} ${this.pointA.top.y} ${this.pointA.top.z}`;
        let end = `${this.pointB.top.x} ${this.pointB.top.y} ${this.pointB.top.z}`;
        lineEl.setAttribute('line', `start: ${start}; end: ${end}; color: white; opacity: 0.7`);
        this.el.sceneEl.appendChild(lineEl);
        
        // Prepariamo un mock del punto C
        this.showMenuMock();
      },

      showMenuMock: function() {
        // Qui la logica per mostrare all'utente che ora può usare il menu
        console.log("Punti A e B tracciati. Usa il tasto Y per aprire il menu antenne.");
      }
    });
  </script>
</head>
<body>
  <a-scene antenna-builder cursor="rayOrigin: mouse">
    
    <a-entity id="cameraRig">
      <a-camera id="camera" position="0 1.6 0"></a-camera>
      <a-entity id="left-controller" laser-controls="hand: left"></a-entity>
      <a-entity id="right-controller" laser-controls="hand: right" raycaster="objects: #ground"></a-entity>
    </a-entity>

    <a-sky color="#222"></a-sky>
    <a-plane id="ground" class="collidable" position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#333" material="roughness: 1;"></a-plane>
    <a-grid position="0 0.01 0"></a-grid>

    <a-ring id="cursor-ring" color="white" radius-inner="0.04" radius-outer="0.05" rotation="-90 0 0" visible="false"></a-ring>
    <a-entity id="vertical-line" visible="false"></a-entity>
    <a-text id="height-text" value="Quota: 0.0m" align="center" color="#00FF00" visible="false" look-at="#camera"></a-text>

    <a-entity id="menu-ui" visible="false" position="0 1.5 -1">
      <a-plane width="0.3" height="0.3" color="#111" material="opacity: 0.9" position="0 0 0"></a-plane>
      <a-text value="Menu Antenne" position="0 0.12 0.01" align="center" width="0.8" color="yellow"></a-text>
      <a-text value="1. Dipolo\n2. End Fed\n3. Longwire\n\nBande: 160m - 2m\n(Prossima Implementazione)" position="0 0 0.01" align="center" width="0.5"></a-text>
    </a-entity>

  </a-scene>
</body>
</html>
