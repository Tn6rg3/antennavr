<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Antenne AR Pro V5.1 - Fix Fluidità Menu</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script>
    // COMPONENTE CRITICO: Forza tutti i testi 3D a guardare sempre gli occhi dell'utente (Visore)
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) {
          // Orienta l'oggetto verso la posizione globale della telecamera del Quest
          this.el.object3D.lookAt(cameraEl.object3D.position);
        }
      }
    });

    // Componente per gestire il feedback visivo dei bottoni alla pressione
    AFRAME.registerComponent('btn-interaction', {
      init: function () {
        let el = this.el;
        let originalColor = el.getAttribute('material').color;
        el.addEventListener('mouseenter', () => el.setAttribute('material', 'opacity', 0.8));
        el.addEventListener('mouseleave', () => {
          el.setAttribute('material', 'opacity', 1.0);
          el.setAttribute('scale', '1 1 1');
          el.setAttribute('material', 'color', originalColor);
        });
        el.addEventListener('mousedown', () => {
          el.setAttribute('scale', '0.95 0.95 0.8');
          el.setAttribute('material', 'color', '#00FFCC');
        });
        el.addEventListener('mouseup', () => {
          el.setAttribute('scale', '1 1 1');
          el.setAttribute('material', 'color', originalColor);
        });
      }
    });

    // COMPONENTE CORRETTO: Gestisce la pressione prolungata dei tasti in modo fluido e senza inceppamenti
    AFRAME.registerComponent('hold-clickable', {
      init: function () {
        let el = this.el;
        this.timeoutId = null;
        this.intervalId = null;
        this.isHolding = false; // Flag di sicurezza contro i micro-tremori

        let startTrigger = () => {
          if (this.isHolding) return; // Evita loop sovrapposti
          this.isHolding = true;
          
          el.emit('holdaction'); 
          this.timeoutId = setTimeout(() => {
            this.intervalId = setInterval(() => {
              el.emit('holdaction');
            }, 50); 
          }, 250);
        };

        let stopTrigger = () => {
          if (!this.isHolding) return;
          this.isHolding = false;
          clearTimeout(this.timeoutId);
          clearInterval(this.intervalId);
        };

        el.addEventListener('mousedown', startTrigger);
        el.addEventListener('mouseup', stopTrigger);
        el.addEventListener('mouseleave', stopTrigger);
        el.addEventListener('click', stopTrigger); // Cattura click sintetici del browser
      }
    });

    // Sistema principale di coordinazione geometrica e radio
    AFRAME.registerComponent('ar-antenna-system', {
      init: function () {
        this.state = 'PLACE_GROUND_A'; 
        
        // Strutture nodi 3D fissi
        this.pointA = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointB = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointC = { top: null, sphere: null, pole: null, label: null, percent: 0.5 }; 
        
        this.labelSegA = null;
        this.labelSegB = null;

        // Tipi di antenna inclusa la nuova VERTICALE
        this.antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale'];
        this.bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
        this.antIdx = 0;
        this.bandIdx = 2; // 40 metri default
        
        // Variabili lunghezze bracci configurabili
        this.endFed_AC_Len = 10.0;
        this.endFed_CB_Len = 10.0;
        this.longwireLen = 20.0;
        this.longwireVertex = 'A'; 
        
        // Variabili specifiche Antenna Verticale
        this.numRadials = 4;
        this.radialLen = 5.0; // Espressa in metri
        this.radialPool = []; // Pool di cilindri per i radiali terrestri
        this.maxRadials = 16; 

        this.globalTextScale = 0.35; 
        this.currentHeight = 1.5; 
        
        this.raycasterEl = document.querySelector('#right-controller');
        this.cursorRing = document.querySelector('#cursor-ring');
        this.verticalCylinder = document.querySelector('#vertical-cylinder');
        this.heightText = document.querySelector('#height-text');
        this.menuUI = document.querySelector('#menu-ui');
        
        this.antennaTube1 = null;
        this.antennaTube2 = null;

        this.raycasterEl.addEventListener('triggerdown', this.onTriggerDown.bind(this));
        this.raycasterEl.addEventListener('thumbstickmoved', this.onThumbstickMoved.bind(this));

        document.querySelector('#left-controller').addEventListener('ybuttondown', () => {
          let isVisible = this.menuUI.getAttribute('visible');
          this.menuUI.setAttribute('visible', !isVisible);
          if(!isVisible) {
            let camera = document.querySelector('#camera').object3D;
            let forward = new THREE.Vector3(0, 0, -0.5).applyQuaternion(camera.quaternion);
            this.menuUI.object3D.position.copy(camera.position).add(forward);
            this.menuUI.object3D.lookAt(camera.position);
          }
        });

        this.initPersistentElements();
        this.resetAntennaLengths();
        this.updateMenuText();
        this.setupMenuInteractions();
      },

      initPersistentElements: function() {
        let scene = this.el.sceneEl;
        let createPointStructure = (color) => {
          let struct = {};
          struct.sphere = document.createElement('a-sphere');
          struct.sphere.setAttribute('radius', '0.05');
          struct.sphere.setAttribute('material', `color: ${color}; roughness: 0.3`);
          struct.sphere.setAttribute('visible', 'false');
          scene.appendChild(struct.sphere);

          struct.pole = document.createElement('a-cylinder');
          struct.pole.setAttribute('radius', '0.008');
          struct.pole.setAttribute('material', 'color: #888888; opacity: 0.6; shader: flat');
          struct.pole.setAttribute('visible', 'false');
          scene.appendChild(struct.pole);

          struct.label = document.createElement('a-text');
          struct.label.setAttribute('align', 'center');
          struct.label.setAttribute('color', '#00FF00');
          struct.label.setAttribute('look-at-camera', ''); // Insegue il visore
          struct.label.setAttribute('visible', 'false');
          scene.appendChild(struct.label);
          return struct;
        };

        this.pointA = Object.assign(this.pointA, createPointStructure('#FF1744'));
        this.pointB = Object.assign(this.pointB, createPointStructure('#2979FF'));
        this.pointC = Object.assign(this.pointC, createPointStructure('#00E676'));

        this.labelSegA = document.createElement('a-text');
        this.labelSegA.setAttribute('align', 'center');
        this.labelSegA.setAttribute('color', 'yellow');
        this.labelSegA.setAttribute('look-at-camera', ''); 
        this.labelSegA.setAttribute('visible', 'false');
        scene.appendChild(this.labelSegA);

        this.labelSegB = document.createElement('a-text');
        this.labelSegB.setAttribute('align', 'center');
        this.labelSegB.setAttribute('color', 'yellow');
        this.labelSegB.setAttribute('look-at-camera', ''); 
        this.labelSegB.setAttribute('visible', 'false');
        scene.appendChild(this.labelSegB);

        this.antennaTube1 = document.createElement('a-cylinder');
        this.antennaTube1.setAttribute('radius', '0.015');
        this.antennaTube1.setAttribute('material', 'color: #FF5722; shader: flat');
        this.antennaTube1.setAttribute('visible', 'false');
        scene.appendChild(this.antennaTube1);

        this.antennaTube2 = document.createElement('a-cylinder');
        this.antennaTube2.setAttribute('radius', '0.015');
        this.antennaTube2.setAttribute('material', 'color: #FF5722; shader: flat');
        this.antennaTube2.setAttribute('visible', 'false');
        scene.appendChild(this.antennaTube2);

        // Generazione del Pool di radiali terrestri (Marrone e Sezione Piccola)
        for(let i=0; i<this.maxRadials; i++) {
          let radCyl = document.createElement('a-cylinder');
          radCyl.setAttribute('radius', '0.004'); // Sezione molto sottile, tipo filo a terra
          radCyl.setAttribute('material', 'color: #5D4037; shader: flat'); // Marrone specifico
          radCyl.setAttribute('visible', 'false');
          scene.appendChild(radCyl);
          this.radialPool.push(radCyl);
        }
      },

      resetAntennaLengths: function() {
        let baseLen = this.getCalculatedLength();
        this.endFed_AC_Len = baseLen / 2;
        this.endFed_CB_Len = baseLen / 2;
        this.longwireLen = baseLen;
      },

      tick: function () {
        if (this.state.startsWith('PLACE_GROUND') || this.state.startsWith('REPOSITION_GROUND')) {
          let intersection = this.raycasterEl.components.raycaster.getIntersection(document.querySelector('#ar-ground'));
          if (intersection) {
            this.cursorRing.setAttribute('visible', 'true');
            this.cursorRing.setAttribute('position', intersection.point);
          } else {
            this.cursorRing.setAttribute('visible', 'false');
          }
        }
      },

      onTriggerDown: function () {
        if (this.menuUI.getAttribute('visible')) {
          let intersectionMenu = this.raycasterEl.components.raycaster.getIntersection(this.menuUI);
          if (intersectionMenu) return;
        }

        if (this.state === 'PLACE_GROUND_A' || this.state === 'REPOSITION_GROUND_A') {
          this.pointA.base = Object.assign({}, this.cursorRing.getAttribute('position'));
          this.state = this.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_A' : 'PLACE_HEIGHT_A';
          this.setupVerticalPreviewMode(this.pointA.base);

        } else if (this.state === 'PLACE_HEIGHT_A' || this.state === 'REPOSITION_HEIGHT_A') {
          this.pointA.top = { x: this.pointA.base.x, y: this.currentHeight, z: this.pointA.base.z };
          this.resetVerticalPreviewMode();
          if(this.state === 'REPOSITION_HEIGHT_A') {
            this.state = 'IDLE';
            this.updateGeometriesAndDrawings();
            this.menuUI.setAttribute('visible', true);
          } else {
            // Se siamo in antenna Verticale, non serve prendere il punto B! Salta a IDLE
            if (this.antennaTypes[this.antIdx] === 'Verticale') {
              this.state = 'IDLE';
              this.updateGeometriesAndDrawings();
              this.menuUI.setAttribute('visible', true);
            } else {
              this.state = 'PLACE_GROUND_B';
            }
          }

        } else if (this.state === 'PLACE_GROUND_B' || this.state === 'REPOSITION_GROUND_B') {
          this.pointB.base = Object.assign({}, this.cursorRing.getAttribute('position'));
          this.state = this.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_B' : 'PLACE_HEIGHT_B';
          this.setupVerticalPreviewMode(this.pointB.base);

        } else if (this.state === 'PLACE_HEIGHT_B' || this.state === 'REPOSITION_HEIGHT_B') {
          this.pointB.top = { x: this.pointB.base.x, y: this.currentHeight, z: this.pointB.base.z };
          this.resetVerticalPreviewMode();
          this.state = 'IDLE';
          this.updateGeometriesAndDrawings();
          this.menuUI.setAttribute('visible', true);
        }
      },

      onThumbstickMoved: function (evt) {
        if (this.state.includes('HEIGHT')) {
          if (Math.abs(evt.detail.y) > 0.4) {
            if (!this.lastThumbTime || Date.now() - this.lastThumbTime > 110) {
              let step = evt.detail.y < 0 ? 0.1 : -0.1; 
              this.currentHeight = Math.max(0.1, this.currentHeight + step);
              let basePos = this.state.includes('_A') ? this.pointA.base : this.pointB.base;
              
              this.verticalCylinder.setAttribute('position', `${basePos.x} ${this.currentHeight / 2} ${basePos.z}`);
              this.verticalCylinder.setAttribute('geometry', `primitive: cylinder; radius: 0.01; height: ${this.currentHeight}`);
              this.heightText.setAttribute('position', `${basePos.x} ${this.currentHeight + 0.2} ${basePos.z}`);
              this.heightText.setAttribute('value', `${this.currentHeight.toFixed(1)}m`);
              this.lastThumbTime = Date.now();
            }
          }
        }
      },

      setupVerticalPreviewMode: function (basePos) {
        this.cursorRing.setAttribute('visible', 'false');
        this.currentHeight = 1.5; 
        this.verticalCylinder.setAttribute('visible', 'true');
        this.verticalCylinder.setAttribute('position', `${basePos.x} 0.75 ${basePos.z}`);
        this.verticalCylinder.setAttribute('geometry', 'primitive: cylinder; radius: 0.01; height: 1.5');
        this.heightText.setAttribute('visible', 'true');
        this.heightText.setAttribute('position', `${basePos.x} 1.7 ${basePos.z}`);
        this.heightText.setAttribute('value', '1.5m');
      },

      resetVerticalPreviewMode: function () {
        this.verticalCylinder.setAttribute('visible', 'false');
        this.heightText.setAttribute('visible', 'false');
      },

      getCalculatedLength: function() {
        let bandMeters = parseInt(this.bands[this.bandIdx]);
        let type = this.antennaTypes[this.antIdx];
        if (type === 'Dipolo' || type === 'Verticale') return bandMeters / 4; // Un quarto d'onda per la verticale stilo
        if (type === 'End Fed') return bandMeters * 0.45; 
        return bandMeters;                                
      },

      renderPoleAndLabel: function(struct, topPos, labelName) {
        if (!topPos) return;
        struct.sphere.setAttribute('visible', 'true');
        struct.pole.setAttribute('visible', 'true');
        struct.label.setAttribute('visible', 'true');

        struct.sphere.setAttribute('position', topPos);
        struct.pole.setAttribute('position', `${topPos.x} ${topPos.y / 2} ${topPos.z}`);
        struct.pole.setAttribute('geometry', `primitive: cylinder; radius: 0.008; height: ${topPos.y}`);

        struct.label.setAttribute('position', `${topPos.x} ${topPos.y / 2} ${topPos.z}`);
        struct.label.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`);
        struct.label.setAttribute('value', `${labelName}\nH: ${topPos.y.toFixed(1)}m`);
      },

      hideStructure: function(struct) {
        struct.sphere.setAttribute('visible', 'false');
        struct.pole.setAttribute('visible', 'false');
        struct.label.setAttribute('visible', 'false');
      },

      updateMenuText: function() {
        let type = this.antennaTypes[this.antIdx];
        let band = this.bands[this.bandIdx];
        
        document.querySelector('#txt-ant-val').setAttribute('value', type.toUpperCase());
        document.querySelector('#txt-band-val').setAttribute('value', band);

        // Gestione visibilità sezioni sub-menu
        document.querySelector('#sub-dipolo').setAttribute('visible', type === 'Dipolo');
        document.querySelector('#sub-endfed').setAttribute('visible', type === 'End Fed');
        document.querySelector('#sub-longwire').setAttribute('visible', type === 'Longwire');
        document.querySelector('#sub-verticale').setAttribute('visible', type === 'Verticale');

        // Controllo visibilità bottone riposizionamento B (Inutile per la verticale)
        document.querySelector('#btn-repo-b').setAttribute('visible', type !== 'Verticale');

        let infoTextStr = "";
        if (type === 'Dipolo') {
          infoTextStr = `ANTENNA: DIPOLO | BANDA: ${band}\nLUNGHEZZA FISICA CORPO: ${this.getCalculatedLength().toFixed(2)}m`;
        } else if (type === 'End Fed') {
          infoTextStr = `ANTENNA: END FED | BANDA: ${band}\nBRACCIO AC: ${this.endFed_AC_Len.toFixed(2)}m | CB: ${this.endFed_CB_Len.toFixed(2)}m`;
          document.querySelector('#txt-ef-values').setAttribute('value', `AC: ${this.endFed_AC_Len.toFixed(2)}m  |  CB: ${this.endFed_CB_Len.toFixed(2)}m`);
        } else if (type === 'Longwire') {
          infoTextStr = `ANTENNA: LONGWIRE | BANDA: ${band}\nORIGINE VERTICE: PUNTO ${this.longwireVertex} | LUNGHEZZA: ${this.longwireLen.toFixed(2)}m`;
          document.querySelector('#txt-lw-vertex-val').setAttribute('value', `VERTICE: DA ${this.longwireVertex}`);
          document.querySelector('#txt-lw-len-val').setAttribute('value', `LUNGH: ${this.longwireLen.toFixed(2)}m`);
        } else if (type === 'Verticale') {
          infoTextStr = `ANTENNA: VERTICALE ¼λ | BANDA: ${band}\nSTILO CORPO: ${this.pointA.top ? this.pointA.top.y.toFixed(2) : 0}m | RADIALI: ${this.numRadials} da ${this.radialLen.toFixed(1)}m`;
          document.querySelector('#txt-rad-num-val').setAttribute('value', `RADIALI: ${this.numRadials}`);
          document.querySelector('#txt-rad-len-val').setAttribute('value', `LUNGH R: ${this.radialLen.toFixed(1)}m`);
        }
        document.querySelector('#info-text').setAttribute('value', infoTextStr);
      },

      updateGeometriesAndDrawings: function() {
        if (!this.pointA.top) return;

        let type = this.antennaTypes[this.antIdx];

        if (type === 'Verticale') {
          this.hideStructure(this.pointB);
          this.hideStructure(this.pointC);
          this.labelSegA.setAttribute('visible', 'false');
          this.labelSegB.setAttribute('visible', 'false');
          this.antennaTube2.setAttribute('visible', 'false');

          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'STILO VERTICALE');

          let h = this.pointA.top.y;
          this.antennaTube1.setAttribute('visible', 'true');
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.018; height: ${h}`);
          this.antennaTube1.object3D.position.set(this.pointA.top.x, h / 2, this.pointA.top.z);
          this.antennaTube1.object3D.rotation.set(0, 0, 0); 

          let base = new THREE.Vector3(this.pointA.base.x, 0.002, this.pointA.base.z); 
          
          for (let i = 0; i < this.maxRadials; i++) {
            if (i < this.numRadials) {
              this.radialPool[i].setAttribute('visible', 'true');
              this.radialPool[i].setAttribute('geometry', `primitive: cylinder; radius: 0.004; height: ${this.radialLen}`);
              
              let angle = (i * 2 * Math.PI) / this.numRadials;
              let targetX = base.x + Math.cos(angle) * this.radialLen;
              let targetZ = base.z + Math.sin(angle) * this.radialLen;
              let targetVec = new THREE.Vector3(targetX, 0.002, targetZ);

              let midPoint = new THREE.Vector3().lerpVectors(base, targetVec, 0.5);
              this.radialPool[i].object3D.position.copy(midPoint);
              this.radialPool[i].object3D.lookAt(targetVec);
              this.radialPool[i].object3D.rotateX(Math.PI / 2);
            } else {
              this.radialPool[i].setAttribute('visible', 'false');
            }
          }
          return;
        }

        // --- ANTENNE FILARI ---
        for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');

        if (!this.pointB.top) return;
        this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PUNTO A');
        this.renderPoleAndLabel(this.pointB, this.pointB.top, 'PUNTO B');

        let vecA = new THREE.Vector3(this.pointA.top.x, this.pointA.top.y, this.pointA.top.z);
        let vecB = new THREE.Vector3(this.pointB.top.x, this.pointB.top.y, this.pointB.top.z);
        let dirAB = new THREE.Vector3().subVectors(vecB, vecA).normalize();
        let dirBA = new THREE.Vector3().subVectors(vecA, vecB).normalize();

        if (type === 'Dipolo') {
          this.antennaTube2.setAttribute('visible', 'false');
          let vecC = new THREE.Vector3().lerpVectors(vecA, vecB, this.pointC.percent);
          this.pointC.top = vecC;
          this.renderPoleAndLabel(this.pointC, this.pointC.top, 'CENTRO C');

          let antLen = this.getCalculatedLength();
          this.antennaTube1.setAttribute('visible', 'true');
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${antLen}`);
          this.antennaTube1.object3D.position.copy(vecC);
          this.antennaTube1.object3D.lookAt(vecB);
          this.antennaTube1.object3D.rotateX(Math.PI / 2);

          let extAntStart = new THREE.Vector3().copy(vecC).addScaledVector(dirAB, -(antLen / 2));
          let extAntEnd = new THREE.Vector3().copy(vecC).addScaledVector(dirAB, antLen / 2);

          this.labelSegA.setAttribute('visible', 'true');
          this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extAntStart, 0.5));
          this.labelSegA.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`);
          this.labelSegA.setAttribute('value', `Distanza A-Ant:\n${vecA.distanceTo(extAntStart).toFixed(2)}m`);

          this.labelSegB.setAttribute('visible', 'true');
          this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extAntEnd, vecB, 0.5));
          this.labelSegB.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`);
          this.labelSegB.setAttribute('value', `Distanza Ant-B:\n${extAntEnd.distanceTo(vecB).toFixed(2)}m`);

        } else if (type === 'End Fed') {
          let vecC = new THREE.Vector3().lerpVectors(vecA, vecB, this.pointC.percent);
          this.pointC.top = vecC;
          this.renderPoleAndLabel(this.pointC, this.pointC.top, 'CENTRO C');

          this.antennaTube1.setAttribute('visible', 'true');
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_AC_Len}`);
          let posTube1 = new THREE.Vector3().copy(vecC).addScaledVector(dirBA, this.endFed_AC_Len / 2);
          this.antennaTube1.object3D.position.copy(posTube1);
          this.antennaTube1.object3D.lookAt(vecA);
          this.antennaTube1.object3D.rotateX(Math.PI / 2);

          this.antennaTube2.setAttribute('visible', 'true');
          this.antennaTube2.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_CB_Len}`);
          let posTube2 = new THREE.Vector3().copy(vecC).addScaledVector(dirAB, this.endFed_CB_Len / 2);
          this.antennaTube2.object3D.position.copy(posTube2);
          this.antennaTube2.object3D.lookAt(vecB);
          this.antennaTube2.object3D.rotateX(Math.PI / 2);

          let extAC = new THREE.Vector3().copy(vecC).addScaledVector(dirBA, this.endFed_AC_Len);
          let extCB = new THREE.Vector3().copy(vecC).addScaledVector(dirAB, this.endFed_CB_Len);

          this.labelSegA.setAttribute('visible', 'true');
          this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extAC, 0.5));
          this.labelSegA.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`);
          this.labelSegA.setAttribute('value', `Vuoto A-Ant:\n${vecA.distanceTo(extAC).toFixed(2)}m`);

          this.labelSegB.setAttribute('visible', 'true');
          this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extCB, vecB, 0.5));
          this.labelSegB.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`);
          this.labelSegB.setAttribute('value', `Vuoto Ant-B:\n${extCB.distanceTo(vecB).toFixed(2)}m`);

        } else if (type === 'Longwire') {
          this.hideStructure(this.pointC);
          this.antennaTube2.setAttribute('visible', 'false');

          let startVec = this.longwireVertex === 'A' ? vecA : vecB;
          let targetVec = this.longwireVertex === 'A' ? vecB : vecA;
          let dirLW = new THREE.Vector3().subVectors(targetVec, startVec).normalize();

          this.antennaTube1.setAttribute('visible', 'true');
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.longwireLen}`);
          let posTubeLW = new THREE.Vector3().copy(startVec).addScaledVector(dirLW, this.longwireLen / 2);
          this.antennaTube1.object3D.position.copy(posTubeLW);
          this.antennaTube1.object3D.lookAt(targetVec);
          this.antennaTube1.object3D.rotateX(Math.PI / 2);

          let extLW = new THREE.Vector3().copy(startVec).addScaledVector(dirLW, this.longwireLen);

          this.labelSegA.setAttribute('visible', 'false');
          this.labelSegB.setAttribute('visible', 'true');
          this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extLW, targetVec, 0.5));
          this.labelSegB.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`);
          this.labelSegB.setAttribute('value', `Restante a palo:\n${extLW.distanceTo(targetVec).toFixed(2)}m`);
        }
      },

      setupMenuInteractions: function() {
        document.querySelector('#btn-ant').addEventListener('click', () => {
          this.antIdx = (this.antIdx + 1) % this.antennaTypes.length;
          this.resetAntennaLengths();
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
        });

        document.querySelector('#btn-band').addEventListener('click', () => {
          this.bandIdx = (this.bandIdx + 1) % this.bands.length;
          this.resetAntennaLengths();
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
        });

        // SUB-MENU DIPOLO
        document.querySelector('#btn-c-left').addEventListener('click', () => {
          this.pointC.percent = Math.max(0.02, this.pointC.percent - 0.05);
          this.updateGeometriesAndDrawings();
        });
        document.querySelector('#btn-c-right').addEventListener('click', () => {
          this.pointC.percent = Math.min(0.98, this.pointC.percent + 0.05);
          this.updateGeometriesAndDrawings();
        });

        // SUB-MENU END FED
        let adjustArm = (arm, amount) => {
          // Uso parseFloat e toFixed(2) per impedire glitch sui decimali
          if(arm === 'AC') this.endFed_AC_Len = parseFloat(Math.max(0.05, this.endFed_AC_Len + amount).toFixed(2));
          if(arm === 'CB') this.endFed_CB_Len = parseFloat(Math.max(0.05, this.endFed_CB_Len + amount).toFixed(2));
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
        };
        document.querySelector('#btn-ac-minus').addEventListener('holdaction', () => adjustArm('AC', -0.01));
        document.querySelector('#btn-ac-plus').addEventListener('holdaction', () => adjustArm('AC', 0.01));
        document.querySelector('#btn-cb-minus').addEventListener('holdaction', () => adjustArm('CB', -0.01));
        document.querySelector('#btn-cb-plus').addEventListener('holdaction', () => adjustArm('CB', 0.01));

        // SUB-MENU LONGWIRE
        document.querySelector('#btn-lw-vertex').addEventListener('click', () => {
          this.longwireVertex = this.longwireVertex === 'A' ? 'B' : 'A';
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
        });
        let adjustLWLen = (amount) => {
          this.longwireLen = parseFloat(Math.max(0.1, this.longwireLen + amount).toFixed(2));
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
        };
        document.querySelector('#btn-lw-minus').addEventListener('holdaction', () => adjustLWLen(-0.01));
        document.querySelector('#btn-lw-plus').addEventListener('holdaction', () => adjustLWLen(0.01));

        // SUB-MENU VERTICALE
        document.querySelector('#btn-rad-num-minus').addEventListener('click', () => {
          this.numRadials = Math.max(1, this.numRadials - 1);
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
        });
        document.querySelector('#btn-rad-num-plus').addEventListener('click', () => {
          this.numRadials = Math.min(this.maxRadials, this.numRadials + 1);
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
        });
        let adjustRadLen = (amount) => {
          this.radialLen = parseFloat(Math.max(0.1, this.radialLen + amount).toFixed(2));
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
        };
        document.querySelector('#btn-rad-len-minus').addEventListener('holdaction', () => adjustRadLen(-0.1));
        document.querySelector('#btn-rad-len-plus').addEventListener('holdaction', () => adjustRadLen(0.1));

        // CONTROLLI SCALA ETICHETTE - ORA SUPPORTANO ANCHE IL TIENI PREMUTO!
        document.querySelector('#btn-txt-minus').addEventListener('holdaction', () => {
          this.globalTextScale = parseFloat(Math.max(0.15, this.globalTextScale - 0.01).toFixed(2));
          this.updateGeometriesAndDrawings();
        });
        document.querySelector('#btn-txt-plus').addEventListener('holdaction', () => {
          this.globalTextScale = parseFloat(Math.min(1.2, this.globalTextScale + 0.01).toFixed(2));
          this.updateGeometriesAndDrawings();
        });

        // RIPOSIZIONAMENTO
        document.querySelector('#btn-repo-a').addEventListener('click', () => {
          this.state = this.antennaTypes[this.antIdx] === 'Verticale' ? 'REPOSITION_GROUND_A' : 'REPOSITION_GROUND_A';
          this.menuUI.setAttribute('visible', false);
        });
        document.querySelector('#btn-repo-b').addEventListener('click', () => {
          this.state = 'REPOSITION_GROUND_B';
          this.menuUI.setAttribute('visible', false);
        });
      }
    });
  </script>
</head>
<body>
  
  <a-scene ar-antenna-system webxr="optionalFeatures: passthrough; referenceSpaceType: local-floor" vr-mode-ui="enabled: true">
    
    <a-entity id="cameraRig">
      <a-camera id="camera" position="0 1.6 0"></a-camera>
      <a-entity id="left-controller" laser-controls="hand: left" windows-motion-controls="hand: left"></a-entity>
      <a-entity id="right-controller" laser-controls="hand: right" oculus-touch-controls="hand: right" raycaster="objects: .clickable, #ar-ground; far: 40;"></a-entity>
    </a-entity>

    <a-plane id="ar-ground" position="0 0 0" rotation="-90 0 0" width="100" height="100" material="opacity: 0.0; transparent: true"></a-plane>

    <a-ring id="cursor-ring" color="#FFFFFF" radius-inner="0.04" radius-outer="0.05" rotation="-90 0 0" visible="false"></a-ring>
    <a-entity id="vertical-cylinder" geometry="primitive: cylinder" material="color: #FFEB3B; shader: flat" visible="false"></a-entity>
    <a-text id="height-text" value="" align="center" color="#00FF00" scale="0.35 0.35 0.35" visible="false" look-at-camera></a-text>

    <a-entity id="menu-ui" visible="false" position="0 1.3 -0.5">
      <a-plane width="0.5" height="0.55" color="#1A1A1A" material="opacity: 0.96; shader: flat"></a-plane>
      
      <a-text value="CONFIGURATORE ANTENNE V5.1" position="0 0.24 0.01" align="center" scale="0.13 0.13 0.13" color="#FFEB3B"></a-text>
      <a-plane width="0.44" height="0.06" color="#2A2A2A" position="0 0.17 0.01">
        <a-text id="info-text" value="Caricamento..." position="-0.21 0 0.01" scale="0.09 0.09 0.09" color="#00E676"></a-text>
      </a-plane>

      <a-plane id="btn-ant" class="clickable" btn-interaction width="0.2" height="0.04" color="#37474F" position="-0.11 0.09 0.01">
        <a-text value="TIPO ANTENNA:" align="center" scale="0.07 0.07 0.07" position="0 0.008 0.005" color="#B0BEC5"></a-text>
        <a-text id="txt-ant-val" value="-" align="center" scale="0.1 0.1 0.1" position="0 -0.008 0.005" color="#FFFFFF"></a-text>
      </a-plane>

      <a-plane id="btn-band" class="clickable" btn-interaction width="0.2" height="0.04" color="#1A237E" position="0.11 0.09 0.01">
        <a-text value="BANDA RADIO:" align="center" scale="0.07 0.07 0.07" position="0 0.008 0.005" color="#9FA8DA"></a-text>
        <a-text id="txt-band-val" value="-" align="center" scale="0.11 0.11 0.11" position="0 -0.008 0.005" color="#FFFFFF"></a-text>
      </a-plane>

      <a-entity id="sub-dipolo" position="0 0.01 0" visible="false">
        <a-text value="SPOSTA ALIMENTAZIONE (PUNTO C)" align="center" scale="0.08 0.08 0.08" color="#B0BEC5" position="0 0.02 0"></a-text>
        <a-plane id="btn-c-left" class="clickable" btn-interaction width="0.16" height="0.03" color="#004D40" position="-0.09 -0.02 0.01">
          <a-text value="<- Verso PUNTO A" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
        <a-plane id="btn-c-right" class="clickable" btn-interaction width="0.16" height="0.03" color="#004D40" position="0.09 -0.02 0.01">
          <a-text value="Verso PUNTO B ->" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
      </a-entity>

      <a-entity id="sub-endfed" position="0 0.01 0" visible="false">
        <a-text value="REGOLAZIONE BRACCI INDIPENDENTI (TIENI PREMUTO PASSO 1cm)" align="center" scale="0.07 0.07 0.07" color="#B0BEC5" position="0 0.03 0"></a-text>
        <a-plane id="btn-ac-minus" class="clickable" btn-interaction hold-clickable width="0.06" height="0.03" color="#3e2723" position="-0.16 -0.01 0.01">
          <a-text value="AC -" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
        <a-plane id="btn-ac-plus" class="clickable" btn-interaction hold-clickable width="0.06" height="0.03" color="#3e2723" position="-0.09 -0.01 0.01">
          <a-text value="AC +" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
        <a-plane id="btn-cb-minus" class="clickable" btn-interaction hold-clickable width="0.06" height="0.03" color="#1565c0" position="0.09 -0.01 0.01">
          <a-text value="CB -" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
        <a-plane id="btn-cb-plus" class="clickable" btn-interaction hold-clickable width="0.06" height="0.03" color="#1565c0" position="0.16 -0.01 0.01">
          <a-text value="CB +" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
        <a-text id="txt-ef-values" value="AC: 0.00m | CB: 0.00m" align="center" scale="0.09 0.09 0.09" color="#FFEB3B" position="0 -0.05 0"></a-text>
      </a-entity>

      <a-entity id="sub-longwire" position="0 0.01 0" visible="false">
        <a-text value="MONOFILO LONGWIRE CONFIGURABILE" align="center" scale="0.07 0.07 0.07" color="#B0BEC5" position="0 0.03 0"></a-text>
        <a-plane id="btn-lw-vertex" class="clickable" btn-interaction width="0.16" height="0.03" color="#006064" position="-0.11 -0.01 0.01">
          <a-text id="txt-lw-vertex-val" value="VERTICE: DA A" align="center" scale="0.07 0.07 0.07" position="0 0 0.005"></a-text>
        </a-plane>
        <a-plane id="btn-lw-minus" class="clickable" btn-interaction hold-clickable width="0.06" height="0.03" color="#424242" position="0.06 -0.01 0.01">
          <a-text value="L. -" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
        <a-plane id="btn-lw-plus" class="clickable" btn-interaction hold-clickable width="0.06" height="0.03" color="#424242" position="0.14 -0.01 0.01">
          <a-text value="L. +" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
        <a-text id="txt-lw-len-val" value="LUNGH: 0.00m" align="center" scale="0.09 0.09 0.09" color="#FFEB3B" position="0 -0.05 0"></a-text>
      </a-entity>

      <a-entity id="sub-verticale" position="0 0.01 0" visible="false">
        <a-text value="SISTEMA DI RADIALI TERRESTRI (PASSO REGOLAZIONE 10cm)" align="center" scale="0.07 0.07 0.07" color="#B0BEC5" position="0 0.03 0"></a-text>
        
        <a-plane id="btn-rad-num-minus" class="clickable" btn-interaction width="0.05" height="0.03" color="#3e2723" position="-0.16 -0.01 0.01">
          <a-text value="N -" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>
        <a-plane id="btn-rad-num-plus" class="clickable" btn-interaction width="0.05" height="0.03" color="#3e2723" position="-0.10 -0.01 0.01">
          <a-text value="N +" align="center" scale="0.08 0.08 0.08" position="0 0 0.005"></a-text>
        </a-plane>

        <a-plane id="btn-rad-len-minus" class="clickable" btn-interaction hold-clickable width="0.06" height="0.03" color="#4e342e" position="0.09 -0.01 0.01">
          <a-text value="LENG -" align="center" scale="0.07 0.07 0.07" position="0 0 0.005"></a-text>
        </a-plane>
        <a-plane id="btn-rad-len-plus" class="clickable" btn-interaction hold-clickable width="0.06" height="0.03" color="#4e342e" position="0.16 -0.01 0.01">
          <a-text value="LENG +" align="center" scale="0.07 0.07 0.07" position="0 0 0.005"></a-text>
        </a-plane>

        <a-text id="txt-rad-num-val" value="RADIALI: 4" align="center" scale="0.08 0.08 0.08" color="#FFEB3B" position="-0.13 -0.05 0"></a-text>
        <a-text id="txt-rad-len-val" value="LUNGH R: 5.0m" align="center" scale="0.08 0.08 0.08" color="#FFEB3B" position="0.12 -0.05 0"></a-text>
      </a-entity>


      <a-text value="DIMENSIONE SCALE TESTI E QUOTE 3D" position="0 -0.1 0.01" align="center" scale="0.08 0.08 0.08" color="#B0BEC5"></a-text>
      <a-plane id="btn-txt-minus" class="clickable" btn-interaction hold-clickable width="0.13" height="0.03" color="#424242" position="-0.08 -0.14 0.01">
        <a-text value="DIM. TESTO [-]" align="center" scale="0.08 0.08 0.08" position="0 0 0.005" color="#FFFFFF"></a-text>
      </a-plane>
      <a-plane id="btn-txt-plus" class="clickable" btn-interaction hold-clickable width="0.13" height="0.03" color="#424242" position="0.08 -0.14 0.01">
        <a-text value="DIM. TESTO [+]" align="center" scale="0.08 0.08 0.08" position="0 0 0.005" color="#FFFFFF"></a-text>
      </a-plane>

      <a-text value="RIPOSIZIONAMENTO STRUTTURE BASE" position="0 -0.19 0.01" align="center" scale="0.08 0.08 0.08" color="#FF1744"></a-text>
      <a-plane id="btn-repo-a" class="clickable" btn-interaction width="0.19" height="0.035" color="#C62828" position="-0.11 -0.23 0.01">
        <a-text value="Riposiziona PUNTO A" align="center" scale="0.08 0.08 0.08" position="0 0 0.005" color="#FFFFFF"></a-text>
      </a-plane>
      <a-plane id="btn-repo-b" class="clickable" btn-interaction width="0.19" height="0.035" color="#1565C0" position="0.11 -0.23 0.01">
        <a-text value="Riposiziona PUNTO B" align="center" scale="0.08 0.08 0.08" position="0 0 0.005" color="#FFFFFF"></a-text>
      </a-plane>
    </a-entity>

  </a-scene>
</body>
</html>
