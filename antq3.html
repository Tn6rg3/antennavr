<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Antenne AR Pro V6.1 - Menu su Controller Fixato</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script>
    // Forza i testi 3D a guardare l'utente
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) {
          this.el.object3D.lookAt(cameraEl.object3D.position);
        }
      }
    });

    // Feedback visivo bottoni
    AFRAME.registerComponent('btn-interaction', {
      init: function () {
        let el = this.el;
        let originalColor = el.getAttribute('material').color;
        el.addEventListener('mouseenter', () => el.setAttribute('material', 'opacity', 0.8));
        el.addEventListener('mouseleave', () => {
          el.setAttribute('material', 'opacity', 1.0);
          el.setAttribute('scale', '1 1 1');
          el.setAttribute('material', 'color', originalColor);
        });
        el.addEventListener('mousedown', () => {
          el.setAttribute('scale', '0.95 0.95 0.8');
          el.setAttribute('material', 'color', '#00FFCC');
        });
        el.addEventListener('mouseup', () => {
          el.setAttribute('scale', '1 1 1');
          el.setAttribute('material', 'color', originalColor);
        });
      }
    });

    // Gestione Pressione Prolungata Fluida
    AFRAME.registerComponent('hold-clickable', {
      schema: { action: {type: 'string', default: ''} },
      init: function () {
        let el = this.el;
        this.timeoutId = null;
        this.intervalId = null;
        this.isPressed = false; 

        let startTrigger = () => {
          if (this.isPressed) return;
          this.isPressed = true;
          
          let system = document.querySelector('a-scene').components['ar-antenna-system'];
          if (system && this.data.action) {
            system.executeHoldAction(this.data.action);
            this.timeoutId = setTimeout(() => {
              this.intervalId = setInterval(() => {
                system.executeHoldAction(this.data.action);
              }, 40); 
            }, 250);
          }
        };

        let stopTrigger = () => {
          if (!this.isPressed) return;
          this.isPressed = false;
          clearTimeout(this.timeoutId);
          clearInterval(this.intervalId);
        };

        el.addEventListener('mousedown', startTrigger);
        el.addEventListener('mouseup', stopTrigger);
        window.addEventListener('mouseup', stopTrigger); 
      }
    });

    // Generatore Tubi MMANA
    AFRAME.registerComponent('wire-element', {
      schema: { start: {type: 'vec3'}, end: {type: 'vec3'} },
      update: function() {
        let s = new THREE.Vector3(this.data.start.x, this.data.start.y, this.data.start.z);
        let e = new THREE.Vector3(this.data.end.x, this.data.end.y, this.data.end.z);
        let dir = new THREE.Vector3().subVectors(e, s);
        let dist = dir.length();
        dir.normalize();
        
        this.el.setAttribute('geometry', `primitive: cylinder; radius: 0.012; height: ${dist}`);
        let mid = new THREE.Vector3().lerpVectors(s, e, 0.5);
        this.el.object3D.position.copy(mid);
        this.el.object3D.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir));
      }
    });

    // SISTEMA PRINCIPALE AR
    AFRAME.registerComponent('ar-antenna-system', {
      init: function () {
        this.state = 'PLACE_GROUND_A'; 
        this.appMode = 'BUILDER'; 
        this.libRotation = 0; 
        
        this.pointA = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointB = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointC = { top: null, sphere: null, pole: null, label: null, percent: 0.5 }; 
        
        this.labelSegA = null; this.labelSegB = null; this.supportWireLine = null;

        this.antennaLibrary = [
          { name: "Yagi 3 El. (2m)", desc: "Direttiva VHF (144 MHz)", color: "#00E676", wires: [[-0.51,0,-0.3, 0.51,0,-0.3], [-0.49,0,0.0, 0.49,0,0.0], [-0.45,0,0.35, 0.45,0,0.35], [0,0,-0.3, 0,0,0.35]] },
          { name: "Yagi 3 El. (20m)", desc: "HF 14MHz (>10m ingombro)", color: "#FF3D00", wires: [[-5.3,0,-3.8, 5.3,0,-3.8], [-5.1,0,0.0, 5.1,0,0.0], [-4.8,0,4.0, 4.8,0,4.0], [0,0,-3.8, 0,0,4.0]] },
          { name: "Cubical Quad (10m)", desc: "Loop Chiuso HF 28MHz", color: "#E040FB", wires: [[-1.25,-1.25,0, 1.25,-1.25,0], [1.25,-1.25,0, 1.25,1.25,0], [1.25,1.25,0, -1.25,1.25,0], [-1.25,1.25,0, -1.25,-1.25,0], [-1.3,-1.3,-1.5, 1.3,-1.3,-1.5], [1.3,-1.3,-1.5, 1.3,1.3,-1.5], [1.3,1.3,-1.5, -1.3,1.3,-1.5], [-1.3,1.3,-1.5, -1.3,-1.3,-1.5], [0,0,0, 0,0,-1.5]] }
        ];
        this.libIdx = 0;

        this.antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale'];
        this.bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
        this.antIdx = 0; this.bandIdx = 2; 
        
        this.endFed_AC_Len = 10.0; this.endFed_CB_Len = 10.0;
        this.longwireLen = 20.0; this.longwireVertex = 'A'; 
        this.numRadials = 4; this.radialLen = 5.0; this.radialPool = []; this.maxRadials = 16; 

        this.globalTextScale = 0.35; 
        this.currentHeight = 0.0; 
        
        this.raycasterEl = document.querySelector('#right-controller');
        this.cursorRing = document.querySelector('#cursor-ring');
        this.verticalCylinder = document.querySelector('#vertical-cylinder');
        this.heightText = document.querySelector('#height-text');
        this.menuUI = document.querySelector('#menu-ui');
        
        this.antennaTube1 = null; this.antennaTube2 = null;

        this.raycasterEl.addEventListener('triggerdown', this.onTriggerDown.bind(this));
        this.raycasterEl.addEventListener('thumbstickmoved', this.onThumbstickMoved.bind(this));

        // Pulsanti X e Y sul controller sinistro per accendere/spegnere menu
        document.querySelector('#left-controller').addEventListener('ybuttondown', this.toggleMenu.bind(this));
        document.querySelector('#left-controller').addEventListener('xbuttondown', this.toggleMenu.bind(this));

        this.initPersistentElements();
        
        this.el.addEventListener('loaded', () => {
          this.resetAntennaLengths();
          this.updateMenuText();
          this.updateGeometriesAndDrawings();
          this.setupMenuInteractions();
        });
      },

      toggleMenu: function() {
        let isVisible = this.menuUI.getAttribute('visible');
        this.menuUI.setAttribute('visible', !isVisible);
      },

      initPersistentElements: function() {
        let scene = this.el.sceneEl;
        let createPointStructure = (color) => {
          let struct = {};
          struct.sphere = document.createElement('a-sphere'); struct.sphere.setAttribute('radius', '0.05'); struct.sphere.setAttribute('material', `color: ${color}; roughness: 0.3`); struct.sphere.setAttribute('visible', 'false'); scene.appendChild(struct.sphere);
          struct.pole = document.createElement('a-cylinder'); struct.pole.setAttribute('radius', '0.008'); struct.pole.setAttribute('material', 'color: #888888; opacity: 0.6; shader: flat'); struct.pole.setAttribute('visible', 'false'); scene.appendChild(struct.pole);
          struct.label = document.createElement('a-text'); struct.label.setAttribute('align', 'center'); struct.label.setAttribute('color', '#00FF00'); struct.label.setAttribute('look-at-camera', ''); struct.label.setAttribute('visible', 'false'); scene.appendChild(struct.label);
          return struct;
        };

        this.pointA = Object.assign(this.pointA, createPointStructure('#FF1744'));
        this.pointB = Object.assign(this.pointB, createPointStructure('#2979FF'));
        this.pointC = Object.assign(this.pointC, createPointStructure('#00E676'));

        this.labelSegA = document.createElement('a-text'); this.labelSegA.setAttribute('align', 'center'); this.labelSegA.setAttribute('color', 'yellow'); this.labelSegA.setAttribute('look-at-camera', ''); this.labelSegA.setAttribute('visible', 'false'); scene.appendChild(this.labelSegA);
        this.labelSegB = document.createElement('a-text'); this.labelSegB.setAttribute('align', 'center'); this.labelSegB.setAttribute('color', 'yellow'); this.labelSegB.setAttribute('look-at-camera', ''); this.labelSegB.setAttribute('visible', 'false'); scene.appendChild(this.labelSegB);
        this.antennaTube1 = document.createElement('a-cylinder'); this.antennaTube1.setAttribute('radius', '0.015'); this.antennaTube1.setAttribute('material', 'color: #FF5722; shader: flat'); this.antennaTube1.setAttribute('visible', 'false'); scene.appendChild(this.antennaTube1);
        this.antennaTube2 = document.createElement('a-cylinder'); this.antennaTube2.setAttribute('radius', '0.015'); this.antennaTube2.setAttribute('material', 'color: #FF5722; shader: flat'); this.antennaTube2.setAttribute('visible', 'false'); scene.appendChild(this.antennaTube2);
        this.supportWireLine = document.createElement('a-entity'); scene.appendChild(this.supportWireLine);

        for(let i=0; i<this.maxRadials; i++) {
          let radCyl = document.createElement('a-cylinder'); radCyl.setAttribute('radius', '0.004'); radCyl.setAttribute('material', 'color: #5D4037; shader: flat'); radCyl.setAttribute('visible', 'false');
          scene.appendChild(radCyl); this.radialPool.push(radCyl);
        }

        this.libContainer = document.createElement('a-entity');
        this.libContainer.setAttribute('visible', 'false');
        scene.appendChild(this.libContainer);
        this.buildLibraryModel();
      },

      buildLibraryModel: function() {
        while (this.libContainer.firstChild) { this.libContainer.removeChild(this.libContainer.firstChild); }
        let model = this.antennaLibrary[this.libIdx];
        model.wires.forEach(w => {
          let cyl = document.createElement('a-entity');
          cyl.setAttribute('wire-element', `start: ${w[0]} ${w[1]} ${w[2]}; end: ${w[3]} ${w[4]} ${w[5]}`);
          cyl.setAttribute('material', `color: ${model.color}; shader: flat`);
          this.libContainer.appendChild(cyl);
        });
        let balun = document.createElement('a-box');
        balun.setAttribute('width', '0.07'); balun.setAttribute('height', '0.07'); balun.setAttribute('depth', '0.07');
        balun.setAttribute('material', 'color: #FFFFFF; shader: flat');
        this.libContainer.appendChild(balun);
      },

      resetAntennaLengths: function() {
        let bandMeters = parseInt(this.bands[this.bandIdx]);
        let quarterLambda = bandMeters / 4; 
        this.endFed_AC_Len = quarterLambda; this.endFed_CB_Len = quarterLambda;
        this.longwireLen = bandMeters; this.radialLen = quarterLambda; 
      },

      tick: function () {
        if (this.state.startsWith('PLACE_GROUND') || this.state.startsWith('REPOSITION_GROUND')) {
          let intersection = this.raycasterEl.components.raycaster.getIntersection(document.querySelector('#ar-ground'));
          if (intersection) {
            this.cursorRing.setAttribute('visible', 'true');
            this.cursorRing.setAttribute('position', intersection.point);
          } else {
            this.cursorRing.setAttribute('visible', 'false');
          }
        }
      },

      onTriggerDown: function () {
        // FIX CRITICO ANTI-CLICK: Controlla se il laser sta toccando il menu. Se sì, FERMA TUTTO.
        let intersectedEls = this.raycasterEl.components.raycaster.intersectedEls;
        if (this.menuUI.getAttribute('visible') && intersectedEls.length > 0) {
          let isHittingMenu = intersectedEls.some(el => el.classList.contains('clickable') || el.id === 'menu-bg');
          if (isHittingMenu) return; // Non piazzare pali se stiamo toccando l'interfaccia!
        }

        if (this.state === 'PLACE_GROUND_A' || this.state === 'REPOSITION_GROUND_A') {
          this.pointA.base = Object.assign({}, this.cursorRing.getAttribute('position'));
          this.state = this.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_A' : 'PLACE_HEIGHT_A';
          this.setupVerticalPreviewMode(this.pointA.base);

        } else if (this.state === 'PLACE_HEIGHT_A' || this.state === 'REPOSITION_HEIGHT_A') {
          this.pointA.top = { x: this.pointA.base.x, y: this.currentHeight, z: this.pointA.base.z };
          this.resetVerticalPreviewMode();
          if(this.state === 'REPOSITION_HEIGHT_A') {
            this.state = 'IDLE'; this.updateGeometriesAndDrawings();
          } else {
            if (this.appMode === 'LIBRARY' || this.antennaTypes[this.antIdx] === 'Verticale') {
              this.state = 'IDLE'; this.updateGeometriesAndDrawings();
            } else {
              this.state = 'PLACE_GROUND_B';
            }
          }

        } else if (this.state === 'PLACE_GROUND_B' || this.state === 'REPOSITION_GROUND_B') {
          this.pointB.base = Object.assign({}, this.cursorRing.getAttribute('position'));
          this.state = this.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_B' : 'PLACE_HEIGHT_B';
          this.setupVerticalPreviewMode(this.pointB.base);

        } else if (this.state === 'PLACE_HEIGHT_B' || this.state === 'REPOSITION_HEIGHT_B') {
          this.pointB.top = { x: this.pointB.base.x, y: this.currentHeight, z: this.pointB.base.z };
          this.resetVerticalPreviewMode();
          this.state = 'IDLE';
          this.updateGeometriesAndDrawings();
        }
      },

      onThumbstickMoved: function (evt) {
        if (this.state.includes('HEIGHT')) {
          if (Math.abs(evt.detail.y) > 0.4) {
            if (!this.lastThumbTime || Date.now() - this.lastThumbTime > 110) {
              let step = evt.detail.y < 0 ? 0.1 : -0.1; 
              this.currentHeight = Math.max(0.0, this.currentHeight + step); 
              let basePos = this.state.includes('_A') ? this.pointA.base : this.pointB.base;
              this.verticalCylinder.setAttribute('position', `${basePos.x} ${this.currentHeight / 2} ${basePos.z}`);
              this.verticalCylinder.setAttribute('geometry', `primitive: cylinder; radius: 0.01; height: ${Math.max(0.01, this.currentHeight)}`);
              this.heightText.setAttribute('position', `${basePos.x} ${this.currentHeight + 0.2} ${basePos.z}`);
              this.heightText.setAttribute('value', `${this.currentHeight.toFixed(1)}m`);
              this.lastThumbTime = Date.now();
            }
          }
        }
      },

      setupVerticalPreviewMode: function (basePos) {
        this.cursorRing.setAttribute('visible', 'false'); this.currentHeight = 0.0; 
        this.verticalCylinder.setAttribute('visible', 'true'); this.verticalCylinder.setAttribute('position', `${basePos.x} 0 ${basePos.z}`);
        this.verticalCylinder.setAttribute('geometry', 'primitive: cylinder; radius: 0.01; height: 0.01');
        this.heightText.setAttribute('visible', 'true'); this.heightText.setAttribute('position', `${basePos.x} 0.2 ${basePos.z}`);
        this.heightText.setAttribute('value', '0.0m (Alza col joystick)');
      },

      resetVerticalPreviewMode: function () {
        this.verticalCylinder.setAttribute('visible', 'false'); this.heightText.setAttribute('visible', 'false');
      },

      renderPoleAndLabel: function(struct, topPos, labelName) {
        if (!topPos) return;
        struct.sphere.setAttribute('visible', 'true'); struct.pole.setAttribute('visible', 'true'); struct.label.setAttribute('visible', 'true');
        struct.sphere.setAttribute('position', topPos);
        struct.pole.setAttribute('position', `${topPos.x} ${topPos.y / 2} ${topPos.z}`); struct.pole.setAttribute('geometry', `primitive: cylinder; radius: 0.008; height: ${topPos.y}`);
        struct.label.setAttribute('position', `${topPos.x} ${topPos.y / 2} ${topPos.z}`); struct.label.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`); struct.label.setAttribute('value', `${labelName}\nH: ${topPos.y.toFixed(2)}m`);
      },

      hideStructure: function(struct) { struct.sphere.setAttribute('visible', 'false'); struct.pole.setAttribute('visible', 'false'); struct.label.setAttribute('visible', 'false'); },

      executeHoldAction: function(action) {
        if (action === 'AC_MINUS') this.endFed_AC_Len = parseFloat(Math.max(0.05, this.endFed_AC_Len - 0.01).toFixed(2));
        if (action === 'AC_PLUS')  this.endFed_AC_Len = parseFloat((this.endFed_AC_Len + 0.01).toFixed(2));
        if (action === 'CB_MINUS') this.endFed_CB_Len = parseFloat(Math.max(0.05, this.endFed_CB_Len - 0.01).toFixed(2));
        if (action === 'CB_PLUS')  this.endFed_CB_Len = parseFloat((this.endFed_CB_Len + 0.01).toFixed(2));
        if (action === 'LW_MINUS') this.longwireLen = parseFloat(Math.max(0.1, this.longwireLen - 0.01).toFixed(2));
        if (action === 'LW_PLUS')  this.longwireLen = parseFloat((this.longwireLen + 0.01).toFixed(2));
        if (action === 'RAD_LEN_MINUS') this.radialLen = parseFloat(Math.max(0.1, this.radialLen - 0.1).toFixed(2));
        if (action === 'RAD_LEN_PLUS')  this.radialLen = parseFloat((this.radialLen + 0.1).toFixed(2));
        if (action === 'TXT_MINUS') this.globalTextScale = parseFloat(Math.max(0.15, this.globalTextScale - 0.01).toFixed(2));
        if (action === 'TXT_PLUS')  this.globalTextScale = parseFloat(Math.min(1.2, this.globalTextScale + 0.01).toFixed(2));
        
        // ROTAZIONE FLUIDA LIBRERIA
        if (action === 'ROT_MINUS') { this.libRotation -= 2; this.libContainer.setAttribute('rotation', `0 ${this.libRotation} 0`); }
        if (action === 'ROT_PLUS')  { this.libRotation += 2; this.libContainer.setAttribute('rotation', `0 ${this.libRotation} 0`); }

        this.updateMenuText();
        this.updateGeometriesAndDrawings();
      },

      updateMenuText: function() {
        if (this.appMode === 'LIBRARY') {
          document.querySelector('#ui-builder').setAttribute('visible', 'false');
          document.querySelector('#ui-library').setAttribute('visible', 'true');
          document.querySelector('#btn-repo-b').setAttribute('visible', 'false');
          let model = this.antennaLibrary[this.libIdx];
          document.querySelector('#txt-mode-val').setAttribute('value', 'MODO: LIBRERIA MMANA');
          document.querySelector('#txt-lib-name').setAttribute('value', model.name);
          document.querySelector('#info-text').setAttribute('value', `MODELLO DIRETTIVALE.\nUsa ROT per orientarlo.`);
        } else {
          document.querySelector('#ui-builder').setAttribute('visible', 'true');
          document.querySelector('#ui-library').setAttribute('visible', 'false');
          document.querySelector('#txt-mode-val').setAttribute('value', 'MODO: COSTRUZIONE FILARI');

          let type = this.antennaTypes[this.antIdx]; let band = this.bands[this.bandIdx]; let bandMeters = parseInt(band);
          document.querySelector('#txt-ant-val').setAttribute('value', type.toUpperCase());
          document.querySelector('#txt-band-val').setAttribute('value', band);

          document.querySelector('#sub-dipolo').setAttribute('visible', type === 'Dipolo');
          document.querySelector('#sub-endfed').setAttribute('visible', type === 'End Fed');
          document.querySelector('#sub-longwire').setAttribute('visible', type === 'Longwire');
          document.querySelector('#sub-verticale').setAttribute('visible', type === 'Verticale');
          document.querySelector('#btn-repo-b').setAttribute('visible', type !== 'Verticale');

          let infoTextStr = "";
          if (type === 'Dipolo') { infoTextStr = `ANTENNA: DIPOLO ½λ | BANDA: ${band}\nBRACCIO (1/4λ): ${(bandMeters/4).toFixed(2)}m | TOT: ${(bandMeters/2).toFixed(2)}m`; } 
          else if (type === 'End Fed') { infoTextStr = `ANTENNA: END FED | BANDA: ${band}\nAC: ${this.endFed_AC_Len.toFixed(2)}m | CB: ${this.endFed_CB_Len.toFixed(2)}m`; document.querySelector('#txt-ef-values').setAttribute('value', `AC: ${this.endFed_AC_Len.toFixed(2)}m  |  CB: ${this.endFed_CB_Len.toFixed(2)}m`); } 
          else if (type === 'Longwire') { infoTextStr = `ANTENNA: LONGWIRE 1λ | BANDA: ${band}\nVERTICE: ${this.longwireVertex} | FILO: ${this.longwireLen.toFixed(2)}m`; document.querySelector('#txt-lw-vertex-val').setAttribute('value', `VERTICE: DA ${this.longwireVertex}`); document.querySelector('#txt-lw-len-val').setAttribute('value', `LUNGH: ${this.longwireLen.toFixed(2)}m`); } 
          else if (type === 'Verticale') { infoTextStr = `ANTENNA: VERTICALE ¼λ | BANDA: ${band}\nSTILO: ${this.pointA.top ? this.pointA.top.y.toFixed(2) : 0}m | RADIALI: ${this.numRadials}`; document.querySelector('#txt-rad-num-val').setAttribute('value', `RADIALI: ${this.numRadials}`); document.querySelector('#txt-rad-len-val').setAttribute('value', `LUNGH R: ${this.radialLen.toFixed(2)}m`); }
          document.querySelector('#info-text').setAttribute('value', infoTextStr);
        }
      },

      updateGeometriesAndDrawings: function() {
        if (!this.pointA.top) return;
        let type = this.antennaTypes[this.antIdx];
        let bandMeters = parseInt(this.bands[this.bandIdx]);

        if (this.appMode === 'LIBRARY') {
          this.hideStructure(this.pointB); this.hideStructure(this.pointC);
          this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false');
          this.antennaTube1.setAttribute('visible', 'false'); this.antennaTube2.setAttribute('visible', 'false'); this.supportWireLine.setAttribute('visible', 'false');
          for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PALO SOSTEGNO');
          this.libContainer.setAttribute('visible', 'true'); this.libContainer.object3D.position.copy(this.pointA.top);
          return;
        }

        this.libContainer.setAttribute('visible', 'false');

        if (type === 'Verticale') {
          this.hideStructure(this.pointB); this.hideStructure(this.pointC);
          this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false');
          this.antennaTube2.setAttribute('visible', 'false'); this.supportWireLine.setAttribute('visible', 'false');

          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'STILO VERTICALE ¼λ');
          let h = this.pointA.top.y;
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.018; height: ${h}`);
          this.antennaTube1.object3D.position.set(this.pointA.top.x, h / 2, this.pointA.top.z); this.antennaTube1.object3D.rotation.set(0, 0, 0); 

          let base = new THREE.Vector3(this.pointA.base.x, 0.002, this.pointA.base.z);
          for (let i = 0; i < this.maxRadials; i++) {
            if (i < this.numRadials) {
              this.radialPool[i].setAttribute('visible', 'true'); this.radialPool[i].setAttribute('geometry', `primitive: cylinder; radius: 0.004; height: ${this.radialLen}`);
              let angle = (i * 2 * Math.PI) / this.numRadials; let targetVec = new THREE.Vector3(base.x + Math.cos(angle) * this.radialLen, 0.002, base.z + Math.sin(angle) * this.radialLen);
              let midPoint = new THREE.Vector3().lerpVectors(base, targetVec, 0.5);
              this.radialPool[i].object3D.position.copy(midPoint); this.radialPool[i].object3D.lookAt(targetVec); this.radialPool[i].object3D.rotateX(Math.PI / 2);
            } else { this.radialPool[i].setAttribute('visible', 'false'); }
          }
          return;
        }

        for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
        if (!this.pointB.top) return;

        this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PUNTO A'); this.renderPoleAndLabel(this.pointB, this.pointB.top, 'PUNTO B');
        let vecA = new THREE.Vector3(this.pointA.top.x, this.pointA.top.y, this.pointA.top.z);
        let vecB = new THREE.Vector3(this.pointB.top.x, this.pointB.top.y, this.pointB.top.z);
        let dirAB = new THREE.Vector3().subVectors(vecB, vecA).normalize(); let dirBA = new THREE.Vector3().subVectors(vecA, vecB).normalize();

        this.supportWireLine.setAttribute('visible', 'true');
        this.supportWireLine.setAttribute('line', `start: ${vecA.x} ${vecA.y} ${vecA.z}; end: ${vecB.x} ${vecB.y} ${vecB.z}; color: #FFFFFF; opacity: 0.4`);
        let vecC = new THREE.Vector3().lerpVectors(vecA, vecB, this.pointC.percent); this.pointC.top = vecC;

        if (type === 'Dipolo') {
          this.renderPoleAndLabel(this.pointC, this.pointC.top, 'CENTRO C');
          let armLen = bandMeters / 4; 
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${armLen}`);
          this.antennaTube1.object3D.position.copy(vecC).addScaledVector(dirBA, armLen / 2); this.antennaTube1.object3D.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dirBA));
          this.antennaTube2.setAttribute('visible', 'true'); this.antennaTube2.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${armLen}`);
          this.antennaTube2.object3D.position.copy(vecC).addScaledVector(dirAB, armLen / 2); this.antennaTube2.object3D.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dirAB));
          
          let extLeft = new THREE.Vector3().copy(vecC).addScaledVector(dirBA, armLen); let extRight = new THREE.Vector3().copy(vecC).addScaledVector(dirAB, armLen);
          this.labelSegA.setAttribute('visible', 'true'); this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extLeft, 0.5)); this.labelSegA.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`); this.labelSegA.setAttribute('value', `Tirante A:\n${vecA.distanceTo(extLeft).toFixed(2)}m`);
          this.labelSegB.setAttribute('visible', 'true'); this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extRight, vecB, 0.5)); this.labelSegB.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`); this.labelSegB.setAttribute('value', `Tirante B:\n${extRight.distanceTo(vecB).toFixed(2)}m`);

        } else if (type === 'End Fed') {
          this.renderPoleAndLabel(this.pointC, this.pointC.top, 'CENTRO C');
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_AC_Len}`);
          this.antennaTube1.object3D.position.copy(vecC).addScaledVector(dirBA, this.endFed_AC_Len / 2); this.antennaTube1.object3D.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dirBA));
          this.antennaTube2.setAttribute('visible', 'true'); this.antennaTube2.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_CB_Len}`);
          this.antennaTube2.object3D.position.copy(vecC).addScaledVector(dirAB, this.endFed_CB_Len / 2); this.antennaTube2.object3D.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dirAB));
          
          let extAC = new THREE.Vector3().copy(vecC).addScaledVector(dirBA, this.endFed_AC_Len); let extCB = new THREE.Vector3().copy(vecC).addScaledVector(dirAB, this.endFed_CB_Len);
          this.labelSegA.setAttribute('visible', 'true'); this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extAC, 0.5)); this.labelSegA.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`); this.labelSegA.setAttribute('value', `Tirante A:\n${vecA.distanceTo(extAC).toFixed(2)}m`);
          this.labelSegB.setAttribute('visible', 'true'); this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extCB, vecB, 0.5)); this.labelSegB.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`); this.labelSegB.setAttribute('value', `Tirante B:\n${extCB.distanceTo(vecB).toFixed(2)}m`);

        } else if (type === 'Longwire') {
          this.hideStructure(this.pointC); this.antennaTube2.setAttribute('visible', 'false');
          let startVec = this.longwireVertex === 'A' ? vecA : vecB; let targetVec = this.longwireVertex === 'A' ? vecB : vecA; let dirLW = new THREE.Vector3().subVectors(targetVec, startVec).normalize();
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.longwireLen}`);
          this.antennaTube1.object3D.position.copy(startVec).addScaledVector(dirLW, this.longwireLen / 2); this.antennaTube1.object3D.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dirLW));
          
          let extLW = new THREE.Vector3().copy(startVec).addScaledVector(dirLW, this.longwireLen);
          this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'true');
          this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extLW, targetVec, 0.5)); this.labelSegB.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`); this.labelSegB.setAttribute('value', `Tirante:\n${extLW.distanceTo(targetVec).toFixed(2)}m`);
        }
      },

      setupMenuInteractions: function() {
        document.querySelector('#btn-mode').addEventListener('click', () => { this.appMode = this.appMode === 'BUILDER' ? 'LIBRARY' : 'BUILDER'; if(this.appMode === 'LIBRARY') this.state = 'REPOSITION_GROUND_A'; this.updateMenuText(); this.updateGeometriesAndDrawings(); });
        document.querySelector('#btn-lib-prev').addEventListener('click', () => { this.libIdx = (this.libIdx - 1 + this.antennaLibrary.length) % this.antennaLibrary.length; this.buildLibraryModel(); this.updateMenuText(); this.updateGeometriesAndDrawings(); });
        document.querySelector('#btn-lib-next').addEventListener('click', () => { this.libIdx = (this.libIdx + 1) % this.antennaLibrary.length; this.buildLibraryModel(); this.updateMenuText(); this.updateGeometriesAndDrawings(); });
        document.querySelector('#btn-ant').addEventListener('click', () => { this.antIdx = (this.antIdx + 1) % this.antennaTypes.length; this.resetAntennaLengths(); this.updateMenuText(); this.updateGeometriesAndDrawings(); });
        document.querySelector('#btn-band').addEventListener('click', () => { this.bandIdx = (this.bandIdx + 1) % this.bands.length; this.resetAntennaLengths(); this.updateMenuText(); this.updateGeometriesAndDrawings(); });
        document.querySelector('#btn-c-left').addEventListener('click', () => { this.pointC.percent = Math.max(0.02, this.pointC.percent - 0.05); this.updateGeometriesAndDrawings(); });
        document.querySelector('#btn-c-right').addEventListener('click', () => { this.pointC.percent = Math.min(0.98, this.pointC.percent + 0.05); this.updateGeometriesAndDrawings(); });
        document.querySelector('#btn-lw-vertex').addEventListener('click', () => { this.longwireVertex = this.longwireVertex === 'A' ? 'B' : 'A'; this.updateMenuText(); this.updateGeometriesAndDrawings(); });
        
        document.querySelector('#btn-rad-num-minus').addEventListener('click', () => { this.numRadials = Math.max(1, this.numRadials - 1); this.updateMenuText(); this.updateGeometriesAndDrawings(); });
        document.querySelector('#btn-rad-num-plus').addEventListener('click', () => { this.numRadials = Math.min(this.maxRadials, this.numRadials + 1); this.updateMenuText(); this.updateGeometriesAndDrawings(); });
        
        document.querySelector('#btn-repo-a').addEventListener('click', () => { this.state = 'REPOSITION_GROUND_A'; });
        document.querySelector('#btn-repo-b').addEventListener('click', () => { this.state = 'REPOSITION_GROUND_B'; });
        document.querySelector('#btn-reset').addEventListener('click', () => { this.resetEntireSystem(); });
      }
    });
  </script>
</head>
<body>
  
  <a-scene ar-antenna-system webxr="optionalFeatures: passthrough; referenceSpaceType: local-floor" vr-mode-ui="enabled: true">
    
    <a-entity id="cameraRig">
      <a-camera id="camera" position="0 1.6 0"></a-camera>
      
      <!-- CONTROLLER SINISTRO (Menu Olografico da Polso) -->
      <a-entity id="left-controller" laser-controls="hand: left" windows-motion-controls="hand: left">
        <a-entity id="menu-ui" visible="false" position="0 0.12 -0.12" rotation="-30 0 0">
          
          <!-- SFONDO MENU ATTIVO PER IL RAYCASTER (#menu-bg) -->
          <a-plane id="menu-bg" width="0.32" height="0.52" color="#1A1A1A" material="opacity: 0.96; shader: flat"></a-plane>
          
          <a-text value="ANTENNE AR PRO V6" position="0 0.23 0.01" align="center" scale="0.08 0.08 0.08" color="#FFEB3B"></a-text>
          <a-plane width="0.28" height="0.04" color="#2A2A2A" position="0 0.18 0.01">
            <a-text id="info-text" value="Pronto. Usa il laser destro." position="-0.13 0 0.01" scale="0.05 0.05 0.05" color="#00E676"></a-text>
          </a-plane>

          <a-plane id="btn-mode" class="clickable" btn-interaction width="0.28" height="0.03" color="#4A148C" position="0 0.13 0.01">
            <a-text id="txt-mode-val" value="MODO: COSTRUZIONE FILARI" align="center" scale="0.055 0.055 0.055" color="#FFFFFF" position="0 0 0.005"></a-text>
          </a-plane>

          <!-- LIBRERIA -->
          <a-entity id="ui-library" visible="false">
            <a-text value="SFOGLIA MODELLI MMANA-GAL" align="center" scale="0.045 0.045 0.045" color="#B0BEC5" position="0 0.07 0"></a-text>
            <a-plane id="btn-lib-prev" class="clickable" btn-interaction width="0.04" height="0.025" color="#006064" position="-0.1 0.04 0.01"><a-text value="<" align="center" scale="0.07 0.07 0.07"></a-text></a-plane>
            <a-plane width="0.14" height="0.025" color="#263238" position="0 0.04 0.01"><a-text id="txt-lib-name" value="-" align="center" scale="0.05 0.05 0.05" color="#FFEB3B"></a-text></a-plane>
            <a-plane id="btn-lib-next" class="clickable" btn-interaction width="0.04" height="0.025" color="#006064" position="0.1 0.04 0.01"><a-text value=">" align="center" scale="0.07 0.07 0.07"></a-text></a-plane>
            
            <a-text value="ORIENTAMENTO AZIMUTH ANTENNA" align="center" scale="0.045 0.045 0.045" color="#B0BEC5" position="0 -0.02 0"></a-text>
            <a-plane id="btn-rot-left" class="clickable" btn-interaction hold-clickable="action: ROT_MINUS" width="0.09" height="0.025" color="#E65100" position="-0.06 -0.05 0.01">
              <a-text value="ROT. [-]" align="center" scale="0.05 0.05 0.05" position="0 0 0.003"></a-text>
            </a-plane>
            <a-plane id="btn-rot-right" class="clickable" btn-interaction hold-clickable="action: ROT_PLUS" width="0.09" height="0.025" color="#E65100" position="0.06 -0.05 0.01">
              <a-text value="ROT. [+]" align="center" scale="0.05 0.05 0.05" position="0 0 0.003"></a-text>
            </a-plane>
          </a-entity>

          <!-- BUILDER -->
          <a-entity id="ui-builder" visible="true">
            <a-plane id="btn-ant" class="clickable" btn-interaction width="0.13" height="0.03" color="#37474F" position="-0.07 0.07 0.01">
              <a-text value="ANTENNA:" align="center" scale="0.05 0.05 0.05" position="0 0.006 0.003" color="#B0BEC5"></a-text>
              <a-text id="txt-ant-val" value="-" align="center" scale="0.06 0.06 0.06" position="0 -0.006 0.003"></a-text>
            </a-plane>
            <a-plane id="btn-band" class="clickable" btn-interaction width="0.13" height="0.03" color="#1A237E" position="0.07 0.07 0.01">
              <a-text value="BANDA:" align="center" scale="0.05 0.05 0.05" position="0 0.006 0.003" color="#9FA8DA"></a-text>
              <a-text id="txt-band-val" value="-" align="center" scale="0.07 0.07 0.07" position="0 -0.006 0.003"></a-text>
            </a-plane>

            <a-entity id="sub-dipolo" position="0 0 0" visible="false">
              <a-text value="SPOSTA C TRALICCIO" align="center" scale="0.05 0.05 0.05" color="#B0BEC5" position="0 0.02 0"></a-text>
              <a-plane id="btn-c-left" class="clickable" btn-interaction width="0.13" height="0.025" color="#004D40" position="-0.07 -0.01 0.01"><a-text value="<- Verso A" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-plane id="btn-c-right" class="clickable" btn-interaction width="0.13" height="0.025" color="#004D40" position="0.07 -0.01 0.01"><a-text value="Verso B ->" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
            </a-entity>

            <a-entity id="sub-endfed" position="0 0 0" visible="false">
              <a-text value="REGOLAZIONE FINE BRACCI (1cm)" align="center" scale="0.045 0.045 0.045" color="#B0BEC5" position="0 0.02 0"></a-text>
              <a-plane class="clickable" btn-interaction hold-clickable="action: AC_MINUS" width="0.05" height="0.02" color="#3e2723" position="-0.11 -0.01 0.01"><a-text value="AC -" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-plane class="clickable" btn-interaction hold-clickable="action: AC_PLUS" width="0.05" height="0.02" color="#3e2723" position="-0.04 -0.01 0.01"><a-text value="AC +" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-plane class="clickable" btn-interaction hold-clickable="action: CB_MINUS" width="0.05" height="0.02" color="#1565c0" position="0.04 -0.01 0.01"><a-text value="CB -" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-plane class="clickable" btn-interaction hold-clickable="action: CB_PLUS" width="0.05" height="0.02" color="#1565c0" position="0.11 -0.01 0.01"><a-text value="CB +" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-text id="txt-ef-values" value="-" align="center" scale="0.055 0.055 0.055" color="#FFEB3B" position="0 -0.03 0"></a-text>
            </a-entity>

            <a-entity id="sub-longwire" position="0 0 0" visible="false">
              <a-text value="CONFIGURA CAVO LONGWIRE" align="center" scale="0.05 0.05 0.05" color="#B0BEC5" position="0 0.02 0"></a-text>
              <a-plane id="btn-lw-vertex" class="clickable" btn-interaction width="0.1" height="0.02" color="#006064" position="-0.08 -0.01 0.01"><a-text id="txt-lw-vertex-val" value="-" align="center" scale="0.045 0.045 0.045"></a-text></a-plane>
              <a-plane class="clickable" btn-interaction hold-clickable="action: LW_MINUS" width="0.05" height="0.02" color="#424242" position="0.01 -0.01 0.01"><a-text value="L -" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-plane class="clickable" btn-interaction hold-clickable="action: LW_PLUS" width="0.05" height="0.02" color="#424242" position="0.08 -0.01 0.01"><a-text value="L +" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-text id="txt-lw-len-val" value="-" align="center" scale="0.06 0.06 0.06" color="#FFEB3B" position="0 -0.03 0"></a-text>
            </a-entity>

            <a-entity id="sub-verticale" position="0 0 0" visible="false">
              <a-text value="RADIALI COASSIALI A TERRA" align="center" scale="0.045 0.045 0.045" color="#B0BEC5" position="0 0.02 0"></a-text>
              <a-plane id="btn-rad-num-minus" class="clickable" btn-interaction width="0.04" height="0.02" color="#3e2723" position="-0.11 -0.01 0.01"><a-text value="N -" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-plane id="btn-rad-num-plus" class="clickable" btn-interaction width="0.04" height="0.02" color="#3e2723" position="-0.05 -0.01 0.01"><a-text value="N +" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-plane class="clickable" btn-interaction hold-clickable="action: RAD_LEN_MINUS" width="0.05" height="0.02" color="#4e342e" position="0.04 -0.01 0.01"><a-text value="L -" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-plane class="clickable" btn-interaction hold-clickable="action: RAD_LEN_PLUS" width="0.05" height="0.02" color="#4e342e" position="0.11 -0.01 0.01"><a-text value="L +" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
              <a-text id="txt-rad-num-val" value="-" align="center" scale="0.05 0.05 0.05" color="#FFEB3B" position="-0.08 -0.03 0"></a-text>
              <a-text id="txt-rad-len-val" value="-" align="center" scale="0.05 0.05 0.05" color="#FFEB3B" position="0.08 -0.03 0"></a-text>
            </a-entity>
          </a-entity>

          <!-- SCALE ETICHETTE -->
          <a-text value="DIMENSIONE SCALE QUOTE 3D" position="0 -0.08 0.01" align="center" scale="0.05 0.05 0.05" color="#B0BEC5"></a-text>
          <a-plane class="clickable" btn-interaction hold-clickable="action: TXT_MINUS" width="0.1" height="0.02" color="#424242" position="-0.06 -0.11 0.01"><a-text value="TESTO [-]" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
          <a-plane class="clickable" btn-interaction hold-clickable="action: TXT_PLUS" width="0.1" height="0.02" color="#424242" position="0.06 -0.11 0.01"><a-text value="TESTO [+]" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>

          <a-text value="MODIFICA PUNTI BASE" position="0 -0.15 0.01" align="center" scale="0.05 0.05 0.05" color="#FF1744"></a-text>
          <a-plane id="btn-repo-a" class="clickable" btn-interaction width="0.13" height="0.025" color="#C62828" position="-0.07 -0.18 0.01"><a-text value="Modifica A" align="center" scale="0.05 0.05 0.05" color="#FFFFFF"></a-text></a-plane>
          <a-plane id="btn-repo-b" class="clickable" btn-interaction width="0.13" height="0.025" color="#1565C0" position="0.07 -0.18 0.01"><a-text value="Modifica B" align="center" scale="0.05 0.05 0.05" color="#FFFFFF"></a-text></a-plane>

          <!-- RESET -->
          <a-plane id="btn-reset" class="clickable" btn-interaction width="0.27" height="0.025" color="#D32F2F" position="0 -0.22 0.01">
            <a-text value="RESETTA E RICOMINCIA" align="center" scale="0.055 0.055 0.055" color="#FFFFFF"></a-text>
          </a-plane>
        </a-entity>
      </a-entity>
      
      <!-- CONTROLLER DESTRO: Spara il laser visivo rosso (Ora include #menu-bg tra le collisioni) -->
      <a-entity id="right-controller" laser-controls="hand: right" oculus-touch-controls="hand: right" raycaster="objects: .clickable, #ar-ground, #menu-bg; far: 40; showLine: true; lineColor: red; lineOpacity: 0.8;"></a-entity>
    </a-entity>

    <a-plane id="ar-ground" position="0 0 0" rotation="-90 0 0" width="100" height="100" material="opacity: 0.0; transparent: true"></a-plane>

    <a-ring id="cursor-ring" color="#FFFFFF" radius-inner="0.04" radius-outer="0.05" rotation="-90 0 0" visible="false"></a-ring>
    <a-entity id="vertical-cylinder" geometry="primitive: cylinder" material="color: #FFEB3B; shader: flat" visible="false"></a-entity>
    <a-text id="height-text" value="" align="center" color="#00FF00" scale="0.35 0.35 0.35" visible="false" look-at-camera></a-text>

  </a-scene>
</body>
</html>
