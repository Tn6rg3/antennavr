<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisi Corsa AR Biomeccanica - Quest 3 Browser</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Area Video (Passthrough Feed) */
        .video-wrapper {
            flex: 1;
            position: relative;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #333;
        }

        video {
            display: none; /* Nascondiamo il video grezzo */
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene le proporzioni */
        }

        /* Dashboard Laterale (Tabella Dati) */
        .dashboard {
            width: 380px;
            background-color: #1e1e1e;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        h2 {
            margin-top: 0;
            color: #4CAF50;
            font-weight: 300;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .section {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .data-card {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }

        .data-label {
            font-size: 0.8rem;
            color: #aaa;
        }

        .data-value {
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 5px;
            color: #fff;
        }

        .data-unit {
            font-size: 0.9rem;
            font-weight: 300;
            color: #ccc;
            margin-left: 3px;
        }

        .eval-status {
            display: flex;
            align-items: center;
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Colori Valutazione */
        .status-neutral { background-color: #444; color: #fff; }
        .status-good { background-color: rgba(76, 175, 80, 0.2); color: #81C784; border: 1px solid #4CAF50; }
        .status-warn { background-color: rgba(255, 152, 0, 0.2); color: #FFB74D; border: 1px solid #FF9800; }
        .status-bad { background-color: rgba(244, 67, 54, 0.2); color: #E57373; border: 1px solid #F44336; }

    </style>
</head>
<body>

    <div class="main-container">
        <div class="video-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div class="dashboard">
            <h2>Analisi Tecnica Corsa</h2>
            
            <div class="data-box">
                <div class="data-label">Stato Tracciamento</div>
                <div class="eval-status status-neutral" id="tracking-status">In attesa...</div>
            </div>

            <div class="section">
                <div class="section-title">Vista Rilevata</div>
                <div class="data-value" id="view-mode">Determinazione...</div>
            </div>

            <div id="panel-lateral" style="display: none;">
                <div class="data-grid">
                    <div class="data-card">
                        <div class="data-label">Angolo Ginocchio (Media)</div>
                        <div class="data-value"><span id="knee-angle">0</span><span class="data-unit">°</span></div>
                    </div>
                </div>
                <div class="data-label">Valutazione Appoggio</div>
                <div class="eval-status status-neutral" id="strike-eval">Attesa fase di stance</div>
            </div>

            <div id="panel-posterior" style="display: none;">
                <div class="data-grid">
                    <div class="data-card">
                        <div class="data-label">Oscillazione Bacino</div>
                        <div class="data-value"><span id="oscillation">0</span><span class="data-unit">%</span></div>
                    </div>
                </div>
                <div class="data-label">Stabilità Caviglie</div>
                <div class="eval-status status-neutral" id="pronation-eval">Analisi neutra</div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // Configurazione medie mobili (smoothing)
        let kneeAngles = [];
        let hipPositionsX = [];
        const maxSamplesLaterale = 15; // Più reattivo per l'appoggio
        const maxSamplesPosteriore = 40; // Più lento per l'oscillazione

        // Calcolo angolo interno tra 3 punti 2D
        function calculateAngle(a, b, c) {
            let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return angle;
        }

        // Semplice media mobile
        function getAverage(arr) {
            if(arr.length === 0) return 0;
            return arr.reduce((a, b) => a + b) / arr.length;
        }

        function updateEvalStatus(elementId, text, statusClass) {
            const el = document.getElementById(elementId);
            el.innerText = text;
            el.className = `eval-status ${statusClass}`;
        }

        function onResults(results) {
            // Setup Canvas dinamico
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Disegna il feed Passthrough grezzo
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;
                updateEvalStatus('tracking-status', 'Tracciamento Attivo', 'status-good');

                // --- 1. BIOMECCANICA: Determinazione della Vista ---
                // Confrontiamo la larghezza relativa delle spalle per capire l'orientamento
                const leftShoulder = landmarks[11];
                const rightShoulder = landmarks[12];
                const shoulderWidthRel = Math.abs(leftShoulder.x - rightShoulder.x);
                
                // Soglia empirica: se la larghezza spalle è > 18% dello schermo è Posteriore
                const isPosteriorView = shoulderWidthRel > 0.18; 
                
                document.getElementById('view-mode').innerText = isPosteriorView ? "Posteriore / Frontale" : "Laterale (Profilo)";
                document.getElementById('panel-lateral').style.display = isPosteriorView ? "none" : "block";
                document.getElementById('panel-posterior').style.display = isPosteriorView ? "block" : "none";

                // --- 2. LOGICA DI DISEGNO E ANALISI SPECIFICA ---
                if (!isPosteriorView) {
                    // VISTA LATERALE: Analisi tecnica appoggio
                    // Mostriamo solo il lato più vicino alla telecamera
                    const isRightSide = landmarks[26].visibility > landmarks[25].visibility;
                    const cColor = isRightSide ? '#00FFFF' : '#FF00FF'; // Ciano Dx, Magenta Sx
                    
                    const hip = isRightSide ? landmarks[24] : landmarks[23];
                    const knee = isRightSide ? landmarks[26] : landmarks[25];
                    const ankle = isRightSide ? landmarks[28] : landmarks[27];
                    const footIndex = isRightSide ? landmarks[32] : landmarks[31];

                    // Disegno Scheletro Laterale Semplificato (Anca->Piede)
                    if (hip.visibility > 0.6 && knee.visibility > 0.6 && ankle.visibility > 0.6) {
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(hip.x * canvasElement.width, hip.y * canvasElement.height);
                        canvasCtx.lineTo(knee.x * canvasElement.width, knee.y * canvasElement.height);
                        canvasCtx.lineTo(ankle.x * canvasElement.width, ankle.y * canvasElement.height);
                        canvasCtx.lineTo(footIndex.x * canvasElement.width, footIndex.y * canvasElement.height);
                        canvasCtx.strokeStyle = cColor;
                        canvasCtx.lineWidth = 6;
                        canvasCtx.stroke();

                        // Disegno Punti
                        [hip, knee, ankle, footIndex].forEach(lm => {
                             canvasCtx.beginPath();
                             canvasCtx.arc(lm.x * canvasElement.width, lm.y * canvasElement.height, 6, 0, 2*Math.PI);
                             canvasCtx.fillStyle = '#fff';
                             canvasCtx.fill();
                        });

                        // --- BIOMECCANICA LATERALE ---
                        // 1. Calcolo Angolo Ginocchio
                        const angle = calculateAngle(hip, knee, ankle);
                        kneeAngles.push(angle);
                        if(kneeAngles.length > maxSamplesLaterale) kneeAngles.shift();
                        
                        const avgKneeAngle = getAverage(kneeAngles);
                        document.getElementById('knee-angle').innerText = avgKneeAngle.toFixed(1);

                        // 2. Valutazione semplificata fase di stance
                        // Logica: se il ginocchio è molto teso (>165°) vicino all'impatto (caviglia bassa)
                        // probabilmente è un Heel Strike.
                        if (avgKneeAngle > 168) {
                            updateEvalStatus('strike-eval', 'Heel Strike Probabile (Tallone)', 'status-bad');
                        } else if (avgKneeAngle > 145) {
                            updateEvalStatus('strike-eval', 'Midfoot / Forefoot (Mesopiede)', 'status-good');
                        } else if (avgKneeAngle < 135) {
                            updateEvalStatus('strike-eval', 'Overstriding / Gamba troppo flessa', 'status-warn');
                        } else {
                            updateEvalStatus('strike-eval', 'Analisi in corso...', 'status-neutral');
                        }
                    }

                } else {
                    // VISTA POSTERIORE: Stabilità e Oscillazione
                    // Disegno Scheletro Completo standard
                    drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                    drawLandmarks(canvasCtx, landmarks, {color: '#F44336', lineWidth: 2, radius: 3});

                    // --- BIOMECCANICA POSTERIORE ---
                    // 1. Oscillazione Laterale Bacino (X del centro tra le anche)
                    const midHipX = (landmarks[23].x + landmarks[24].x) / 2;
                    hipPositionsX.push(midHipX);
                    if(hipPositionsX.length > maxSamplesPosteriore) hipPositionsX.shift();

                    const minX = Math.min(...hipPositionsX);
                    const maxX = Math.max(...hipPositionsX);
                    // Oscillazione come percentuale della larghezza della vista video
                    const oscillationRel = (maxX - minX) * 100; 

                    document.getElementById('oscillation').innerText = oscillationRel.toFixed(1);

                    // 2. Valutazione Stabilità
                    if (oscillationRel > 13) {
                        updateEvalStatus('pronation-eval', 'Eccessiva oscillazione laterale', 'status-bad');
                    } else if (oscillationRel > 8) {
                        updateEvalStatus('pronation-eval', 'Lieve instabilità', 'status-warn');
                    } else {
                        updateEvalStatus('pronation-eval', 'Bacino Stabile', 'status-good');
                    }
                }
            } else {
                updateEvalStatus('tracking-status', 'Corpo non rilevato', 'status-bad');
            }
            canvasCtx.restore();
        }

        // Configurazione MediaPipe Pose
        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1, // 0 veloce, 1 bilanciato, 2 preciso
            smoothLandmarks: true,
            enableSegmentation: false,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        pose.onResults(onResults);

        // Cattura Fotocamera (getUserMedia)
        // Sul Quest cattura la vista Passthrough
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        camera.start();
    </script>
</body>
</html>
