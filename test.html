<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner 3D Definitivo + Export</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px; }
        #point-counter { color: #00ffff; font-family: monospace; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="info">
        <b>Grilletti (Tieni premuti)</b>: Mappa le superfici reali<br>
        <b>Pulsante Y (Sinistro)</b>: Salva ed esporta Modello 3D (.PLY)<br>
        <b>Pulsante X (Sinistro)</b>: Cancella scansione<br>
        <div id="point-counter">Celle Rete: 0 / 50000</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        
        // Importiamo i moduli per unire la mesh ed esportare il file 3D
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
        import { PLYExporter } from 'three/addons/exporters/PLYExporter.js';

        let camera, scene, renderer;
        
        const MAX_HEXAGONS = 50000; 
        const HEX_RADIUS = 0.05; // 5 centimetri
        const VOXEL_SIZE = 0.1;  // Griglia spaziale di 10 centimetri
        
        let instancedMesh;
        let voxelGrid = new Set(); 
        
        let lastButtonPressTime = 0;
        let isExporting = false;
        const uiCounter = document.getElementById('point-counter');

        const dummyMatrix = new THREE.Matrix4();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            light.position.set(0, 2, 0);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            function buildControllerPointer() {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0, 0, -1) 
                ]);
                const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
                return new THREE.Line(geometry, material);
            }

            for (let i = 0; i < 2; i++) {
                const controller = renderer.xr.getController(i);
                
                controller.userData = { handedness: null, isScanning: false, hitTestSource: null };

                controller.addEventListener('connected', function (event) {
                    this.userData.handedness = event.data.handedness;
                    this.add(buildControllerPointer());
                    renderer.xr.getSession().requestHitTestSource({ space: event.data.targetRaySpace })
                        .then(source => { this.userData.hitTestSource = source; })
                        .catch(console.error);
                });

                controller.addEventListener('selectstart', function () { this.userData.isScanning = true; });
                controller.addEventListener('selectend', function () { this.userData.isScanning = false; });

                scene.add(controller);
            }

            // CREAZIONE RETE (Correzione bug invisibilità)
            const geometry = new THREE.RingGeometry(HEX_RADIUS - 0.005, HEX_RADIUS, 6);
            geometry.rotateX(-Math.PI / 2);
            geometry.rotateY(Math.PI / 6);

            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });

            instancedMesh = new THREE.InstancedMesh(geometry, material, MAX_HEXAGONS);
            instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            instancedMesh.count = 0;
            
            // IL FIX FONDAMENTALE CHE MANCAVA:
            instancedMesh.frustumCulled = false; 
            
            scene.add(instancedMesh);
            window.addEventListener('resize', onWindowResize);
        }

        function clearScannedMesh() {
            instancedMesh.count = 0;
            instancedMesh.instanceMatrix.needsUpdate = true;
            voxelGrid.clear(); 
            
            uiCounter.textContent = `Celle Rete: 0 / ${MAX_HEXAGONS} (RESET)`;
            uiCounter.style.color = "#ff0000";
            setTimeout(() => { uiCounter.style.color = "#00ffff"; }, 1000);
        }

        // --- SISTEMA DI ESPORTAZIONE 3D (.PLY) ---
        function exportMeshToPLY() {
            if (instancedMesh.count === 0 || isExporting) return;
            isExporting = true;

            uiCounter.textContent = "ESPORTAZIONE IN CORSO... ATTENDI";
            uiCounter.style.color = "#ffff00";

            // Creiamo un array di geometrie piatte per ogni esagono disegnato
            const geometries = [];
            const baseGeo = instancedMesh.geometry.clone();

            for ( let i = 0; i < instancedMesh.count; i ++ ) {
                const matrix = new THREE.Matrix4();
                instancedMesh.getMatrixAt( i, matrix );
                const geo = baseGeo.clone();
                geo.applyMatrix4( matrix ); // Inclina e posiziona il singolo esagono
                geometries.push( geo );
            }

            // Fondiamo i migliaia di esagoni in un unico oggetto solido
            const mergedGeometry = BufferGeometryUtils.mergeGeometries( geometries );
            const finalMesh = new THREE.Mesh( mergedGeometry, new THREE.MeshBasicMaterial() );

            // Generiamo il file
            const exporter = new PLYExporter();
            exporter.parse( finalMesh, function ( result ) {
                const blob = new Blob( [ result ], { type: 'text/plain' } );
                const url = URL.createObjectURL( blob );
                
                // Inganniamo il browser simulando un clic su un link per forzare il download
                const link = document.createElement( 'a' );
                link.style.display = 'none';
                link.href = url;
                link.download = 'Scansione_Stanza.ply';
                document.body.appendChild( link );
                link.click();
                document.body.removeChild( link );
                
                uiCounter.textContent = "DOWNLOAD COMPLETATO! FILE SALVATO.";
                uiCounter.style.color = "#00ff00";
                
                setTimeout(() => { 
                    uiCounter.textContent = `Celle Rete: ${instancedMesh.count} / ${MAX_HEXAGONS}`; 
                    uiCounter.style.color = "#00ffff";
                    isExporting = false;
                }, 3000);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                const now = performance.now();

                // GESTIONE PULSANTI
                for (const source of session.inputSources) {
                    if (source.handedness === 'left' && source.gamepad) {
                        
                        // Pulsante X (Indice 4) - Cancella
                        if (source.gamepad.buttons[4] && source.gamepad.buttons[4].pressed) {
                            if (now - lastButtonPressTime > 500) {
                                lastButtonPressTime = now;
                                clearScannedMesh();
                            }
                        }
                        
                        // Pulsante Y (Indice 5) - Esporta
                        if (source.gamepad.buttons[5] && source.gamepad.buttons[5].pressed) {
                            if (now - lastButtonPressTime > 1000) { // Pausa più lunga per evitare doppi download
                                lastButtonPressTime = now;
                                exportMeshToPLY();
                            }
                        }
                    }
                }

                // SCANSIONE CON I GRILLETTI
                const c0 = renderer.xr.getController(0);
                const c1 = renderer.xr.getController(1);
                const controllers = [c0, c1];

                let meshAdded = false;

                controllers.forEach(ctrl => {
                    if (ctrl.userData.isScanning && ctrl.userData.hitTestSource && instancedMesh.count < MAX_HEXAGONS && !isExporting) {
                        const hits = frame.getHitTestResults(ctrl.userData.hitTestSource);
                        
                        if (hits.length > 0) {
                            const pose = hits[0].getPose(referenceSpace);
                            const pos = new THREE.Vector3().setFromMatrixPosition(dummyMatrix.fromArray(pose.transform.matrix));

                            const voxelKey = `${Math.floor(pos.x / VOXEL_SIZE)},${Math.floor(pos.y / VOXEL_SIZE)},${Math.floor(pos.z / VOXEL_SIZE)}`;

                            if (!voxelGrid.has(voxelKey)) {
                                voxelGrid.add(voxelKey); 
                                instancedMesh.setMatrixAt(instancedMesh.count, dummyMatrix);
                                instancedMesh.count++;
                                meshAdded = true;
                            }
                        }
                    }
                });

                if (meshAdded) {
                    instancedMesh.instanceMatrix.needsUpdate = true;
                    if (instancedMesh.count % 10 === 0 || instancedMesh.count === MAX_HEXAGONS) {
                        uiCounter.textContent = `Celle Rete: ${instancedMesh.count} / ${MAX_HEXAGONS}`;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
