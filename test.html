<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Hit-Test Sicuro</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    AFRAME.registerComponent('debug-hit-test', {
      init: function() {
        this.statusText = document.querySelector('#status-text');
        this.reticle = document.querySelector('#reticle');
        this.hitTestSource = null;
        this.localSpace = null;

        // Quando entri in AR, avvia il sensore di profondità
        this.el.sceneEl.addEventListener('enter-vr', () => {
          if (this.el.sceneEl.is('ar-mode')) {
            this.statusText.setAttribute('value', 'Sei in AR!\nCerco superfici fisiche...');
            this.statusText.setAttribute('color', '#00FF00');
            this.startHitTest();
          } else {
            this.statusText.setAttribute('value', 'Sei entrato in VR (schermo nero).\nEsci e clicca il tasto "AR" in basso a destra.');
            this.statusText.setAttribute('color', '#FF0000');
          }
        });
      },

      startHitTest: function() {
        let session = this.el.sceneEl.renderer.xr.getSession();
        
        // Chiediamo uno spazio ancorato al visore (il tuo sguardo)
        session.requestReferenceSpace('viewer').then((refSpace) => {
          session.requestHitTestSource({ space: refSpace }).then((source) => {
            this.hitTestSource = source;
          });
        });

        // Chiediamo il sistema di coordinate della stanza
        session.requestReferenceSpace('local-floor').then((refSpace) => {
          this.localSpace = refSpace;
        });
      },

      tick: function() {
        if (!this.hitTestSource || !this.localSpace) return;
        
        let frame = this.el.sceneEl.frame;
        if (frame) {
          // Eseguiamo il "lancio del raggio" contro il mondo reale
          let hitTestResults = frame.getHitTestResults(this.hitTestSource);
          
          if (hitTestResults.length > 0) {
            // Superficie fisica trovata!
            let pose = hitTestResults[0].getPose(this.localSpace);
            let pos = pose.transform.position;
            
            // Incolliamo il mirino verde nel punto reale
            this.reticle.setAttribute('position', pos);
            this.reticle.setAttribute('visible', 'true');
            
            this.statusText.setAttribute('value', `Superficie Trovata!\nQuota Terreno (Y): ${pos.y.toFixed(2)}m`);
          } else {
            // Niente trovato (es. stai guardando il cielo)
            this.reticle.setAttribute('visible', 'false');
            this.statusText.setAttribute('value', 'Guarda verso il pavimento o i muri...');
          }
        }
      }
    });

    // Testo sempre rivolto a te
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) { this.el.object3D.lookAt(cameraEl.object3D.position); }
      }
    });
  </script>
</head>
<body style="background-color: #111; color: white; text-align: center;">

  <a-scene webxr="optionalFeatures: hit-test, local-floor" vr-mode-ui="enabled: true">
    
    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <a-entity position="0 1.5 -1.5" look-at-camera>
        <a-plane width="1.2" height="0.6" color="#222" material="opacity: 0.8; shader: flat" position="0 0 -0.01"></a-plane>
        <a-text id="status-text" value="In attesa di entrare in AR...\nClicca l'icona AR in basso a destra" align="center" color="#FFFFFF" scale="0.4 0.4 0.4"></a-text>
    </a-entity>

    <a-ring id="reticle" color="#00FF00" radius-inner="0.08" radius-outer="0.1" rotation="-90 0 0" visible="false"></a-ring>

    <a-entity debug-hit-test></a-entity>

  </a-scene>
</body>
</html>
