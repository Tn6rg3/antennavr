<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Scanner 3D - Meta Quest 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <span id="status" style="color: #ffff00;">IN ATTESA</span><br>
        Usa il <b>Pulsante Y (Controller Sinistro)</b> per avviare la scansione dell'ambiente.<br>
        Premi di nuovo Y per fermare e isolare il modello 3D.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        
        // Stati dell'applicazione
        let scanState = 0; // 0: Attesa, 1: Scansione (Wireframe), 2: Visualizzazione isolata (VR)
        let lastYPressTime = 0; // Per evitare doppi click accidentali

        // Gestione delle Mesh (I poligoni della stanza)
        const roomMeshes = new Map();
        let blackoutSphere;

        const uiStatus = document.getElementById('status');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            light.position.set(0, 2, 0);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // IMPORTANTE: Richiediamo la feature 'mesh-detection' al visore
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['mesh-detection'] 
            }));

            // Creiamo la sfera di blackout (invisibile all'inizio)
            const sphereGeo = new THREE.SphereGeometry(20, 32, 32);
            // BackSide fa in modo che la sfera sia nera guardandola da DENTRO
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide });
            blackoutSphere = new THREE.Mesh(sphereGeo, sphereMat);
            blackoutSphere.visible = false;
            scene.add(blackoutSphere);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- GESTIONE DEL PULSANTE Y ---
        function checkYButton(session) {
            const now = performance.now();
            // Evita che tenere premuto il tasto attivi tutto all'infinito
            if (now - lastYPressTime < 500) return; 

            for (const source of session.inputSources) {
                // Il tasto Y è il pulsante indice 5 sul gamepad SINISTRO in WebXR
                if (source.handedness === 'left' && source.gamepad) {
                    if (source.gamepad.buttons[5] && source.gamepad.buttons[5].pressed) {
                        
                        lastYPressTime = now;
                        scanState++;
                        
                        if (scanState === 1) {
                            uiStatus.textContent = "SCANSIONE IN CORSO...";
                            uiStatus.style.color = "#00ff00";
                        } else if (scanState === 2) {
                            uiStatus.textContent = "VISUALIZZAZIONE ISOLATA (VR)";
                            uiStatus.style.color = "#00ffff";
                            triggerBlackout();
                        } else if (scanState > 2) {
                            // Reset
                            scanState = 0;
                            uiStatus.textContent = "IN ATTESA";
                            uiStatus.style.color = "#ffff00";
                            removeBlackout();
                        }
                    }
                }
            }
        }

        // Funzioni per l'isolamento visivo
        function triggerBlackout() {
            // Accendiamo la sfera nera gigante che copre la telecamera del Quest
            blackoutSphere.visible = true;
            
            // Trasformiamo tutte le mesh da "Rete Verde" a "Grigio Solido"
            roomMeshes.forEach(mesh => {
                mesh.material.wireframe = false;
                mesh.material.color.setHex(0xaaaaaa);
                mesh.material.transparent = false;
                mesh.material.opacity = 1.0;
            });
        }

        function removeBlackout() {
            blackoutSphere.visible = false;
            
            roomMeshes.forEach(mesh => {
                mesh.material.wireframe = true;
                mesh.material.color.setHex(0x00ff00);
                mesh.material.transparent = true;
                mesh.material.opacity = 0.5;
            });
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                checkYButton(session);

                // --- ESTRAZIONE DELLA MESH DELLA STANZA ---
                // frame.detectedMeshes è una lista di pezzi di stanza scansionati dal Quest
                if (scanState === 1 && frame.detectedMeshes) {
                    
                    frame.detectedMeshes.forEach(xrMesh => {
                        let threeMesh = roomMeshes.get(xrMesh);

                        // Se è un pezzo di stanza nuovo, creiamo la geometria
                        if (!threeMesh) {
                            const geometry = new THREE.BufferGeometry();
                            geometry.setAttribute('position', new THREE.BufferAttribute(xrMesh.vertices, 3));
                            geometry.setIndex(new THREE.BufferAttribute(xrMesh.indices, 1));
                            geometry.computeVertexNormals(); // Calcola le ombre

                            const material = new THREE.MeshPhongMaterial({
                                color: 0x00ff00,
                                wireframe: true,
                                transparent: true,
                                opacity: 0.5
                            });

                            threeMesh = new THREE.Mesh(geometry, material);
                            roomMeshes.set(xrMesh, threeMesh);
                            scene.add(threeMesh);
                        } else {
                            // Se il pezzo esiste già, aggiorniamo i suoi vertici in caso il Quest li abbia affinati
                            threeMesh.geometry.setAttribute('position', new THREE.BufferAttribute(xrMesh.vertices, 3));
                            threeMesh.geometry.setIndex(new THREE.BufferAttribute(xrMesh.indices, 1));
                            threeMesh.geometry.computeVertexNormals();
                            threeMesh.geometry.attributes.position.needsUpdate = true;
                            if (threeMesh.geometry.index) threeMesh.geometry.index.needsUpdate = true;
                        }

                        // Aggiorniamo la posizione del pezzo di stanza nello spazio reale
                        const pose = frame.getPose(xrMesh.meshSpace, referenceSpace);
                        if (pose) {
                            threeMesh.matrix.fromArray(pose.transform.matrix);
                            threeMesh.matrixAutoUpdate = false;
                        }
                    });
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
