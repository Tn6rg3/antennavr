<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Scanner 3D PRO - Meta Quest 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <span id="status" style="color: #ffff00;">IN ATTESA</span><br>
        <b>Pulsante Y (Controller SX)</b>: Avvia scansione / Isola in VR<br>
        <b>Pulsante X (Controller SX)</b>: Resetta e cancella l'ambiente
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        
        let scanState = 0; // 0: Attesa, 1: Scansione (Wireframe), 2: Isolata (VR)
        let lastButtonPressTime = 0; 

        const roomMeshes = new Map();
        let blackoutSphere;

        const uiStatus = document.getElementById('status');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            light.position.set(0, 2, 0);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['mesh-detection'] 
            }));

            // Sfera di blackout per l'isolamento VR
            const sphereGeo = new THREE.SphereGeometry(20, 32, 32);
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide });
            blackoutSphere = new THREE.Mesh(sphereGeo, sphereMat);
            blackoutSphere.visible = false;
            scene.add(blackoutSphere);

            window.addEventListener('resize', onWindowResize);
        }

        // --- GESTIONE AVANZATA DEI PULSANTI (X e Y) ---
        function checkButtons(session) {
            const now = performance.now();
            if (now - lastButtonPressTime < 500) return; // Anti-rimbalzo (mezzo secondo di pausa tra i click)

            for (const source of session.inputSources) {
                if (source.handedness === 'left' && source.gamepad) {
                    
                    const gamepad = source.gamepad;

                    // PULSANTE Y (Indice 5) - Cambia stato di scansione/isolamento
                    if (gamepad.buttons[5] && gamepad.buttons[5].pressed) {
                        lastButtonPressTime = now;
                        
                        if (scanState === 0 || scanState === 2) {
                            scanState = 1;
                            uiStatus.textContent = "SCANSIONE IN CORSO...";
                            uiStatus.style.color = "#00ff00";
                            removeBlackout();
                        } else if (scanState === 1) {
                            scanState = 2;
                            uiStatus.textContent = "VISUALIZZAZIONE ISOLATA (VR)";
                            uiStatus.style.color = "#00ffff";
                            triggerBlackout();
                        }
                    }

                    // PULSANTE X (Indice 4) - Hard Reset
                    if (gamepad.buttons[4] && gamepad.buttons[4].pressed) {
                        lastButtonPressTime = now;
                        resetScanner();
                    }
                }
            }
        }

        // --- FUNZIONE DI HARD RESET (Salva la memoria RAM) ---
        function resetScanner() {
            // 1. Rimuove le mesh dalla scena e cancella geometria/materiali dalla GPU
            roomMeshes.forEach((threeMesh, xrMesh) => {
                scene.remove(threeMesh);
                threeMesh.geometry.dispose();
                threeMesh.material.dispose();
            });
            
            // 2. Svuota la mappa logica
            roomMeshes.clear();

            // 3. Resetta l'interfaccia e l'ambiente
            scanState = 0;
            removeBlackout();

            uiStatus.textContent = "RESET ESEGUITO. IN ATTESA.";
            uiStatus.style.color = "#ff4444"; // Rosso per far capire che è stato cancellato

            // Dopo 2 secondi, torna alla scritta gialla di attesa
            setTimeout(() => {
                if (scanState === 0) {
                    uiStatus.textContent = "IN ATTESA";
                    uiStatus.style.color = "#ffff00";
                }
            }, 2000);
        }

        function triggerBlackout() {
            blackoutSphere.visible = true;
            roomMeshes.forEach(mesh => {
                mesh.material.wireframe = false;
                mesh.material.color.setHex(0xaaaaaa);
                mesh.material.transparent = false;
                mesh.material.opacity = 1.0;
            });
        }

        function removeBlackout() {
            blackoutSphere.visible = false;
            roomMeshes.forEach(mesh => {
                mesh.material.wireframe = true;
                mesh.material.color.setHex(0x00ff00);
                mesh.material.transparent = true;
                mesh.material.opacity = 0.5;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                checkButtons(session);

                if (scanState === 1 && frame.detectedMeshes) {
                    
                    frame.detectedMeshes.forEach(xrMesh => {
                        let threeMesh = roomMeshes.get(xrMesh);

                        if (!threeMesh) {
                            const geometry = new THREE.BufferGeometry();
                            geometry.setAttribute('position', new THREE.BufferAttribute(xrMesh.vertices, 3));
                            geometry.setIndex(new THREE.BufferAttribute(xrMesh.indices, 1));
                            geometry.computeVertexNormals();

                            const material = new THREE.MeshPhongMaterial({
                                color: 0x00ff00,
                                wireframe: true,
                                transparent: true,
                                opacity: 0.5
                            });

                            threeMesh = new THREE.Mesh(geometry, material);
                            roomMeshes.set(xrMesh, threeMesh);
                            scene.add(threeMesh);
                        } else {
                            threeMesh.geometry.setAttribute('position', new THREE.BufferAttribute(xrMesh.vertices, 3));
                            threeMesh.geometry.setIndex(new THREE.BufferAttribute(xrMesh.indices, 1));
                            threeMesh.geometry.computeVertexNormals();
                            threeMesh.geometry.attributes.position.needsUpdate = true;
                            if (threeMesh.geometry.index) threeMesh.geometry.index.needsUpdate = true;
                        }

                        const pose = frame.getPose(xrMesh.meshSpace, referenceSpace);
                        if (pose) {
                            threeMesh.matrix.fromArray(pose.transform.matrix);
                            threeMesh.matrixAutoUpdate = false;
                        }
                    });
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
