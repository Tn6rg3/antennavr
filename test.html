<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ologramma SLAM Debug - Quest 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px; }
    </style>
</head>
<body>
    <div id="info">
        Premi "Enter AR".<br>
        Vedrai un cartello olografico fluttuante davanti a te con il responso del sensore.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        
        // Variabili per il Cartello Olografico
        let hudCanvas, hudContext, hudTexture, hudMesh;
        let lastMessage = "";

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Rimosso il dom-overlay che causava il blocco. Chiediamo SOLO i dati di profondità.
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['depth-sensing'],
                depthSensing: {
                    usagePreference: ['cpu-optimized'],
                    dataFormatPreference: ['luminance-alpha', 'float32']
                }
            }));

            // --- CREAZIONE DELL'OLOGRAMMA DIAGNOSTICO ---
            // 1. Creiamo una tela invisibile (Canvas) dove scriveremo il testo
            hudCanvas = document.createElement('canvas');
            hudCanvas.width = 1024;
            hudCanvas.height = 256;
            hudContext = hudCanvas.getContext('2d');
            
            // 2. Trasformiamo la tela in una Texture 3D
            hudTexture = new THREE.CanvasTexture(hudCanvas);
            
            // 3. Creiamo un piano 3D (il cartello fisico)
            const geometry = new THREE.PlaneGeometry(0.8, 0.2); // Largo 80cm, alto 20cm
            const material = new THREE.MeshBasicMaterial({ map: hudTexture, transparent: true });
            hudMesh = new THREE.Mesh(geometry, material);
            
            // 4. Posizioniamo il cartello a 1 metro davanti agli occhi
            hudMesh.position.set(0, 0, -1);
            
            // 5. Incolliamo il cartello alla telecamera così ti segue sempre
            camera.add(hudMesh);
            scene.add(camera);

            // Disegna il messaggio iniziale
            updateHUD("INIZIALIZZAZIONE AR...", "#ffffff", "#0000ff");

            window.addEventListener('resize', onWindowResize);
        }

        // Funzione per scrivere sul cartello 3D
        function updateHUD(text, textColor, bgColor) {
            if (lastMessage === text) return; // Aggiorna solo se il messaggio cambia
            
            hudContext.fillStyle = bgColor;
            hudContext.fillRect(0, 0, hudCanvas.width, hudCanvas.height);
            
            hudContext.font = "bold 40px sans-serif";
            hudContext.fillStyle = textColor;
            hudContext.textAlign = "center";
            hudContext.textBaseline = "middle";
            hudContext.fillText(text, hudCanvas.width / 2, hudCanvas.height / 2);
            
            hudTexture.needsUpdate = true;
            lastMessage = text;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();

                // 1. Il visore ci ha dato il permesso di usare il sensore?
                if (!session.grantedFeatures || !session.grantedFeatures.includes('depth-sensing')) {
                    updateHUD("BLOCCO PERMESSI: Depth-Sensing negato dal Browser", "#ffffff", "#ff0000");
                    renderer.render(scene, camera);
                    return;
                }

                const referenceSpace = renderer.xr.getReferenceSpace();
                const viewerPose = frame.getViewerPose(referenceSpace);

                if (viewerPose) {
                    const view = viewerPose.views[0];

                    // 2. Il sensore ci sta effettivamente passando i numeri?
                    const depthInfo = frame.getDepthInformation(view);

                    if (!depthInfo) {
                        updateHUD("PERMESSI OK - In attesa del feed dal sensore...", "#000000", "#ffff00");
                    } else {
                        updateHUD(`SUCCESSO! Dati ricevuti: ${depthInfo.width}x${depthInfo.height}`, "#000000", "#00ff00");
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
