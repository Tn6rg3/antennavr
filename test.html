<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Sensore Profondita (Controller)</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    AFRAME.registerComponent('ar-controller-cursor', {
      init: function () {
        this.reticle = document.querySelector('#reticle');
        this.hitTestSource = null;
        this.refSpace = null;

        // Quando clicchi su AR, avvia il sensore
        this.el.sceneEl.addEventListener('enter-vr', () => {
          let session = this.el.sceneEl.renderer.xr.getSession();
          if (!session) return;

          // Richiede il sistema di coordinate della stanza
          session.requestReferenceSpace('local-floor').then((space) => {
            this.refSpace = space;
          });

          // Cerca il controller destro e attiva il raggio laser "fisico"
          session.addEventListener('inputsourceschange', (event) => {
            session.inputSources.forEach((source) => {
              if (source.handedness === 'right' && source.targetRaySpace) {
                session.requestHitTestSource({ space: source.targetRaySpace }).then((hitSource) => {
                  this.hitTestSource = hitSource;
                });
              }
            });
          });
        });
      },
      tick: function () {
        if (!this.hitTestSource || !this.refSpace) return;
        
        let frame = this.el.sceneEl.frame;
        if (frame) {
          // Controlla contro cosa sta sbattendo il laser fisico
          let hitTestResults = frame.getHitTestResults(this.hitTestSource);
          
          if (hitTestResults.length > 0) {
            // Se colpisce un oggetto o il pavimento, sposta lì l'anello
            let pose = hitTestResults[0].getPose(this.refSpace);
            this.reticle.setAttribute('position', pose.transform.position);
            this.reticle.setAttribute('visible', 'true');
          } else {
            // Se punti nel vuoto o in cielo, nascondi l'anello
            this.reticle.setAttribute('visible', 'false');
          }
        }
      }
    });

    // Testo sempre rivolto verso te
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) { this.el.object3D.lookAt(cameraEl.object3D.position); }
      }
    });
  </script>
</head>
<body style="background-color: #111; color: white; text-align: center; font-family: sans-serif; padding-top: 50px;">

  <h2>Test Sensore Reale</h2>
  <p>Punta il controller destro in giro per la stanza.</p>

  <!-- Chiediamo al visore i permessi corretti senza bloccarlo -->
  <a-scene webxr="optionalFeatures: hit-test, local-floor" vr-mode-ui="enabled: true">
    
    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <a-entity position="0 1.5 -1.5" look-at-camera>
      <a-plane width="1.2" height="0.4" color="#222" material="opacity: 0.8; shader: flat" position="0 0 -0.01"></a-plane>
      <a-text value="Usa il Controller Destro\nper puntare il pavimento reale." align="center" color="#00FFFF" scale="0.4 0.4 0.4"></a-text>
    </a-entity>

    <!-- Componente agganciato al controller destro -->
    <a-entity id="right-controller" oculus-touch-controls="hand: right" ar-controller-cursor></a-entity>
    
    <!-- L'anello verde che si spalmerà sul mondo fisico -->
    <a-ring id="reticle" color="#00FF00" radius-inner="0.05" radius-outer="0.08" rotation="-90 0 0" visible="false"></a-ring>

  </a-scene>
</body>
</html>
