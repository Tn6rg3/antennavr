<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostica SLAM - Quest 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        
        /* Pannello diagnostico galleggiante in AR */
        #ui-layer {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.8); border: 2px solid #00ffff;
            padding: 15px; border-radius: 10px; font-family: monospace;
            z-index: 100; font-size: 16px; text-align: center;
            pointer-events: none;
        }
        .error { color: #ff4444; font-weight: bold; }
        .ok { color: #00ff00; font-weight: bold; }
        .wait { color: #ffff00; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h3 style="margin:0 0 10px 0; color: #fff;">Diagnostica Sensore di Profondità</h3>
        <div id="log" class="wait">In attesa che tu prema "Enter AR"...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer, depthPoints;
        const logEl = document.getElementById('log');
        let currentStatus = "";

        const DEPTH_WIDTH = 160; 
        const DEPTH_HEIGHT = 120;
        const TOTAL_POINTS = DEPTH_WIDTH * DEPTH_HEIGHT;

        init();
        animate();

        // Funzione per aggiornare il testo senza bloccare il browser
        function updateLog(msg, className) {
            if (currentStatus !== msg) {
                logEl.innerText = msg;
                logEl.className = className;
                currentStatus = msg;
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // IMPORTANTE: Abbiamo aggiunto 'float32' e 'dom-overlay'
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['depth-sensing'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body },
                depthSensing: {
                    usagePreference: ['cpu-optimized'],
                    // Aggiunto float32 per compatibilità con le nuove versioni del Quest
                    dataFormatPreference: ['luminance-alpha', 'float32'] 
                }
            }));

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(TOTAL_POINTS * 3);
            for(let i=0; i<TOTAL_POINTS*3; i++) { positions[i] = 999; }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            // Punti più grandi (5cm) per vederli chiaramente durante il test
            const material = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.05 });
            depthPoints = new THREE.Points(geometry, material);
            depthPoints.frustumCulled = false;
            
            camera.add(depthPoints); 
            scene.add(camera); 

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();

                // 1. Controllo dei Permessi
                if (!session.grantedFeatures || !session.grantedFeatures.includes('depth-sensing')) {
                    updateLog("ERRORE CRITICO: Il browser o il visore ha negato i permessi 'depth-sensing'. Controlla chrome://flags", "error");
                    renderer.render(scene, camera);
                    return;
                }

                const referenceSpace = renderer.xr.getReferenceSpace();
                const viewerPose = frame.getViewerPose(referenceSpace);

                if (viewerPose) {
                    const view = viewerPose.views[0];

                    // 2. Lettura dei Dati Crudi
                    const depthInfo = frame.getDepthInformation(view);

                    if (!depthInfo) {
                        updateLog("IN ATTESA... Il sensore non sta inviando dati di profondità.", "wait");
                    } else {
                        updateLog(`SUCCESSO! Dati in ricezione: Formato [${depthInfo.width}x${depthInfo.height}]`, "ok");

                        const positions = depthPoints.geometry.attributes.position.array;
                        let pointIndex = 0;

                        const invProjection = new THREE.Matrix4().copy(camera.projectionMatrix).invert();
                        const stepX = depthInfo.width / DEPTH_WIDTH;
                        const stepY = depthInfo.height / DEPTH_HEIGHT;

                        for (let y = 0; y < DEPTH_HEIGHT; y++) {
                            for (let x = 0; x < DEPTH_WIDTH; x++) {
                                
                                const depthInMeters = depthInfo.getDepthInMeters(
                                    Math.floor(x * stepX), 
                                    Math.floor(y * stepY)
                                );

                                if (depthInMeters > 0 && depthInMeters < 5.0) {
                                    const ndcX = (x / DEPTH_WIDTH) * 2 - 1;
                                    const ndcY = -(y / DEPTH_HEIGHT) * 2 + 1; 
                                    
                                    const vector = new THREE.Vector3(ndcX, ndcY, 0.5);
                                    vector.applyMatrix4(invProjection);
                                    vector.multiplyScalar(depthInMeters / Math.abs(vector.z));

                                    positions[pointIndex * 3] = vector.x;
                                    positions[pointIndex * 3 + 1] = vector.y;
                                    positions[pointIndex * 3 + 2] = -depthInMeters; 
                                } else {
                                    positions[pointIndex * 3] = 999;
                                    positions[pointIndex * 3 + 1] = 999;
                                    positions[pointIndex * 3 + 2] = 999;
                                }
                                pointIndex++;
                            }
                        }
                        depthPoints.geometry.attributes.position.needsUpdate = true;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
