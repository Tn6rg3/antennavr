<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Depth SLAM - WebXR</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <span style="color: #00ffff;">MOTORE SLAM RAW ATTIVO</span><br>
        Guarda la stanza: il codice sta ricostruendo la topologia in tempo reale dai dati crudi di profondità.<br>
        Nessuna cache. Nessun fantasma.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        let depthPoints; // L'oggetto Three.js che farà da "pelle" agli oggetti reali
        
        // Risoluzione della nostra mappa (Quanti punti estraiamo dal sensore)
        // Il Quest 3 di solito ha un sensore di profondità interno a risoluzione molto bassa (es. 160x120)
        const DEPTH_WIDTH = 160; 
        const DEPTH_HEIGHT = 120;
        const TOTAL_POINTS = DEPTH_WIDTH * DEPTH_HEIGHT;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // --- LA MAGIA È QUI: Richiediamo la 'depth-sensing' ---
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['depth-sensing'],
                depthSensing: {
                    usagePreference: ['cpu-optimized'],
                    dataFormatPreference: ['luminance-alpha']
                }
            }));

            // --- CREIAMO LA NUVOLA DI PUNTI (La nostra "Pre-Mesh") ---
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(TOTAL_POINTS * 3);
            
            // Inizializziamo i punti lontano dalla vista
            for(let i=0; i<TOTAL_POINTS*3; i++) { positions[i] = 999; }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            // Creiamo quadratini verdi semitrasparenti per formare una superficie compatta
            const material = new THREE.PointsMaterial({ 
                color: 0x00ff00, 
                size: 0.03, // 3 centimetri di grandezza
                transparent: true,
                opacity: 0.8
            });

            depthPoints = new THREE.Points(geometry, material);
            depthPoints.frustumCulled = false;
            
            // Agganciamo i punti DIRETTAMENTE alla telecamera, così seguono il tuo sguardo
            camera.add(depthPoints); 
            scene.add(camera); 

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                const viewerPose = frame.getViewerPose(referenceSpace);

                if (viewerPose) {
                    const view = viewerPose.views[0]; // Prendiamo l'occhio sinistro come riferimento

                    // --- CHIEDIAMO I DATI DI PROFONDITÀ AL SENSORE ---
                    const depthInfo = frame.getDepthInformation(view);

                    if (depthInfo) {
                        const positions = depthPoints.geometry.attributes.position.array;
                        let pointIndex = 0;

                        // Otteniamo la matrice di proiezione per capire come i pixel si spalmano nello spazio
                        const projectionMatrix = view.projectionMatrix;
                        const invProjection = new THREE.Matrix4().copy(camera.projectionMatrix).invert();

                        // Lo step (salto) ci permette di adattare la griglia alla risoluzione reale del sensore
                        const stepX = depthInfo.width / DEPTH_WIDTH;
                        const stepY = depthInfo.height / DEPTH_HEIGHT;

                        // Analizziamo la matrice dei pixel di profondità
                        for (let y = 0; y < DEPTH_HEIGHT; y++) {
                            for (let x = 0; x < DEPTH_WIDTH; x++) {
                                
                                // Otteniamo la distanza in metri in quel preciso pixel
                                const depthInMeters = depthInfo.getDepthInMeters(
                                    Math.floor(x * stepX), 
                                    Math.floor(y * stepY)
                                );

                                // Se il sensore rileva qualcosa ed è entro 5 metri...
                                if (depthInMeters > 0 && depthInMeters < 5.0) {
                                    
                                    // 1. Calcoliamo la posizione 2D sullo schermo (da -1 a +1)
                                    const ndcX = (x / DEPTH_WIDTH) * 2 - 1;
                                    const ndcY = -(y / DEPTH_HEIGHT) * 2 + 1; // La Y va invertita
                                    
                                    // 2. Usiamo una formula SLAM base per "S-proiettare" il punto 2D nella 3D
                                    // sfruttando il valore di profondità (Z)
                                    const vector = new THREE.Vector3(ndcX, ndcY, 0.5);
                                    vector.applyMatrix4(invProjection);
                                    vector.multiplyScalar(depthInMeters / Math.abs(vector.z));

                                    // 3. Aggiorniamo la coordinata nella nostra griglia
                                    positions[pointIndex * 3] = vector.x;
                                    positions[pointIndex * 3 + 1] = vector.y;
                                    positions[pointIndex * 3 + 2] = -depthInMeters; // Profondità in negativo sull'asse Z
                                } else {
                                    // Nascondi i punti che non intercettano nulla
                                    positions[pointIndex * 3] = 999;
                                    positions[pointIndex * 3 + 1] = 999;
                                    positions[pointIndex * 3 + 2] = 999;
                                }
                                pointIndex++;
                            }
                        }

                        // Diciamo alla scheda video di aggiornare la scena
                        depthPoints.geometry.attributes.position.needsUpdate = true;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
