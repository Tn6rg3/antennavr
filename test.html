<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Antenne AR Pro V29 - Fix Collari, Diamanti & Caricamento</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    #ui-2d-container {
      position: absolute; top: 15px; left: 15px; z-index: 9999;
      background: #111; color: #00E676; padding: 15px;
      border: 2px solid #FFEB3B; border-radius: 8px; font-family: monospace; max-width: 290px;
    }
    #ui-2d-container h3 { margin: 0 0 5px 0; font-size: 14px; text-transform: uppercase; }
    #ui-2d-container p { margin: 0 0 10px 0; font-size: 11px; color: #fff; line-height: 1.3; }
    #ui-2d-container input, #ui-2d-container textarea { 
        width: 95%; padding: 6px; background: #222; color: #fff; border: 1px solid #00E676; margin-bottom: 10px; box-sizing: border-box; 
    }
    #ui-2d-container button { width: 100%; padding: 6px; background: #00E676; color: #000; border: none; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
    #ui-2d-container button:hover { background: #00FFCC; }
    .btn-action { background: #FF9800 !important; color: #000 !important; }
    .divider { border-top: 1px solid #444; margin: 10px 0; }
  </style>
  <script>
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) { this.el.object3D.lookAt(cameraEl.object3D.position); }
      }
    });

    AFRAME.registerComponent('btn-interaction', {
      init: function () {
        let el = this.el;
        if (!el.hasAttribute('material') || !el.getAttribute('material').color) return; 
        let originalColor = el.getAttribute('material').color;
        el.addEventListener('mouseenter', () => el.setAttribute('material', 'opacity', 0.8));
        el.addEventListener('mouseleave', () => { el.setAttribute('material', 'opacity', 1.0); el.setAttribute('scale', '1 1 1'); el.setAttribute('material', 'color', originalColor); });
        el.addEventListener('mousedown', () => { el.setAttribute('scale', '0.95 0.95 0.8'); el.setAttribute('material', 'color', '#00FFCC'); });
        el.addEventListener('mouseup', () => { el.setAttribute('scale', '1 1 1'); el.setAttribute('material', 'color', originalColor); });
      }
    });

    // --- SISTEMA IBRIDO CON ANTI-JITTER & BLIND SPOT (40cm) ---
    AFRAME.registerComponent('controller-hybrid-target', {
      init: function () {
        this.hitPoint = new THREE.Vector3();
        this.smoothedPoint = new THREE.Vector3();
        this.isActive = false;   
        this.isPhysical = false; 
        this.hitTestSource = null;
        this.refSpace = null;
        this.firstHit = true;

        this.el.sceneEl.addEventListener('enter-vr', () => {
          if (this.el.sceneEl.is('ar-mode')) {
            let session = this.el.sceneEl.renderer.xr.getSession();
            session.requestReferenceSpace('local-floor').then((space) => { this.refSpace = space; });

            const setupHitTest = () => {
              if (this.hitTestSource) return; 
              session.inputSources.forEach((source) => {
                if (source.handedness === 'right' && source.targetRaySpace) {
                  session.requestHitTestSource({ space: source.targetRaySpace }).then((hitSource) => {
                    this.hitTestSource = hitSource;
                  });
                }
              });
            };
            setupHitTest();
            session.addEventListener('inputsourceschange', setupHitTest);
          }
        });
      },
      tick: function () {
        this.isActive = false;
        this.isPhysical = false;
        
        let frame = this.el.sceneEl.frame;
        let rawHit = null;
        let controllerPos = new THREE.Vector3();
        this.el.object3D.getWorldPosition(controllerPos);
        
        if (this.hitTestSource && this.refSpace && frame) {
          let results = frame.getHitTestResults(this.hitTestSource);
          if (results.length > 0) {
            let pose = results[0].getPose(this.refSpace);
            if (pose) {
                let tempHit = pose.transform.position;
                if (controllerPos.distanceTo(tempHit) > 0.4) {
                    rawHit = tempHit;
                    this.isPhysical = true;
                }
            }
          }
        }

        if (!rawHit) {
            let dir = new THREE.Vector3(0, 0, -1);
            let quat = new THREE.Quaternion();
            this.el.object3D.getWorldQuaternion(quat);
            dir.applyQuaternion(quat).normalize();

            if (dir.y < -0.02) { 
                let distanceToGround = -controllerPos.y / dir.y; 
                if (distanceToGround > 0 && distanceToGround < 150) { 
                    rawHit = controllerPos.clone().add(dir.multiplyScalar(distanceToGround));
                    this.isPhysical = false; 
                }
            }
        }

        if (rawHit) {
            if (this.firstHit) {
                this.smoothedPoint.copy(rawHit);
                this.firstHit = false;
            } else {
                this.smoothedPoint.lerp(rawHit, 0.15); 
            }
            this.hitPoint.copy(this.smoothedPoint);
            this.isActive = true;
        } else {
            this.firstHit = true;
        }
      }
    });

    // --- MOTORE ANTENNA ---
    AFRAME.registerComponent('ar-antenna-system', {
      init: function () {
        this.state = 'PLACE_GROUND_A'; 
        
        this.pointA = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointB = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointC = { base: null, top: null, sphere: null, pole: null, label: null, percent: 0.5 }; 
        this.labelSegA = null; this.labelSegB = null;

        this.antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale', 'MMANA-GAL'];
        this.bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
        this.antIdx = 0; this.bandIdx = 2; 
        
        this.endFed_AC_Len = 10.0; this.endFed_CB_Len = 10.0; this.longwireLen = 20.0; this.longwireVertex = 'A'; 
        this.numRadials = 4; this.radialLen = 5.0; this.radialPool = []; this.maxRadials = 16; 
        
        this.mmanaModels = ['Yagi 3 Elementi', 'Delta Loop', 'Dipolo MMANA', 'Modello Importato'];
        this.mmanaModelIdx = 0;
        this.antennaRotationY = 0; 
        this.globalTextScale = 0.35; 
        
        this.currentHeight = 0.1; 
        this.tempBasePos = null;
        this.tempElevation = 0;

        this.mmanaWires = []; this.importedMmanaWires = []; 
        this.guyWiresData = []; 
        this.activeAnchor = null; 
        this.gwState = 'OFF'; 
        this.lastTriggerTime = 0; 
        this.currentHoveredGW = null; 

        this.calibOriginalPoints = [];
        this.calibNewPoints = [];
        this.calibDiamonds = []; 
        this.loadedData = null;

        this.raycasterEl = document.querySelector('#right-controller');
        this.leftControllerEl = document.querySelector('#left-controller');
        
        this.cursorContainer = document.querySelector('#cursor-container');
        this.cursorElevGroup = document.querySelector('#cursor-elevation-group');
        this.cursorGroundRing = document.querySelector('#cursor-ground-ring');
        this.cursorPlumbLine = document.querySelector('#cursor-plumb-line');
        this.cursorText = document.querySelector('#cursor-text');
        this.mainRing = document.querySelector('#cursor-ring');
        this.cursorDiamond = document.querySelector('#cursor-diamond');
        
        this.worldPivotEl = document.querySelector('#world-pivot');
        this.worldContentEl = document.querySelector('#world-content');
        this.gwDeleteCursor = document.querySelector('#gw-delete-cursor'); 

        this.verticalCylinder = document.querySelector('#vertical-cylinder');
        this.heightText = document.querySelector('#height-text');
        this.menuUI = document.querySelector('#menu-ui');
        this.gwUI = document.querySelector('#guy-wires-ui');
        this.mmanaContainerEl = document.querySelector('#mmana-wires-container');
        this.gwContainerEl = document.querySelector('#guy-wires-container');

        this.raycasterEl.addEventListener('triggerdown', this.onTriggerDown.bind(this));
        this.raycasterEl.addEventListener('thumbstickmoved', this.onRightThumbstick.bind(this));
        this.leftControllerEl.addEventListener('ybuttondown', this.toggleMenu.bind(this));
        this.leftControllerEl.addEventListener('xbuttondown', this.toggleGuyWireMode.bind(this));
        this.leftControllerEl.addEventListener('thumbstickmoved', this.onLeftThumbstick.bind(this));

        this.initPersistentElements();
        this.loadPreloadedMmanaModel();
        this.resetAntennaLengths();
        this.setupGlobalEventDelegation();
        this.setupFileIO();
        this.updateMenuText();
      },

      // FUNZIONE CRITICA PER IGNORARE GLI ELEMENTI INVISIBILI
      isElementVisible: function(el) {
        if (!el) return false;
        let curr = el;
        while (curr && curr.tagName && curr.tagName.toLowerCase() !== 'a-scene') {
            let vis = curr.getAttribute('visible');
            if (vis === false || vis === 'false') return false;
            curr = curr.parentElement;
        }
        return true;
      },

      getLocalPoint: function(worldVec) {
        let local = new THREE.Vector3();
        this.worldContentEl.object3D.worldToLocal(local.copy(worldVec));
        return { x: local.x, y: local.y, z: local.z };
      },

      toggleMenu: function() {
        if(this.gwState !== 'OFF' || this.state.includes('CALIB')) return; 
        if(!this.menuUI) return;
        let isVisible = this.menuUI.getAttribute('visible') === 'true' || this.menuUI.getAttribute('visible') === true;
        this.menuUI.setAttribute('visible', !isVisible);
      },

      toggleGuyWireMode: function() {
        if (this.state.includes('CALIB')) return;

        if (this.gwState === 'ADJUST_HEIGHT' || this.gwState === 'PLACE_PEGS' || this.gwState === 'ADJUST_PEG_BASE') {
            this.gwState = 'SELECT_POLE';
            this.activeAnchor = null; 
            this.gwUI.setAttribute('visible', 'true');
            this.previewCollar.setAttribute('visible', 'false');
            this.previewCollarText.setAttribute('visible', 'false');
            this.updateGWStatus("SCEGLI PALO DA TIRANTARE");
            return;
        }

        if (!this.pointA.top && !this.pointB.top) return; 

        if (this.gwState === 'OFF') {
          this.state = 'IDLE'; 
          this.menuUI.setAttribute('visible', false);
          this.gwUI.setAttribute('visible', true);

          this.gwState = 'SELECT_POLE';
          this.updateGWStatus("SCEGLI PALO DA TIRANTARE");
          this.cursorContainer.setAttribute('visible', 'false');
          this.gwDeleteCursor.setAttribute('visible', 'false');
          
          this.toggleButton('#btn-gw-new-a', this.pointA.top !== null);
          this.toggleButton('#btn-gw-new-b', this.pointB.top !== null);
          document.querySelector('#btn-gw-delete-mode a-text').setAttribute('value', 'ELIMINA ANELLI / PICCHETTI');
          this.refreshRaycaster();
        } else {
          this.gwUI.setAttribute('visible', false);
          this.menuUI.setAttribute('visible', true);
          this.gwState = 'OFF';
          this.activeAnchor = null;
          this.currentHoveredGW = null;
          this.previewCollar.setAttribute('visible', 'false');
          this.previewCollarText.setAttribute('visible', 'false');
          this.gwDeleteCursor.setAttribute('visible', 'false');
          this.refreshAll();
        }
      },

      toggleButton: function(id, isVisible) {
        let btn = document.querySelector(id);
        if(!btn) return;
        btn.setAttribute('visible', isVisible);
        if(isVisible) btn.classList.add('clickable');
        else btn.classList.remove('clickable');
      },

      updateGWStatus: function(msg) { 
        let statusEl = document.querySelector('#txt-gw-status');
        if(statusEl) statusEl.setAttribute('value', msg);
      },

      refreshRaycaster: function() {
        setTimeout(() => { if (this.raycasterEl && this.raycasterEl.components.raycaster) this.raycasterEl.components.raycaster.refreshObjects(); }, 50);
      },

      refreshAll: function() {
        this.updateMenuText();
        this.updateGeometriesAndDrawings();
        this.refreshRaycaster();
      },

      initPersistentElements: function() {
        let createPointStructure = (color) => {
          let struct = {};
          struct.sphere = document.createElement('a-sphere'); 
          struct.sphere.setAttribute('radius', '0.05'); 
          struct.sphere.setAttribute('material', `color: ${color}; roughness: 0.3`); 
          struct.sphere.setAttribute('visible', 'false');
          this.el.sceneEl.appendChild(struct.sphere);
          
          struct.pole = document.createElement('a-cylinder'); 
          struct.pole.setAttribute('radius', '0.008'); 
          struct.pole.setAttribute('material', 'color: #888888; opacity: 0.6; shader: flat'); 
          struct.pole.setAttribute('visible', 'false');
          this.el.sceneEl.appendChild(struct.pole);
          
          struct.label = document.createElement('a-text'); 
          struct.label.setAttribute('align', 'center'); 
          struct.label.setAttribute('color', '#00FF00'); 
          struct.label.setAttribute('look-at-camera', '');
          struct.label.setAttribute('visible', 'false');
          this.el.sceneEl.appendChild(struct.label);
          
          return struct;
        };

        this.pointA = Object.assign(this.pointA, createPointStructure('#FF1744'));
        this.pointB = Object.assign(this.pointB, createPointStructure('#2979FF'));
        this.pointC = Object.assign(this.pointC, createPointStructure('#00E676'));

        this.antennaTube1 = document.createElement('a-cylinder'); 
        this.antennaTube1.setAttribute('radius', '0.015'); 
        this.antennaTube1.setAttribute('material', 'color: #FF5722; shader: flat'); 
        this.antennaTube1.setAttribute('visible', 'false');
        this.el.sceneEl.appendChild(this.antennaTube1);
        
        this.antennaTube2 = document.createElement('a-cylinder'); 
        this.antennaTube2.setAttribute('radius', '0.015'); 
        this.antennaTube2.setAttribute('material', 'color: #FF5722; shader: flat'); 
        this.antennaTube2.setAttribute('visible', 'false');
        this.el.sceneEl.appendChild(this.antennaTube2);

        this.labelSegA = document.createElement('a-text'); 
        this.labelSegA.setAttribute('align', 'center'); 
        this.labelSegA.setAttribute('color', 'yellow'); 
        this.labelSegA.setAttribute('look-at-camera', '');
        this.labelSegA.setAttribute('visible', 'false');
        this.el.sceneEl.appendChild(this.labelSegA);
        
        this.labelSegB = document.createElement('a-text'); 
        this.labelSegB.setAttribute('align', 'center'); 
        this.labelSegB.setAttribute('color', 'yellow'); 
        this.labelSegB.setAttribute('look-at-camera', '');
        this.labelSegB.setAttribute('visible', 'false');
        this.el.sceneEl.appendChild(this.labelSegB);

        for(let i=0; i<this.maxRadials; i++) {
          let radCyl = document.createElement('a-cylinder'); 
          radCyl.setAttribute('radius', '0.005'); 
          radCyl.setAttribute('material', 'color: #5D4037; shader: flat'); 
          radCyl.setAttribute('visible', 'false');
          this.el.sceneEl.appendChild(radCyl);
          this.radialPool.push(radCyl);
        }

        this.previewCollar = document.createElement('a-torus'); 
        this.previewCollar.setAttribute('radius', '0.04'); 
        this.previewCollar.setAttribute('radius-tubular', '0.006'); 
        this.previewCollar.setAttribute('material', 'color: #FFEB3B; shader: flat');
        this.previewCollar.setAttribute('rotation', '90 0 0');
        this.previewCollar.setAttribute('visible', 'false');
        this.el.sceneEl.appendChild(this.previewCollar);
        
        this.previewCollarText = document.createElement('a-text'); 
        this.previewCollarText.setAttribute('align', 'center'); 
        this.previewCollarText.setAttribute('color', '#FFEB3B'); 
        this.previewCollarText.setAttribute('look-at-camera', '');
        this.previewCollarText.setAttribute('visible', 'false');
        this.el.sceneEl.appendChild(this.previewCollarText);

        for(let i=0; i<2; i++) {
            let dia = document.createElement('a-octahedron');
            dia.setAttribute('radius', '0.06'); 
            dia.setAttribute('material', 'color: #FFD600; shader: flat; wireframe: true');
            dia.setAttribute('visible', 'false');
            this.el.sceneEl.appendChild(dia); 
            this.calibDiamonds.push(dia);
        }
      },

      getCalculatedLength: function() {
        let bandMeters = parseInt(this.bands[this.bandIdx]);
        let type = this.antennaTypes[this.antIdx];
        if (type === 'Dipolo' || type === 'Verticale') return bandMeters / 4; 
        if (type === 'End Fed') return bandMeters * 0.45; 
        return bandMeters;                                
      },

      resetAntennaLengths: function() {
        let baseLen = this.getCalculatedLength();
        this.endFed_AC_Len = baseLen / 2; this.endFed_CB_Len = baseLen / 2; this.longwireLen = baseLen;
      },

      tick: function () {
        let isPlacing = this.state.includes('PLACE_GROUND') || this.state.includes('REPOSITION_GROUND') || this.state.includes('CALIB') || this.gwState === 'PLACE_PEGS';
        let isAdjusting = this.state.includes('ADJUST_BASE') || this.gwState === 'ADJUST_PEG_BASE';
        let isDeleting = this.gwState === 'DELETE_GW';

        // GESTIONE GLOBO ROSSO ELIMINAZIONE 
        if (isDeleting) {
            this.cursorContainer.setAttribute('visible', 'false');
            this.currentHoveredGW = null;
            let raycasterComponent = this.raycasterEl.components.raycaster;
            if (raycasterComponent && raycasterComponent.intersectedEls.length > 0) {
                let targetEl = null;
                for (let i = 0; i < raycasterComponent.intersectedEls.length; i++) {
                    let el = raycasterComponent.intersectedEls[i];
                    if (this.isElementVisible(el) && el.classList.contains('deletable')) {
                        targetEl = el; break;
                    }
                }
                
                if (targetEl) {
                    this.currentHoveredGW = targetEl;
                    this.gwDeleteCursor.setAttribute('position', targetEl.getAttribute('position'));
                    this.gwDeleteCursor.setAttribute('visible', 'true');
                } else { this.gwDeleteCursor.setAttribute('visible', 'false'); }
            } else { this.gwDeleteCursor.setAttribute('visible', 'false'); }
            return; 
        } else {
            this.gwDeleteCursor.setAttribute('visible', 'false');
        }

        // SCUDO VISIBILE PER IL RAGGIO
        let isPointingUI = false;
        let raycasterComponent = this.raycasterEl.components.raycaster;
        if (raycasterComponent && raycasterComponent.intersectedEls.length > 0) {
            for (let i = 0; i < raycasterComponent.intersectedEls.length; i++) {
                let el = raycasterComponent.intersectedEls[i];
                if (this.isElementVisible(el)) {
                    if (el.classList.contains('menu-bg') || (el.classList.contains('clickable') && !el.classList.contains('deletable'))) {
                        isPointingUI = true;
                        break;
                    }
                }
            }
        }

        if (isPointingUI) {
            this.cursorContainer.setAttribute('visible', 'false');
            return;
        }

        let hybrid = this.raycasterEl.components['controller-hybrid-target'];
        let hasTarget = hybrid && hybrid.isActive;

        if (this.state.includes('CALIB')) {
            this.cursorDiamond.setAttribute('visible', 'true');
            this.mainRing.setAttribute('visible', 'false');
        } else {
            this.cursorDiamond.setAttribute('visible', 'false');
            this.mainRing.setAttribute('visible', 'true');
        }

        this.cursorText.setAttribute('value', '');
        if (this.state === 'CALIB_SAVE_1') this.cursorText.setAttribute('value', 'Piazza DIAMANTE 1\n(Punto Origine)');
        if (this.state === 'CALIB_SAVE_2') this.cursorText.setAttribute('value', 'Piazza DIAMANTE 2\n(Orientamento)');
        if (this.state === 'CALIB_LOAD_1') this.cursorText.setAttribute('value', 'Riposiziona DIAMANTE 1\n(Punto Origine)');
        if (this.state === 'CALIB_LOAD_2') this.cursorText.setAttribute('value', 'Riposiziona DIAMANTE 2\n(Orientamento)');

        if (isPlacing) {
            if (hasTarget) {
                this.cursorContainer.setAttribute('visible', 'true'); 
                this.cursorContainer.setAttribute('position', hybrid.hitPoint);
                this.cursorElevGroup.setAttribute('position', '0 0 0');
                this.cursorPlumbLine.setAttribute('visible', 'false');
                this.cursorGroundRing.setAttribute('visible', 'false');
                this.mainRing.setAttribute('color', hybrid.isPhysical ? '#00E676' : '#00BFFF');
            } else { 
                this.cursorContainer.setAttribute('visible', 'false'); 
            }
        } 
        else if (isAdjusting) {
            if (this.tempBasePos) {
                this.mainRing.setAttribute('color', '#00E676'); 
                let localZero = new THREE.Vector3(this.tempBasePos.x, this.tempBasePos.y, this.tempBasePos.z);
                let worldZero = new THREE.Vector3();
                this.worldContentEl.object3D.localToWorld(worldZero.copy(localZero));

                this.cursorContainer.setAttribute('visible', 'true');
                this.cursorContainer.setAttribute('position', worldZero);
                this.cursorElevGroup.setAttribute('position', `0 ${this.tempElevation} 0`);

                if (Math.abs(this.tempElevation) > 0.01) {
                    this.cursorPlumbLine.setAttribute('visible', 'true');
                    this.cursorGroundRing.setAttribute('visible', 'true');
                    this.cursorPlumbLine.setAttribute('height', Math.abs(this.tempElevation));
                    this.cursorPlumbLine.setAttribute('position', `0 ${this.tempElevation / 2} 0`);
                    this.cursorPlumbLine.setAttribute('material', 'color', this.tempElevation > 0 ? '#00FFFF' : '#FF1744');
                } else {
                    this.cursorPlumbLine.setAttribute('visible', 'false');
                    this.cursorGroundRing.setAttribute('visible', 'false');
                }
            }
        } 
        else { this.cursorContainer.setAttribute('visible', 'false'); }
      },

      onLeftThumbstick: function(evt) {
        let now = Date.now();
        let isAdjustingBase = this.state.includes('ADJUST_BASE') || this.gwState === 'ADJUST_PEG_BASE';
        if (isAdjustingBase) {
          if (!this.lastElevTime || now - this.lastElevTime > 110) {
            if (Math.abs(evt.detail.y) > 0.4) {
              this.tempElevation += evt.detail.y < 0 ? 0.05 : -0.05; 
              this.lastElevTime = now;
            }
          }
        } 
        else if (this.gwState === 'OFF' && !this.state.includes('HEIGHT') && !this.state.includes('GROUND') && !this.state.includes('CALIB')) {
          if (Math.abs(evt.detail.x) > 0.3) {
              this.antennaRotationY += evt.detail.x > 0 ? 2.0 : -2.0;
              this.updateGeometriesAndDrawings();
          }
        }
      },

      onRightThumbstick: function (evt) {
        let thumbTime = Date.now();
        if (!this.lastThumbTime || thumbTime - this.lastThumbTime > 110) {
          if (this.state.includes('HEIGHT') && Math.abs(evt.detail.y) > 0.4) {
            this.currentHeight = Math.max(0.0, this.currentHeight + (evt.detail.y < 0 ? 0.1 : -0.1));
            this.updateHeightPreview(); this.lastThumbTime = thumbTime;
          }
          else if (this.gwState === 'ADJUST_HEIGHT' && this.activeAnchor && Math.abs(evt.detail.y) > 0.4) {
            let poleData = this.activeAnchor.pole === 'A' ? this.pointA : this.pointB;
            let maxH = poleData.top.y - poleData.base.y;
            this.activeAnchor.height = Math.max(0.1, Math.min(maxH, this.activeAnchor.height + (evt.detail.y < 0 ? 0.1 : -0.1)));
            this.updateCollarPreview();
            this.lastThumbTime = thumbTime;
          }
        }
      },

      updateHeightPreview: function() {
        let basePos = this.state.includes('_A') ? this.pointA.base : this.pointB.base;
        if(!basePos) return;
        let cy = basePos.y + (this.currentHeight / 2);
        this.verticalCylinder.setAttribute('position', `${basePos.x} ${cy} ${basePos.z}`);
        this.verticalCylinder.setAttribute('geometry', `primitive: cylinder; radius: 0.01; height: ${this.currentHeight}`);
        this.heightText.setAttribute('position', `${basePos.x} ${basePos.y + this.currentHeight + 0.2} ${basePos.z}`);
        this.heightText.setAttribute('value', `Altezza: ${this.currentHeight.toFixed(1)}m`);
      },

      updateCollarPreview: function() {
        if (!this.activeAnchor) return;
        let pData = this.activeAnchor.pole === 'A' ? this.pointA : this.pointB;
        if(!pData || !pData.base) return;
        let cy = pData.base.y + this.activeAnchor.height;
        this.previewCollar.setAttribute('position', `${pData.base.x} ${cy} ${pData.base.z}`);
        this.previewCollarText.setAttribute('position', `${pData.base.x + 0.15} ${cy} ${pData.base.z}`);
        this.previewCollarText.setAttribute('value', `H: ${this.activeAnchor.height.toFixed(1)}m`);
      },

      startCollarPlacement: function(poleId) {
        let pData = poleId === 'A' ? this.pointA : this.pointB;
        if (!pData || !pData.top) return;
        
        this.gwUI.setAttribute('visible', 'false');

        this.activeAnchor = { pole: poleId, height: (pData.top.y - pData.base.y)/2, pegs: [] };
        this.previewCollar.setAttribute('visible', 'true'); 
        this.previewCollarText.setAttribute('visible', 'true');
        this.previewCollar.setAttribute('material', 'color: #FFEB3B');
        this.updateCollarPreview();
        this.gwState = 'ADJUST_HEIGHT'; 
      },

      onTriggerDown: function () {
        let now = Date.now();
        if (now - this.lastTriggerTime < 300) return;
        this.lastTriggerTime = now;

        // SCUDO MENU (Se premiamo su un pulsante UI o pannello VISIBILE, fermiamo il terreno)
        let intersects = this.raycasterEl.components.raycaster.intersectedEls;
        if (intersects && intersects.length > 0) {
            for (let i = 0; i < intersects.length; i++) {
                let hitEl = intersects[i];
                if (this.isElementVisible(hitEl)) {
                    if (hitEl.classList.contains('menu-bg') || (hitEl.classList.contains('clickable') && !hitEl.classList.contains('deletable'))) {
                        return; // Ferma il click! L'utente stava puntando a un menu vero e visibile.
                    }
                }
            }
        }

        if (this.gwState === 'DELETE_GW') {
            if (this.currentHoveredGW) {
                let aIdx = parseInt(this.currentHoveredGW.getAttribute('data-aidx'));
                let pIdx = this.currentHoveredGW.getAttribute('data-pidx');
                if (pIdx === "null" || pIdx === null) this.guyWiresData.splice(aIdx, 1);
                else this.guyWiresData[aIdx].pegs.splice(parseInt(pIdx), 1);
                this.drawGuyWires(); 
                this.currentHoveredGW = null; 
                this.gwDeleteCursor.setAttribute('visible', 'false'); 
                this.refreshRaycaster();
            }
            return;
        }

        let hybridTarget = this.raycasterEl.components['controller-hybrid-target'];
        let hasTarget = hybridTarget && hybridTarget.isActive;

        // --- SISTEMA CALIBRAZIONE ---
        if (this.state.includes('CALIB_SAVE')) {
            if(!hasTarget) return;
            if (this.state === 'CALIB_SAVE_1') {
                this.calibOriginalPoints[0] = this.getLocalPoint(hybridTarget.hitPoint);
                this.calibDiamonds[0].setAttribute('position', hybridTarget.hitPoint);
                this.calibDiamonds[0].setAttribute('visible', 'true');
                this.state = 'CALIB_SAVE_2';
            } else if (this.state === 'CALIB_SAVE_2') {
                this.calibOriginalPoints[1] = this.getLocalPoint(hybridTarget.hitPoint);
                this.calibDiamonds[1].setAttribute('position', hybridTarget.hitPoint);
                this.calibDiamonds[1].setAttribute('visible', 'true');
                this.state = 'IDLE';
                this.executeExportJSON();
            }
            return;
        }

        if (this.state.includes('CALIB_LOAD')) {
            if(!hasTarget) return;
            if (this.state === 'CALIB_LOAD_1') {
                this.calibNewPoints = [hybridTarget.hitPoint.clone()];
                this.state = 'CALIB_LOAD_2';
            } else if (this.state === 'CALIB_LOAD_2') {
                this.calibNewPoints.push(hybridTarget.hitPoint.clone());
                this.executeCalibrationAlignment();
            }
            return;
        }

        if (this.gwState !== 'OFF') {
          if (this.gwState === 'ADJUST_HEIGHT') {
            this.gwState = 'PLACE_PEGS'; 
            this.guyWiresData.push(this.activeAnchor); 
            this.previewCollar.setAttribute('material', 'color: #FF0000'); 
            this.previewCollarText.setAttribute('value', '');
            this.updateGWStatus("POSIZIONA PICCHETTI");
            return;
          }
          if (this.gwState === 'PLACE_PEGS') {
            if (hasTarget) {
              this.tempBasePos = this.getLocalPoint(hybridTarget.hitPoint);
              this.tempElevation = 0; 
              this.gwState = 'ADJUST_PEG_BASE';
            }
            return;
          }
          if (this.gwState === 'ADJUST_PEG_BASE') {
            let localHit = { x: this.tempBasePos.x, y: this.tempBasePos.y + this.tempElevation, z: this.tempBasePos.z };
            this.activeAnchor.pegs.push(localHit); 
            this.drawGuyWires(); 
            this.gwState = 'PLACE_PEGS'; 
            this.updateGWStatus("PICCHETTO AGGIUNTO! Premi ancora per aggiungerne altri");
            return;
          }
          return; 
        }

        let type = this.antennaTypes[this.antIdx];

        if (this.state === 'PLACE_GROUND_A' || this.state === 'REPOSITION_GROUND_A') {
          if(!hasTarget) return;
          this.tempBasePos = this.getLocalPoint(hybridTarget.hitPoint); 
          this.tempElevation = 0;
          this.state = this.state.includes('REPOSITION') ? 'REPOSITION_ADJUST_BASE_A' : 'ADJUST_BASE_A';
          document.querySelector('#info-text').setAttribute('value', "RITOCCO QUOTA (JSX)");
          return;
        }
        
        if (this.state === 'ADJUST_BASE_A' || this.state === 'REPOSITION_ADJUST_BASE_A') {
          this.pointA.base = { x: this.tempBasePos.x, y: this.tempBasePos.y + this.tempElevation, z: this.tempBasePos.z };
          this.state = this.state.includes('REPOSITION') ? 'REPOSITION_HEIGHT_A' : 'PLACE_HEIGHT_A';
          this.currentHeight = type === 'Verticale' ? this.getCalculatedLength() : 0.1;
          this.setupVerticalPreviewMode(this.pointA.base);
          document.querySelector('#info-text').setAttribute('value', "REGOLA ALTEZZA PALO (JDX)");
          return;
        }

        if (this.state === 'PLACE_HEIGHT_A' || this.state === 'REPOSITION_HEIGHT_A') {
          this.pointA.top = { x: this.pointA.base.x, y: this.pointA.base.y + this.currentHeight, z: this.pointA.base.z };
          this.resetVerticalPreviewMode();
          this.renderPoleAndLabel(this.pointA, this.pointA.top, type === 'Verticale' ? 'STILO VERTICALE' : (type === 'MMANA-GAL' ? 'PILONE MMANA' : 'PUNTO A'));

          if(this.state === 'REPOSITION_HEIGHT_A') {
            this.state = 'IDLE'; 
            this.updateGeometriesAndDrawings(); 
            this.menuUI.setAttribute('visible', true); 
          } else {
            if (type === 'Verticale' || type === 'MMANA-GAL') {
              this.state = 'IDLE'; 
              this.updateGeometriesAndDrawings(); 
              this.menuUI.setAttribute('visible', true); 
            } else { 
              this.state = 'PLACE_GROUND_B'; 
              document.querySelector('#info-text').setAttribute('value', "POSIZIONA PUNTO B");
            }
          }
          return;
        }

        if (this.state === 'PLACE_GROUND_B' || this.state === 'REPOSITION_GROUND_B') {
          if(!hasTarget) return;
          this.tempBasePos = this.getLocalPoint(hybridTarget.hitPoint); 
          this.tempElevation = 0;
          this.state = this.state.includes('REPOSITION') ? 'REPOSITION_ADJUST_BASE_B' : 'ADJUST_BASE_B';
          document.querySelector('#info-text').setAttribute('value', "RITOCCO QUOTA (JSX)");
          return;
        }

        if (this.state === 'ADJUST_BASE_B' || this.state === 'REPOSITION_ADJUST_BASE_B') {
          this.pointB.base = { x: this.tempBasePos.x, y: this.tempBasePos.y + this.tempElevation, z: this.tempBasePos.z };
          this.state = this.state.includes('REPOSITION') ? 'REPOSITION_HEIGHT_B' : 'PLACE_HEIGHT_B';
          this.currentHeight = 0.1;
          this.setupVerticalPreviewMode(this.pointB.base);
          document.querySelector('#info-text').setAttribute('value', "REGOLA ALTEZZA PALO (JDX)");
          return;
        }

        if (this.state === 'PLACE_HEIGHT_B' || this.state === 'REPOSITION_HEIGHT_B') {
          this.pointB.top = { x: this.pointB.base.x, y: this.pointB.base.y + this.currentHeight, z: this.pointB.base.z };
          this.resetVerticalPreviewMode();
          this.state = 'IDLE'; 
          this.updateGeometriesAndDrawings(); 
          this.menuUI.setAttribute('visible', true); 
          return;
        }
      },

      setupVerticalPreviewMode: function (basePos) {
        this.cursorContainer.setAttribute('visible', 'false');
        this.verticalCylinder.setAttribute('visible', 'true'); 
        this.updateHeightPreview();
        this.heightText.setAttribute('visible', 'true');
      },

      resetVerticalPreviewMode: function () {
        this.verticalCylinder.setAttribute('visible', 'false'); 
        this.heightText.setAttribute('visible', 'false');
      },

      renderPoleAndLabel: function(struct, topPos, labelName) {
        if (!topPos || !struct.base) return;
        let height = topPos.y - struct.base.y;
        let cy = struct.base.y + (height / 2);
        struct.sphere.setAttribute('visible', 'true'); 
        struct.pole.setAttribute('visible', 'true'); 
        struct.label.setAttribute('visible', 'true');
        struct.sphere.setAttribute('position', topPos);
        struct.pole.setAttribute('position', `${topPos.x} ${cy} ${topPos.z}`);
        struct.pole.setAttribute('geometry', `primitive: cylinder; radius: 0.008; height: ${height}`);
        struct.label.setAttribute('position', `${topPos.x} ${cy} ${topPos.z}`);
        struct.label.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`);
        struct.label.setAttribute('value', `${labelName}\nH: ${height.toFixed(1)}m`);
      },

      hideStructure: function(struct) {
        struct.sphere.setAttribute('visible', 'false'); 
        struct.pole.setAttribute('visible', 'false'); 
        struct.label.setAttribute('visible', 'false');
      },

      loadPreloadedMmanaModel: function() {
        let mName = this.mmanaModels[this.mmanaModelIdx];
        if (mName === 'Yagi 3 Elementi') {
          this.mmanaWires = [
            { x1: 0, y1: -2.5, z1: 0, x2: 0, y2: 2.5, z2: 0, radius: 0.004 }, 
            { x1: 1.5, y1: -2.4, z1: 0, x2: 1.5, y2: 2.4, z2: 0, radius: 0.004 }, 
            { x1: 3.2, y1: -2.2, z1: 0, x2: 3.2, y2: 2.2, z2: 0, radius: 0.004 }  
          ];
        } else if (mName === 'Delta Loop') {
          this.mmanaWires = [
            { x1: 0, y1: -2.0, z1: 0, x2: 0, y2: 2.0, z2: 0, radius: 0.002 }, 
            { x1: 0, y1: -2.0, z1: 0, x2: 0, y2: 0, z2: 3.5, radius: 0.002 }, 
            { x1: 0, y1: 2.0, z1: 0, x2: 0, y2: 0, z2: 3.5, radius: 0.002 }
          ];
        } else if (mName === 'Dipolo MMANA') {
          this.mmanaWires = [{ x1: 0, y1: -5.0, z1: 0, x2: 0, y2: 5.0, z2: 0, radius: 0.002 }];
        } else if (mName === 'Modello Importato') { 
          this.mmanaWires = this.importedMmanaWires; 
        }
      },

      updateMenuText: function() {
        let type = this.antennaTypes[this.antIdx]; 
        let band = this.bands[this.bandIdx];
        let antValEl = document.querySelector('#txt-ant-val');
        let bandValEl = document.querySelector('#txt-band-val');
        if(antValEl) antValEl.setAttribute('value', type.toUpperCase());
        if(bandValEl) bandValEl.setAttribute('value', band);

        let toggleSubMenu = (id, isVisible) => {
          let el = document.querySelector(id);
          if(!el) return;
          el.setAttribute('visible', isVisible);
          el.querySelectorAll('[btn-interaction]').forEach(btn => { 
            if (isVisible) btn.classList.add('clickable'); 
            else btn.classList.remove('clickable'); 
          });
        };

        toggleSubMenu('#sub-dipolo', type === 'Dipolo'); 
        toggleSubMenu('#sub-endfed', type === 'End Fed'); 
        toggleSubMenu('#sub-longwire', type === 'Longwire');
        toggleSubMenu('#sub-verticale', type === 'Verticale'); 
        toggleSubMenu('#sub-mmana', type === 'MMANA-GAL');
        
        let repoBbtn = document.querySelector('#btn-repo-b');
        if(repoBbtn) repoBbtn.setAttribute('visible', type !== 'Verticale' && type !== 'MMANA-GAL');
        this.refreshRaycaster();

        let infoTextEl = document.querySelector('#info-text');
        if(!infoTextEl) return;
        let infoTextStr = infoTextEl.getAttribute('value');
        
        if (this.state === 'IDLE') {
          if (type === 'Dipolo') { 
            infoTextStr = `ANTENNA: DIPOLO | BANDA: ${band}\nLUNGHEZZA: ${this.getCalculatedLength().toFixed(2)}m`; 
          } 
          else if (type === 'End Fed') { 
            infoTextStr = `ANTENNA: END FED | BANDA: ${band}\nAC: ${this.endFed_AC_Len.toFixed(2)}m | CB: ${this.endFed_CB_Len.toFixed(2)}m`; 
          }
          else if (type === 'Longwire') { 
            infoTextStr = `ANTENNA: LONGWIRE | BANDA: ${band}\nVERTICE: DA ${this.longwireVertex} | LUNGH: ${this.longwireLen.toFixed(2)}m`; 
          }
          else if (type === 'Verticale') { 
            let h = this.pointA.top ? (this.pointA.top.y - this.pointA.base.y).toFixed(2) : 0; 
            infoTextStr = `ANTENNA: VERTICALE | BANDA: ${band}\nSTILO: ${h}m`; 
          }
          else if (type === 'MMANA-GAL') { 
            infoTextStr = `MMANA: ${this.mmanaModels[this.mmanaModelIdx]}\nFili conduttori: ${this.mmanaWires.length}\nRuota l'antenna col joystick sx.`; 
          }
          infoTextEl.setAttribute('value', infoTextStr);
        }
      },

      drawGuyWires: function() {
        while (this.gwContainerEl.firstChild) { 
          this.gwContainerEl.removeChild(this.gwContainerEl.firstChild); 
        }
        this.guyWiresData.forEach((anchor, aIdx) => {
          let pData = anchor.pole === 'A' ? this.pointA : this.pointB;
          if (!pData.base || !pData.top) return;
          let h = Math.min(anchor.height, pData.top.y - pData.base.y);
          let anchorPos = new THREE.Vector3(pData.base.x, pData.base.y + h, pData.base.z);

          let collar = document.createElement('a-torus');
          collar.setAttribute('radius', '0.04'); 
          collar.setAttribute('radius-tubular', '0.006');
          collar.setAttribute('material', 'color: #FF1744; shader: flat'); 
          collar.setAttribute('rotation', '90 0 0');
          collar.setAttribute('position', `${anchorPos.x} ${anchorPos.y} ${anchorPos.z}`);
          collar.setAttribute('class', 'clickable deletable'); 
          collar.setAttribute('data-aidx', aIdx); 
          collar.setAttribute('data-pidx', 'null');
          this.gwContainerEl.appendChild(collar);

          anchor.pegs.forEach((pegPos, pIdx) => {
            let pVec = new THREE.Vector3(pegPos.x, pegPos.y, pegPos.z);
            let distance = anchorPos.distanceTo(pVec);
            let peg = document.createElement('a-cone');
            peg.setAttribute('radius-bottom', '0.04'); 
            peg.setAttribute('radius-top', '0.005'); 
            peg.setAttribute('height', '0.15');
            peg.setAttribute('material', 'color: #FF9800; shader: flat'); 
            peg.setAttribute('position', `${pVec.x} ${pVec.y + 0.075} ${pVec.z}`);
            peg.setAttribute('class', 'clickable deletable'); 
            peg.setAttribute('data-aidx', aIdx); 
            peg.setAttribute('data-pidx', pIdx);
            this.gwContainerEl.appendChild(peg);

            let wire = document.createElement('a-cylinder');
            wire.setAttribute('radius', '0.002'); 
            wire.setAttribute('height', distance); 
            wire.setAttribute('material', 'color: #B0BEC5; shader: flat');
            let midPoint = new THREE.Vector3().lerpVectors(anchorPos, pVec, 0.5);
            wire.object3D.position.copy(midPoint); 
            wire.object3D.lookAt(pVec); 
            wire.object3D.rotateX(Math.PI / 2);
            this.gwContainerEl.appendChild(wire);

            let textPos = new THREE.Vector3().lerpVectors(pVec, anchorPos, 0.3);
            let label = document.createElement('a-text');
            label.setAttribute('value', `${distance.toFixed(2)}m`); 
            label.setAttribute('align', 'center'); 
            label.setAttribute('color', '#FFEB3B');
            label.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`);
            label.setAttribute('position', `${textPos.x} ${textPos.y + 0.1} ${textPos.z}`); 
            label.setAttribute('look-at-camera', '');
            this.gwContainerEl.appendChild(label);
          });
        });
        this.refreshRaycaster();
      },

      updateGeometriesAndDrawings: function() {
        this.mmanaContainerEl.innerHTML = ''; 
        this.drawGuyWires();
        if (!this.pointA.top) return;
        let type = this.antennaTypes[this.antIdx];

        if (type === 'Verticale') {
          this.hideStructure(this.pointB); 
          this.hideStructure(this.pointC);
          this.labelSegA.setAttribute('visible', 'false'); 
          this.labelSegB.setAttribute('visible', 'false'); 
          this.antennaTube2.setAttribute('visible', 'false');
          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'STILO VERTICALE');
          let h = this.pointA.top.y - this.pointA.base.y;
          this.antennaTube1.setAttribute('visible', 'true'); 
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.018; height: ${h}`);
          this.antennaTube1.object3D.position.set(this.pointA.top.x, this.pointA.base.y + (h / 2), this.pointA.top.z); 
          this.antennaTube1.object3D.rotation.set(0, 0, 0);

          let base = new THREE.Vector3(this.pointA.base.x, this.pointA.base.y + 0.002, this.pointA.base.z);
          let radRot = this.antennaRotationY * Math.PI / 180;
          for (let i = 0; i < this.maxRadials; i++) {
            if (i < this.numRadials) {
              this.radialPool[i].setAttribute('visible', 'true'); 
              this.radialPool[i].setAttribute('geometry', `primitive: cylinder; radius: 0.004; height: ${this.radialLen}`);
              let angle = ((i * 2 * Math.PI) / this.numRadials) + radRot;
              let targetVec = new THREE.Vector3(base.x + Math.cos(angle) * this.radialLen, base.y, base.z + Math.sin(angle) * this.radialLen);
              let midPoint = new THREE.Vector3().lerpVectors(base, targetVec, 0.5);
              this.radialPool[i].object3D.position.copy(midPoint); 
              this.radialPool[i].object3D.lookAt(targetVec); 
              this.radialPool[i].object3D.rotateX(Math.PI / 2);
            } else { 
              this.radialPool[i].setAttribute('visible', 'false'); 
            }
          }
          return;
        }

        if (type === 'MMANA-GAL') {
          this.antennaTube1.setAttribute('visible', 'false'); 
          this.antennaTube2.setAttribute('visible', 'false');
          for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
          this.labelSegA.setAttribute('visible', 'false'); 
          this.labelSegB.setAttribute('visible', 'false');
          this.hideStructure(this.pointB); 
          this.hideStructure(this.pointC);
          if (this.mmanaWires.length === 0) return;
          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PILONE MMANA');
          let vecA = new THREE.Vector3(this.pointA.top.x, this.pointA.top.y, this.pointA.top.z);
          this.mmanaContainerEl.object3D.position.copy(vecA); 
          this.mmanaContainerEl.object3D.rotation.set(0, this.antennaRotationY * Math.PI / 180, 0);
          this.mmanaWires.forEach((w) => {
            let cyl = document.createElement('a-cylinder'); 
            let p1 = new THREE.Vector3(w.x1, w.z1, w.y1); 
            let p2 = new THREE.Vector3(w.x2, w.z2, w.y2); 
            let d = p1.distanceTo(p2);
            if(d < 0.01) return;
            cyl.setAttribute('geometry', `primitive: cylinder; radius: ${Math.max(0.005, w.radius * 2.8)}; height: ${d}`); 
            cyl.setAttribute('material', 'color: #00E676; shader: flat');
            let mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
            cyl.object3D.position.copy(mid); 
            cyl.object3D.lookAt(p2); 
            cyl.object3D.rotateX(Math.PI / 2); 
            this.mmanaContainerEl.appendChild(cyl);
          });
          return;
        }

        for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
        if (!this.pointB.top) return;

        this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PUNTO A'); 
        this.renderPoleAndLabel(this.pointB, this.pointB.top, 'PUNTO B');
        let vecA = new THREE.Vector3(this.pointA.top.x, this.pointA.top.y, this.pointA.top.z); 
        let vecB = new THREE.Vector3(this.pointB.top.x, this.pointB.top.y, this.pointB.top.z);
        let dirAB = new THREE.Vector3().subVectors(vecB, vecA).normalize(); 
        let dirBA = new THREE.Vector3().subVectors(vecA, vecB).normalize();

        let vecC = new THREE.Vector3().lerpVectors(vecA, vecB, this.pointC.percent);
        let baseC_y = this.pointA.base.y + (this.pointB.base.y - this.pointA.base.y) * this.pointC.percent;
        this.pointC.base = { x: vecC.x, y: baseC_y, z: vecC.z }; 
        this.pointC.top = vecC; 
        this.renderPoleAndLabel(this.pointC, this.pointC.top, 'CENTRO C');

        if (type === 'Dipolo') {
          this.antennaTube2.setAttribute('visible', 'false'); 
          let antLen = this.getCalculatedLength();
          this.antennaTube1.setAttribute('visible', 'true'); 
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${antLen}`);
          this.antennaTube1.object3D.position.copy(this.pointC.top); 
          this.antennaTube1.object3D.lookAt(vecB); 
          this.antennaTube1.object3D.rotateX(Math.PI / 2);
          let extAntStart = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, -(antLen / 2)); 
          let extAntEnd = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, antLen / 2);
          this.labelSegA.setAttribute('visible', 'true'); 
          this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extAntStart, 0.5)); 
          this.labelSegA.setAttribute('value', `A->Ant:\n${new THREE.Vector3().subVectors(extAntStart, vecA).length().toFixed(2)}m`);
          this.labelSegB.setAttribute('visible', 'true'); 
          this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extAntEnd, vecB, 0.5)); 
          this.labelSegB.setAttribute('value', `Ant->B:\n${new THREE.Vector3().subVectors(vecB, extAntEnd).length().toFixed(2)}m`);
        } 
        else if (type === 'End Fed') {
          this.antennaTube1.setAttribute('visible', 'true'); 
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_AC_Len}`);
          let posTube1 = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirBA, this.endFed_AC_Len / 2);
          this.antennaTube1.object3D.position.copy(posTube1); 
          this.antennaTube1.object3D.lookAt(vecA); 
          this.antennaTube1.object3D.rotateX(Math.PI / 2);
          this.antennaTube2.setAttribute('visible', 'true'); 
          this.antennaTube2.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_CB_Len}`);
          let posTube2 = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, this.endFed_CB_Len / 2);
          this.antennaTube2.object3D.position.copy(posTube2); 
          this.antennaTube2.object3D.lookAt(vecB); 
          this.antennaTube2.object3D.rotateX(Math.PI / 2);
          let extAC = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirBA, this.endFed_AC_Len); 
          let extCB = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, this.endFed_CB_Len);
          this.labelSegA.setAttribute('visible', 'true'); 
          this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extAC, 0.5)); 
          this.labelSegA.setAttribute('value', `Vuoto AC:\n${this.endFed_AC_Len.toFixed(2)}m`);
          this.labelSegB.setAttribute('visible', 'true'); 
          this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extCB, vecB, 0.5)); 
          this.labelSegB.setAttribute('value', `Vuoto CB:\n${this.endFed_CB_Len.toFixed(2)}m`);
        } 
        else if (type === 'Longwire') {
          this.hideStructure(this.pointC); 
          this.antennaTube2.setAttribute('visible', 'false');
          let startVec = this.longwireVertex === 'A' ? vecA : vecB; 
          let targetVec = this.longwireVertex === 'A' ? vecB : vecA;
          let dirLW = new THREE.Vector3().subVectors(targetVec, startVec).normalize();
          this.antennaTube1.setAttribute('visible', 'true'); 
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.longwireLen}`);
          let posTubeLW = new THREE.Vector3().copy(startVec).addScaledVector(dirLW, this.longwireLen / 2);
          this.antennaTube1.object3D.position.copy(posTubeLW); 
          this.antennaTube1.object3D.lookAt(targetVec); 
          this.antennaTube1.object3D.rotateX(Math.PI / 2);
          let extLW = new THREE.Vector3().copy(startVec).addScaledVector(dirLW, this.longwireLen);
          this.labelSegA.setAttribute('visible', 'false'); 
          this.labelSegB.setAttribute('visible', 'true'); 
          this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extLW, targetVec, 0.5));
          this.labelSegB.setAttribute('value', `Lungo: ${this.longwireLen.toFixed(2)}m`);
        }
        this.labelSegA.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`); 
        this.labelSegB.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`);
      },

      setupGlobalEventDelegation: function() {
        let scene = this.el.sceneEl; 
        this.lastClickTime = 0; 
        scene.addEventListener('mousedown', (evt) => {
          let now = Date.now(); 
          if (now - this.lastClickTime < 250) return; 
          let target = evt.target.closest('.clickable'); 
          if(!target) return;
          
          if (!this.isElementVisible(target)) return;

          this.lastClickTime = now; 
          let id = target.id; 
          let mathRound = (num) => Math.round(num * 100) / 100;

          if (id === 'btn-gw-new-a') { this.startCollarPlacement('A'); } 
          else if (id === 'btn-gw-new-b') { this.startCollarPlacement('B'); }
          else if (id === 'btn-gw-delete-mode') {
            if (this.gwState === 'ADJUST_HEIGHT' || this.gwState === 'PLACE_PEGS' || this.gwState === 'ADJUST_PEG_BASE') { 
              this.activeAnchor = null; 
              this.previewCollar.setAttribute('visible', 'false'); 
              this.previewCollarText.setAttribute('visible', 'false');
              this.gwState = 'SELECT_POLE';
              this.updateGWStatus("SCEGLI PALO DA TIRANTARE");
              return;
            }
            if (this.gwState !== 'DELETE_GW') {
                this.gwState = 'DELETE_GW'; 
                this.updateGWStatus("PUNTA COL LASER UN ANELLO/PICCHETTO E PREMI IL GRILLETTO");
                document.querySelector('#btn-gw-delete-mode a-text').setAttribute('value', '[ TORNA A INSERIMENTO ]'); 
            } else {
                this.gwState = 'SELECT_POLE'; 
                this.updateGWStatus("SCEGLI PALO DA TIRANTARE");
                document.querySelector('#btn-gw-delete-mode a-text').setAttribute('value', 'ELIMINA ANELLI / PICCHETTI');
            }
          }
          else if (id === 'btn-gw-close') { this.toggleGuyWireMode(); }
          
          else if (id === 'btn-ar-save') { 
              if(this.state !== 'IDLE') return;
              this.state = 'CALIB_SAVE_1';
              this.menuUI.setAttribute('visible', 'false');
          }

          else if (id === 'btn-ant') { this.antIdx = (this.antIdx + 1) % this.antennaTypes.length; this.resetAntennaLengths(); this.refreshAll(); } 
          else if (id === 'btn-band') { this.bandIdx = (this.bandIdx + 1) % this.bands.length; this.resetAntennaLengths(); if (this.antennaTypes[this.antIdx] === 'Verticale' && this.pointA.top) { this.refreshAll(); } }
          else if (id === 'btn-c-left') { this.pointC.percent = Math.max(0.02, mathRound(this.pointC.percent - 0.05)); this.updateGeometriesAndDrawings(); } 
          else if (id === 'btn-c-right') { this.pointC.percent = Math.min(0.98, mathRound(this.pointC.percent + 0.05)); this.updateGeometriesAndDrawings(); }
          else if (id === 'btn-lw-vertex') { this.longwireVertex = this.longwireVertex === 'A' ? 'B' : 'A'; this.refreshAll(); } 
          else if (id === 'btn-mmana-model') { this.mmanaModelIdx = (this.mmanaModelIdx + 1) % this.mmanaModels.length; this.loadPreloadedMmanaModel(); this.refreshAll(); }
          else if (id === 'btn-txt-minus') { this.globalTextScale = Math.max(0.15, mathRound(this.globalTextScale - 0.05)); this.updateGeometriesAndDrawings(); } 
          else if (id === 'btn-txt-plus') { this.globalTextScale = Math.min(1.0, mathRound(this.globalTextScale + 0.05)); this.updateGeometriesAndDrawings(); }
          else if (id === 'btn-ac-m1')   { this.endFed_AC_Len = Math.max(0.1, mathRound(this.endFed_AC_Len - 1.0)); this.refreshAll(); } 
          else if (id === 'btn-ac-m01')  { this.endFed_AC_Len = Math.max(0.1, mathRound(this.endFed_AC_Len - 0.1)); this.refreshAll(); }
          else if (id === 'btn-ac-p01')  { this.endFed_AC_Len = mathRound(this.endFed_AC_Len + 0.1); this.refreshAll(); } 
          else if (id === 'btn-ac-p1')   { this.endFed_AC_Len = mathRound(this.endFed_AC_Len + 1.0); this.refreshAll(); }
          else if (id === 'btn-cb-m1')   { this.endFed_CB_Len = Math.max(0.1, mathRound(this.endFed_CB_Len - 1.0)); this.refreshAll(); } 
          else if (id === 'btn-cb-m01')  { this.endFed_CB_Len = Math.max(0.1, mathRound(this.endFed_CB_Len - 0.1)); this.refreshAll(); }
          else if (id === 'btn-cb-p01')  { this.endFed_CB_Len = mathRound(this.endFed_CB_Len + 0.1); this.refreshAll(); } 
          else if (id === 'btn-cb-p1')   { this.endFed_CB_Len = mathRound(this.endFed_CB_Len + 1.0); this.refreshAll(); }
          else if (id === 'btn-lw-m1')   { this.longwireLen = Math.max(0.1, mathRound(this.longwireLen - 1.0)); this.refreshAll(); } 
          else if (id === 'btn-lw-m01')  { this.longwireLen = Math.max(0.1, mathRound(this.longwireLen - 0.1)); this.refreshAll(); }
          else if (id === 'btn-lw-p01')  { this.longwireLen = mathRound(this.longwireLen + 0.1); this.refreshAll(); } 
          else if (id === 'btn-lw-p1')   { this.longwireLen = mathRound(this.longwireLen + 1.0); this.refreshAll(); }
          else if (id === 'btn-rad-num-minus') { this.numRadials = Math.max(1, this.numRadials - 1); this.refreshAll(); } 
          else if (id === 'btn-rad-num-plus')  { this.numRadials = Math.min(this.maxRadials, this.numRadials + 1); this.refreshAll(); }
          else if (id === 'btn-rad-m1')   { this.radialLen = Math.max(0.1, mathRound(this.radialLen - 1.0)); this.refreshAll(); } 
          else if (id === 'btn-rad-m01')  { this.radialLen = Math.max(0.1, mathRound(this.radialLen - 0.1)); this.refreshAll(); }
          else if (id === 'btn-rad-p01')  { this.radialLen = mathRound(this.radialLen + 0.1); this.refreshAll(); } 
          else if (id === 'btn-rad-p1')   { this.radialLen = mathRound(this.radialLen + 1.0); this.refreshAll(); }
          else if (id === 'btn-repo-a') { this.state = 'REPOSITION_GROUND_A'; this.menuUI.setAttribute('visible', false); document.querySelector('#info-text').setAttribute('value', 'POSIZIONA PUNTO A'); } 
          else if (id === 'btn-repo-b') { this.state = 'REPOSITION_GROUND_B'; this.menuUI.setAttribute('visible', false); document.querySelector('#info-text').setAttribute('value', 'POSIZIONA PUNTO B'); }
          else if (id === 'btn-global-reset') { this.triggerGlobalReset(); }
        });
      },

      setupFileIO: function() {
        document.querySelector('#btn-browser-save').addEventListener('click', () => {
            if(this.state !== 'IDLE') { alert("Finisci di piazzare l'antenna in AR prima di salvare."); return; }
            this.state = 'CALIB_SAVE_1';
            this.menuUI.setAttribute('visible', 'false');
            let alertBox = document.querySelector('#alert-msg');
            alertBox.style.color = "#00FFFF";
            alertBox.innerText = "NOME SALVATO! Ora metti il visore e piazza i 2 Diamanti in Realtà Aumentata.";
        });

        document.querySelector('#file-load').addEventListener('change', (evt) => {
            let file = evt.target.files[0]; 
            if(!file) return;
            let reader = new FileReader();
            reader.onload = (e) => {
                try {
                    this.loadedData = JSON.parse(e.target.result);
                    if (this.loadedData.calib && this.loadedData.calib.length === 2) {
                        this.state = 'CALIB_LOAD_1';
                        this.triggerGlobalReset(); 
                        this.menuUI.setAttribute('visible', 'false');
                        this.gwUI.setAttribute('visible', 'false');
                        let alertBox = document.querySelector('#alert-msg');
                        alertBox.style.color = "#00FF00";
                        alertBox.innerText = "File letto! Indossa il visore e posiziona i 2 Diamanti nei punti in cui li avevi salvati.";
                    } else { alert("File incompatibile o privo di dati di calibrazione."); }
                } catch(err) { alert("Errore lettura file JSON."); }
            };
            reader.readAsText(file);
        });
      },

      executeExportJSON: function() {
        let name = document.querySelector('#save-name').value.trim() || 'configurazione_antenna';
        let data = {
            pointA: { base: this.pointA.base, top: this.pointA.top },
            pointB: { base: this.pointB.base, top: this.pointB.top },
            pointC: { percent: this.pointC.percent },
            antIdx: this.antIdx, bandIdx: this.bandIdx,
            endFed_AC_Len: this.endFed_AC_Len, endFed_CB_Len: this.endFed_CB_Len,
            longwireLen: this.longwireLen, longwireVertex: this.longwireVertex,
            numRadials: this.numRadials, radialLen: this.radialLen,
            guyWiresData: this.guyWiresData, antennaRotationY: this.antennaRotationY,
            calib: this.calibOriginalPoints 
        };
        
        let blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        let url = URL.createObjectURL(blob);
        let downloadAnchor = document.createElement('a');
        downloadAnchor.href = url;
        downloadAnchor.download = name + ".json";
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        document.body.removeChild(downloadAnchor);
        URL.revokeObjectURL(url);
        
        this.calibDiamonds.forEach(d => d.setAttribute('visible', 'false'));
        document.querySelector('#alert-msg').style.color = "#00FF00";
        document.querySelector('#alert-msg').innerText = "File salvato nei Download del tuo visore/PC!";
        this.menuUI.setAttribute('visible', 'true');
      },

      executeCalibrationAlignment: function() {
        let O1 = this.loadedData.calib[0]; 
        let O2 = this.loadedData.calib[1]; 
        let N1 = this.calibNewPoints[0]; 
        let N2 = this.calibNewPoints[1]; 

        let origAngle = Math.atan2(O2.z - O1.z, O2.x - O1.x);
        let newAngle = Math.atan2(N2.z - N1.z, N2.x - N1.x);
        let deltaAngle = newAngle - origAngle;

        this.worldPivotEl.object3D.rotation.y = deltaAngle;

        let rotatedO1 = new THREE.Vector3(O1.x, O1.y, O1.z);
        rotatedO1.applyAxisAngle(new THREE.Vector3(0,1,0), deltaAngle);
        this.worldPivotEl.object3D.position.set(N1.x - rotatedO1.x, N1.y - rotatedO1.y, N1.z - rotatedO1.z);

        let data = this.loadedData;
        this.pointA.base = data.pointA.base; 
        this.pointA.top = data.pointA.top;
        this.pointB.base = data.pointB.base; 
        this.pointB.top = data.pointB.top;
        if(data.pointC) this.pointC.percent = data.pointC.percent;
        this.antIdx = data.antIdx; 
        this.bandIdx = data.bandIdx;
        this.endFed_AC_Len = data.endFed_AC_Len; 
        this.endFed_CB_Len = data.endFed_CB_Len;
        this.longwireLen = data.longwireLen; 
        this.longwireVertex = data.longwireVertex;
        this.numRadials = data.numRadials; 
        this.radialLen = data.radialLen;
        this.guyWiresData = data.guyWiresData || [];
        this.antennaRotationY = data.antennaRotationY || 0;
        this.mmanaModelIdx = data.mmanaModelIdx || 0;
        
        this.state = 'IDLE';
        document.querySelector('#alert-msg').style.color = "#00FF00";
        document.querySelector('#alert-msg').innerText = "Calibrazione Completata e Antenna Ripristinata!";
        this.calibDiamonds.forEach(d => d.setAttribute('visible', 'false'));
        this.menuUI.setAttribute('visible', 'true');
        this.refreshAll();
      },

      triggerGlobalReset: function() {
        this.hideStructure(this.pointA); 
        this.hideStructure(this.pointB); 
        this.hideStructure(this.pointC);
        this.pointA.top = null; 
        this.pointA.base = null; 
        this.pointB.top = null; 
        this.pointB.base = null;
        this.labelSegA.setAttribute('visible', 'false'); 
        this.labelSegB.setAttribute('visible', 'false');
        if(this.antennaTube1) this.antennaTube1.setAttribute('visible', 'false'); 
        if(this.antennaTube2) this.antennaTube2.setAttribute('visible', 'false');
        for(let i=0; i<this.maxRadials; i++) { 
          if(this.radialPool[i]) this.radialPool[i].setAttribute('visible', 'false'); 
        }
        this.mmanaContainerEl.innerHTML = ''; 
        this.state = 'PLACE_GROUND_A'; 
        this.antennaRotationY = 0; 
        this.tempElevation = 0; 
        this.tempBasePos = null; 
        this.currentHoveredGW = null;
        this.guyWiresData = []; 
        this.drawGuyWires(); 
        this.gwState = 'OFF'; 
        this.gwUI.setAttribute('visible', false);
        this.previewCollar.setAttribute('visible', 'false'); 
        this.previewCollarText.setAttribute('visible', 'false');
        this.gwDeleteCursor.setAttribute('visible', 'false');
        this.worldPivotEl.object3D.position.set(0,0,0); 
        this.worldPivotEl.object3D.rotation.set(0,0,0);
      }
    });
  </script>
