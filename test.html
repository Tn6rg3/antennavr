<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Environment Scanner - Hit Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px; }
        #point-counter { color: #00ffff; font-family: monospace; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="info">
        <b>Grilletti (Tieni premuto)</b>: "Dipingi" la stanza in tempo reale<br>
        <b>Pulsante X (Sinistro)</b>: Resetta la scansione<br>
        <div id="point-counter">Punti: 0 / 1000000</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        
        // Impostazioni per scala ambientale (Stanza)
        const MAX_POINTS = 1000000; // 1 Milione di punti
        const MIN_DISTANCE = 0.02;  // Scrive un punto ogni 2 centimetri
        
        let pointCloud;
        let positions;
        let pointCount = 0;
        
        let lastButtonPressTime = 0;
        const uiCounter = document.getElementById('point-counter');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Chiediamo SOLO l'hit-test, bypassando le mesh e i confini salvati!
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // --- GESTIONE CONTROLLER E LASER ---
            function buildControllerPointer() {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0, 0, -1) 
                ]);
                const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
                return new THREE.Line(geometry, material);
            }

            for (let i = 0; i < 2; i++) {
                const controller = renderer.xr.getController(i);
                
                controller.userData = {
                    handedness: null,
                    isScanning: false,
                    hitTestSource: null,
                    lastPoint: new THREE.Vector3(999, 999, 999)
                };

                controller.addEventListener('connected', function (event) {
                    this.userData.handedness = event.data.handedness;
                    this.add(buildControllerPointer());

                    renderer.xr.getSession().requestHitTestSource({ space: event.data.targetRaySpace })
                        .then(source => { this.userData.hitTestSource = source; })
                        .catch(console.error);
                });

                controller.addEventListener('selectstart', function () { this.userData.isScanning = true; });
                controller.addEventListener('selectend', function () { this.userData.isScanning = false; });

                scene.add(controller);
            }

            // --- NUVOLA DI PUNTI ---
            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(MAX_POINTS * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setDrawRange(0, 0);

            // Punti di 2 centimetri per riempire in fretta i muri
            const material = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.02 });
            pointCloud = new THREE.Points(geometry, material);
            pointCloud.frustumCulled = false; 
            scene.add(pointCloud);

            window.addEventListener('resize', onWindowResize);
        }

        // --- FUNZIONE DI RESET IMMEDIATO ---
        function clearPointCloud() {
            pointCount = 0;
            pointCloud.geometry.setDrawRange(0, 0);
            pointCloud.geometry.attributes.position.needsUpdate = true;
            uiCounter.textContent = `Punti: ${pointCount} / ${MAX_POINTS} (RESET)`;
            uiCounter.style.color = "#ff0000";
            
            setTimeout(() => { uiCounter.style.color = "#00ffff"; }, 1000);
            
            // Resetta le memorie dei controller
            for (let i = 0; i < 2; i++) {
                renderer.xr.getController(i).userData.lastPoint.set(999, 999, 999);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                const now = performance.now();

                // 1. GESTIONE DEL TASTO X PER IL RESET
                for (const source of session.inputSources) {
                    if (source.handedness === 'left' && source.gamepad) {
                        if (source.gamepad.buttons[4] && source.gamepad.buttons[4].pressed) {
                            if (now - lastButtonPressTime > 500) {
                                lastButtonPressTime = now;
                                clearPointCloud();
                            }
                        }
                    }
                }

                // 2. GESTIONE HIT TEST E DISEGNO PUNTI
                const c0 = renderer.xr.getController(0);
                const c1 = renderer.xr.getController(1);
                const controllers = [c0, c1];

                let pointsAdded = false;

                controllers.forEach(ctrl => {
                    if (ctrl.userData.isScanning && ctrl.userData.hitTestSource && pointCount < MAX_POINTS) {
                        const hits = frame.getHitTestResults(ctrl.userData.hitTestSource);
                        
                        if (hits.length > 0) {
                            const pose = hits[0].getPose(referenceSpace);
                            const currentPos = new THREE.Vector3().setFromMatrixPosition(new THREE.Matrix4().fromArray(pose.transform.matrix));

                            if (currentPos.distanceTo(ctrl.userData.lastPoint) > MIN_DISTANCE) {
                                positions[pointCount * 3] = currentPos.x;
                                positions[pointCount * 3 + 1] = currentPos.y;
                                positions[pointCount * 3 + 2] = currentPos.z;

                                pointCount++;
                                pointsAdded = true;
                                ctrl.userData.lastPoint.copy(currentPos);
                            }
                        }
                    }
                });

                if (pointsAdded) {
                    pointCloud.geometry.setDrawRange(0, pointCount);
                    pointCloud.geometry.attributes.position.needsUpdate = true;
                    
                    // Aggiorna l'interfaccia ogni 50 punti per non sovraccaricare la CPU
                    if (pointCount % 50 === 0 || pointCount === MAX_POINTS) {
                        uiCounter.textContent = `Punti: ${pointCount} / ${MAX_POINTS}`;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
