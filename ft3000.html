<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Yaesu AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #f4f4f4; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; }
        .ar-button {
            background-color: #007bff; color: white; border-radius: 25px; border: none;
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 16px 32px; font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <model-viewer 
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        <button slot="ar-button" class="ar-button">Vedi nello spazio (AR)</button>
    </model-viewer>
</body>
</html>
