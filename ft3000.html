<html lang="it">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Yaesu AR</title>
    <!-- Importa la libreria WebAR -->

    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #f4f4f4; overflow: hidden; font-family: sans-serif;
        }
        model-viewer { width: 100%; height: 100%; }
        .ar-button {
            background-color: #007bff;
            color: white;
            border-radius: 25px;
            border: none;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .ar-button:active { background-color: #0056b3; }
        .header {
            position: absolute; top: 0; left: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
            padding: 20px; color: white; box-sizing: border-box; pointer-events: none; z-index: 100;
        }
        .header h1 { margin: 0; font-size: 20px; }
        .header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.8; }
    </style>
</head>
