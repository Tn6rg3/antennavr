<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Antenne AR Pro V24 - Multi-Scena & Traliccio Dinamico</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    #ui-2d-container { position: absolute; top: 15px; left: 15px; z-index: 9999; background: #111; color: #00E676; padding: 15px; border: 2px solid #FFEB3B; border-radius: 8px; font-family: monospace; max-width: 320px; max-height: 90vh; overflow-y: auto; }
    #ui-2d-container h3 { margin: 0 0 5px 0; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px;}
    #ui-2d-container p { margin: 5px 0; font-size: 11px; color: #fff; line-height: 1.3; }
    #ui-2d-container input, #ui-2d-container select { width: 93%; padding: 6px; background: #222; color: #fff; border: 1px solid #00E676; margin-bottom: 10px; font-family: monospace; }
    #ui-2d-container button { width: 100%; padding: 8px; background: #00E676; color: #000; border: none; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
    #ui-2d-container button.action { background: #FFEB3B; }
    hr { border-color: #333; margin: 15px 0; }
  </style>
  <script>
    AFRAME.registerComponent('look-at-camera', { tick: function () { let cameraEl = document.querySelector('#camera'); if (cameraEl && cameraEl.object3D) { this.el.object3D.lookAt(cameraEl.object3D.position); } } });
    
    AFRAME.registerComponent('btn-interaction', {
      init: function () {
        let el = this.el; let originalColor = el.getAttribute('material') ? el.getAttribute('material').color : '#FFFFFF';
        el.addEventListener('mouseenter', () => el.setAttribute('material', 'opacity', 0.8));
        el.addEventListener('mouseleave', () => { el.setAttribute('material', 'opacity', 1.0); el.setAttribute('scale', '1 1 1'); if(el.getAttribute('material')) el.setAttribute('material', 'color', originalColor); });
        el.addEventListener('mousedown', () => { el.setAttribute('scale', '0.95 0.95 0.8'); el.setAttribute('material', 'color', '#00FFCC'); });
        el.addEventListener('mouseup', () => { el.setAttribute('scale', '1 1 1'); if(el.getAttribute('material')) el.setAttribute('material', 'color', originalColor); });
      }
    });

    AFRAME.registerComponent('ar-antenna-system', {
      init: function () {
        try {
            this.state = 'PLACE_GROUND_A'; 
            this.pointA = { base: null, top: null, sphere: null, pole: null, label: null };
            this.pointB = { base: null, top: null, sphere: null, pole: null, label: null };
            this.pointC = { top: null, sphere: null, pole: null, label: null, percent: 0.5 }; 
            
            this.traliccio = { active: false, center: null, shape: 'square', radius: 0.3, rotationY: 0, height: 6.0, corners: [], pegs: [] };

            this.labelSegA = null; this.labelSegB = null;
            this.antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale', 'MMANA-GAL'];
            this.bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
            this.antIdx = 0; this.bandIdx = 2; 
            
            this.endFed_AC_Len = 10.0; this.endFed_CB_Len = 10.0; this.longwireLen = 20.0; this.longwireVertex = 'A'; 
            this.numRadials = 4; this.radialLen = 5.0; this.radialPool = []; this.maxRadials = 16; 
            this.mmanaModels = ['Yagi 3 Elementi', 'Delta Loop', 'Dipolo MMANA', 'Modello Importato'];
            this.mmanaModelIdx = 0; this.antennaRotationY = 0; this.globalTextScale = 0.35; this.currentHeight = 0.1; 
            this.mmanaWires = []; this.importedMmanaWires = []; 

            this.guyWiresData = []; this.gwState = 'OFF'; this.activeAnchor = null; 
            this.lastTriggerTime = 0; this.calibLocal1 = null; this.calibLocal2 = null;

            this.laserMode = false; this.hitTestSource = null; this.requestingHitTest = false; this.reticleValid = false;
            this.targetReticlePos = new THREE.Vector3(); this.targetReticleQuat = new THREE.Quaternion(); this.lastFloorY = 0; 

            // MULTI-ANTENNA SCENE MANAGEMENT
            this.sceneAntennas = []; 
            this.currentSlot = 0;
            this.sceneAntennas.push({ state: null, clone: null });

            this.raycasterEl = document.querySelector('#right-controller'); this.leftControllerEl = document.querySelector('#left-controller');
            this.worldPivotEl = document.querySelector('#world-pivot'); this.worldContentEl = document.querySelector('#world-content');
            
            this.activeAntennaContainerEl = document.querySelector('#active-antenna-container');
            this.staticContainerEl = document.querySelector('#static-antennas-container');
            this.verticalCylinder = document.querySelector('#vertical-cylinder'); this.heightText = document.querySelector('#height-text');
            this.menuUI = document.querySelector('#menu-ui'); this.gwUI = document.querySelector('#guy-wires-ui');
            
            this.mmanaContainerEl = document.querySelector('#mmana-wires-container'); this.gwContainerEl = document.querySelector('#guy-wires-container');
            this.traliccioContainerEl = document.createElement('a-entity'); this.activeAntennaContainerEl.appendChild(this.traliccioContainerEl);

            if (this.raycasterEl) { this.raycasterEl.addEventListener('triggerdown', this.onTriggerDown.bind(this)); this.raycasterEl.addEventListener('thumbstickmoved', this.onRightThumbstick.bind(this)); }
            if (this.leftControllerEl) { this.leftControllerEl.addEventListener('ybuttondown', this.toggleMenu.bind(this)); this.leftControllerEl.addEventListener('xbuttondown', this.toggleGuyWireMode.bind(this)); this.leftControllerEl.addEventListener('thumbstickmoved', this.onLeftThumbstick.bind(this)); }

            this.el.sceneEl.addEventListener('exit-vr', () => { this.hitTestSource = null; this.requestingHitTest = false; });

            this.initPersistentElements(); this.loadPreloadedMmanaModel(); this.resetAntennaLengths(); this.setupGlobalEventDelegation(); this.setupMmanaFileLoader();
            window.saveAntennaToDB = this.saveAntennaToDB.bind(this); window.loadAntennaFromDB = this.loadAntennaFromDB.bind(this); window.deleteAntennaFromDB = this.deleteAntennaFromDB.bind(this);
            this.refreshDBList(); this.loadFromStorage(); 
        } catch (error) { console.error("Errore inizializzazione:", error); }
      },

      packState: function() {
        return {
            state: this.state, pointA: { base: this.pointA.base, top: this.pointA.top }, pointB: { base: this.pointB.base, top: this.pointB.top },
            pointCPercent: this.pointC.percent, traliccio: JSON.parse(JSON.stringify(this.traliccio)), antIdx: this.antIdx, bandIdx: this.bandIdx,
            endFed_AC_Len: this.endFed_AC_Len, endFed_CB_Len: this.endFed_CB_Len, longwireLen: this.longwireLen, longwireVertex: this.longwireVertex,
            numRadials: this.numRadials, radialLen: this.radialLen, mmanaModelIdx: this.mmanaModelIdx, antennaRotationY: this.antennaRotationY,
            guyWiresData: JSON.parse(JSON.stringify(this.guyWiresData)), currentHeight: this.currentHeight
        };
      },

      unpackState: function(d) {
        if(!d) { this.resetCurrentAntenna(); return; }
        this.state = d.state || 'IDLE';
        if (d.pointA && d.pointA.base) this.pointA.base = d.pointA.base; if (d.pointA && d.pointA.top) this.pointA.top = d.pointA.top;
        if (d.pointB && d.pointB.base) this.pointB.base = d.pointB.base; if (d.pointB && d.pointB.top) this.pointB.top = d.pointB.top;
        this.traliccio = Object.assign({ active: false, center: null, shape: 'square', radius: 0.3, rotationY: 0, height: 6.0, corners: [], pegs: [] }, d.traliccio);
        this.pointC.percent = d.pointCPercent !== undefined ? d.pointCPercent : 0.5; this.antIdx = d.antIdx || 0; this.bandIdx = d.bandIdx || 2;
        this.endFed_AC_Len = d.endFed_AC_Len || 10.0; this.endFed_CB_Len = d.endFed_CB_Len || 10.0; this.longwireLen = d.longwireLen || 20.0; this.longwireVertex = d.longwireVertex || 'A';
        this.numRadials = d.numRadials || 4; this.radialLen = d.radialLen || 5.0; this.mmanaModelIdx = d.mmanaModelIdx || 0; this.antennaRotationY = d.antennaRotationY || 0;
        this.guyWiresData = d.guyWiresData || []; this.currentHeight = d.currentHeight || 0.1;
        this.gwState = 'OFF'; this.activeAnchor = null;
      },

      saveActiveToSlot: function() {
        let slot = this.sceneAntennas[this.currentSlot];
        if (slot.clone && slot.clone.parentNode) slot.clone.parentNode.removeChild(slot.clone);
        
        this.resetVerticalPreviewMode(); // Non salvare il cilindro giallo di costruzione nel clone
        slot.state = this.packState();
        
        let clone = this.activeAntennaContainerEl.cloneNode(true);
        clone.removeAttribute('id');
        clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
        clone.querySelectorAll('.clickable').forEach(el => { el.classList.remove('clickable'); el.removeAttribute('btn-interaction'); });
        
        let vCyl = clone.querySelector('[geometry="primitive: cylinder"][material*="#FFEB3B"]'); if(vCyl) vCyl.setAttribute('visible', 'false');
        let hTxt = clone.querySelector('[look-at-camera]'); if(hTxt && hTxt.getAttribute('color') === '#00FF00') hTxt.setAttribute('visible', 'false');
        
        slot.clone = clone;
        this.staticContainerEl.appendChild(clone);
      },

      loadActiveFromSlot: function() {
        let slot = this.sceneAntennas[this.currentSlot];
        if (slot.clone && slot.clone.parentNode) slot.clone.parentNode.removeChild(slot.clone); // Rimuovi il clone statico perché ora è attivo
        this.unpackState(slot.state);
        this.refreshAll();
      },

      refreshDBList: function() {
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}'); let select = document.querySelector('#load-list'); if(!select) return; select.innerHTML = '';
        for (let name in db) { let opt = document.createElement('option'); opt.value = name; opt.innerText = name; select.appendChild(opt); }
      },

      executeSave: function(customName) {
        if(!this.pointA.base && this.sceneAntennas.length <= 1) return "ERRORE: Devi piazzare almeno il Punto A."; 
        if(!this.calibLocal1 || !this.calibLocal2) return "ERRORE: Devi impostare i 2 Diamanti prima.";
        
        this.sceneAntennas[this.currentSlot].state = this.packState();
        let arr = this.sceneAntennas.map(s => s.state);
        
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}');
        db[customName] = { slots: arr, currentSlot: this.currentSlot, globalTextScale: this.globalTextScale, calibLocal1: this.calibLocal1, calibLocal2: this.calibLocal2 };
        localStorage.setItem('antenneAR_DB', JSON.stringify(db)); this.refreshDBList(); return `SCENA SALVATA:\n${customName}`;
      },

      saveAntennaToDB: function() { let name = document.querySelector('#save-name').value.trim(); if(!name) { alert("Inserisci un nome!"); return; } alert(this.executeSave(name)); },
      
      loadAntennaFromDB: function() {
        let select = document.querySelector('#load-list'); if(!select) return; let name = select.value;
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}'); let d = db[name]; if(!d) return;

        this.calibLocal1 = d.calibLocal1; this.calibLocal2 = d.calibLocal2;
        this.worldContentEl.object3D.position.set(-this.calibLocal1.x, -this.calibLocal1.y, -this.calibLocal1.z); this.worldContentEl.setAttribute('visible', 'true'); 
        this.diamondRef1.setAttribute('position', this.calibLocal1); this.diamondRef2.setAttribute('position', this.calibLocal2);
        this.diamondRef1.setAttribute('visible', 'true'); this.diamondRef2.setAttribute('visible', 'true');

        if(d.slots && d.slots.length > 0) {
            this.staticContainerEl.innerHTML = '';
            this.sceneAntennas = [];
            d.slots.forEach(s => this.sceneAntennas.push({ state: s, clone: null }));
            this.currentSlot = d.currentSlot || 0;
            if(this.currentSlot >= this.sceneAntennas.length) this.currentSlot = 0;
            
            this.sceneAntennas.forEach((slot, idx) => {
                if(idx !== this.currentSlot && slot.state && slot.state.pointA && slot.state.pointA.base) {
                    this.unpackState(slot.state);
                    this.updateGeometriesAndDrawings();
                    slot.clone = this.activeAntennaContainerEl.cloneNode(true);
                    slot.clone.removeAttribute('id'); slot.clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
                    slot.clone.querySelectorAll('.clickable').forEach(el => { el.classList.remove('clickable'); el.removeAttribute('btn-interaction'); });
                    this.staticContainerEl.appendChild(slot.clone);
                }
            });
            this.unpackState(this.sceneAntennas[this.currentSlot].state);
        }

        this.globalTextScale = parseFloat(d.globalTextScale) || 0.35;
        this.state = 'AWAITING_CALIB_PT1'; if(this.menuUI) this.menuUI.setAttribute('visible', true);
        this.refreshAll(); alert("Scena " + name + " caricata! Allinea il visore agganciato ai diamanti.");
      },
      
      deleteAntennaFromDB: function() { let select = document.querySelector('#load-list'); if(!select) return; let name = select.value; if(name && confirm("Eliminare l'antenna '" + name + "'?")) { let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}'); delete db[name]; localStorage.setItem('antenneAR_DB', JSON.stringify(db)); this.refreshDBList(); } },

      saveToStorage: function() {
        this.sceneAntennas[this.currentSlot].state = this.packState();
        let arr = this.sceneAntennas.map(s => s.state);
        let data = { slots: arr, currentSlot: this.currentSlot, globalTextScale: this.globalTextScale, pivotPos: this.worldPivotEl.object3D.position, pivotRot: this.worldPivotEl.object3D.rotation, contentPos: this.worldContentEl.object3D.position };
        localStorage.setItem('antennaArProV21', JSON.stringify(data));
      },

      loadFromStorage: function() {
        let saved = localStorage.getItem('antennaArProV21');
        if (saved) {
          try {
            let d = JSON.parse(saved);
            if(d.slots && d.slots.length > 0) {
                this.staticContainerEl.innerHTML = '';
                this.sceneAntennas = [];
                for(let i=0; i<d.slots.length; i++) this.sceneAntennas.push({ state: d.slots[i], clone: null });
                this.currentSlot = d.currentSlot || 0;
                if(this.currentSlot >= this.sceneAntennas.length) this.currentSlot = 0;

                this.sceneAntennas.forEach((slot, idx) => {
                    if(idx !== this.currentSlot && slot.state && slot.state.pointA && slot.state.pointA.base) {
                        this.unpackState(slot.state);
                        this.updateGeometriesAndDrawings();
                        slot.clone = this.activeAntennaContainerEl.cloneNode(true);
                        slot.clone.removeAttribute('id'); slot.clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
                        slot.clone.querySelectorAll('.clickable').forEach(el => { el.classList.remove('clickable'); el.removeAttribute('btn-interaction'); });
                        this.staticContainerEl.appendChild(slot.clone);
                    }
                });
                this.unpackState(this.sceneAntennas[this.currentSlot].state);
            }
            if (d.globalTextScale) this.globalTextScale = d.globalTextScale;
            if (d.pivotPos) this.worldPivotEl.object3D.position.copy(d.pivotPos); if (d.pivotRot) this.worldPivotEl.object3D.rotation.copy(d.pivotRot); if (d.contentPos) this.worldContentEl.object3D.position.copy(d.contentPos);
            
            if (this.state.startsWith('PLACE_HEIGHT') || this.state.startsWith('REPOSITION_HEIGHT') || this.state.startsWith('SET_CALIB') || this.state.startsWith('AWAITING_CALIB') || this.state.startsWith('SIZE_ROTATE')) this.state = 'IDLE';
          } catch(e) { console.error(e); }
        }
        this.gwState = 'OFF'; this.activeAnchor = null; if(this.gwUI) this.gwUI.setAttribute('visible', false); this.refreshAll();
      },

      getLocalPoint: function(worldVec) { let local = new THREE.Vector3(); this.worldContentEl.object3D.worldToLocal(local.copy(worldVec)); return { x: local.x, y: local.y, z: local.z }; },

      toggleMenu: function() {
        if(this.gwState !== 'OFF') return; 
        if(!this.menuUI) return;
        let isVisible = this.menuUI.getAttribute('visible') === 'true' || this.menuUI.getAttribute('visible') === true;
        this.menuUI.setAttribute('visible', !isVisible);
      },

      toggleGuyWireMode: function() {
        if (!this.pointA.top && !this.pointB.top && !this.traliccio.active) return; 
        if (this.state.startsWith('AWAITING') || this.state.startsWith('PLACE_HEIGHT') || this.state.startsWith('SET_CALIB') || this.state.startsWith('SIZE_ROTATE')) return;
        
        if (this.gwState === 'OFF') {
          this.gwState = 'MAIN'; if(this.menuUI) this.menuUI.setAttribute('visible', false); if(this.gwUI) this.gwUI.setAttribute('visible', true);
          this.activeAnchor = null; this.updateGWUI(); this.drawGuyWires();
        } else {
          this.gwState = 'OFF'; if(this.gwUI) this.gwUI.setAttribute('visible', false); if(this.menuUI) this.menuUI.setAttribute('visible', true);
          this.activeAnchor = null; this.drawGuyWires();
        }
      },

      updateGWUI: function() {
        let isMain = (this.gwState === 'MAIN'); let isEditCollar = (this.gwState === 'EDIT_COLLAR');
        let isEditPegs = (this.gwState === 'EDIT_PEGS' || this.gwState === 'EDIT_TRALICCIO_PEGS'); let isAnyEdit = isEditCollar || isEditPegs;

        let gwMain = document.querySelector('#gw-page-main'); if(gwMain) gwMain.setAttribute('visible', isMain);
        let gwEdit = document.querySelector('#gw-page-edit'); if(gwEdit) gwEdit.setAttribute('visible', isAnyEdit);
        
        this.toggleButton('#btn-gw-new-tral', isMain && this.traliccio.active);
        this.toggleButton('#btn-gw-new-a', isMain && this.pointA.top !== null);
        this.toggleButton('#btn-gw-new-b', isMain && this.pointB.top !== null);
        this.toggleButton('#btn-gw-done', isAnyEdit);

        let txtEl = document.querySelector('#txt-gw-status');
        if (txtEl) {
            if (isMain) txtEl.setAttribute('value', 'PUNTA IL LASER SU CORNICE/COLLARE O CREA NUOVO');
            if (isEditCollar) txtEl.setAttribute('value', 'JOYSTICK Y: CAMBIA ALTEZZA CORNICE\nGRILLETTO: CONFERMA');
            if (this.gwState === 'EDIT_PEGS') txtEl.setAttribute('value', 'JOYSTICK Y: ALTEZZA | GRILLETTO A TERRA: PICCHETTO\nLASER SU PICCHETTO O COLLARE PER ELIMINARE');
            if (this.gwState === 'EDIT_TRALICCIO_PEGS') {
                let req = this.traliccio.shape === 'square' ? 4 : 3; let c = this.traliccio.pegs ? this.traliccio.pegs.length : 0;
                txtEl.setAttribute('value', `PIAZZAMENTO PICCHETTI CONDIVISI\nTERRA: ${c} su ${req} | GRILLETTO A TERRA: PIAZZA\nLASER SU PICCHETTO O CORNICE: ELIMINA`);
            }
        }
        this.refreshRaycaster();
      },

      toggleButton: function(id, isVisible) { let btn = document.querySelector(id); if(!btn) return; btn.setAttribute('visible', isVisible); if(isVisible) btn.classList.add('clickable'); else btn.classList.remove('clickable'); },
      refreshRaycaster: function() { setTimeout(() => { if (this.raycasterEl && this.raycasterEl.components.raycaster) this.raycasterEl.components.raycaster.refreshObjects(); }, 50); },

      initPersistentElements: function() {
        let createPointStructure = (color) => {
          let struct = {};
          struct.sphere = document.createElement('a-sphere'); struct.sphere.setAttribute('radius', '0.05'); struct.sphere.setAttribute('material', `color: ${color}; roughness: 0.3`); struct.sphere.setAttribute('visible', 'false'); this.activeAntennaContainerEl.appendChild(struct.sphere);
          struct.pole = document.createElement('a-cylinder'); struct.pole.setAttribute('radius', '0.008'); struct.pole.setAttribute('material', 'color: #888888; opacity: 0.6; shader: flat'); struct.pole.setAttribute('visible', 'false'); this.activeAntennaContainerEl.appendChild(struct.pole);
          struct.label = document.createElement('a-text'); struct.label.setAttribute('align', 'center'); struct.label.setAttribute('color', '#00FF00'); struct.label.setAttribute('look-at-camera', ''); struct.label.setAttribute('visible', 'false'); this.activeAntennaContainerEl.appendChild(struct.label);
          return struct;
        };

        this.pointA = Object.assign(this.pointA, createPointStructure('#FF1744')); this.pointB = Object.assign(this.pointB, createPointStructure('#2979FF')); this.pointC = Object.assign(this.pointC, createPointStructure('#00E676'));
        this.antennaTube1 = document.createElement('a-cylinder'); this.antennaTube1.setAttribute('radius', '0.015'); this.antennaTube1.setAttribute('material', 'color: #FF5722; shader: flat'); this.antennaTube1.setAttribute('visible', 'false'); this.activeAntennaContainerEl.appendChild(this.antennaTube1);
        this.antennaTube2 = document.createElement('a-cylinder'); this.antennaTube2.setAttribute('radius', '0.015'); this.antennaTube2.setAttribute('material', 'color: #FF5722; shader: flat'); this.antennaTube2.setAttribute('visible', 'false'); this.activeAntennaContainerEl.appendChild(this.antennaTube2);
        this.labelSegA = document.createElement('a-text'); this.labelSegA.setAttribute('align', 'center'); this.labelSegA.setAttribute('color', 'yellow'); this.labelSegA.setAttribute('look-at-camera', ''); this.labelSegA.setAttribute('visible', 'false'); this.activeAntennaContainerEl.appendChild(this.labelSegA);
        this.labelSegB = document.createElement('a-text'); this.labelSegB.setAttribute('align', 'center'); this.labelSegB.setAttribute('color', 'yellow'); this.labelSegB.setAttribute('look-at-camera', ''); this.labelSegB.setAttribute('visible', 'false'); this.activeAntennaContainerEl.appendChild(this.labelSegB);

        for(let i=0; i<this.maxRadials; i++) { let radCyl = document.createElement('a-cylinder'); radCyl.setAttribute('radius', '0.005'); radCyl.setAttribute('material', 'color: #5D4037; shader: flat'); radCyl.setAttribute('visible', 'false'); this.activeAntennaContainerEl.appendChild(radCyl); this.radialPool.push(radCyl); }

        let makeLocalDiamond = (color) => {
            let d = document.createElement('a-octahedron'); d.setAttribute('radius', '0.06'); d.setAttribute('material', `color: ${color}; shader: flat; wireframe: true; opacity: 0.5`); d.setAttribute('visible', 'false');
            let core = document.createElement('a-octahedron'); core.setAttribute('radius', '0.03'); core.setAttribute('material', `color: ${color}; shader: flat; opacity: 0.8`); d.appendChild(core);
            this.worldContentEl.appendChild(d); return d; // I diamanti restano legati al mondo intero
        };
        this.diamondRef1 = makeLocalDiamond('#00BFFF'); this.diamondRef2 = makeLocalDiamond('#FF00FF');
        this.reticle = document.createElement('a-entity'); this.reticle.setAttribute('geometry', 'primitive: ring; radiusInner: 0.08; radiusOuter: 0.1; segmentsTheta: 6'); this.reticle.setAttribute('material', 'color: #00FF00; shader: flat; transparent: true; opacity: 0.9'); this.reticle.setAttribute('rotation', '-90 0 0'); this.reticle.setAttribute('visible', 'false'); this.el.sceneEl.appendChild(this.reticle); 
      },

      getCalculatedLength: function() {
        let bandMeters = parseInt(this.bands[this.bandIdx]); let type = this.antennaTypes[this.antIdx];
        if (type === 'Dipolo' || type === 'Verticale') return bandMeters / 4; 
        if (type === 'End Fed') return bandMeters * 0.45; 
        return bandMeters;                                 
      },

      resetAntennaLengths: function() { let baseLen = this.getCalculatedLength(); this.endFed_AC_Len = baseLen / 2; this.endFed_CB_Len = baseLen / 2; this.longwireLen = baseLen; },

      tick: function (time, frameDelta) {
        if(!this.state) return;
        let isPlacingMode = this.state.startsWith('PLACE_GROUND') || this.state.startsWith('REPOSITION_GROUND') || this.state.startsWith('AWAITING_CALIB') || this.state.startsWith('SET_CALIB') || this.state.startsWith('PLACE_TRALICCIO_CENTER') || (this.gwState && this.gwState.includes('PEGS'));
        let indicator = document.querySelector('#touch-indicator'); if (indicator) indicator.setAttribute('visible', isPlacingMode && !this.laserMode);

        let sceneEl = this.el.sceneEl; let frame = sceneEl.frame;
        let cameraPos = new THREE.Vector3(); let cameraDir = new THREE.Vector3(0, 0, -1);
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) { cameraEl.object3D.getWorldPosition(cameraPos); cameraDir.applyQuaternion(cameraEl.object3D.getWorldQuaternion(new THREE.Quaternion())); }

        if (this.laserMode && isPlacingMode && frame && sceneEl.is('ar-mode')) {
            let session = sceneEl.renderer.xr.getSession(); let refSpace = sceneEl.renderer.xr.getReferenceSpace(); let hitFound = false;

      drawTraliccio: function() {

      },

        if(this.antennaTube1) this.antennaTube1.setAttribute('visible', 'false'); if(this.antennaTube2) this.antennaTube2.setAttribute('visible', 'false');
        for(let i=0; i<this.maxRadials; i++) { if(this.radialPool[i]) this.radialPool[i].setAttribute('visible', 'false'); }
        
        if(this.mmanaContainerEl) this.mmanaContainerEl.innerHTML = ''; if(this.gwContainerEl) this.gwContainerEl.innerHTML = ''; if(this.traliccioContainerEl) this.traliccioContainerEl.innerHTML = '';

        this.guyWiresData = []; this.gwState = 'OFF'; if(this.gwUI) this.gwUI.setAttribute('visible', false);
        this.state = 'PLACE_GROUND_A'; this.antennaRotationY = 0;
        this.antIdx = 0; this.bandIdx = 2; this.resetAntennaLengths();
      },

      setupGlobalEventDelegation: function() {
        let scene = this.el.sceneEl; this.lastClickTime = 0; 
        scene.addEventListener('mousedown', (evt) => {
          let now = Date.now(); if (now - this.lastClickTime < 250) return; 
          let target = evt.target.closest('.clickable'); if(!target) return;
          let isVis = target.getAttribute('visible'); if (isVis === false || isVis === 'false') return;
          let parent = target.parentElement; if (parent && (parent.getAttribute('visible') === false || parent.getAttribute('visible') === 'false')) return;

          this.lastClickTime = now; let id = target.id; let mathRound = (num) => Math.round(num * 100) / 100;

          if (id === 'btn-laser-toggle') {
              this.laserMode = !this.laserMode; let txt = document.querySelector('#txt-laser-toggle'); let btn = document.querySelector('#btn-laser-toggle');
              if (this.laserMode) { txt.setAttribute('value', "PUNTAMENTO: MISTO (VISORE + JOYSTICK)"); btn.setAttribute('color', '#D81B60'); } 
              else { txt.setAttribute('value', "PUNTAMENTO: TOCCO (LASER OFF)"); btn.setAttribute('color', '#5E35B1'); this.hitTestSource = null; } this.refreshAll();
          }
          else if (id === 'btn-start-traliccio') {
              this.resetCurrentAntenna(); this.traliccio.active = true; this.state = 'PLACE_TRALICCIO_CENTER';
              if(this.menuUI) this.menuUI.setAttribute('visible', false); this.updateMenuText();
          }
          else if (id === 'btn-scene-new') {
              this.saveActiveToSlot();
              this.resetCurrentAntenna();
              this.currentSlot = this.sceneAntennas.length;
              this.sceneAntennas.push({ state: null, clone: null });
              this.refreshAll();
          }
          else if (id === 'btn-scene-prev') {
              if (this.sceneAntennas.length <= 1) return;
              this.saveActiveToSlot();
              this.currentSlot = (this.currentSlot - 1 + this.sceneAntennas.length) % this.sceneAntennas.length;
              this.loadActiveFromSlot();
          }
          else if (id === 'btn-scene-next') {
              if (this.sceneAntennas.length <= 1) return;
              this.saveActiveToSlot();
              this.currentSlot = (this.currentSlot + 1) % this.sceneAntennas.length;
              this.loadActiveFromSlot();
          }
          else if (id === 'btn-tral-shape') {
              this.traliccio.shape = this.traliccio.shape === 'square' ? 'triangle' : 'square';
              this.updateGeometriesAndDrawings(); this.updateMenuText();
          }
          else if (id === 'btn-gw-new-tral') {
            let newAnchor = { type: 'traliccio', height: 3.0 }; this.guyWiresData.push(newAnchor); this.activeAnchor = newAnchor; this.gwState = 'EDIT_COLLAR';
            this.updateGWUI(); this.drawGuyWires(); this.saveToStorage();
          }
          else if (id === 'btn-gw-new-a') {
            let maxH = this.pointA.top.y - this.pointA.base.y; let newAnchor = { pole: 'A', height: maxH / 2, pegs: [] }; this.guyWiresData.push(newAnchor); this.activeAnchor = newAnchor; this.gwState = 'EDIT_COLLAR'; this.updateGWUI(); this.drawGuyWires(); this.saveToStorage();
          }
          else if (id === 'btn-gw-new-b') {
            let maxH = this.pointB.top.y - this.pointB.base.y; let newAnchor = { pole: 'B', height: maxH / 2, pegs: [] }; this.guyWiresData.push(newAnchor); this.activeAnchor = newAnchor; this.gwState = 'EDIT_COLLAR'; this.updateGWUI(); this.drawGuyWires(); this.saveToStorage();
          }
          else if (id === 'btn-gw-done') { this.activeAnchor = null; this.gwState = 'MAIN'; this.updateGWUI(); this.drawGuyWires(); }
          else if (id === 'btn-cal-set-pts') { if (!this.pointA.base) return; this.state = 'SET_CALIB_PT1'; if(this.menuUI) this.menuUI.setAttribute('visible', false); this.updateMenuText(); }
          else if (id === 'btn-cal-recover') { if (!this.calibLocal1 || !this.calibLocal2) return; this.state = 'AWAITING_CALIB_PT1'; if(this.menuUI) this.menuUI.setAttribute('visible', false); this.updateMenuText(); }
          else if (id === 'btn-ar-save') {
              if (!this.calibLocal1 || !this.calibLocal2) return;
              let timeStr = new Date().getHours() + "-" + new Date().getMinutes() + "-" + new Date().getSeconds(); document.querySelector('#info-text').setAttribute('value', this.executeSave("SCENA_" + timeStr));
          }
          else if (id === 'btn-height-a') { if(!this.pointA.base) return; this.state = 'REPOSITION_HEIGHT_A'; this.currentHeight = this.pointA.top.y - this.pointA.base.y; this.setupVerticalPreviewMode(this.pointA.base); if(this.menuUI) this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-height-b') { if(!this.pointB.base) return; this.state = 'REPOSITION_HEIGHT_B'; this.currentHeight = this.pointB.top.y - this.pointB.base.y; this.setupVerticalPreviewMode(this.pointB.base); if(this.menuUI) this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-ant') { this.antIdx = (this.antIdx + 1) % this.antennaTypes.length; this.resetAntennaLengths(); this.refreshAll(); } 
          else if (id === 'btn-band') { this.bandIdx = (this.bandIdx + 1) % this.bands.length; this.resetAntennaLengths(); if (this.antennaTypes[this.antIdx] === 'Verticale' && this.pointA.top) { this.pointA.top.y = this.pointA.base.y + this.getCalculatedLength(); } this.refreshAll(); } 
          else if (id === 'btn-c-left') { this.pointC.percent = Math.max(0.02, mathRound(this.pointC.percent - 0.05)); this.refreshAll(); } 
          else if (id === 'btn-c-right') { this.pointC.percent = Math.min(0.98, mathRound(this.pointC.percent + 0.05)); this.refreshAll(); } 
          else if (id === 'btn-lw-vertex') { this.longwireVertex = this.longwireVertex === 'A' ? 'B' : 'A'; this.refreshAll(); } 
          else if (id === 'btn-mmana-model') { this.mmanaModelIdx = (this.mmanaModelIdx + 1) % this.mmanaModels.length; this.loadPreloadedMmanaModel(); this.refreshAll(); } 
          else if (id === 'btn-txt-minus') { this.globalTextScale = Math.max(0.15, mathRound(this.globalTextScale - 0.05)); this.refreshAll(); this.updateHeightPreview(); } 
          else if (id === 'btn-txt-plus') { this.globalTextScale = Math.min(1.2, mathRound(this.globalTextScale + 0.05)); this.refreshAll(); this.updateHeightPreview(); } 
          else if (id.startsWith('btn-ac') || id.startsWith('btn-cb') || id.startsWith('btn-lw') || id.startsWith('btn-rad')) {
             if(id==='btn-ac-m1') this.endFed_AC_Len = Math.max(0.1, mathRound(this.endFed_AC_Len - 1.0)); else if(id==='btn-ac-m01') this.endFed_AC_Len = Math.max(0.01, mathRound(this.endFed_AC_Len - 0.01)); else if(id==='btn-ac-p01') this.endFed_AC_Len = mathRound(this.endFed_AC_Len + 0.01); else if(id==='btn-ac-p1') this.endFed_AC_Len = mathRound(this.endFed_AC_Len + 1.0);
             else if(id==='btn-cb-m1') this.endFed_CB_Len = Math.max(0.1, mathRound(this.endFed_CB_Len - 1.0)); else if(id==='btn-cb-m01') this.endFed_CB_Len = Math.max(0.01, mathRound(this.endFed_CB_Len - 0.01)); else if(id==='btn-cb-p01') this.endFed_CB_Len = mathRound(this.endFed_CB_Len + 0.01); else if(id==='btn-cb-p1') this.endFed_CB_Len = mathRound(this.endFed_CB_Len + 1.0);
             else if(id==='btn-lw-m1') this.longwireLen = Math.max(0.1, mathRound(this.longwireLen - 1.0)); else if(id==='btn-lw-m01') this.longwireLen = Math.max(0.01, mathRound(this.longwireLen - 0.01)); else if(id==='btn-lw-p01') this.longwireLen = mathRound(this.longwireLen + 0.01); else if(id==='btn-lw-p1') this.longwireLen = mathRound(this.longwireLen + 1.0);
             else if(id==='btn-rad-num-minus') this.numRadials = Math.max(1, this.numRadials - 1); else if(id==='btn-rad-num-plus') this.numRadials = Math.min(this.maxRadials, this.numRadials + 1);
             else if(id==='btn-rad-m1') this.radialLen = Math.max(0.1, mathRound(this.radialLen - 1.0)); else if(id==='btn-rad-m01') this.radialLen = Math.max(0.1, mathRound(this.radialLen - 0.1)); else if(id==='btn-rad-p01') this.radialLen = mathRound(this.radialLen + 0.1); else if(id==='btn-rad-p1') this.radialLen = mathRound(this.radialLen + 1.0);
             this.refreshAll();
          }
          else if (id === 'btn-repo-a') { this.state = 'REPOSITION_GROUND_A'; if(this.menuUI) this.menuUI.setAttribute('visible', false); } 
          else if (id === 'btn-repo-b') { this.state = 'REPOSITION_GROUND_B'; if(this.menuUI) this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-global-reset') {
             if(this.staticContainerEl) this.staticContainerEl.innerHTML = '';
             this.sceneAntennas = [{ state: null, clone: null }];
             this.currentSlot = 0;
             this.resetCurrentAntenna();
             if(this.worldPivotEl) { this.worldPivotEl.object3D.position.set(0,0,0); this.worldPivotEl.object3D.rotation.set(0,0,0); }
             if(this.worldContentEl) { this.worldContentEl.object3D.position.set(0,0,0); this.worldContentEl.setAttribute('visible', 'true'); }
             this.calibLocal1 = null; this.calibLocal2 = null;
             if(this.diamondRef1) this.diamondRef1.setAttribute('visible', 'false'); if(this.diamondRef2) this.diamondRef2.setAttribute('visible', 'false');
             localStorage.removeItem('antennaArProV21');
             this.refreshAll();
          }
        });
      },

      setupMmanaFileLoader: function() {
        let fileInput = document.querySelector('#file-mmana'); if(!fileInput) return;
        fileInput.addEventListener('change', (evt) => {
          let file = evt.target.files[0]; if(!file) return; let reader = new FileReader();
          reader.onload = (e) => { 
              let lines = e.target.result.split('\n'); this.importedMmanaWires = []; let insideWiresSection = false;
              for(let i=0; i<lines.length; i++) {
                let line = lines[i].trim(); let upperLine = line.toUpperCase();
                if(insideWiresSection && upperLine.startsWith('***')) insideWiresSection = false;
                if(upperLine.includes('***') && upperLine.includes('WIRES')) { insideWiresSection = true; continue; }
                if(insideWiresSection && line !== "") { let tokens = line.split(/[\s,]+/).filter(t => t !== ''); if(tokens.length >= 7) this.importedMmanaWires.push({ x1: parseFloat(tokens[0]), y1: parseFloat(tokens[1]), z1: parseFloat(tokens[2]), x2: parseFloat(tokens[3]), y2: parseFloat(tokens[4]), z2: parseFloat(tokens[5]), radius: parseFloat(tokens[6]) > 0 ? parseFloat(tokens[6])/1000 : 0.002 }); }
              }
              if (this.importedMmanaWires.length > 0) { this.mmanaWires = this.importedMmanaWires; this.mmanaModelIdx = this.mmanaModels.indexOf('Modello Importato'); this.antIdx = this.antennaTypes.indexOf('MMANA-GAL'); this.refreshAll(); alert(`Caricati ${this.mmanaWires.length} fili!`); }
          };
          reader.readAsText(file);
        });
      },

      refreshAll: function() { this.updateMenuText(); this.updateGeometriesAndDrawings(); this.saveToStorage(); }
    });
  </script>
</head>
