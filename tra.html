<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Traliccio e Tiranti Condivisi</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    #ui-container { position: absolute; top: 10px; left: 10px; z-index: 999; background: rgba(0,0,0,0.8); color: #00E676; padding: 15px; font-family: monospace; border: 1px solid #00E676; border-radius: 8px; }
    button { display: block; width: 100%; margin-bottom: 8px; padding: 10px; background: #00E676; color: #000; border: none; font-weight: bold; cursor: pointer; }
    button:hover { background: #FFEB3B; }
  </style>
  <script>
    AFRAME.registerComponent('sistema-traliccio-test', {
      schema: {
        shape: { type: 'string', default: 'square' }, // 'square' o 'triangle'
        radius: { type: 'number', default: 0.3 },     // Distanza dal centro allo spigolo
        height: { type: 'number', default: 6.0 },
        rotationY: { type: 'number', default: 0 },    // Rotazione in gradi
        collarHeights: { type: 'array', default: [] } // Altezze degli ordini di tiranti
      },

      update: function () {
        this.el.innerHTML = ''; // Pulisce
        let data = this.data;
        
        let isSquare = data.shape === 'square';
        let numSides = isSquare ? 4 : 3;
        let matPoles = 'color: #90A4AE; roughness: 0.4; metalness: 0.6; shader: flat';
        let matBraces = 'color: #CFD8DC; roughness: 0.5; metalness: 0.3; shader: flat';
        let matWire = 'color: #B0BEC5; shader: flat';
        let matFrame = 'color: #FF1744; shader: flat'; // Colore della cornice dei tiranti
        
        // 1. CALCOLO VERTICI (Spigoli del traliccio)
        let corners = [];
        let rotRad = data.rotationY * (Math.PI / 180);
        
        for (let i = 0; i < numSides; i++) {
          // Angoli sfalsati (per il quadrato partiamo da 45° per avere i lati dritti, per il triangolo da 90°)
          let baseAngle = isSquare ? (Math.PI / 4) : (Math.PI / 2);
          let angle = baseAngle + (i * (2 * Math.PI) / numSides) + rotRad;
          corners.push(new THREE.Vector3(
            Math.cos(angle) * data.radius,
            0,
            Math.sin(angle) * data.radius
          ));
        }

        // Funzione helper per tubi
        let createTube = (p1, p2, rad, mat) => {
          let t = document.createElement('a-cylinder');
          t.setAttribute('radius', rad); t.setAttribute('height', p1.distanceTo(p2));
          t.setAttribute('material', mat);
          let mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
          t.object3D.position.copy(mid); t.object3D.lookAt(p2); t.object3D.rotateX(Math.PI / 2);
          this.el.appendChild(t);
        };

        // 2. DISEGNA MONTANTI
        corners.forEach(pos => {
          let pole = document.createElement('a-cylinder');
          pole.setAttribute('radius', '0.015'); pole.setAttribute('height', data.height);
          pole.setAttribute('material', matPoles);
          pole.setAttribute('position', `${pos.x} ${data.height/2} ${pos.z}`);
          this.el.appendChild(pole);
        });

        // 3. DISEGNA LATTICE (X e Traverse)
        let sectionHeight = data.radius * 2.5; // Proporzione visiva delle sezioni
        let numSections = Math.floor(data.height / sectionHeight);
        let actualSecH = data.height / numSections;

        for (let i = 0; i < numSections; i++) {
          let yB = i * actualSecH; let yT = (i + 1) * actualSecH;
          for (let c = 0; c < numSides; c++) {
            let nextC = (c + 1) % numSides;
            let vBL = new THREE.Vector3(corners[c].x, yB, corners[c].z);
            let vBR = new THREE.Vector3(corners[nextC].x, yB, corners[nextC].z);
            let vTL = new THREE.Vector3(corners[c].x, yT, corners[c].z);
            let vTR = new THREE.Vector3(corners[nextC].x, yT, corners[nextC].z);
            
            createTube(vBL, vBR, 0.008, matBraces); // Base orizzontale
            if (i === numSections - 1) createTube(vTL, vTR, 0.008, matBraces); // Chiusura top
            createTube(vBL, vTR, 0.006, matBraces); // Diagonale X
            createTube(vBR, vTL, 0.006, matBraces); // Diagonale X
          }
        }

        // 4. DISEGNA TIRANTI E PICCHETTI CONDIVISI
        // Simuliamo dei picchetti piazzati dall'utente a 4 metri di distanza, allineati agli spigoli
        let pegDistance = 4.0; 
        let pegs = [];
        corners.forEach(c => {
          let dir = new THREE.Vector3(c.x, 0, c.z).normalize();
          let pegPos = new THREE.Vector3(dir.x * pegDistance, 0, dir.z * pegDistance);
          pegs.push(pegPos);

          // Disegna il picchetto a terra
          let pegEl = document.createElement('a-cone');
          pegEl.setAttribute('radius-bottom', '0.04'); pegEl.setAttribute('radius-top', '0.005');
          pegEl.setAttribute('height', '0.15'); pegEl.setAttribute('material', 'color: #FF9800; shader: flat');
          pegEl.setAttribute('position', `${pegPos.x} 0.075 ${pegPos.z}`);
          this.el.appendChild(pegEl);
        });

        // Disegna le cornici e i cavi per ogni altezza salvata
        data.collarHeights.forEach(h => {
          for (let c = 0; c < numSides; c++) {
            let nextC = (c + 1) % numSides;
            let p1 = new THREE.Vector3(corners[c].x, h, corners[c].z);
            let p2 = new THREE.Vector3(corners[nextC].x, h, corners[nextC].z);
            
            // Cornice (Tubo rosso)
            createTube(p1, p2, 0.02, matFrame);

            // Cavo dal Corner al Picchetto condiviso
            createTube(p1, pegs[c], 0.003, matWire);
          }
        });
      }
    });

    // Logica dei bottoni UI
    window.onload = () => {
      let traliccioEl = document.querySelector('#traliccio-obj');
      let currentShape = 'square';
      let currentRot = 0;
      let collars = [];

      document.querySelector('#btn-shape').onclick = () => {
        currentShape = currentShape === 'square' ? 'triangle' : 'square';
        traliccioEl.setAttribute('sistema-traliccio-test', 'shape', currentShape);
      };
      document.querySelector('#btn-rot-plus').onclick = () => {
        currentRot += 15;
        traliccioEl.setAttribute('sistema-traliccio-test', 'rotationY', currentRot);
      };
      document.querySelector('#btn-rot-minus').onclick = () => {
        currentRot -= 15;
        traliccioEl.setAttribute('sistema-traliccio-test', 'rotationY', currentRot);
      };
      document.querySelector('#btn-add-collar').onclick = () => {
        if (collars.length === 0) collars.push(3.0);
        else if (collars.length === 1) collars.push(6.0);
        else collars.push(9.0); // Massimo 3 ordini per il test
        traliccioEl.setAttribute('sistema-traliccio-test', 'collarHeights', collars.join(','));
      };
      document.querySelector('#btn-reset-collar').onclick = () => {
        collars = [];
        traliccioEl.setAttribute('sistema-traliccio-test', 'collarHeights', []);
      };
    };
  </script>
</head>
<body>
  <div id="ui-container">
    <h3>TEST TRALICCIO</h3>
    <button id="btn-shape">CAMBIA FORMA (Quad/Trian)</button>
    <button id="btn-rot-plus">RUOTA DESTRA (+15°)</button>
    <button id="btn-rot-minus">RUOTA SINISTRA (-15°)</button>
    <hr>
    <button id="btn-add-collar" style="background: #FF8F00;">AGGIUNGI ORDINE TIRANTI</button>
    <button id="btn-reset-collar" style="background: #D32F2F; color: white;">RESET TIRANTI</button>
  </div>

  <a-scene background="color: #222">
    <a-entity id="traliccio-obj" sistema-traliccio-test="shape: square; height: 10.0; radius: 0.3; rotationY: 0"></a-entity>
    <a-camera position="0 1.6 5" look-controls="pointerLockEnabled: false" wasd-controls="fly: true"></a-camera>
    <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#111"></a-plane>
  </a-scene>
</body>
</html>
