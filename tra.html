<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Antenne AR Pro V28 - Data-Driven & Rotazioni Matematiche Perfette</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    #ui-2d-container { position: absolute; top: 15px; left: 15px; z-index: 9999; background: #111; color: #00E676; padding: 15px; border: 2px solid #FFEB3B; border-radius: 8px; font-family: monospace; max-width: 320px; max-height: 90vh; overflow-y: auto; }
    #ui-2d-container h3 { margin: 0 0 5px 0; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px;}
    #ui-2d-container p { margin: 5px 0; font-size: 11px; color: #fff; line-height: 1.3; }
    #ui-2d-container input, #ui-2d-container select { width: 93%; padding: 6px; background: #222; color: #fff; border: 1px solid #00E676; margin-bottom: 10px; font-family: monospace; }
    #ui-2d-container button { width: 100%; padding: 8px; background: #00E676; color: #000; border: none; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
    #ui-2d-container button.action { background: #FFEB3B; }
    hr { border-color: #333; margin: 15px 0; }
  </style>
  <script>
    // Componente look-at-camera ricalcolato per resistere alle rotazioni globali
    AFRAME.registerComponent('look-at-camera', { 
      tick: function () { 
        let cameraEl = document.querySelector('#camera'); 
        if (cameraEl && cameraEl.object3D) { 
          let target = new THREE.Vector3();
          cameraEl.object3D.getWorldPosition(target);
          this.el.object3D.lookAt(target); 
        } 
      } 
    });
    
    AFRAME.registerComponent('btn-interaction', {
      init: function () {
        let el = this.el; let originalColor = el.getAttribute('material') ? el.getAttribute('material').color : '#FFFFFF';
        el.addEventListener('mouseenter', () => el.setAttribute('material', 'opacity', 0.8));
        el.addEventListener('mouseleave', () => { el.setAttribute('material', 'opacity', 1.0); el.setAttribute('scale', '1 1 1'); if(el.getAttribute('material')) el.setAttribute('material', 'color', originalColor); });
        el.addEventListener('mousedown', () => { el.setAttribute('scale', '0.95 0.95 0.8'); el.setAttribute('material', 'color', '#00FFCC'); });
        el.addEventListener('mouseup', () => { el.setAttribute('scale', '1 1 1'); if(el.getAttribute('material')) el.setAttribute('material', 'color', originalColor); });
      }
    });

    AFRAME.registerComponent('ar-antenna-system', {
      init: function () {
        try {
            this.antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale', 'MMANA-GAL'];
            this.bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
            this.mmanaModels = ['Yagi 3 Elementi', 'Delta Loop', 'Dipolo MMANA', 'Modello Importato'];
            this.maxRadials = 16; 
            
            // Variabili Globali di Scena
            this.globalTextScale = 0.35; 
            this.currentHeight = 0.1; 
            this.gwState = 'OFF'; 
            this.activeAnchor = null; 
            this.lastTriggerTime = 0; 
            this.calibLocal1 = null; 
            this.calibLocal2 = null;
            this.laserMode = false; this.hitTestSource = null; this.requestingHitTest = false; this.reticleValid = false;
            this.targetReticlePos = new THREE.Vector3(); this.targetReticleQuat = new THREE.Quaternion(); this.lastFloorY = 0; 

            // GESTIONE MULTI-ANTENNA DATA-DRIVEN
            this.antennas = [this.createEmptyAntenna()]; 
            this.activeAntIdx = 0;
            this.current = this.antennas[0]; // Riferimento veloce all'antenna attiva

            this.raycasterEl = document.querySelector('#right-controller'); this.leftControllerEl = document.querySelector('#left-controller');
            this.worldPivotEl = document.querySelector('#world-pivot'); this.worldContentEl = document.querySelector('#world-content');
            
            this.verticalCylinder = document.querySelector('#vertical-cylinder'); this.heightText = document.querySelector('#height-text');
            this.menuUI = document.querySelector('#menu-ui'); this.gwUI = document.querySelector('#guy-wires-ui');

            if (this.raycasterEl) { this.raycasterEl.addEventListener('triggerdown', this.onTriggerDown.bind(this)); this.raycasterEl.addEventListener('thumbstickmoved', this.onRightThumbstick.bind(this)); }
            if (this.leftControllerEl) { this.leftControllerEl.addEventListener('ybuttondown', this.toggleMenu.bind(this)); this.leftControllerEl.addEventListener('xbuttondown', this.toggleGuyWireMode.bind(this)); this.leftControllerEl.addEventListener('thumbstickmoved', this.onLeftThumbstick.bind(this)); }

            this.el.sceneEl.addEventListener('exit-vr', () => { this.hitTestSource = null; this.requestingHitTest = false; });

            this.initPersistentElements(); this.setupGlobalEventDelegation(); this.setupMmanaFileLoader();
            window.saveAntennaToDB = this.saveAntennaToDB.bind(this); window.loadAntennaFromDB = this.loadAntennaFromDB.bind(this); window.deleteAntennaFromDB = this.deleteAntennaFromDB.bind(this);
            this.refreshDBList(); this.loadFromStorage(); 
        } catch (error) { console.error("Errore inizializzazione:", error); }
      },

      createEmptyAntenna: function() {
          return {
              state: 'PLACE_GROUND_A',
              pointA: { base: null, top: null }, pointB: { base: null, top: null }, pointC: { percent: 0.5, top: null },
              traliccio: { active: false, center: null, shape: 'square', radius: 0.3, rotationY: 0, height: 6.0, corners: [], pegs: [] },
              antIdx: 0, bandIdx: 2,
              endFed_AC_Len: 10.0, endFed_CB_Len: 10.0, longwireLen: 20.0, longwireVertex: 'A',
              numRadials: 4, radialLen: 5.0, mmanaModelIdx: 0, antennaRotationY: 0,
              mmanaWires: [], guyWiresData: []
          };
      },

      loadPreloadedMmanaModel: function(ant) {
        let mName = this.mmanaModels[ant.mmanaModelIdx];
        if (mName === 'Yagi 3 Elementi') { ant.mmanaWires = [{ x1: 0, y1: -2.5, z1: 0, x2: 0, y2: 2.5, z2: 0, radius: 0.004 }, { x1: 1.5, y1: -2.4, z1: 0, x2: 1.5, y2: 2.4, z2: 0, radius: 0.004 }, { x1: 3.2, y1: -2.2, z1: 0, x2: 3.2, y2: 2.2, z2: 0, radius: 0.004 }]; } 
        else if (mName === 'Delta Loop') { ant.mmanaWires = [{ x1: 0, y1: -2.0, z1: 0, x2: 0, y2: 2.0, z2: 0, radius: 0.002 }, { x1: 0, y1: -2.0, z1: 0, x2: 0, y2: 0, z2: 3.5, radius: 0.002 }, { x1: 0, y1: 2.0, z1: 0, x2: 0, y2: 0, z2: 3.5, radius: 0.002 }]; } 
        else if (mName === 'Dipolo MMANA') { ant.mmanaWires = [{ x1: 0, y1: -5.0, z1: 0, x2: 0, y2: 5.0, z2: 0, radius: 0.002 }]; } 
        else if (mName === 'Modello Importato') { ant.mmanaWires = this.importedMmanaWires || []; }
      },

      switchAntenna: function(idx) {
          this.gwState = 'OFF'; this.activeAnchor = null;
          this.activeAntIdx = idx;
          this.current = this.antennas[idx];
          
          if (this.current.pointA.top && (this.current.state.startsWith('PLACE_') || this.current.state.startsWith('AWAITING_'))) {
              this.current.state = 'IDLE';
          }
          if(this.menuUI) this.menuUI.setAttribute('visible', true);
          this.refreshAll();
      },

      refreshDBList: function() {
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}'); let select = document.querySelector('#load-list'); if(!select) return; select.innerHTML = '';
        for (let name in db) { let opt = document.createElement('option'); opt.value = name; opt.innerText = name; select.appendChild(opt); }
      },

      executeSave: function(customName) {
        if(!this.current.pointA.base && this.antennas.length <= 1) return "ERRORE: Devi piazzare almeno un'antenna."; 
        if(!this.calibLocal1 || !this.calibLocal2) return "ERRORE: Devi impostare i 2 Diamanti prima.";
        
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}');
        db[customName] = { 
            antennas: JSON.parse(JSON.stringify(this.antennas)), 
            activeAntIdx: this.activeAntIdx, 
            globalTextScale: this.globalTextScale, 
            calibLocal1: this.calibLocal1, 
            calibLocal2: this.calibLocal2 
        };
        localStorage.setItem('antenneAR_DB', JSON.stringify(db)); this.refreshDBList(); return `SCENA SALVATA:\n${customName}`;
      },

      saveAntennaToDB: function() { let name = document.querySelector('#save-name').value.trim(); if(!name) { alert("Inserisci un nome!"); return; } alert(this.executeSave(name)); },
      
      loadAntennaFromDB: function() {
        let select = document.querySelector('#load-list'); if(!select) return; let name = select.value;
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}'); let d = db[name]; if(!d) return;

        this.calibLocal1 = d.calibLocal1; this.calibLocal2 = d.calibLocal2;
        this.worldContentEl.object3D.position.set(-this.calibLocal1.x, -this.calibLocal1.y, -this.calibLocal1.z); this.worldContentEl.setAttribute('visible', 'true'); 
        this.diamondRef1.setAttribute('position', this.calibLocal1); this.diamondRef2.setAttribute('position', this.calibLocal2);
        this.diamondRef1.setAttribute('visible', 'true'); this.diamondRef2.setAttribute('visible', 'true');

        if(d.antennas && d.antennas.length > 0) {
            this.antennas = d.antennas;
            this.activeAntIdx = d.activeAntIdx || 0;
            if(this.activeAntIdx >= this.antennas.length) this.activeAntIdx = 0;
            this.current = this.antennas[this.activeAntIdx];
        }

        this.globalTextScale = parseFloat(d.globalTextScale) || 0.35;
        this.current.state = 'AWAITING_CALIB_PT1'; if(this.menuUI) this.menuUI.setAttribute('visible', true);
        this.refreshAll(); alert("Scena " + name + " caricata! Allinea il visore agganciato ai diamanti.");
      },
      
      deleteAntennaFromDB: function() { let select = document.querySelector('#load-list'); if(!select) return; let name = select.value; if(name && confirm("Eliminare l'antenna '" + name + "'?")) { let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}'); delete db[name]; localStorage.setItem('antenneAR_DB', JSON.stringify(db)); this.refreshDBList(); } },

      saveToStorage: function() {
        let data = { antennas: JSON.parse(JSON.stringify(this.antennas)), activeAntIdx: this.activeAntIdx, globalTextScale: this.globalTextScale, pivotPos: this.worldPivotEl.object3D.position, pivotRot: this.worldPivotEl.object3D.rotation, contentPos: this.worldContentEl.object3D.position };
        localStorage.setItem('antennaArProV21', JSON.stringify(data));
      },

      loadFromStorage: function() {
        let saved = localStorage.getItem('antennaArProV21');
        if (saved) {
          try {
            let d = JSON.parse(saved);
            if(d.antennas && d.antennas.length > 0) {
                this.antennas = d.antennas;
                this.activeAntIdx = d.activeAntIdx || 0;
                if(this.activeAntIdx >= this.antennas.length) this.activeAntIdx = 0;
                this.current = this.antennas[this.activeAntIdx];
            }
            if (d.globalTextScale) this.globalTextScale = d.globalTextScale;
            if (d.pivotPos) this.worldPivotEl.object3D.position.copy(d.pivotPos); if (d.pivotRot) this.worldPivotEl.object3D.rotation.copy(d.pivotRot); if (d.contentPos) this.worldContentEl.object3D.position.copy(d.contentPos);
            
            if (this.current.state.startsWith('PLACE_HEIGHT') || this.current.state.startsWith('REPOSITION_HEIGHT') || this.current.state.startsWith('SET_CALIB') || this.current.state.startsWith('AWAITING_CALIB') || this.current.state.startsWith('SIZE_ROTATE')) this.current.state = 'IDLE';
          } catch(e) { console.error(e); }
        }
        this.gwState = 'OFF'; this.activeAnchor = null; if(this.gwUI) this.gwUI.setAttribute('visible', false); this.refreshAll();
      },

      getLocalPoint: function(worldVec) { let local = new THREE.Vector3(); this.worldContentEl.object3D.worldToLocal(local.copy(worldVec)); return { x: local.x, y: local.y, z: local.z }; },

      toggleMenu: function() {
        if(this.gwState !== 'OFF') return; 
        if(!this.menuUI) return;
        let isVisible = this.menuUI.getAttribute('visible') === 'true' || this.menuUI.getAttribute('visible') === true;
        this.menuUI.setAttribute('visible', !isVisible);
        this.refreshAll(); // Aggiorna per far sparire/apparire i selettori
      },

      toggleGuyWireMode: function() {
        if (!this.current.pointA.top && !this.current.pointB.top && !this.current.traliccio.active) return; 
        if (this.current.state.startsWith('AWAITING') || this.current.state.startsWith('PLACE_HEIGHT') || this.current.state.startsWith('SET_CALIB') || this.current.state.startsWith('SIZE_ROTATE')) return;
        
        if (this.gwState === 'OFF') {
          this.gwState = 'MAIN'; if(this.menuUI) this.menuUI.setAttribute('visible', false); if(this.gwUI) this.gwUI.setAttribute('visible', true);
          this.activeAnchor = null; this.updateGWUI(); this.refreshAll();
        } else {
          this.gwState = 'OFF'; if(this.gwUI) this.gwUI.setAttribute('visible', false); if(this.menuUI) this.menuUI.setAttribute('visible', true);
          this.activeAnchor = null; this.refreshAll();
        }
      },

      updateGWUI: function() {
        let isMain = (this.gwState === 'MAIN'); let isEditCollar = (this.gwState === 'EDIT_COLLAR');
        let isEditPegs = (this.gwState === 'EDIT_PEGS' || this.gwState === 'EDIT_TRALICCIO_PEGS'); let isAnyEdit = isEditCollar || isEditPegs;

        let gwMain = document.querySelector('#gw-page-main'); if(gwMain) gwMain.setAttribute('visible', isMain);
        let gwEdit = document.querySelector('#gw-page-edit'); if(gwEdit) gwEdit.setAttribute('visible', isAnyEdit);
        
        this.toggleButton('#btn-gw-new-tral', isMain && this.current.traliccio.active);
        this.toggleButton('#btn-gw-new-a', isMain && this.current.pointA.top !== null);
        this.toggleButton('#btn-gw-new-b', isMain && this.current.pointB.top !== null);
        this.toggleButton('#btn-gw-done', isAnyEdit);

        let txtEl = document.querySelector('#txt-gw-status');
        if (txtEl) {
            if (isMain) txtEl.setAttribute('value', 'PUNTA IL LASER SU CORNICE/COLLARE O CREA NUOVO');
            if (isEditCollar) txtEl.setAttribute('value', 'JOYSTICK Y: CAMBIA ALTEZZA CORNICE\nGRILLETTO: CONFERMA');
            if (this.gwState === 'EDIT_PEGS') txtEl.setAttribute('value', 'JOYSTICK Y: ALTEZZA | GRILLETTO A TERRA: PICCHETTO\nLASER SU PICCHETTO O COLLARE PER ELIMINARE');
            if (this.gwState === 'EDIT_TRALICCIO_PEGS') {
                let req = this.current.traliccio.shape === 'square' ? 4 : 3; let c = this.current.traliccio.pegs ? this.current.traliccio.pegs.length : 0;
                txtEl.setAttribute('value', `PIAZZAMENTO PICCHETTI CONDIVISI\nTERRA: ${c} su ${req} | GRILLETTO A TERRA: PIAZZA\nLASER SU PICCHETTO O CORNICE: ELIMINA`);
            }
        }
        this.refreshRaycaster();
      },

      toggleButton: function(id, isVisible) { let btn = document.querySelector(id); if(!btn) return; btn.setAttribute('visible', isVisible); if(isVisible) btn.classList.add('clickable'); else btn.classList.remove('clickable'); },
      refreshRaycaster: function() { setTimeout(() => { if (this.raycasterEl && this.raycasterEl.components.raycaster) this.raycasterEl.components.raycaster.refreshObjects(); }, 50); },

      initPersistentElements: function() {
        let makeLocalDiamond = (color) => {
            let d = document.createElement('a-octahedron'); d.setAttribute('radius', '0.06'); d.setAttribute('material', `color: ${color}; shader: flat; wireframe: true; opacity: 0.5`); d.setAttribute('visible', 'false');
            let core = document.createElement('a-octahedron'); core.setAttribute('radius', '0.03'); core.setAttribute('material', `color: ${color}; shader: flat; opacity: 0.8`); d.appendChild(core);
            this.worldContentEl.appendChild(d); return d; 
        };
        this.diamondRef1 = makeLocalDiamond('#00BFFF'); this.diamondRef2 = makeLocalDiamond('#FF00FF');
        this.reticle = document.createElement('a-entity'); this.reticle.setAttribute('geometry', 'primitive: ring; radiusInner: 0.08; radiusOuter: 0.1; segmentsTheta: 6'); this.reticle.setAttribute('material', 'color: #00FF00; shader: flat; transparent: true; opacity: 0.9'); this.reticle.setAttribute('rotation', '-90 0 0'); this.reticle.setAttribute('visible', 'false'); this.el.sceneEl.appendChild(this.reticle); 
      },

      getCalculatedLength: function() {
        let bandMeters = parseInt(this.bands[this.current.bandIdx]); let type = this.antennaTypes[this.current.antIdx];
        if (type === 'Dipolo' || type === 'Verticale') return bandMeters / 4; 
        if (type === 'End Fed') return bandMeters * 0.45; 
        return bandMeters;                                 
      },

      resetAntennaLengths: function() { 
          let baseLen = this.getCalculatedLength(); 
          this.current.endFed_AC_Len = baseLen / 2; 
          this.current.endFed_CB_Len = baseLen / 2; 
          this.current.longwireLen = baseLen; 
      },

      tick: function (time, frameDelta) {
        if(!this.current.state) return;
        let isPlacingMode = this.current.state.startsWith('PLACE_GROUND') || this.current.state.startsWith('REPOSITION_GROUND') || this.current.state.startsWith('AWAITING_CALIB') || this.current.state.startsWith('SET_CALIB') || this.current.state.startsWith('PLACE_TRALICCIO_CENTER') || (this.gwState && this.gwState.includes('PEGS'));
        let indicator = document.querySelector('#touch-indicator'); if (indicator) indicator.setAttribute('visible', isPlacingMode && !this.laserMode);

        let sceneEl = this.el.sceneEl; let frame = sceneEl.frame;
        let cameraPos = new THREE.Vector3(); let cameraDir = new THREE.Vector3(0, 0, -1);
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) { cameraEl.object3D.getWorldPosition(cameraPos); cameraDir.applyQuaternion(cameraEl.object3D.getWorldQuaternion(new THREE.Quaternion())); }

        if (this.laserMode && isPlacingMode && frame && sceneEl.is('ar-mode')) {
            let session = sceneEl.renderer.xr.getSession(); let refSpace = sceneEl.renderer.xr.getReferenceSpace(); let hitFound = false;
            if (!this.hitTestSource && !this.requestingHitTest) {
                this.requestingHitTest = true;
                session.requestReferenceSpace('viewer').then((viewerSpace) => { session.requestHitTestSource({ space: viewerSpace }).then((source) => { this.hitTestSource = source; this.requestingHitTest = false; }).catch(() => { this.requestingHitTest = false; }); });
            }
            if (this.hitTestSource) {
                let hitTestResults = frame.getHitTestResults(this.hitTestSource);
                if (hitTestResults.length > 0) {
                    let pose = hitTestResults[0].getPose(refSpace);
                    if (pose) {
                        let hitPos = new THREE.Vector3(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
                        this.targetReticlePos.copy(hitPos); this.targetReticleQuat.copy(pose.transform.orientation); this.lastFloorY = hitPos.y; hitFound = true;
                    }
                }
            }
            if (!hitFound && cameraDir.y < -0.02) {
                let distanceToFloor = (this.lastFloorY - cameraPos.y) / cameraDir.y;
                if (distanceToFloor > 0 && distanceToFloor < 100) { this.targetReticlePos.copy(cameraPos).addScaledVector(cameraDir, distanceToFloor); this.targetReticleQuat.setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0)); hitFound = true; }
            }
            if (hitFound && this.reticle) { this.reticle.object3D.position.lerp(this.targetReticlePos, 0.25); this.reticle.object3D.rotation.set(-Math.PI / 2, 0, 0); this.reticle.setAttribute('visible', 'true'); this.reticleValid = true; } 
            else if (this.reticle) { this.reticle.setAttribute('visible', 'false'); this.reticleValid = false; }
        } else { if(this.reticle) this.reticle.setAttribute('visible', 'false'); this.reticleValid = false; }

        if (this.current.state === 'AWAITING_CALIB_PT1') { let hitGround = this.getHitPoint(); if (hitGround) this.worldPivotEl.object3D.position.copy(hitGround.point); } 
        else if (this.current.state === 'AWAITING_CALIB_PT2') { let hitGround = this.getHitPoint(); if (hitGround && this.calibPt1 && this.calibLocal1 && this.calibLocal2) { let angleLocal = Math.atan2(this.calibLocal2.x - this.calibLocal1.x, this.calibLocal2.z - this.calibLocal1.z); let angleWorld = Math.atan2(hitGround.point.x - this.calibPt1.x, hitGround.point.z - this.calibPt1.z); this.worldPivotEl.object3D.rotation.set(0, angleWorld - angleLocal, 0); } }
      },

      getHitPoint: function() {
        if (this.laserMode && this.reticleValid) { let pos = new THREE.Vector3(); this.reticle.object3D.getWorldPosition(pos); return { point: pos }; }
        let pos = new THREE.Vector3(); let indicator = document.querySelector('#touch-indicator');
        if (indicator && (indicator.getAttribute('visible') === true || indicator.getAttribute('visible') === 'true')) { indicator.object3D.getWorldPosition(pos); } 
        else if (this.raycasterEl) { this.raycasterEl.object3D.getWorldPosition(pos); }
        return { point: pos };
      },

      onLeftThumbstick: function(evt) {
        if (Math.abs(evt.detail.x) > 0.3) {
            let delta = evt.detail.x > 0 ? 2.0 : -2.0;
            if (this.gwState !== 'OFF') return;
            
            if (this.current.state === 'SIZE_ROTATE_TRALICCIO') {
               this.current.traliccio.rotationY += delta;
               this.refreshAll();
            } else {
               this.current.antennaRotationY += delta;
               this.refreshAll();
               if(Date.now() - this.lastTriggerTime > 1000) { this.saveToStorage(); this.lastTriggerTime = Date.now(); }
            }
        }
      },

      onRightThumbstick: function (evt) {
        let thumbTime = Date.now();
        if (!this.lastThumbTime || thumbTime - this.lastThumbTime > 110) {
          
          if (this.current.state === 'SIZE_ROTATE_TRALICCIO') {
             if (Math.abs(evt.detail.y) > 0.3) {
                 let step = evt.detail.y < 0 ? 0.05 : -0.05; 
                 this.current.traliccio.radius = Math.max(0.15, this.current.traliccio.radius + step);
                 this.refreshAll(); this.lastThumbTime = thumbTime;
             }
          }
          else if (this.current.state === 'PLACE_HEIGHT_TRALICCIO') {
             if (Math.abs(evt.detail.y) > 0.4) {
                 let step = evt.detail.y < 0 ? 0.2 : -0.2;
                 this.current.traliccio.height = Math.max(1.0, this.current.traliccio.height + step);
                 this.refreshAll(); this.lastThumbTime = thumbTime;
             }
          }
          else if (this.current.state.includes('HEIGHT') && Math.abs(evt.detail.y) > 0.4 && this.current.state !== 'PLACE_HEIGHT_TRALICCIO') {
            let step = evt.detail.y < 0 ? 0.1 : -0.1; 
            this.currentHeight = Math.max(0.0, this.currentHeight + step);
            this.updateHeightPreview(); this.lastThumbTime = thumbTime;
          }
          else if (this.gwState === 'EDIT_COLLAR' && this.activeAnchor && Math.abs(evt.detail.y) > 0.4) {
            let step = evt.detail.y < 0 ? 0.1 : -0.1;
            let maxH = this.activeAnchor.type === 'traliccio' ? this.current.traliccio.height : (this.activeAnchor.pole === 'A' ? (this.current.pointA.top.y - this.current.pointA.base.y) : (this.current.pointB.top.y - this.current.pointB.base.y));
            this.activeAnchor.height = Math.max(0.1, Math.min(maxH, this.activeAnchor.height + step));
            this.refreshAll(); this.lastThumbTime = thumbTime; this.saveToStorage();
          }
        }
      },

      updateHeightPreview: function() {
        if (!this.current.pointA.base && !this.current.pointB.base) return;
        let basePos = this.current.state.includes('_A') ? this.current.pointA.base : this.current.pointB.base;
        if (!basePos) return;

      onTriggerDown: function () {
        try {
            let now = Date.now(); if (now - this.lastTriggerTime < 300) return; this.lastTriggerTime = now;
            let intersects = null; if (this.raycasterEl && this.raycasterEl.components && this.raycasterEl.components.raycaster) intersects = this.raycasterEl.components.raycaster.intersectedEls;
            
            if (intersects) {
              // SELEZIONE LASER ANTENNA (Piccoli diamanti)
              let hitSelector = intersects.find(el => el.classList && el.classList.contains('antenna-selector'));
              if (hitSelector) {
                  let targetIdx = parseInt(hitSelector.getAttribute('data-ant-idx'));
                  this.switchAntenna(targetIdx);
                  return;
              }

              for (let i = 0; i < intersects.length; i++) {
                let el = intersects[i];
                if (el.classList && el.classList.contains('clickable') && !el.classList.contains('gw-collar') && !el.classList.contains('gw-peg')) return;
                if (el.closest && (el.closest('#menu-ui') || el.closest('#guy-wires-ui'))) return;
              }
            }

            if (this.current.state === 'PLACE_TRALICCIO_CENTER') {
               let hitGround = this.getHitPoint();
               if(hitGround) {
                   this.current.traliccio.center = this.getLocalPoint(hitGround.point);
                   this.current.state = 'SIZE_ROTATE_TRALICCIO';
                   if(this.menuUI) this.menuUI.setAttribute('visible', true); 
                   this.refreshAll();
               }
               return;
            }
            if (this.current.state === 'SIZE_ROTATE_TRALICCIO') { this.current.state = 'PLACE_HEIGHT_TRALICCIO'; if(this.menuUI) this.menuUI.setAttribute('visible', false); this.refreshAll(); return; }
            if (this.current.state === 'PLACE_HEIGHT_TRALICCIO') {
               this.current.pointA.base = { x: this.current.traliccio.center.x, y: this.current.traliccio.center.y + this.current.traliccio.height, z: this.current.traliccio.center.z };
               this.currentHeight = 0.1; this.current.state = 'PLACE_HEIGHT_A'; this.setupVerticalPreviewMode(this.current.pointA.base); this.refreshAll(); return;
            }

            // GESTIONE TIRANTI TRALICCIO
            if (this.gwState === 'EDIT_TRALICCIO_PEGS') {
                let hitPeg = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-peg')) : null;
                if (hitPeg) {
                    let pIdx = parseInt(hitPeg.getAttribute('data-peg-idx'));
                    if(this.current.traliccio.pegs) this.current.traliccio.pegs.splice(pIdx, 1);
                    this.updateGWUI(); this.refreshAll(); return;
                }
                let hitCollar = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-collar')) : null;
                if (hitCollar) {
                    let cIdx = parseInt(hitCollar.getAttribute('data-index'));
                    if (this.current.guyWiresData[cIdx] === this.activeAnchor) {
                        this.current.guyWiresData.splice(cIdx, 1); this.activeAnchor = null; this.gwState = 'MAIN'; this.updateGWUI(); this.refreshAll(); return;
                    }
                }
                let req = this.current.traliccio.shape === 'square' ? 4 : 3;
                if (!this.current.traliccio.pegs) this.current.traliccio.pegs = [];
                if (this.current.traliccio.pegs.length < req) {
                    let hitGround = this.getHitPoint();
                    if (hitGround) {
                        this.current.traliccio.pegs.push(this.getLocalPoint(hitGround.point));
                        if (this.current.traliccio.pegs.length >= req) { this.gwState = 'MAIN'; this.activeAnchor = null; this.updateGWUI(); } 
                        else { this.updateGWUI(); }
                        this.refreshAll();
                    }
                }
                return;
            }

            if (this.current.state === 'AWAITING_CALIB_PT1') { let hitGround = this.getHitPoint(); if (hitGround) { this.calibPt1 = hitGround.point.clone(); this.worldPivotEl.object3D.position.copy(this.calibPt1); this.current.state = 'AWAITING_CALIB_PT2'; this.updateMenuText(); } return; }
            if (this.current.state === 'AWAITING_CALIB_PT2') { let hitGround = this.getHitPoint(); if (hitGround) { this.calibPt2 = hitGround.point.clone(); this.diamondRef1.setAttribute('visible', 'false'); this.diamondRef2.setAttribute('visible', 'false'); this.current.state = 'IDLE'; this.refreshAll(); } return; }
            if (this.current.state === 'SET_CALIB_PT1') { let hitGround = this.getHitPoint(); if (hitGround) { this.calibLocal1 = this.getLocalPoint(hitGround.point); this.diamondRef1.setAttribute('position', this.calibLocal1); this.diamondRef1.setAttribute('visible', 'true'); this.current.state = 'SET_CALIB_PT2'; this.updateMenuText(); } return; }
            if (this.current.state === 'SET_CALIB_PT2') { let hitGround = this.getHitPoint(); if (hitGround) { this.calibLocal2 = this.getLocalPoint(hitGround.point); this.diamondRef2.setAttribute('position', this.calibLocal2); this.diamondRef2.setAttribute('visible', 'true'); setTimeout(() => { this.diamondRef1.setAttribute('visible', 'false'); this.diamondRef2.setAttribute('visible', 'false'); }, 1000); this.current.state = 'IDLE'; this.updateMenuText(); } return; }

            if (this.gwState === 'EDIT_COLLAR') {
               if (this.activeAnchor && this.activeAnchor.type === 'traliccio') {
                   let req = this.current.traliccio.shape === 'square' ? 4 : 3;
                   if (!this.current.traliccio.pegs) this.current.traliccio.pegs = [];
                   if (this.current.traliccio.pegs.length < req) { this.gwState = 'EDIT_TRALICCIO_PEGS'; }
                   else { this.gwState = 'MAIN'; this.activeAnchor = null; }
               } else { this.gwState = 'EDIT_PEGS'; }
               this.updateGWUI(); this.refreshAll(); return;
            }

            if (this.gwState === 'EDIT_PEGS') {
                let hitPeg = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-peg')) : null;
                if (hitPeg) { let pIdx = parseInt(hitPeg.getAttribute('data-peg-idx')); if(this.activeAnchor.pegs) this.activeAnchor.pegs.splice(pIdx, 1); this.refreshAll(); return; }
                let hitCollar = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-collar')) : null;
                if (hitCollar) { let cIdx = parseInt(hitCollar.getAttribute('data-index')); if (this.current.guyWiresData[cIdx] === this.activeAnchor) { this.current.guyWiresData.splice(cIdx, 1); this.activeAnchor = null; this.gwState = 'MAIN'; this.updateGWUI(); this.refreshAll(); return; } }
                let hitGround = this.getHitPoint();
                if (hitGround) { let localHit = this.getLocalPoint(hitGround.point); if(!this.activeAnchor.pegs) this.activeAnchor.pegs=[]; this.activeAnchor.pegs.push(localHit); this.refreshAll(); }
                return;
            }

            if (this.gwState === 'MAIN') {
                let hitCollar = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-collar')) : null;
                if (hitCollar) {
                    let idx = parseInt(hitCollar.getAttribute('data-index'));
                    this.activeAnchor = this.current.guyWiresData[idx];
                    this.gwState = 'EDIT_COLLAR'; 
                    this.updateGWUI(); this.refreshAll();
                }
                return;
            }

            let type = this.antennaTypes[this.current.antIdx];

            if (this.current.state === 'PLACE_GROUND_A' || this.current.state === 'REPOSITION_GROUND_A') {
              let hitGround = this.getHitPoint(); if(!hitGround) return;
              this.current.pointA.base = this.getLocalPoint(hitGround.point); this.current.state = this.current.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_A' : 'PLACE_HEIGHT_A'; this.currentHeight = type === 'Verticale' ? this.getCalculatedLength() : 0.1; this.setupVerticalPreviewMode(this.current.pointA.base);
            } 
            else if (this.current.state === 'PLACE_HEIGHT_A' || this.current.state === 'REPOSITION_HEIGHT_A') {
              this.current.pointA.top = { x: this.current.pointA.base.x, y: this.current.pointA.base.y + this.currentHeight, z: this.current.pointA.base.z }; this.resetVerticalPreviewMode();
              if(this.current.state === 'REPOSITION_HEIGHT_A' || type === 'Verticale' || type === 'MMANA-GAL') { this.current.state = 'IDLE'; if(this.menuUI) this.menuUI.setAttribute('visible', true); this.refreshAll(); } else { this.current.state = 'PLACE_GROUND_B'; }
            } 
            else if (this.current.state === 'PLACE_GROUND_B' || this.current.state === 'REPOSITION_GROUND_B') {
              let hitGround = this.getHitPoint(); if(!hitGround) return;
              this.current.pointB.base = this.getLocalPoint(hitGround.point); this.current.state = this.current.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_B' : 'PLACE_HEIGHT_B'; this.currentHeight = 0.1; this.setupVerticalPreviewMode(this.current.pointB.base);
            } 
            else if (this.current.state === 'PLACE_HEIGHT_B' || this.current.state === 'REPOSITION_HEIGHT_B') {
              this.current.pointB.top = { x: this.current.pointB.base.x, y: this.current.pointB.base.y + this.currentHeight, z: this.current.pointB.base.z }; this.resetVerticalPreviewMode(); this.current.state = 'IDLE'; if(this.menuUI) this.menuUI.setAttribute('visible', true); this.refreshAll(); 
            }
        } catch(e) { console.error("Errore onTriggerDown:", e); }
      },

      // PURE RENDER ENGINE HELPERS
      createLabel: function(text, pos, color, scale, container) {
          let label = document.createElement('a-text');
          label.setAttribute('value', text);
          label.setAttribute('align', 'center');
          label.setAttribute('color', color);

      },

      createPoleAndLabel: function(topPos, basePos, labelName, color, container) {
          if (!topPos) return;
          let sphere = document.createElement('a-sphere');
          sphere.setAttribute('radius', '0.05');
          sphere.setAttribute('material', `color: ${color}; roughness: 0.3`);
          sphere.setAttribute('position', `${topPos.x} ${topPos.y} ${topPos.z}`);
          container.appendChild(sphere);

          let baseH = basePos ? basePos.y : 0;
          let actualHeight = topPos.y - baseH;
          let midY = baseH + (actualHeight / 2);
          
          let pole = document.createElement('a-cylinder');
          pole.setAttribute('geometry', `primitive: cylinder; radius: 0.008; height: ${actualHeight}`);
          pole.setAttribute('material', 'color: #888888; opacity: 0.6; shader: flat');
          pole.setAttribute('position', `${topPos.x} ${midY} ${topPos.z}`);
          container.appendChild(pole);

          this.createLabel(`${labelName}\nALTEZZA PALO: ${actualHeight.toFixed(2)}m`, {x: topPos.x, y: midY, z: topPos.z}, '#00FF00', this.globalTextScale, container);
      },

      createLineTube: function(p1, p2, radius, materialStr, container) {
          let tube = document.createElement('a-cylinder');
          let dist = p1.distanceTo(p2);
          tube.setAttribute('geometry', `primitive: cylinder; radius: ${radius}; height: ${dist}`);
          tube.setAttribute('material', materialStr);
          
          let mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
          tube.setAttribute('position', `${mid.x} ${mid.y} ${mid.z}`);
          
          // NUOVO CALCOLO DELLA ROTAZIONE: Usa coordinate puramente locali
          if (dist > 0.001) {
              let dir = new THREE.Vector3().subVectors(p2, p1).normalize();
              let quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
              let euler = new THREE.Euler().setFromQuaternion(quat, 'YXZ');
              tube.setAttribute('rotation', `${euler.x * 180 / Math.PI} ${euler.y * 180 / Math.PI} ${euler.z * 180 / Math.PI}`);
          }
          
          container.appendChild(tube);
          return tube;
      },

      drawTraliccio: function(ant, container, isCurrent) {
        if (!ant.traliccio || !ant.traliccio.active || !ant.traliccio.center) return;

        let t = ant.traliccio; let isSq = t.shape === 'square'; let numS = isSq ? 4 : 3;
        t.corners = []; let rotRad = (t.rotationY || 0) * (Math.PI / 180); let baseAng = isSq ? Math.PI/4 : Math.PI/2;

        for (let i = 0; i < numS; i++) { let ang = baseAng + (i * 2 * Math.PI / numS) + rotRad; t.corners.push(new THREE.Vector3( t.center.x + Math.cos(ang) * (t.radius||0.3), t.center.y, t.center.z + Math.sin(ang) * (t.radius||0.3) )); }

        let matPoles = 'color: #90A4AE; roughness: 0.4; metalness: 0.6; shader: flat'; let matBraces = 'color: #CFD8DC; roughness: 0.5; metalness: 0.3; shader: flat';

        let h = t.height || 6.0; if (isCurrent && ant.state === 'SIZE_ROTATE_TRALICCIO') h = Math.max(1.0, (t.radius||0.3) * 3); 

        t.corners.forEach(pos => { let p = document.createElement('a-cylinder'); p.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${h}`); p.setAttribute('material', matPoles); p.setAttribute('position', `${pos.x} ${t.center.y + h/2} ${pos.z}`); container.appendChild(p); });

        let secH = Math.max(0.3, (t.radius||0.3) * 2.5); let numSec = Math.max(1, Math.floor(h / secH)); let aSecH = h / numSec;
        for (let i = 0; i < numSec; i++) {
            let yB = t.center.y + (i * aSecH); let yT = t.center.y + ((i + 1) * aSecH);
            for (let c = 0; c < numS; c++) {
                let nC = (c + 1) % numS; let vBL = new THREE.Vector3(t.corners[c].x, yB, t.corners[c].z); let vBR = new THREE.Vector3(t.corners[nC].x, yB, t.corners[nC].z); let vTL = new THREE.Vector3(t.corners[c].x, yT, t.corners[c].z); let vTR = new THREE.Vector3(t.corners[nC].x, yT, t.corners[nC].z);
                this.createLineTube(vBL, vBR, 0.008, matBraces, container); if (i === numSec - 1) this.createLineTube(vTL, vTR, 0.008, matBraces, container); this.createLineTube(vBL, vTR, 0.006, matBraces, container); this.createLineTube(vBR, vTL, 0.006, matBraces, container);
            }
        }

        let lato = t.corners[0].distanceTo(t.corners[1]);
        let tVal = `TRALICCIO ${isSq?'QUAD':'TRIA'}\nH: ${h.toFixed(2)}m | L: ${lato.toFixed(2)}m`;
        if (isCurrent && ant.state === 'SIZE_ROTATE_TRALICCIO') tVal = `MODIFICA LATO: ${lato.toFixed(2)}m\nROTAZIONE: ${t.rotationY}°`;
        else if (isCurrent && ant.state === 'PLACE_HEIGHT_TRALICCIO') tVal = `IMPOSTA ALTEZZA: ${h.toFixed(2)}m\nLATO: ${lato.toFixed(2)}m`;
        this.createLabel(tVal, {x: t.center.x, y: t.center.y + h + 0.2, z: t.center.z}, '#FFEB3B', this.globalTextScale, container);
      },

      drawGuyWires: function(ant, container, isCurrent) {
        if (ant.traliccio && ant.traliccio.active && (isCurrent ? this.gwState !== 'OFF' : true) && ant.traliccio.pegs) {
            ant.traliccio.pegs.forEach((pegPosRaw, pIdx) => {
                let pegPos = new THREE.Vector3(pegPosRaw.x, pegPosRaw.y, pegPosRaw.z); 
                let peg = document.createElement('a-cone');
                if (isCurrent && this.gwState === 'EDIT_TRALICCIO_PEGS') { peg.classList.add('gw-peg', 'clickable'); peg.setAttribute('btn-interaction', ''); }
                peg.setAttribute('data-peg-idx', pIdx); peg.setAttribute('geometry', 'primitive: cone; radiusBottom: 0.04; radiusTop: 0.005; height: 0.15');
                peg.setAttribute('material', 'color: #FF9800; shader: flat'); peg.setAttribute('position', `${pegPos.x} ${pegPos.y + 0.075} ${pegPos.z}`);
                container.appendChild(peg);
            });

            if (isCurrent && this.gwState === 'EDIT_TRALICCIO_PEGS' && ant.traliccio.corners.length > 0) {
                let req = ant.traliccio.shape === 'square' ? 4 : 3;
                let cIdx = ant.traliccio.pegs.length;
                if (cIdx < req && ant.traliccio.corners[cIdx]) {
                    let nextC = ant.traliccio.corners[cIdx];
                    let glow = document.createElement('a-cylinder'); glow.setAttribute('geometry', `primitive: cylinder; radius: 0.04; height: ${ant.traliccio.height}`);
                    glow.setAttribute('material', 'color: #00E676; opacity: 0.6; shader: flat; transparent: true'); glow.setAttribute('position', `${nextC.x} ${ant.traliccio.center.y + ant.traliccio.height/2} ${nextC.z}`);
                    container.appendChild(glow);
                    this.createLabel(`<- PIAZZA PICCHETTO\nSPIGOLO ${cIdx + 1}`, {x: nextC.x, y: ant.traliccio.center.y + 1.5, z: nextC.z}, '#00E676', this.globalTextScale, container);
                }
            }
        }

        if(!ant.guyWiresData) return;
        ant.guyWiresData.forEach((anchor, idx) => {
          let isSelected = isCurrent && (this.activeAnchor === anchor);

          if (anchor.type === 'traliccio' && ant.traliccio && ant.traliccio.active) {

      renderAntenna: function(ant, container, isCurrent, idx) {
          let tContainer = document.createElement('a-entity'); container.appendChild(tContainer);
          this.drawTraliccio(ant, tContainer, isCurrent);

          let gwContainer = document.createElement('a-entity'); container.appendChild(gwContainer);
          this.drawGuyWires(ant, gwContainer, isCurrent);

          if (!ant.pointA.top) { this.renderSelectorBox(ant, container, isCurrent, idx); return; }

          let type = this.antennaTypes[ant.antIdx];

          if (type === 'Verticale') {
              this.createPoleAndLabel(ant.pointA.top, ant.pointA.base, 'STILO VERTICALE', '#FF1744', container);
              let h = ant.pointA.top.y - ant.pointA.base.y;
              let base = new THREE.Vector3(ant.pointA.base.x, ant.pointA.base.y + 0.002, ant.pointA.base.z);
              let top = new THREE.Vector3(ant.pointA.base.x, ant.pointA.base.y + h, ant.pointA.base.z);
              this.createLineTube(base, top, 0.018, 'color: #FF5722; shader: flat', container);
              
              if (!ant.traliccio.active) {
                  let radRot = (ant.antennaRotationY * Math.PI / 180);
                  for (let i = 0; i < ant.numRadials; i++) {
                      let angle = ((i * 2 * Math.PI) / ant.numRadials) + radRot;
                      let targetVec = new THREE.Vector3( base.x + Math.cos(angle) * ant.radialLen, base.y, base.z + Math.sin(angle) * ant.radialLen );
                      this.createLineTube(base, targetVec, 0.004, 'color: #5D4037; shader: flat', container);
                  }
              }
          }
          else if (type === 'MMANA-GAL') {
              this.createPoleAndLabel(ant.pointA.top, ant.pointA.base, 'PILONE MMANA', '#FF1744', container);
              if (ant.mmanaWires && ant.mmanaWires.length > 0) {
                  let mmanaGroup = document.createElement('a-entity');
                  mmanaGroup.setAttribute('position', `${ant.pointA.top.x} ${ant.pointA.top.y} ${ant.pointA.top.z}`);
                  mmanaGroup.setAttribute('rotation', `0 ${ant.antennaRotationY} 0`);
                  container.appendChild(mmanaGroup);
                  ant.mmanaWires.forEach((w) => {
                      let p1 = new THREE.Vector3(w.x1, w.z1, w.y1); let p2 = new THREE.Vector3(w.x2, w.z2, w.y2); if(p1.distanceTo(p2) < 0.01) return;
                      this.createLineTube(p1, p2, Math.max(0.005, w.radius * 2.8), 'color: #00E676; shader: flat', mmanaGroup);
                  });
              }
          }
          else if (ant.pointB.top) {
              this.createPoleAndLabel(ant.pointA.top, ant.pointA.base, 'PUNTO A', '#FF1744', container);
              this.createPoleAndLabel(ant.pointB.top, ant.pointB.base, 'PUNTO B', '#2979FF', container);
              
              let vecA = new THREE.Vector3(ant.pointA.top.x, ant.pointA.top.y, ant.pointA.top.z);
              let vecB = new THREE.Vector3(ant.pointB.top.x, ant.pointB.top.y, ant.pointB.top.z);
              let dirAB = new THREE.Vector3().subVectors(vecB, vecA).normalize(); let dirBA = new THREE.Vector3().subVectors(vecA, vecB).normalize();
              let vecC = new THREE.Vector3().lerpVectors(vecA, vecB, ant.pointC.percent);
              ant.pointC.top = vecC;

              if (type !== 'Longwire') this.createPoleAndLabel(ant.pointC.top, null, 'CENTRO C', '#00E676', container);

              if (type === 'Dipolo') {
                  let antLen = this.getCalculatedLength(); 
                  let extAntStart = new THREE.Vector3().copy(ant.pointC.top).addScaledVector(dirAB, -(antLen / 2)); let extAntEnd = new THREE.Vector3().copy(ant.pointC.top).addScaledVector(dirAB, antLen / 2);
                  this.createLineTube(extAntStart, extAntEnd, 0.015, 'color: #FF5722; shader: flat', container);
                  this.createLabel(`BRACCIO 1: ${(antLen / 2).toFixed(2)}m\nDIST. PALO A: ${vecA.distanceTo(extAntStart).toFixed(2)}m`, new THREE.Vector3().lerpVectors(vecA, extAntStart, 0.5), 'yellow', this.globalTextScale, container);
                  this.createLabel(`BRACCIO 2: ${(antLen / 2).toFixed(2)}m\nDIST. PALO B: ${extAntEnd.distanceTo(vecB).toFixed(2)}m`, new THREE.Vector3().lerpVectors(extAntEnd, vecB, 0.5), 'yellow', this.globalTextScale, container);
              } 
              else if (type === 'End Fed') {
                  let endA = new THREE.Vector3().copy(ant.pointC.top).addScaledVector(dirBA, ant.endFed_AC_Len); let endB = new THREE.Vector3().copy(ant.pointC.top).addScaledVector(dirAB, ant.endFed_CB_Len);
                  this.createLineTube(ant.pointC.top, endA, 0.015, 'color: #FF5722; shader: flat', container);
                  this.createLineTube(ant.pointC.top, endB, 0.015, 'color: #FF5722; shader: flat', container);
                  this.createLabel(`FILO AC: ${ant.endFed_AC_Len.toFixed(2)}m\nDIST. PALO A: ${vecA.distanceTo(endA).toFixed(2)}m`, new THREE.Vector3().lerpVectors(vecA, endA, 0.5), 'yellow', this.globalTextScale, container);
                  this.createLabel(`FILO CB: ${ant.endFed_CB_Len.toFixed(2)}m\nDIST. PALO B: ${extCB.distanceTo(vecB).toFixed(2)}m`, new THREE.Vector3().lerpVectors(endB, vecB, 0.5), 'yellow', this.globalTextScale, container);
              } 
              else if (type === 'Longwire') {
                  let startVec = ant.longwireVertex === 'A' ? vecA : vecB; let targetVec = ant.longwireVertex === 'A' ? vecB : vecA; let dirLW = new THREE.Vector3().subVectors(targetVec, startVec).normalize();
                  let extLW = new THREE.Vector3().copy(startVec).addScaledVector(dirLW, ant.longwireLen);
                  this.createLineTube(startVec, extLW, 0.015, 'color: #FF5722; shader: flat', container);
                  this.createLabel(`LUNGH. BRACCIO: ${ant.longwireLen.toFixed(2)}m\nDIST. PALO: ${extLW.distanceTo(targetVec).toFixed(2)}m`, new THREE.Vector3().lerpVectors(extLW, targetVec, 0.5), 'yellow', this.globalTextScale, container);
              }
          }

          this.renderSelectorBox(ant, container, isCurrent, idx);
      },

      setupMmanaFileLoader: function() {
        let fileInput = document.querySelector('#file-mmana'); if(!fileInput) return;
        fileInput.addEventListener('change', (evt) => {
          let file = evt.target.files[0]; if(!file) return; let reader = new FileReader();
          reader.onload = (e) => { 
              let lines = e.target.result.split('\n'); this.importedMmanaWires = []; let insideWiresSection = false;
              for(let i=0; i<lines.length; i++) {
                let line = lines[i].trim(); let upperLine = line.toUpperCase();
                if(insideWiresSection && upperLine.startsWith('***')) insideWiresSection = false;
                if(upperLine.includes('***') && upperLine.includes('WIRES')) { insideWiresSection = true; continue; }
                if(insideWiresSection && line !== "") { let tokens = line.split(/[\s,]+/).filter(t => t !== ''); if(tokens.length >= 7) this.importedMmanaWires.push({ x1: parseFloat(tokens[0]), y1: parseFloat(tokens[1]), z1: parseFloat(tokens[2]), x2: parseFloat(tokens[3]), y2: parseFloat(tokens[4]), z2: parseFloat(tokens[5]), radius: parseFloat(tokens[6]) > 0 ? parseFloat(tokens[6])/1000 : 0.002 }); }
              }
              if (this.importedMmanaWires.length > 0) { this.current.mmanaWires = this.importedMmanaWires; this.current.mmanaModelIdx = this.mmanaModels.indexOf('Modello Importato'); this.current.antIdx = this.antennaTypes.indexOf('MMANA-GAL'); this.refreshAll(); alert(`Caricati ${this.current.mmanaWires.length} fili!`); }
          };
          reader.readAsText(file);
        });
      },

      refreshAll: function() { this.updateMenuText(); this.updateGeometriesAndDrawings(); this.saveToStorage(); }
    });
  </script>
