<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Antenne AR Pro V21 - Traliccio e Puntamento Ibrido</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    #ui-2d-container { position: absolute; top: 15px; left: 15px; z-index: 9999; background: #111; color: #00E676; padding: 15px; border: 2px solid #FFEB3B; border-radius: 8px; font-family: monospace; max-width: 320px; max-height: 90vh; overflow-y: auto; }
    #ui-2d-container h3 { margin: 0 0 5px 0; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px;}
    #ui-2d-container p { margin: 5px 0; font-size: 11px; color: #fff; line-height: 1.3; }
    #ui-2d-container input, #ui-2d-container textarea, #ui-2d-container select { width: 93%; padding: 6px; background: #222; color: #fff; border: 1px solid #00E676; margin-bottom: 10px; font-family: monospace; }
    #ui-2d-container button { width: 100%; padding: 8px; background: #00E676; color: #000; border: none; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
    #ui-2d-container button.action { background: #FFEB3B; }
    hr { border-color: #333; margin: 15px 0; }
  </style>
  <script>
    AFRAME.registerComponent('look-at-camera', { tick: function () { let cameraEl = document.querySelector('#camera'); if (cameraEl && cameraEl.object3D) { this.el.object3D.lookAt(cameraEl.object3D.position); } } });
    
    AFRAME.registerComponent('btn-interaction', {
      init: function () {
        let el = this.el;
        let originalColor = el.getAttribute('material') ? el.getAttribute('material').color : '#FFFFFF';
        el.addEventListener('mouseenter', () => el.setAttribute('material', 'opacity', 0.8));
        el.addEventListener('mouseleave', () => { el.setAttribute('material', 'opacity', 1.0); el.setAttribute('scale', '1 1 1'); if(el.getAttribute('material')) el.setAttribute('material', 'color', originalColor); });
        el.addEventListener('mousedown', () => { el.setAttribute('scale', '0.95 0.95 0.8'); el.setAttribute('material', 'color', '#00FFCC'); });
        el.addEventListener('mouseup', () => { el.setAttribute('scale', '1 1 1'); if(el.getAttribute('material')) el.setAttribute('material', 'color', originalColor); });
      }
    });

    AFRAME.registerComponent('ar-antenna-system', {
      init: function () {
        this.state = 'PLACE_GROUND_A'; 
        this.pointA = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointB = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointC = { top: null, sphere: null, pole: null, label: null, percent: 0.5 }; 
        
        // --- NUOVO: GESTIONE TRALICCIO ---
        this.traliccio = { active: false, center: null, shape: 'square', radius: 0.3, rotationY: 0, height: 6.0, corners: [], pegs: [] };

        this.labelSegA = null; this.labelSegB = null;
        this.antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale', 'MMANA-GAL'];
        this.bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
        this.antIdx = 0; this.bandIdx = 2; 
        
        this.endFed_AC_Len = 10.0; this.endFed_CB_Len = 10.0; this.longwireLen = 20.0; this.longwireVertex = 'A'; 
        this.numRadials = 4; this.radialLen = 5.0; this.radialPool = []; this.maxRadials = 16; 
        this.mmanaModels = ['Yagi 3 Elementi', 'Delta Loop', 'Dipolo MMANA', 'Modello Importato'];
        this.mmanaModelIdx = 0; this.antennaRotationY = 0; this.globalTextScale = 0.35; this.currentHeight = 0.1; 
        this.mmanaWires = []; this.importedMmanaWires = []; 

        this.guyWiresData = []; this.gwState = 'OFF'; this.activeAnchor = null; 
        this.lastTriggerTime = 0; 
        this.calibLocal1 = null; this.calibLocal2 = null;

        // --- VARIABILI MODALITA' SGUARDO ---
        this.laserMode = false;
        this.hitTestSource = null;
        this.requestingHitTest = false;
        this.reticleValid = false;
        this.targetReticlePos = new THREE.Vector3();
        this.targetReticleQuat = new THREE.Quaternion();
        this.lastFloorY = 0; 

        this.raycasterEl = document.querySelector('#right-controller');
        this.leftControllerEl = document.querySelector('#left-controller');
        this.worldPivotEl = document.querySelector('#world-pivot');
        this.worldContentEl = document.querySelector('#world-content');
        this.verticalCylinder = document.querySelector('#vertical-cylinder');
        this.heightText = document.querySelector('#height-text');
        this.menuUI = document.querySelector('#menu-ui');
        this.gwUI = document.querySelector('#guy-wires-ui');
        
        this.mmanaContainerEl = document.querySelector('#mmana-wires-container');
        this.gwContainerEl = document.querySelector('#guy-wires-container');
        
        // Nuovo container per rendering del traliccio
        this.traliccioContainerEl = document.createElement('a-entity');
        this.worldContentEl.appendChild(this.traliccioContainerEl);

        this.raycasterEl.addEventListener('triggerdown', this.onTriggerDown.bind(this));
        this.raycasterEl.addEventListener('thumbstickmoved', this.onRightThumbstick.bind(this));
        this.leftControllerEl.addEventListener('ybuttondown', this.toggleMenu.bind(this));
        this.leftControllerEl.addEventListener('xbuttondown', this.toggleGuyWireMode.bind(this));
        this.leftControllerEl.addEventListener('thumbstickmoved', this.onLeftThumbstick.bind(this));

        this.el.sceneEl.addEventListener('exit-vr', () => {
            this.hitTestSource = null; this.requestingHitTest = false;
        });

        this.initPersistentElements();
        this.loadPreloadedMmanaModel();
        this.resetAntennaLengths();
        this.setupGlobalEventDelegation();
        this.setupMmanaFileLoader();
        
        window.saveAntennaToDB = this.saveAntennaToDB.bind(this);
        window.loadAntennaFromDB = this.loadAntennaFromDB.bind(this);
        window.deleteAntennaFromDB = this.deleteAntennaFromDB.bind(this);
        this.refreshDBList();
        
        this.loadFromStorage(); 
      },

      refreshDBList: function() {
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}');
        let select = document.querySelector('#load-list');
        select.innerHTML = '';
        for (let name in db) {
            let opt = document.createElement('option');
            opt.value = name; opt.innerText = name;
            select.appendChild(opt);
        }
      },

      executeSave: function(customName) {
        if(!this.pointA.base) return "ERRORE: Devi piazzare almeno il Punto A.";
        if(!this.calibLocal1 || !this.calibLocal2) return "ERRORE: Devi impostare i 2 Diamanti prima.";
        
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}');
        db[customName] = {
          pointA: { base: this.pointA.base, top: this.pointA.top }, pointB: { base: this.pointB.base, top: this.pointB.top },
          traliccio: this.traliccio,
          pointCPercent: this.pointC.percent, antIdx: this.antIdx, bandIdx: this.bandIdx,
          endFed_AC_Len: this.endFed_AC_Len, endFed_CB_Len: this.endFed_CB_Len,
          longwireLen: this.longwireLen, longwireVertex: this.longwireVertex,
          numRadials: this.numRadials, radialLen: this.radialLen,
          mmanaModelIdx: this.mmanaModelIdx, antennaRotationY: this.antennaRotationY,
          globalTextScale: this.globalTextScale, guyWiresData: this.guyWiresData,
          calibLocal1: this.calibLocal1, calibLocal2: this.calibLocal2
        };
        localStorage.setItem('antenneAR_DB', JSON.stringify(db));
        this.refreshDBList();
        return `SALVATA CON SUCCESSO:\n${customName}`;
      },

      saveAntennaToDB: function() {
        let name = document.querySelector('#save-name').value.trim();
        if(!name) { alert("Inserisci un nome!"); return; }
        alert(this.executeSave(name));
      },

      loadAntennaFromDB: function() {
        let name = document.querySelector('#load-list').value;
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}');
        let d = db[name];
        if(!d) return;

        this.pointA.base = d.pointA.base; this.pointA.top = d.pointA.top;
        this.pointB.base = d.pointB.base; this.pointB.top = d.pointB.top;
        if(d.traliccio) this.traliccio = d.traliccio; else this.traliccio = { active: false, center: null, shape: 'square', radius: 0.3, rotationY: 0, height: 6.0, corners: [], pegs: [] };
        
        this.pointC.percent = parseFloat(d.pointCPercent) || 0.5;
        this.antIdx = parseInt(d.antIdx) || 0; this.bandIdx = parseInt(d.bandIdx) || 2;
        this.endFed_AC_Len = parseFloat(d.endFed_AC_Len) || 10.0; this.endFed_CB_Len = parseFloat(d.endFed_CB_Len) || 10.0;
        this.longwireLen = parseFloat(d.longwireLen) || 20.0; this.longwireVertex = d.longwireVertex || 'A';
        this.numRadials = parseInt(d.numRadials) || 4; this.radialLen = parseFloat(d.radialLen) || 5.0;
        this.mmanaModelIdx = parseInt(d.mmanaModelIdx) || 0; this.antennaRotationY = parseFloat(d.antennaRotationY) || 0;
        this.globalTextScale = parseFloat(d.globalTextScale) || 0.35;
        this.guyWiresData = d.guyWiresData || [];
        this.calibLocal1 = d.calibLocal1; this.calibLocal2 = d.calibLocal2;

        this.worldContentEl.object3D.position.set(-this.calibLocal1.x, -this.calibLocal1.y, -this.calibLocal1.z);
        this.worldContentEl.setAttribute('visible', 'true'); 

        this.diamondRef1.setAttribute('position', this.calibLocal1); this.diamondRef2.setAttribute('position', this.calibLocal2);
        this.diamondRef1.setAttribute('visible', 'true'); this.diamondRef2.setAttribute('visible', 'true');

        this.state = 'AWAITING_CALIB_PT1';
        this.menuUI.setAttribute('visible', true);
        this.updateMenuText(); this.updateGeometriesAndDrawings(); 
        alert("Antenna " + name + " caricata! Agganciata al controller.");
      },

      deleteAntennaFromDB: function() {
        let name = document.querySelector('#load-list').value;
        if(name && confirm("Eliminare l'antenna '" + name + "'?")) {
            let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}');
            delete db[name]; localStorage.setItem('antenneAR_DB', JSON.stringify(db));
            this.refreshDBList();
        }
      },

      saveToStorage: function() {
        let data = {
          state: this.state, pointA: { base: this.pointA.base, top: this.pointA.top },
          pointB: { base: this.pointB.base, top: this.pointB.top }, pointCPercent: this.pointC.percent,
          traliccio: this.traliccio,
          antIdx: this.antIdx, bandIdx: this.bandIdx, endFed_AC_Len: this.endFed_AC_Len, endFed_CB_Len: this.endFed_CB_Len,
          longwireLen: this.longwireLen, longwireVertex: this.longwireVertex, numRadials: this.numRadials, radialLen: this.radialLen,
          mmanaModelIdx: this.mmanaModelIdx, antennaRotationY: this.antennaRotationY, globalTextScale: this.globalTextScale,
          pivotPos: this.worldPivotEl.object3D.position, pivotRot: this.worldPivotEl.object3D.rotation,
          contentPos: this.worldContentEl.object3D.position, guyWiresData: this.guyWiresData
        };
        localStorage.setItem('antennaArProV21', JSON.stringify(data));
      },

      loadFromStorage: function() {
        let saved = localStorage.getItem('antennaArProV21');
        if (saved) {
          try {
            let d = JSON.parse(saved);
            if (d.pointA && d.pointA.base) this.pointA.base = d.pointA.base;
            if (d.pointA && d.pointA.top) this.pointA.top = d.pointA.top;
            if (d.pointB && d.pointB.base) this.pointB.base = d.pointB.base;
            if (d.pointB && d.pointB.top) this.pointB.top = d.pointB.top;
            if (d.traliccio) this.traliccio = d.traliccio;
            
            this.pointC.percent = d.pointCPercent !== undefined ? d.pointCPercent : 0.5;
            this.antIdx = d.antIdx || 0; this.bandIdx = d.bandIdx || 2;
            this.endFed_AC_Len = d.endFed_AC_Len || 10.0; this.endFed_CB_Len = d.endFed_CB_Len || 10.0;
            this.longwireLen = d.longwireLen || 20.0; this.longwireVertex = d.longwireVertex || 'A';
            this.numRadials = d.numRadials || 4; this.radialLen = d.radialLen || 5.0;
            this.mmanaModelIdx = d.mmanaModelIdx || 0; this.antennaRotationY = d.antennaRotationY || 0;
            this.globalTextScale = d.globalTextScale || 0.35;
            this.guyWiresData = d.guyWiresData || [];
            
            if (d.pivotPos) this.worldPivotEl.object3D.position.copy(d.pivotPos);
            if (d.pivotRot) this.worldPivotEl.object3D.rotation.copy(d.pivotRot);
            if (d.contentPos) this.worldContentEl.object3D.position.copy(d.contentPos);
            
            this.state = d.state || 'IDLE';
            if (this.state.startsWith('PLACE_HEIGHT') || this.state.startsWith('REPOSITION_HEIGHT') || this.state.startsWith('SET_CALIB') || this.state.startsWith('AWAITING_CALIB') || this.state.startsWith('SIZE_ROTATE')) {
               this.state = 'IDLE';
            }
          } catch(e) { console.error(e); }
        }
        this.gwState = 'OFF'; this.activeAnchor = null;
        if(this.gwUI) this.gwUI.setAttribute('visible', false);
        this.refreshAll();
      },

      getLocalPoint: function(worldVec) {
        let local = new THREE.Vector3();
        this.worldContentEl.object3D.worldToLocal(local.copy(worldVec));
        return { x: local.x, y: local.y, z: local.z };
      },

      toggleMenu: function() {
        if(this.gwState !== 'OFF') return; 
        if(!this.menuUI) return;
        let isVisible = this.menuUI.getAttribute('visible') === 'true' || this.menuUI.getAttribute('visible') === true;
        this.menuUI.setAttribute('visible', !isVisible);
      },

      toggleGuyWireMode: function() {
        if (!this.pointA.top && !this.pointB.top) return; 
        if (this.state.startsWith('AWAITING') || this.state.startsWith('PLACE_HEIGHT') || this.state.startsWith('SET_CALIB') || this.state.startsWith('SIZE_ROTATE')) return;
        
        if (this.gwState === 'OFF') {
          this.gwState = 'MAIN'; this.menuUI.setAttribute('visible', false); this.gwUI.setAttribute('visible', true);
          this.activeAnchor = null; this.updateGWUI(); this.drawGuyWires();
        } else {
          this.gwState = 'OFF'; this.gwUI.setAttribute('visible', false); this.menuUI.setAttribute('visible', true);
          this.activeAnchor = null; this.drawGuyWires();
        }
      },

      updateGWUI: function() {
        let isMain = (this.gwState === 'MAIN'); 
        let isEditCollar = (this.gwState === 'EDIT_COLLAR');
        let isEditPegs = (this.gwState === 'EDIT_PEGS' || this.gwState === 'EDIT_TRALICCIO_PEGS');
        let isAnyEdit = isEditCollar || isEditPegs;

        document.querySelector('#gw-page-main').setAttribute('visible', isMain);
        document.querySelector('#gw-page-edit').setAttribute('visible', isAnyEdit);
        
        this.toggleButton('#btn-gw-new-tral', isMain && this.traliccio.active);
        this.toggleButton('#btn-gw-new-a', isMain && this.pointA.top !== null);
        this.toggleButton('#btn-gw-new-b', isMain && this.pointB.top !== null);
        this.toggleButton('#btn-gw-done', isAnyEdit);

        let txtEl = document.querySelector('#txt-gw-status');
        if (isMain) txtEl.setAttribute('value', 'SELEZIONA COLLARE O CREA NUOVO');
        if (isEditCollar) txtEl.setAttribute('value', 'JOYSTICK Y: CAMBIA QUOTA COLLARE\nGRILLETTO: CONFERMA ALTEZZA');
        if (this.gwState === 'EDIT_PEGS') txtEl.setAttribute('value', 'JOYSTICK Y: ALTEZZA | GRILLETTO A TERRA: PICCHETTO\nPUNTA PICCHETTO O COLLARE PER ELIMINARE');
        if (this.gwState === 'EDIT_TRALICCIO_PEGS') {
            let req = this.traliccio.shape === 'square' ? 4 : 3;
            txtEl.setAttribute('value', `PIAZZAMENTO PICCHETTI CONDIVISI\nTERRA: ${this.traliccio.pegs.length} su ${req} | GRILLETTO PER PIAZZARE`);
        }
        this.refreshRaycaster();
      },

      toggleButton: function(id, isVisible) {
        let btn = document.querySelector(id);
        if(!btn) return;
        btn.setAttribute('visible', isVisible);
        if(isVisible) btn.classList.add('clickable');
        else btn.classList.remove('clickable');
      },

      refreshRaycaster: function() {
        setTimeout(() => { if (this.raycasterEl && this.raycasterEl.components.raycaster) this.raycasterEl.components.raycaster.refreshObjects(); }, 50);
      },

      initPersistentElements: function() {
        let createPointStructure = (color) => {
          let struct = {};
          struct.sphere = document.createElement('a-sphere'); struct.sphere.setAttribute('radius', '0.05'); struct.sphere.setAttribute('material', `color: ${color}; roughness: 0.3`); struct.sphere.setAttribute('visible', 'false'); this.worldContentEl.appendChild(struct.sphere);
          struct.pole = document.createElement('a-cylinder'); struct.pole.setAttribute('radius', '0.008'); struct.pole.setAttribute('material', 'color: #888888; opacity: 0.6; shader: flat'); struct.pole.setAttribute('visible', 'false'); this.worldContentEl.appendChild(struct.pole);
          struct.label = document.createElement('a-text'); struct.label.setAttribute('align', 'center'); struct.label.setAttribute('color', '#00FF00'); struct.label.setAttribute('look-at-camera', ''); struct.label.setAttribute('visible', 'false'); this.worldContentEl.appendChild(struct.label);
          return struct;
        };

        this.pointA = Object.assign(this.pointA, createPointStructure('#FF1744'));
        this.pointB = Object.assign(this.pointB, createPointStructure('#2979FF'));
        this.pointC = Object.assign(this.pointC, createPointStructure('#00E676'));

        this.antennaTube1 = document.createElement('a-cylinder'); this.antennaTube1.setAttribute('radius', '0.015'); this.antennaTube1.setAttribute('material', 'color: #FF5722; shader: flat'); this.antennaTube1.setAttribute('visible', 'false'); this.worldContentEl.appendChild(this.antennaTube1);
        this.antennaTube2 = document.createElement('a-cylinder'); this.antennaTube2.setAttribute('radius', '0.015'); this.antennaTube2.setAttribute('material', 'color: #FF5722; shader: flat'); this.antennaTube2.setAttribute('visible', 'false'); this.worldContentEl.appendChild(this.antennaTube2);

        this.labelSegA = document.createElement('a-text'); this.labelSegA.setAttribute('align', 'center'); this.labelSegA.setAttribute('color', 'yellow'); this.labelSegA.setAttribute('look-at-camera', ''); this.labelSegA.setAttribute('visible', 'false'); this.worldContentEl.appendChild(this.labelSegA);
        this.labelSegB = document.createElement('a-text'); this.labelSegB.setAttribute('align', 'center'); this.labelSegB.setAttribute('color', 'yellow'); this.labelSegB.setAttribute('look-at-camera', ''); this.labelSegB.setAttribute('visible', 'false'); this.worldContentEl.appendChild(this.labelSegB);

        for(let i=0; i<this.maxRadials; i++) {
          let radCyl = document.createElement('a-cylinder'); radCyl.setAttribute('radius', '0.005'); radCyl.setAttribute('material', 'color: #5D4037; shader: flat'); radCyl.setAttribute('visible', 'false'); this.worldContentEl.appendChild(radCyl); this.radialPool.push(radCyl);
        }

        let makeLocalDiamond = (color) => {
            let d = document.createElement('a-octahedron'); d.setAttribute('radius', '0.06'); d.setAttribute('material', `color: ${color}; shader: flat; wireframe: true; opacity: 0.5`); d.setAttribute('visible', 'false');
            let core = document.createElement('a-octahedron'); core.setAttribute('radius', '0.03'); core.setAttribute('material', `color: ${color}; shader: flat; opacity: 0.8`); d.appendChild(core);
            this.worldContentEl.appendChild(d); return d;
        };
        this.diamondRef1 = makeLocalDiamond('#00BFFF'); this.diamondRef2 = makeLocalDiamond('#FF00FF');

        this.reticle = document.createElement('a-entity');
        this.reticle.setAttribute('geometry', 'primitive: ring; radiusInner: 0.08; radiusOuter: 0.1; segmentsTheta: 6');
        this.reticle.setAttribute('material', 'color: #00FF00; shader: flat; transparent: true; opacity: 0.9');
        this.reticle.setAttribute('rotation', '-90 0 0');
        this.reticle.setAttribute('visible', 'false');
        this.el.sceneEl.appendChild(this.reticle); 
      },

      getCalculatedLength: function() {
        let bandMeters = parseInt(this.bands[this.bandIdx]); let type = this.antennaTypes[this.antIdx];
        if (type === 'Dipolo' || type === 'Verticale') return bandMeters / 4; 
        if (type === 'End Fed') return bandMeters * 0.45; 
        return bandMeters;                                 
      },

      resetAntennaLengths: function() {
        let baseLen = this.getCalculatedLength();
        this.endFed_AC_Len = baseLen / 2; this.endFed_CB_Len = baseLen / 2; this.longwireLen = baseLen;
      },

      tick: function (time, frameDelta) {
        let isPlacingMode = this.state.startsWith('PLACE_GROUND') || this.state.startsWith('REPOSITION_GROUND') || this.state.startsWith('AWAITING_CALIB') || this.state.startsWith('SET_CALIB') || this.state.startsWith('PLACE_TRALICCIO_CENTER') || this.gwState.includes('PEGS');

        let indicator = document.querySelector('#touch-indicator');
        if (indicator) indicator.setAttribute('visible', isPlacingMode && !this.laserMode);

        let sceneEl = this.el.sceneEl; let frame = sceneEl.frame;
        
        let cameraPos = new THREE.Vector3(); let cameraDir = new THREE.Vector3(0, 0, -1);
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) {
            cameraEl.object3D.getWorldPosition(cameraPos);
            cameraDir.applyQuaternion(cameraEl.object3D.getWorldQuaternion(new THREE.Quaternion()));
        }

        if (this.laserMode && isPlacingMode && frame && sceneEl.is('ar-mode')) {
            let session = sceneEl.renderer.xr.getSession();
            let refSpace = sceneEl.renderer.xr.getReferenceSpace();
            let hitFound = false;

            if (!this.hitTestSource && !this.requestingHitTest) {
                this.requestingHitTest = true;
                session.requestReferenceSpace('viewer').then((viewerSpace) => {
                    session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                        this.hitTestSource = source; this.requestingHitTest = false;
                    }).catch(() => { this.requestingHitTest = false; });
                });
            }

            if (this.hitTestSource) {
                let hitTestResults = frame.getHitTestResults(this.hitTestSource);
                if (hitTestResults.length > 0) {
                    let pose = hitTestResults[0].getPose(refSpace);
                    if (pose) {
                        let hitPos = new THREE.Vector3(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
                        this.targetReticlePos.copy(hitPos); this.targetReticleQuat.copy(pose.transform.orientation);
                        this.lastFloorY = hitPos.y; hitFound = true;
                    }
                }
            }

            if (!hitFound && cameraDir.y < -0.02) {
                let distanceToFloor = (this.lastFloorY - cameraPos.y) / cameraDir.y;
                if (distanceToFloor > 0 && distanceToFloor < 100) {
                    this.targetReticlePos.copy(cameraPos).addScaledVector(cameraDir, distanceToFloor);
                    this.targetReticleQuat.setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));
                    hitFound = true;
                }
            }

            if (hitFound) {
                this.reticle.object3D.position.lerp(this.targetReticlePos, 0.25); 
                this.reticle.object3D.rotation.set(-Math.PI / 2, 0, 0); 
                this.reticle.setAttribute('visible', 'true'); this.reticleValid = true;
            } else {
                this.reticle.setAttribute('visible', 'false'); this.reticleValid = false;
            }

        } else {
            if(this.reticle) this.reticle.setAttribute('visible', 'false');
            this.reticleValid = false;
        }

        if (this.state === 'AWAITING_CALIB_PT1') {
            let hitGround = this.getHitPoint();
            if (hitGround) this.worldPivotEl.object3D.position.copy(hitGround.point);
        } else if (this.state === 'AWAITING_CALIB_PT2') {
            let hitGround = this.getHitPoint();
            if (hitGround && this.calibPt1 && this.calibLocal1 && this.calibLocal2) {
                let angleLocal = Math.atan2(this.calibLocal2.x - this.calibLocal1.x, this.calibLocal2.z - this.calibLocal1.z);
                let angleWorld = Math.atan2(hitGround.point.x - this.calibPt1.x, hitGround.point.z - this.calibPt1.z);
                this.worldPivotEl.object3D.rotation.set(0, angleWorld - angleLocal, 0);
            }
        }
      },

      getHitPoint: function() {
        if (this.laserMode && this.reticleValid) {
            let pos = new THREE.Vector3(); this.reticle.object3D.getWorldPosition(pos); return { point: pos };
        }
        let pos = new THREE.Vector3();
        let indicator = document.querySelector('#touch-indicator');
        if (indicator && indicator.getAttribute('visible') === true) indicator.object3D.getWorldPosition(pos);
        else this.raycasterEl.object3D.getWorldPosition(pos);
        return { point: pos };
      },

      onLeftThumbstick: function(evt) {
        if (Math.abs(evt.detail.x) > 0.3) {
            let delta = evt.detail.x > 0 ? 2.0 : -2.0;
            if (this.gwState !== 'OFF') return;
            
            // --- ROTAZIONE TRALICCIO O ANTENNA ---
            if (this.state === 'SIZE_ROTATE_TRALICCIO') {
               this.traliccio.rotationY += delta;
               this.updateGeometriesAndDrawings();
            } else {
               this.antennaRotationY += delta;
               this.updateGeometriesAndDrawings();
               if(Date.now() - this.lastTriggerTime > 1000) { this.saveToStorage(); this.lastTriggerTime = Date.now(); }
            }
        }
      },

      onRightThumbstick: function (evt) {
        let thumbTime = Date.now();
        if (!this.lastThumbTime || thumbTime - this.lastThumbTime > 110) {
          
          if (this.state === 'SIZE_ROTATE_TRALICCIO') {
             if (Math.abs(evt.detail.y) > 0.3) {
                 let step = evt.detail.y < 0 ? 0.02 : -0.02;
                 this.traliccio.radius = Math.max(0.1, this.traliccio.radius + step);
                 this.updateGeometriesAndDrawings(); this.lastThumbTime = thumbTime;
             }
          }
          else if (this.state === 'PLACE_HEIGHT_TRALICCIO') {
             if (Math.abs(evt.detail.y) > 0.4) {
                 let step = evt.detail.y < 0 ? 0.1 : -0.1;
                 this.traliccio.height = Math.max(0.5, this.traliccio.height + step);
                 this.updateGeometriesAndDrawings(); this.lastThumbTime = thumbTime;
             }
          }
          else if (this.state.includes('HEIGHT') && Math.abs(evt.detail.y) > 0.4) {
            let step = evt.detail.y < 0 ? 0.1 : -0.1; 
            this.currentHeight = Math.max(0.0, this.currentHeight + step);
            this.updateHeightPreview(); this.lastThumbTime = thumbTime;
          }
          else if (this.gwState === 'EDIT_COLLAR' && this.activeAnchor && Math.abs(evt.detail.y) > 0.4) {
            let step = evt.detail.y < 0 ? 0.1 : -0.1;
            let maxH = this.activeAnchor.type === 'traliccio' ? this.traliccio.height : (this.activeAnchor.pole === 'A' ? (this.pointA.top.y - this.pointA.base.y) : (this.pointB.top.y - this.pointB.base.y));
            this.activeAnchor.height = Math.max(0.1, Math.min(maxH, this.activeAnchor.height + step));
            this.drawGuyWires(); this.lastThumbTime = thumbTime; this.saveToStorage();
          }
        }
      },

      updateHeightPreview: function() {
        let basePos = this.state.includes('_A') ? this.pointA.base : this.pointB.base;
        this.verticalCylinder.setAttribute('position', `${basePos.x} ${basePos.y + (this.currentHeight / 2)} ${basePos.z}`);
        this.verticalCylinder.setAttribute('geometry', `primitive: cylinder; radius: 0.01; height: ${this.currentHeight}`);
        this.heightText.setAttribute('position', `${basePos.x} ${basePos.y + this.currentHeight + 0.2} ${basePos.z}`);
        this.heightText.setAttribute('value', `${this.currentHeight.toFixed(1)}m`);
      },

      onTriggerDown: function () {
        let now = Date.now();
        if (now - this.lastTriggerTime < 300) return;
        this.lastTriggerTime = now;

        let intersects = this.raycasterEl.components.raycaster.intersectedEls;
        if (intersects) {
          for (let i = 0; i < intersects.length; i++) {
            let el = intersects[i];
            if (el.classList && el.classList.contains('clickable') && !el.classList.contains('gw-collar') && !el.classList.contains('gw-peg')) return;
            if (el.closest && (el.closest('#menu-ui') || el.closest('#guy-wires-ui'))) return;
          }
        }

        // --- STATI TRALICCIO ---
        if (this.state === 'PLACE_TRALICCIO_CENTER') {
           let hitGround = this.getHitPoint();
           if(hitGround) {
               this.traliccio.center = this.getLocalPoint(hitGround.point);
               this.state = 'SIZE_ROTATE_TRALICCIO';
               this.menuUI.setAttribute('visible', true); this.updateMenuText(); this.updateGeometriesAndDrawings();
           }
           return;
        }
        if (this.state === 'SIZE_ROTATE_TRALICCIO') {
           this.state = 'PLACE_HEIGHT_TRALICCIO'; this.menuUI.setAttribute('visible', false); this.updateMenuText();
           return;
        }
        if (this.state === 'PLACE_HEIGHT_TRALICCIO') {
           this.pointA.base = { x: this.traliccio.center.x, y: this.traliccio.center.y + this.traliccio.height, z: this.traliccio.center.z };
           this.currentHeight = 0.1; this.state = 'PLACE_HEIGHT_A'; this.setupVerticalPreviewMode(this.pointA.base); this.updateMenuText();
           return;
        }

        // --- GESTIONE TIRANTI TRALICCIO (PICCHETTI CONDIVISI) ---
        if (this.gwState === 'EDIT_TRALICCIO_PEGS') {
            let hitPeg = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-peg')) : null;
            if (hitPeg) {
                let pIdx = parseInt(hitPeg.getAttribute('data-peg-idx'));
                this.traliccio.pegs.splice(pIdx, 1);
                this.updateGWUI(); this.drawGuyWires(); this.saveToStorage(); return;
            }
            let req = this.traliccio.shape === 'square' ? 4 : 3;
            if (this.traliccio.pegs.length < req) {
                let hitGround = this.getHitPoint();
                if (hitGround) {
                    this.traliccio.pegs.push(this.getLocalPoint(hitGround.point));
                    if (this.traliccio.pegs.length >= req) {
                        this.gwState = 'MAIN'; this.activeAnchor = null; this.updateGWUI();
                    } else { this.updateGWUI(); }
                    this.drawGuyWires(); this.saveToStorage();
                }
            }
            return;
        }

        // --- CALIBRAZIONE RITARDATA ---
        if (this.state === 'AWAITING_CALIB_PT1') { let hitGround = this.getHitPoint(); if (hitGround) { this.calibPt1 = hitGround.point.clone(); this.worldPivotEl.object3D.position.copy(this.calibPt1); this.state = 'AWAITING_CALIB_PT2'; this.updateMenuText(); } return; }
        if (this.state === 'AWAITING_CALIB_PT2') { let hitGround = this.getHitPoint(); if (hitGround) { this.calibPt2 = hitGround.point.clone(); this.diamondRef1.setAttribute('visible', 'false'); this.diamondRef2.setAttribute('visible', 'false'); this.state = 'IDLE'; this.refreshAll(); } return; }
        if (this.state === 'SET_CALIB_PT1') { let hitGround = this.getHitPoint(); if (hitGround) { this.calibLocal1 = this.getLocalPoint(hitGround.point); this.diamondRef1.setAttribute('position', this.calibLocal1); this.diamondRef1.setAttribute('visible', 'true'); this.state = 'SET_CALIB_PT2'; this.updateMenuText(); } return; }
        if (this.state === 'SET_CALIB_PT2') { let hitGround = this.getHitPoint(); if (hitGround) { this.calibLocal2 = this.getLocalPoint(hitGround.point); this.diamondRef2.setAttribute('position', this.calibLocal2); this.diamondRef2.setAttribute('visible', 'true'); setTimeout(() => { this.diamondRef1.setAttribute('visible', 'false'); this.diamondRef2.setAttribute('visible', 'false'); }, 1000); this.state = 'IDLE'; this.updateMenuText(); } return; }

        // --- GESTIONE TIRANTI (CONFERMA COLLARE E NORMALI PEGS) ---
        if (this.gwState === 'EDIT_COLLAR') {
           if (this.activeAnchor && this.activeAnchor.type === 'traliccio') {
               let req = this.traliccio.shape === 'square' ? 4 : 3;
               if (this.traliccio.pegs.length < req) this.gwState = 'EDIT_TRALICCIO_PEGS';
               else { this.gwState = 'MAIN'; this.activeAnchor = null; }
           } else {
               this.gwState = 'EDIT_PEGS';
           }
           this.updateGWUI(); return;
        }

        if (this.gwState === 'EDIT_PEGS') {
            let hitPeg = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-peg')) : null;
            if (hitPeg) { let pIdx = parseInt(hitPeg.getAttribute('data-peg-idx')); this.activeAnchor.pegs.splice(pIdx, 1); this.drawGuyWires(); this.saveToStorage(); return; }
            let hitCollar = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-collar')) : null;
            if (hitCollar) {
                let cIdx = parseInt(hitCollar.getAttribute('data-index'));
                if (this.guyWiresData[cIdx] === this.activeAnchor) {
                    this.guyWiresData.splice(cIdx, 1); this.activeAnchor = null; this.gwState = 'MAIN'; this.updateGWUI(); this.drawGuyWires(); this.saveToStorage(); return;
                }
            }
            let hitGround = this.getHitPoint();
            if (hitGround) { let localHit = this.getLocalPoint(hitGround.point); this.activeAnchor.pegs.push(localHit); this.drawGuyWires(); this.saveToStorage(); }
            return;
        }

        if (this.gwState === 'MAIN') {
            let hitCollar = intersects ? intersects.find(el => el.classList && el.classList.contains('gw-collar')) : null;
            if (hitCollar) {
                let idx = parseInt(hitCollar.getAttribute('data-index'));
                this.activeAnchor = this.guyWiresData[idx];
                this.gwState = this.activeAnchor.type === 'traliccio' ? 'EDIT_TRALICCIO_PEGS' : 'EDIT_PEGS'; 
                this.updateGWUI(); this.drawGuyWires();
            }
            return;
        }

        // --- PIAZZAMENTO ANTENNE BASE ---
        let type = this.antennaTypes[this.antIdx];

        if (this.state === 'PLACE_GROUND_A' || this.state === 'REPOSITION_GROUND_A') {
          let hitGround = this.getHitPoint(); if(!hitGround) return;
          this.pointA.base = this.getLocalPoint(hitGround.point);
          this.state = this.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_A' : 'PLACE_HEIGHT_A';
          this.currentHeight = type === 'Verticale' ? this.getCalculatedLength() : 0.1;
          this.setupVerticalPreviewMode(this.pointA.base);
        } 
        else if (this.state === 'PLACE_HEIGHT_A' || this.state === 'REPOSITION_HEIGHT_A') {
          this.pointA.top = { x: this.pointA.base.x, y: this.pointA.base.y + this.currentHeight, z: this.pointA.base.z };
          this.resetVerticalPreviewMode();
          this.renderPoleAndLabel(this.pointA, this.pointA.top, type === 'Verticale' ? 'STILO VERTICALE' : (type === 'MMANA-GAL' ? 'PILONE MMANA' : 'PUNTO A'));

          if(this.state === 'REPOSITION_HEIGHT_A' || type === 'Verticale' || type === 'MMANA-GAL') {
            this.state = 'IDLE'; this.menuUI.setAttribute('visible', true); this.refreshAll(); 
          } else { this.state = 'PLACE_GROUND_B'; }
        } 
        else if (this.state === 'PLACE_GROUND_B' || this.state === 'REPOSITION_GROUND_B') {
          let hitGround = this.getHitPoint(); if(!hitGround) return;
          this.pointB.base = this.getLocalPoint(hitGround.point);
          this.state = this.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_B' : 'PLACE_HEIGHT_B';
          this.currentHeight = 0.1; this.setupVerticalPreviewMode(this.pointB.base);
        } 
        else if (this.state === 'PLACE_HEIGHT_B' || this.state === 'REPOSITION_HEIGHT_B') {
          this.pointB.top = { x: this.pointB.base.x, y: this.pointB.base.y + this.currentHeight, z: this.pointB.base.z };
          this.resetVerticalPreviewMode();
          this.state = 'IDLE'; this.menuUI.setAttribute('visible', true); this.refreshAll(); 
        }
      },

      setupVerticalPreviewMode: function (basePos) { this.verticalCylinder.setAttribute('visible', 'true'); this.updateHeightPreview(); this.heightText.setAttribute('visible', 'true'); },
      resetVerticalPreviewMode: function () { this.verticalCylinder.setAttribute('visible', 'false'); this.heightText.setAttribute('visible', 'false'); },

      renderPoleAndLabel: function(struct, topPos, labelName) {
        if (!topPos) return;
        struct.sphere.setAttribute('visible', 'true'); struct.pole.setAttribute('visible', 'true'); struct.label.setAttribute('visible', 'true');
        struct.sphere.setAttribute('position', topPos);
        let baseH = struct === this.pointA ? (this.pointA.base ? this.pointA.base.y : 0) : (this.pointB.base ? this.pointB.base.y : 0);
        let actualHeight = topPos.y - baseH;
        struct.pole.setAttribute('position', `${topPos.x} ${baseH + actualHeight / 2} ${topPos.z}`);
        struct.pole.setAttribute('geometry', `primitive: cylinder; radius: 0.008; height: ${actualHeight}`);
        struct.label.setAttribute('position', `${topPos.x} ${baseH + actualHeight / 2} ${topPos.z}`);
        struct.label.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`);
        struct.label.setAttribute('value', `${labelName}\nALTEZZA PALO: ${actualHeight.toFixed(2)}m`);
      },

      hideStructure: function(struct) { struct.sphere.setAttribute('visible', 'false'); struct.pole.setAttribute('visible', 'false'); struct.label.setAttribute('visible', 'false'); },

      loadPreloadedMmanaModel: function() {
        let mName = this.mmanaModels[this.mmanaModelIdx];
        if (mName === 'Yagi 3 Elementi') { this.mmanaWires = [{ x1: 0, y1: -2.5, z1: 0, x2: 0, y2: 2.5, z2: 0, radius: 0.004 }, { x1: 1.5, y1: -2.4, z1: 0, x2: 1.5, y2: 2.4, z2: 0, radius: 0.004 }, { x1: 3.2, y1: -2.2, z1: 0, x2: 3.2, y2: 2.2, z2: 0, radius: 0.004 }]; } 
        else if (mName === 'Delta Loop') { this.mmanaWires = [{ x1: 0, y1: -2.0, z1: 0, x2: 0, y2: 2.0, z2: 0, radius: 0.002 }, { x1: 0, y1: -2.0, z1: 0, x2: 0, y2: 0, z2: 3.5, radius: 0.002 }, { x1: 0, y1: 2.0, z1: 0, x2: 0, y2: 0, z2: 3.5, radius: 0.002 }]; } 
        else if (mName === 'Dipolo MMANA') { this.mmanaWires = [{ x1: 0, y1: -5.0, z1: 0, x2: 0, y2: 5.0, z2: 0, radius: 0.002 }]; } 
        else if (mName === 'Modello Importato') { this.mmanaWires = this.importedMmanaWires; }
      },

      updateMenuText: function() {
        let type = this.antennaTypes[this.antIdx]; let band = this.bands[this.bandIdx];
        document.querySelector('#txt-ant-val').setAttribute('value', type.toUpperCase());
        document.querySelector('#txt-band-val').setAttribute('value', band);

        let toggleSubMenu = (id, isVisible) => {
          let el = document.querySelector(id); el.setAttribute('visible', isVisible);
          let btns = el.querySelectorAll('[btn-interaction]');
          btns.forEach(btn => { if (isVisible) btn.classList.add('clickable'); else btn.classList.remove('clickable'); });
        };

        // Nascondi tutto se stiamo configurando il traliccio
        let isTraliccioSetup = this.state === 'SIZE_ROTATE_TRALICCIO';
        toggleSubMenu('#sub-dipolo', type === 'Dipolo' && !isTraliccioSetup); toggleSubMenu('#sub-endfed', type === 'End Fed' && !isTraliccioSetup);
        toggleSubMenu('#sub-longwire', type === 'Longwire' && !isTraliccioSetup); toggleSubMenu('#sub-verticale', type === 'Verticale' && !isTraliccioSetup);
        toggleSubMenu('#sub-mmana', type === 'MMANA-GAL' && !isTraliccioSetup);
        toggleSubMenu('#sub-traliccio-setup', isTraliccioSetup);
        
        document.querySelector('#btn-repo-b').setAttribute('visible', type !== 'Verticale' && type !== 'MMANA-GAL' && !isTraliccioSetup);
        document.querySelector('#btn-height-b').setAttribute('visible', type !== 'Verticale' && type !== 'MMANA-GAL' && !isTraliccioSetup);

        this.refreshRaycaster();

        let infoTextStr = "";
        let poleAH = this.pointA.top ? (this.pointA.top.y - this.pointA.base.y) : 0;

        if (this.state === 'PLACE_TRALICCIO_CENTER') { infoTextStr = "Punta a terra e premi grilletto per\nil CENTRO del Traliccio."; }
        else if (isTraliccioSetup) { infoTextStr = "JOYSTICK SX: Ruota | JOYSTICK DX: Base\nGRILLETTO: Conferma forma e dimensioni"; document.querySelector('#txt-tral-shape').setAttribute('value', `FORMA: ${this.traliccio.shape.toUpperCase()}`); }
        else if (this.state === 'PLACE_HEIGHT_TRALICCIO') { infoTextStr = "JOYSTICK DX: Alza o abbassa il traliccio\nGRILLETTO: Conferma altezza traliccio."; }
        else if (this.state === 'AWAITING_CALIB_PT1') { infoTextStr = "CALIBRAZIONE: L'antenna è agganciata al controller.\nPosiziona il Diamante 1 sul VERO PUNTO 1."; }
        else if (this.state === 'AWAITING_CALIB_PT2') { infoTextStr = "CALIBRAZIONE: Ruota l'antenna fino ad allineare\nil Diamante 2 sul VERO PUNTO 2."; }
        else if (this.state === 'SET_CALIB_PT1') { infoTextStr = "IMPOSTA CAPISALDI:\nAppoggia il controller sul VERO PUNTO 1 e premi grilletto."; }
        else if (this.state === 'SET_CALIB_PT2') { infoTextStr = "IMPOSTA CAPISALDI:\nOra sul VERO PUNTO 2. (Scompariranno appena confermati)."; }
        else if (type === 'Dipolo') { infoTextStr = `ANTENNA: DIPOLO | BANDA: ${band}\nLUNGHEZZA: ${this.getCalculatedLength().toFixed(2)}m`; } 
        else if (type === 'End Fed') { infoTextStr = `ANTENNA: END FED | BANDA: ${band}\nAC: ${this.endFed_AC_Len.toFixed(2)}m | CB: ${this.endFed_CB_Len.toFixed(2)}m`; document.querySelector('#txt-ef-values').setAttribute('value', `AC: ${this.endFed_AC_Len.toFixed(2)}m | CB: ${this.endFed_CB_Len.toFixed(2)}m`); }
        else if (type === 'Longwire') { infoTextStr = `ANTENNA: LONGWIRE | BANDA: ${band}\nVERTICE: DA ${this.longwireVertex} | LUNGH: ${this.longwireLen.toFixed(2)}m`; document.querySelector('#txt-lw-vertex-val').setAttribute('value', `VERTICE: DA ${this.longwireVertex}`); document.querySelector('#txt-lw-len-val').setAttribute('value', `LUNGH: ${this.longwireLen.toFixed(2)}m`); }
        else if (type === 'Verticale') { infoTextStr = `ANTENNA: VERTICALE | BANDA: ${band}\nSTILO: ${poleAH.toFixed(2)}m | RADIALI: ${this.numRadials} da ${this.radialLen.toFixed(1)}m`; document.querySelector('#txt-rad-num-val').setAttribute('value', `RADIALI: ${this.numRadials}`); document.querySelector('#txt-rad-len-val').setAttribute('value', `LUNGH R: ${this.radialLen.toFixed(1)}m`); }
        else if (type === 'MMANA-GAL') { infoTextStr = `MMANA: ${this.mmanaModels[this.mmanaModelIdx]}\nFili conduttori: ${this.mmanaWires.length}\nRuota l'antenna col joystick sinistro.`; document.querySelector('#txt-mmana-model-val').setAttribute('value', this.mmanaModels[this.mmanaModelIdx].toUpperCase()); }
        
        document.querySelector('#info-text').setAttribute('value', infoTextStr);
      },

      drawTraliccio: function() {
        this.traliccioContainerEl.innerHTML = '';
        if (!this.traliccio.active || !this.traliccio.center) return;

        let t = this.traliccio;
        let isSq = t.shape === 'square';
        let numS = isSq ? 4 : 3;
        t.corners = [];
        let rotRad = t.rotationY * (Math.PI / 180);
        let baseAng = isSq ? Math.PI/4 : Math.PI/2;

        for (let i = 0; i < numS; i++) {
            let ang = baseAng + (i * 2 * Math.PI / numS) + rotRad;
            t.corners.push(new THREE.Vector3( t.center.x + Math.cos(ang) * t.radius, t.center.y, t.center.z + Math.sin(ang) * t.radius ));
        }

        let matPoles = 'color: #90A4AE; roughness: 0.4; metalness: 0.6; shader: flat';
        let matBraces = 'color: #CFD8DC; roughness: 0.5; metalness: 0.3; shader: flat';

        let createTube = (p1, p2, rad, mat) => {
            let el = document.createElement('a-cylinder'); el.setAttribute('radius', rad); el.setAttribute('height', p1.distanceTo(p2)); el.setAttribute('material', mat);
            let mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5); el.object3D.position.copy(mid); el.object3D.lookAt(p2); el.object3D.rotateX(Math.PI / 2);
            this.traliccioContainerEl.appendChild(el);
        };

        let h = t.height;
        if (this.state === 'SIZE_ROTATE_TRALICCIO') h = Math.max(1.0, t.radius * 3); // Altezza temporanea visiva

        t.corners.forEach(pos => {
            let p = document.createElement('a-cylinder'); p.setAttribute('radius', '0.015'); p.setAttribute('height', h); p.setAttribute('material', matPoles);
            p.setAttribute('position', `${pos.x} ${t.center.y + h/2} ${pos.z}`); this.traliccioContainerEl.appendChild(p);
        });

        let secH = Math.max(0.3, t.radius * 2.5);
        let numSec = Math.max(1, Math.floor(h / secH));
        let aSecH = h / numSec;

        for (let i = 0; i < numSec; i++) {
            let yB = t.center.y + (i * aSecH); let yT = t.center.y + ((i + 1) * aSecH);
            for (let c = 0; c < numS; c++) {
                let nC = (c + 1) % numS;
                let vBL = new THREE.Vector3(t.corners[c].x, yB, t.corners[c].z); let vBR = new THREE.Vector3(t.corners[nC].x, yB, t.corners[nC].z);
                let vTL = new THREE.Vector3(t.corners[c].x, yT, t.corners[c].z); let vTR = new THREE.Vector3(t.corners[nC].x, yT, t.corners[nC].z);

                createTube(vBL, vBR, 0.008, matBraces); if (i === numSec - 1) createTube(vTL, vTR, 0.008, matBraces);
                createTube(vBL, vTR, 0.006, matBraces); createTube(vBR, vTL, 0.006, matBraces);
            }
        }
      },

      drawGuyWires: function() {
        while (this.gwContainerEl.firstChild) { this.gwContainerEl.removeChild(this.gwContainerEl.firstChild); }

        // Disegna picchetti condivisi del traliccio
        if (this.traliccio.active && this.gwState !== 'OFF') {
            this.traliccio.pegs.forEach((pegPos, pIdx) => {
                let peg = document.createElement('a-cone');
                if (this.gwState === 'EDIT_TRALICCIO_PEGS') { peg.classList.add('gw-peg', 'clickable'); peg.setAttribute('btn-interaction', ''); }
                peg.setAttribute('data-peg-idx', pIdx);
                peg.setAttribute('radius-bottom', '0.04'); peg.setAttribute('radius-top', '0.005'); peg.setAttribute('height', '0.15');
                peg.setAttribute('material', 'color: #FF9800; shader: flat'); peg.setAttribute('position', `${pegPos.x} ${pegPos.y + 0.075} ${pegPos.z}`);
                this.gwContainerEl.appendChild(peg);
            });
        }

        this.guyWiresData.forEach((anchor, idx) => {
          let isSelected = (this.activeAnchor === anchor);

          if (anchor.type === 'traliccio' && this.traliccio.active) {

              collarLabel.setAttribute('position', `${tCenter.x} ${hY + 0.15} ${tCenter.z}`); collarLabel.setAttribute('look-at-camera', ''); this.gwContainerEl.appendChild(collarLabel);
          } 
          else if (anchor.type !== 'traliccio') {
            // Disegno classico del collare tondo sul palo
            let pData = anchor.pole === 'A' ? this.pointA : this.pointB; if (!pData || !pData.base || !pData.top) return;
            let maxH = pData.top.y - pData.base.y; let h = Math.min(anchor.height, maxH); anchor.height = h; 
            let anchorPos = new THREE.Vector3(pData.base.x, pData.base.y + h, pData.base.z);

            let collar = document.createElement('a-torus'); collar.classList.add('gw-collar');
            if (this.gwState === 'MAIN' || ((this.gwState === 'EDIT_COLLAR' || this.gwState === 'EDIT_PEGS') && isSelected)) { collar.classList.add('clickable'); collar.setAttribute('btn-interaction', ''); }
            collar.setAttribute('data-index', idx); collar.setAttribute('radius', '0.04'); collar.setAttribute('radius-tubular', '0.006');
            collar.setAttribute('material', isSelected ? 'color: #00FF00; shader: flat' : 'color: #FF1744; shader: flat'); if (isSelected) collar.setAttribute('scale', '1.3 1.3 1.3');
            collar.setAttribute('rotation', '90 0 0'); collar.setAttribute('position', `${anchorPos.x} ${anchorPos.y} ${anchorPos.z}`); this.gwContainerEl.appendChild(collar);

            let collarLabel = document.createElement('a-text'); collarLabel.setAttribute('value', `COLLARE: ${h.toFixed(2)}m`);
            collarLabel.setAttribute('align', 'center'); collarLabel.setAttribute('color', '#00E676'); collarLabel.setAttribute('scale', `${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8} ${this.globalTextScale * 0.8}`);
            collarLabel.setAttribute('position', `${anchorPos.x} ${anchorPos.y + 0.08} ${anchorPos.z}`); collarLabel.setAttribute('look-at-camera', ''); this.gwContainerEl.appendChild(collarLabel);

            anchor.pegs.forEach((pegPos, pegIdx) => {
              let pVec = new THREE.Vector3(pegPos.x, pegPos.y, pegPos.z); let wireLength = anchorPos.distanceTo(pVec);
              let groundPolePos = new THREE.Vector3(pData.base.x, pData.base.y, pData.base.z); let groundPegPos = new THREE.Vector3(pVec.x, pData.base.y, pVec.z); let groundDist = groundPolePos.distanceTo(groundPegPos);

              let peg = document.createElement('a-cone');
              if (isSelected && this.gwState === 'EDIT_PEGS') { peg.classList.add('gw-peg', 'clickable'); peg.setAttribute('btn-interaction', ''); }
              peg.setAttribute('data-peg-idx', pegIdx); peg.setAttribute('radius-bottom', '0.04'); peg.setAttribute('radius-top', '0.005'); peg.setAttribute('height', '0.15');
              peg.setAttribute('material', 'color: #FF9800; shader: flat'); peg.setAttribute('position', `${pVec.x} ${pVec.y + 0.075} ${pVec.z}`); this.gwContainerEl.appendChild(peg);

              let midPoint = new THREE.Vector3().lerpVectors(anchorPos, pVec, 0.5); wire.object3D.position.copy(midPoint); wire.object3D.lookAt(pVec); wire.object3D.rotateX(Math.PI / 2); this.gwContainerEl.appendChild(wire);

      },

      updateGeometriesAndDrawings: function() {
        this.mmanaContainerEl.innerHTML = ''; 
        this.drawTraliccio();
        this.drawGuyWires();

        if (!this.pointA.top) return;
        let type = this.antennaTypes[this.antIdx];

        if (type === 'Verticale') {
          this.hideStructure(this.pointB); this.hideStructure(this.pointC);
          this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false'); this.antennaTube2.setAttribute('visible', 'false');
          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'STILO VERTICALE');

          let h = this.pointA.top.y - this.pointA.base.y;
          this.antennaTube1.setAttribute('visible', 'true');
          this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.018; height: ${h}`);
          this.antennaTube1.object3D.quaternion.identity(); 
          this.antennaTube1.object3D.position.set(this.pointA.base.x, this.pointA.base.y + (h / 2), this.pointA.base.z);

          let base = new THREE.Vector3(this.pointA.base.x, this.pointA.base.y + 0.002, this.pointA.base.z);
          let radRot = (this.antennaRotationY * Math.PI / 180);
          
          for (let i = 0; i < this.maxRadials; i++) {
            if (i < this.numRadials) {
              this.radialPool[i].setAttribute('visible', 'true');
              this.radialPool[i].setAttribute('geometry', `primitive: cylinder; radius: 0.004; height: ${this.radialLen}`);
              let angle = ((i * 2 * Math.PI) / this.numRadials) + radRot;
              let targetVec = new THREE.Vector3( base.x + Math.cos(angle) * this.radialLen, base.y, base.z + Math.sin(angle) * this.radialLen );
              let midPoint = new THREE.Vector3().lerpVectors(base, targetVec, 0.5);
              this.radialPool[i].object3D.quaternion.identity(); this.radialPool[i].object3D.position.copy(midPoint); this.radialPool[i].object3D.lookAt(targetVec); this.radialPool[i].object3D.rotateX(Math.PI / 2);
            } else { this.radialPool[i].setAttribute('visible', 'false'); }
          }
          return;
        }

        if (type === 'MMANA-GAL') {
          this.antennaTube1.setAttribute('visible', 'false'); this.antennaTube2.setAttribute('visible', 'false');
          for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
          this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false');
          this.hideStructure(this.pointB); this.hideStructure(this.pointC);
          if (this.mmanaWires.length === 0) return;
          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PILONE MMANA');
          let vecA = new THREE.Vector3(this.pointA.top.x, this.pointA.top.y, this.pointA.top.z);
          this.mmanaContainerEl.object3D.position.copy(vecA);
          this.mmanaContainerEl.object3D.rotation.set(0, this.antennaRotationY * Math.PI / 180, 0);
          this.mmanaWires.forEach((w) => {
            let cyl = document.createElement('a-cylinder');
            let p1 = new THREE.Vector3(w.x1, w.z1, w.y1); let p2 = new THREE.Vector3(w.x2, w.z2, w.y2); let d = p1.distanceTo(p2);
            if(d < 0.01) return;
            cyl.setAttribute('geometry', `primitive: cylinder; radius: ${Math.max(0.005, w.radius * 2.8)}; height: ${d}`);
            cyl.setAttribute('material', 'color: #00E676; shader: flat');
            let mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
            cyl.object3D.position.copy(mid); cyl.object3D.lookAt(p2); cyl.object3D.rotateX(Math.PI / 2);
            this.mmanaContainerEl.appendChild(cyl);
          });
          return;
        }

        for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
        if (!this.pointB.top) return;

        this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PUNTO A'); this.renderPoleAndLabel(this.pointB, this.pointB.top, 'PUNTO B');
        let vecA = new THREE.Vector3(this.pointA.top.x, this.pointA.top.y, this.pointA.top.z); let vecB = new THREE.Vector3(this.pointB.top.x, this.pointB.top.y, this.pointB.top.z);
        let dirAB = new THREE.Vector3().subVectors(vecB, vecA).normalize(); let dirBA = new THREE.Vector3().subVectors(vecA, vecB).normalize();
        let vecC = new THREE.Vector3().lerpVectors(vecA, vecB, this.pointC.percent);
        this.pointC.top = vecC; this.renderPoleAndLabel(this.pointC, this.pointC.top, 'CENTRO C');

        if (type === 'Dipolo') {
          this.antennaTube2.setAttribute('visible', 'false'); let antLen = this.getCalculatedLength();
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${antLen}`);
          this.antennaTube1.object3D.quaternion.identity(); this.antennaTube1.object3D.position.copy(this.pointC.top); this.antennaTube1.object3D.lookAt(vecB); this.antennaTube1.object3D.rotateX(Math.PI / 2);
          let extAntStart = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, -(antLen / 2)); 
          let extAntEnd = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, antLen / 2);
          this.labelSegA.setAttribute('visible', 'true'); this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extAntStart, 0.5)); this.labelSegA.setAttribute('value', `BRACCIO 1: ${(antLen / 2).toFixed(2)}m\nDIST. PALO A: ${vecA.distanceTo(extAntStart).toFixed(2)}m`);
          this.labelSegB.setAttribute('visible', 'true'); this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extAntEnd, vecB, 0.5)); this.labelSegB.setAttribute('value', `BRACCIO 2: ${(antLen / 2).toFixed(2)}m\nDIST. PALO B: ${extAntEnd.distanceTo(vecB).toFixed(2)}m`);
        } else if (type === 'End Fed') {
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_AC_Len}`);
          let posTube1 = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirBA, this.endFed_AC_Len / 2);
          this.antennaTube1.object3D.quaternion.identity(); this.antennaTube1.object3D.position.copy(posTube1); this.antennaTube1.object3D.lookAt(vecA); this.antennaTube1.object3D.rotateX(Math.PI / 2);
          this.antennaTube2.setAttribute('visible', 'true'); this.antennaTube2.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_CB_Len}`);
          let posTube2 = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, this.endFed_CB_Len / 2);
          this.antennaTube2.object3D.quaternion.identity(); this.antennaTube2.object3D.position.copy(posTube2); this.antennaTube2.object3D.lookAt(vecB); this.antennaTube2.object3D.rotateX(Math.PI / 2);
          let extAC = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirBA, this.endFed_AC_Len); let extCB = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, this.endFed_CB_Len);
          this.labelSegA.setAttribute('visible', 'true'); this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extAC, 0.5)); this.labelSegA.setAttribute('value', `FILO AC: ${this.endFed_AC_Len.toFixed(2)}m\nDIST. PALO A: ${vecA.distanceTo(extAC).toFixed(2)}m`);
          this.labelSegB.setAttribute('visible', 'true'); this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extCB, vecB, 0.5)); this.labelSegB.setAttribute('value', `FILO CB: ${this.endFed_CB_Len.toFixed(2)}m\nDIST. PALO B: ${extCB.distanceTo(vecB).toFixed(2)}m`);
        } else if (type === 'Longwire') {
          this.hideStructure(this.pointC); this.antennaTube2.setAttribute('visible', 'false');
          let startVec = this.longwireVertex === 'A' ? vecA : vecB; let targetVec = this.longwireVertex === 'A' ? vecB : vecA;
          let dirLW = new THREE.Vector3().subVectors(targetVec, startVec).normalize();
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.longwireLen}`);
          let posTubeLW = new THREE.Vector3().copy(startVec).addScaledVector(dirLW, this.longwireLen / 2);
          this.antennaTube1.object3D.quaternion.identity(); this.antennaTube1.object3D.position.copy(posTubeLW); this.antennaTube1.object3D.lookAt(targetVec); this.antennaTube1.object3D.rotateX(Math.PI / 2);
          let extLW = new THREE.Vector3().copy(startVec).addScaledVector(dirLW, this.longwireLen);
          this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'true'); 
          this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extLW, targetVec, 0.5)); this.labelSegB.setAttribute('value', `LUNGH. BRACCIO: ${this.longwireLen.toFixed(2)}m\nDIST. PALO: ${extLW.distanceTo(targetVec).toFixed(2)}m`);
        }
        
        this.labelSegA.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`);
        this.labelSegB.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`);
      },

      setupGlobalEventDelegation: function() {
        let scene = this.el.sceneEl; this.lastClickTime = 0; 
        scene.addEventListener('mousedown', (evt) => {
          let now = Date.now(); if (now - this.lastClickTime < 250) return; 
          let target = evt.target.closest('.clickable'); if(!target) return;
          let isVis = target.getAttribute('visible'); if (isVis === false || isVis === 'false') return;
          let parent = target.parentElement; if (parent && (parent.getAttribute('visible') === false || parent.getAttribute('visible') === 'false')) return;

          this.lastClickTime = now; let id = target.id; let mathRound = (num) => Math.round(num * 100) / 100;

          if (id === 'btn-laser-toggle') {
              this.laserMode = !this.laserMode;
              let txt = document.querySelector('#txt-laser-toggle'); let btn = document.querySelector('#btn-laser-toggle');
              if (this.laserMode) { txt.setAttribute('value', "PUNTAMENTO: MISTO (VISORE + JOYSTICK)"); btn.setAttribute('color', '#D81B60'); } 
              else { txt.setAttribute('value', "PUNTAMENTO: TOCCO (LASER OFF)"); btn.setAttribute('color', '#5E35B1'); this.hitTestSource = null; }
              this.refreshAll();
          }
          // --- NUOVI BOTTONI TRALICCIO E TIRANTI ---
          else if (id === 'btn-start-traliccio') {
              this.triggerGlobalReset();
              this.traliccio.active = true; this.state = 'PLACE_TRALICCIO_CENTER';
              this.menuUI.setAttribute('visible', false); this.updateMenuText();
          }
          else if (id === 'btn-tral-shape') {
              this.traliccio.shape = this.traliccio.shape === 'square' ? 'triangle' : 'square';
              this.updateGeometriesAndDrawings(); this.updateMenuText();
          }
          else if (id === 'btn-gw-new-tral') {
            let newAnchor = { type: 'traliccio', height: 3.0 }; // Default 3 metri
            this.guyWiresData.push(newAnchor); this.activeAnchor = newAnchor; this.gwState = 'EDIT_COLLAR';
            this.updateGWUI(); this.drawGuyWires(); this.saveToStorage();
          }
          // ----------------------------------------
          else if (id === 'btn-gw-new-a') {
            let maxH = this.pointA.top.y - this.pointA.base.y; let newAnchor = { pole: 'A', height: maxH / 2, pegs: [] };
            this.guyWiresData.push(newAnchor); this.activeAnchor = newAnchor; this.gwState = 'EDIT_COLLAR';
            this.updateGWUI(); this.drawGuyWires(); this.saveToStorage();
          }
          else if (id === 'btn-gw-new-b') {
            let maxH = this.pointB.top.y - this.pointB.base.y; let newAnchor = { pole: 'B', height: maxH / 2, pegs: [] };
            this.guyWiresData.push(newAnchor); this.activeAnchor = newAnchor; this.gwState = 'EDIT_COLLAR';
            this.updateGWUI(); this.drawGuyWires(); this.saveToStorage();
          }
          else if (id === 'btn-gw-done') { this.activeAnchor = null; this.gwState = 'MAIN'; this.updateGWUI(); this.drawGuyWires(); }
          else if (id === 'btn-cal-set-pts') { if (!this.pointA.base) return; this.state = 'SET_CALIB_PT1'; this.menuUI.setAttribute('visible', false); this.updateMenuText(); }
          else if (id === 'btn-cal-recover') { if (!this.calibLocal1 || !this.calibLocal2) return; this.state = 'AWAITING_CALIB_PT1'; this.menuUI.setAttribute('visible', false); this.updateMenuText(); }
          else if (id === 'btn-ar-save') {
              if (!this.pointA.base || !this.calibLocal1 || !this.calibLocal2) return;
              let timeStr = new Date().getHours() + "-" + new Date().getMinutes() + "-" + new Date().getSeconds();
              document.querySelector('#info-text').setAttribute('value', this.executeSave(this.antennaTypes[this.antIdx].toUpperCase() + "_" + this.bands[this.bandIdx] + "_" + timeStr));
          }
          else if (id === 'btn-height-a') { if(!this.pointA.base) return; this.state = 'REPOSITION_HEIGHT_A'; this.currentHeight = this.pointA.top.y - this.pointA.base.y; this.setupVerticalPreviewMode(this.pointA.base); this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-height-b') { if(!this.pointB.base) return; this.state = 'REPOSITION_HEIGHT_B'; this.currentHeight = this.pointB.top.y - this.pointB.base.y; this.setupVerticalPreviewMode(this.pointB.base); this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-ant') { this.antIdx = (this.antIdx + 1) % this.antennaTypes.length; this.resetAntennaLengths(); this.refreshAll(); } 
          else if (id === 'btn-band') { this.bandIdx = (this.bandIdx + 1) % this.bands.length; this.resetAntennaLengths(); if (this.antennaTypes[this.antIdx] === 'Verticale' && this.pointA.top) { this.pointA.top.y = this.pointA.base.y + this.getCalculatedLength(); } this.refreshAll(); } 
          else if (id === 'btn-c-left') { this.pointC.percent = Math.max(0.02, mathRound(this.pointC.percent - 0.05)); this.refreshAll(); } 
          else if (id === 'btn-c-right') { this.pointC.percent = Math.min(0.98, mathRound(this.pointC.percent + 0.05)); this.refreshAll(); } 
          else if (id === 'btn-lw-vertex') { this.longwireVertex = this.longwireVertex === 'A' ? 'B' : 'A'; this.refreshAll(); } 
          else if (id === 'btn-mmana-model') { this.mmanaModelIdx = (this.mmanaModelIdx + 1) % this.mmanaModels.length; this.loadPreloadedMmanaModel(); this.refreshAll(); } 
          else if (id === 'btn-txt-minus') { this.globalTextScale = Math.max(0.15, mathRound(this.globalTextScale - 0.05)); this.refreshAll(); } 
          else if (id === 'btn-txt-plus') { this.globalTextScale = Math.min(1.2, mathRound(this.globalTextScale + 0.05)); this.refreshAll(); } 
          else if (id.startsWith('btn-ac') || id.startsWith('btn-cb') || id.startsWith('btn-lw') || id.startsWith('btn-rad')) {
             if(id==='btn-ac-m1') this.endFed_AC_Len = Math.max(0.1, mathRound(this.endFed_AC_Len - 1.0)); else if(id==='btn-ac-m01') this.endFed_AC_Len = Math.max(0.01, mathRound(this.endFed_AC_Len - 0.01)); else if(id==='btn-ac-p01') this.endFed_AC_Len = mathRound(this.endFed_AC_Len + 0.01); else if(id==='btn-ac-p1') this.endFed_AC_Len = mathRound(this.endFed_AC_Len + 1.0);
             else if(id==='btn-cb-m1') this.endFed_CB_Len = Math.max(0.1, mathRound(this.endFed_CB_Len - 1.0)); else if(id==='btn-cb-m01') this.endFed_CB_Len = Math.max(0.01, mathRound(this.endFed_CB_Len - 0.01)); else if(id==='btn-cb-p01') this.endFed_CB_Len = mathRound(this.endFed_CB_Len + 0.01); else if(id==='btn-cb-p1') this.endFed_CB_Len = mathRound(this.endFed_CB_Len + 1.0);
             else if(id==='btn-lw-m1') this.longwireLen = Math.max(0.1, mathRound(this.longwireLen - 1.0)); else if(id==='btn-lw-m01') this.longwireLen = Math.max(0.01, mathRound(this.longwireLen - 0.01)); else if(id==='btn-lw-p01') this.longwireLen = mathRound(this.longwireLen + 0.01); else if(id==='btn-lw-p1') this.longwireLen = mathRound(this.longwireLen + 1.0);
             else if(id==='btn-rad-num-minus') this.numRadials = Math.max(1, this.numRadials - 1); else if(id==='btn-rad-num-plus') this.numRadials = Math.min(this.maxRadials, this.numRadials + 1);
             else if(id==='btn-rad-m1') this.radialLen = Math.max(0.1, mathRound(this.radialLen - 1.0)); else if(id==='btn-rad-m01') this.radialLen = Math.max(0.1, mathRound(this.radialLen - 0.1)); else if(id==='btn-rad-p01') this.radialLen = mathRound(this.radialLen + 0.1); else if(id==='btn-rad-p1') this.radialLen = mathRound(this.radialLen + 1.0);
             this.refreshAll();
          }
          else if (id === 'btn-repo-a') { this.state = 'REPOSITION_GROUND_A'; this.menuUI.setAttribute('visible', false); } 
          else if (id === 'btn-repo-b') { this.state = 'REPOSITION_GROUND_B'; this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-global-reset') { this.triggerGlobalReset(); }
        });
      },

      setupMmanaFileLoader: function() {
        let fileInput = document.querySelector('#file-mmana'); if(!fileInput) return;
        fileInput.addEventListener('change', (evt) => {
          let file = evt.target.files[0]; if(!file) return;
          let reader = new FileReader();
          reader.onload = (e) => { 
              let lines = e.target.result.split('\n'); this.importedMmanaWires = []; let insideWiresSection = false;
              for(let i=0; i<lines.length; i++) {
                let line = lines[i].trim(); let upperLine = line.toUpperCase();
                if(insideWiresSection && upperLine.startsWith('***')) insideWiresSection = false;
                if(upperLine.includes('***') && upperLine.includes('WIRES')) { insideWiresSection = true; continue; }
                if(insideWiresSection && line !== "") {
                  let tokens = line.split(/[\s,]+/).filter(t => t !== '');
                  if(tokens.length >= 7) this.importedMmanaWires.push({ x1: parseFloat(tokens[0]), y1: parseFloat(tokens[1]), z1: parseFloat(tokens[2]), x2: parseFloat(tokens[3]), y2: parseFloat(tokens[4]), z2: parseFloat(tokens[5]), radius: parseFloat(tokens[6]) > 0 ? parseFloat(tokens[6])/1000 : 0.002 });
                }
              }
              if (this.importedMmanaWires.length > 0) { this.mmanaWires = this.importedMmanaWires; this.mmanaModelIdx = this.mmanaModels.indexOf('Modello Importato'); this.antIdx = this.antennaTypes.indexOf('MMANA-GAL'); this.refreshAll(); alert(`Caricati ${this.mmanaWires.length} fili!`); }
          };
          reader.readAsText(file);
        });
      },

      triggerGlobalReset: function() {
        this.pointA = { base: null, top: null, sphere: this.pointA.sphere, pole: this.pointA.pole, label: this.pointA.label };
        this.pointB = { base: null, top: null, sphere: this.pointB.sphere, pole: this.pointB.pole, label: this.pointB.label };
        this.pointC.top = null;
        
        this.traliccio = { active: false, center: null, shape: 'square', radius: 0.3, height: 6.0, rotationY: 0, corners: [], pegs: [] };

        this.hideStructure(this.pointA); this.hideStructure(this.pointB); this.hideStructure(this.pointC);
        this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false');
        if(this.antennaTube1) this.antennaTube1.setAttribute('visible', 'false'); 
        if(this.antennaTube2) this.antennaTube2.setAttribute('visible', 'false');
        for(let i=0; i<this.maxRadials; i++) { if(this.radialPool[i]) this.radialPool[i].setAttribute('visible', 'false'); }
        
        this.mmanaContainerEl.innerHTML = ''; this.gwContainerEl.innerHTML = ''; this.traliccioContainerEl.innerHTML = '';
        this.worldPivotEl.object3D.position.set(0,0,0); this.worldPivotEl.object3D.rotation.set(0,0,0); 
        this.worldContentEl.object3D.position.set(0,0,0); this.worldContentEl.setAttribute('visible', 'true');
        
        this.guyWiresData = []; this.gwState = 'OFF'; if(this.gwUI) this.gwUI.setAttribute('visible', false);
        this.calibLocal1 = null; this.calibLocal2 = null;
        this.diamondRef1.setAttribute('visible', 'false'); this.diamondRef2.setAttribute('visible', 'false');

        this.menuUI.setAttribute('visible', false);
        this.state = 'PLACE_GROUND_A'; this.antennaRotationY = 0; 
        localStorage.removeItem('antennaArProV21');
      },

      refreshAll: function() { this.updateMenuText(); this.updateGeometriesAndDrawings(); this.saveToStorage(); }
    });
  </script>
</head>
