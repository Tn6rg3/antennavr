<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Antenne AR Pro V21 - Puntamento Mobile Avanzato</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    /* Sposta i pulsanti VR/AR nativi per evitare i menu del browser in basso */
    .a-enter-vr, .a-enter-ar {
      bottom: 120px !important;
      right: 20px !important;
    }

    #ui-2d-container { background: rgba(17, 17, 17, 0.9); color: #00E676; padding: 15px; border: 2px solid #FFEB3B; border-radius: 8px; font-family: monospace; max-width: 320px; max-height: 50vh; overflow-y: auto; pointer-events: auto; margin: 10px; }
    #ui-2d-container h3 { margin: 0 0 5px 0; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px;}
    #ui-2d-container p { margin: 5px 0; font-size: 11px; color: #fff; line-height: 1.3; }
    #ui-2d-container input, #ui-2d-container textarea, #ui-2d-container select { width: 93%; padding: 6px; background: #222; color: #fff; border: 1px solid #00E676; margin-bottom: 10px; font-family: monospace; }
    #ui-2d-container button { width: 100%; padding: 8px; background: #00E676; color: #000; border: none; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
    #ui-2d-container button.action { background: #FFEB3B; }
    hr { border-color: #333; margin: 15px 0; }
    
    .mobile-btn {
      padding: 12px 16px;
      background: rgba(17, 17, 17, 0.9);
      color: #00E676;
      border: 2px solid #FFEB3B;
      border-radius: 8px;
      font-family: monospace;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .mobile-btn:active { background: rgba(255, 235, 59, 0.9); color: #000; }
  </style>
  <script>
    AFRAME.registerComponent('look-at-camera', { tick: function () { let cameraEl = document.querySelector('#camera'); if (cameraEl && cameraEl.object3D) { this.el.object3D.lookAt(cameraEl.object3D.position); } } });
    
    AFRAME.registerComponent('btn-interaction', {
      init: function () {
        let el = this.el;
        let originalColor = el.getAttribute('material') ? el.getAttribute('material').color : '#FFFFFF';
        el.addEventListener('mouseenter', () => el.setAttribute('material', 'opacity', 0.8));
        el.addEventListener('mouseleave', () => { el.setAttribute('material', 'opacity', 1.0); el.setAttribute('scale', '1 1 1'); if(el.getAttribute('material')) el.setAttribute('material', 'color', originalColor); });
        el.addEventListener('mousedown', () => { el.setAttribute('scale', '0.95 0.95 0.8'); el.setAttribute('material', 'color', '#00FFCC'); });
        el.addEventListener('mouseup', () => { el.setAttribute('scale', '1 1 1'); if(el.getAttribute('material')) el.setAttribute('material', 'color', originalColor); });
      }
    });

    AFRAME.registerComponent('ar-antenna-system', {
      init: function () {
        this.state = 'PLACE_GROUND_A'; 
        this.pointA = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointB = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointC = { top: null, sphere: null, pole: null, label: null, percent: 0.5 }; 
        this.labelSegA = null; this.labelSegB = null;

        this.antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale', 'MMANA-GAL'];
        this.bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
        this.antIdx = 0; this.bandIdx = 2; 
        
        this.endFed_AC_Len = 10.0; this.endFed_CB_Len = 10.0; this.longwireLen = 20.0; this.longwireVertex = 'A'; 
        this.numRadials = 4; this.radialLen = 5.0; this.radialPool = []; this.maxRadials = 16; 
        this.mmanaModels = ['Yagi 3 Elementi', 'Delta Loop', 'Dipolo MMANA', 'Modello Importato'];
        this.mmanaModelIdx = 0; this.antennaRotationY = 0; this.globalTextScale = 0.35; this.currentHeight = 0.1; 
        this.mmanaWires = []; this.importedMmanaWires = []; 

        this.guyWiresData = []; this.gwState = 'OFF'; this.activeAnchor = null; 
        this.lastTriggerTime = 0; 
        this.calibLocal1 = null; this.calibLocal2 = null;

        this.laserMode = true; 
        this.hitTestSource = null;
        this.requestingHitTest = false;
        this.reticleValid = false;
        this.targetReticlePos = new THREE.Vector3();
        this.targetReticleQuat = new THREE.Quaternion();
        this.lastFloorY = 0; 

        this.raycasterEl = document.querySelector('#right-controller');
        this.worldPivotEl = document.querySelector('#world-pivot');
        this.worldContentEl = document.querySelector('#world-content');
        this.verticalCylinder = document.querySelector('#vertical-cylinder');
        this.heightText = document.querySelector('#height-text');
        this.menuUI = document.querySelector('#menu-ui');
        this.gwUI = document.querySelector('#guy-wires-ui');
        this.mmanaContainerEl = document.querySelector('#mmana-wires-container');
        this.gwContainerEl = document.querySelector('#guy-wires-container');

        // GESTIONE TRANSIZIONE AR / BROWSER
        this.el.sceneEl.addEventListener('enter-vr', () => {
            if (this.el.sceneEl.is('ar-mode')) {
                document.querySelector('#ui-2d-container').style.display = 'none';
                document.querySelector('#ar-overlay-controls').style.display = 'flex';
            }
        });

        this.el.sceneEl.addEventListener('exit-vr', () => {
            document.querySelector('#ui-2d-container').style.display = 'block';
            document.querySelector('#ar-overlay-controls').style.display = 'none';
            this.hitTestSource = null;
            this.requestingHitTest = false;
        });

        // ==========================================
        // GESTIONE BOTTONI DOM (TOUCH OTTIMIZZATO)
        // ==========================================
        const addTouchHandler = (selector, callback) => {
            let el = document.querySelector(selector);
            if (!el) return;
            const handler = (e) => { e.preventDefault(); e.stopPropagation(); callback(); };
            el.addEventListener('touchstart', handler, {passive: false});
            el.addEventListener('mousedown', handler);
        };

        addTouchHandler('#btn-mobile-menu', () => this.toggleMenu());
        addTouchHandler('#btn-mobile-gw', () => this.toggleGuyWireMode());
        addTouchHandler('#btn-h-minus', () => { this.currentHeight = Math.max(0.0, this.currentHeight - 0.1); this.updateHeightPreview(); });
        addTouchHandler('#btn-h-plus', () => { this.currentHeight += 0.1; this.updateHeightPreview(); });
        addTouchHandler('#btn-h-confirm', () => this.confirmHeight());
        
        addTouchHandler('#btn-mobile-confirm', () => {
            if (this.reticleValid && this.reticle.getAttribute('visible') === 'true') {
                let pos = new THREE.Vector3();
                this.reticle.object3D.getWorldPosition(pos);
                this.doPlacement(pos);
            }
        });

        this.initPersistentElements();
        this.loadPreloadedMmanaModel();
        this.resetAntennaLengths();
        this.setupGlobalEventDelegation();
        this.setupMmanaFileLoader();
        
        window.saveAntennaToDB = this.saveAntennaToDB.bind(this);
        window.loadAntennaFromDB = this.loadAntennaFromDB.bind(this);
        window.deleteAntennaFromDB = this.deleteAntennaFromDB.bind(this);
        this.refreshDBList();
        
        this.loadFromStorage(); 
      },

      refreshDBList: function() {
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}');
        let select = document.querySelector('#load-list');
        select.innerHTML = '';
        for (let name in db) {
            let opt = document.createElement('option'); opt.value = name; opt.innerText = name;
            select.appendChild(opt);
        }
      },

      executeSave: function(customName) {
        if(!this.pointA.base) return "ERRORE: Devi piazzare almeno il Punto A.";
        if(!this.calibLocal1 || !this.calibLocal2) return "ERRORE: Devi impostare i 2 Diamanti prima.";
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}');
        db[customName] = {
          pointA: { base: this.pointA.base, top: this.pointA.top }, pointB: { base: this.pointB.base, top: this.pointB.top }, pointCPercent: this.pointC.percent,
          antIdx: this.antIdx, bandIdx: this.bandIdx, endFed_AC_Len: this.endFed_AC_Len, endFed_CB_Len: this.endFed_CB_Len, longwireLen: this.longwireLen, longwireVertex: this.longwireVertex,
          numRadials: this.numRadials, radialLen: this.radialLen, mmanaModelIdx: this.mmanaModelIdx, antennaRotationY: this.antennaRotationY, globalTextScale: this.globalTextScale,
          guyWiresData: this.guyWiresData, calibLocal1: this.calibLocal1, calibLocal2: this.calibLocal2
        };
        localStorage.setItem('antenneAR_DB', JSON.stringify(db)); this.refreshDBList();
        return `SALVATA CON SUCCESSO:\n${customName}`;
      },

      saveAntennaToDB: function() { let name = document.querySelector('#save-name').value.trim(); if(!name) { alert("Inserisci un nome per l'antenna!"); return; } alert(this.executeSave(name)); },
      
      loadAntennaFromDB: function() {
        let name = document.querySelector('#load-list').value; if(!name) return;
        let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}'); let d = db[name]; if(!d) return;
        this.pointA.base = d.pointA.base; this.pointA.top = d.pointA.top; this.pointB.base = d.pointB.base; this.pointB.top = d.pointB.top;
        this.pointC.percent = parseFloat(d.pointCPercent) || 0.5; this.antIdx = parseInt(d.antIdx) || 0; this.bandIdx = parseInt(d.bandIdx) || 2;
        this.endFed_AC_Len = parseFloat(d.endFed_AC_Len) || 10.0; this.endFed_CB_Len = parseFloat(d.endFed_CB_Len) || 10.0;
        this.longwireLen = parseFloat(d.longwireLen) || 20.0; this.longwireVertex = d.longwireVertex || 'A';
        this.numRadials = parseInt(d.numRadials) || 4; this.radialLen = parseFloat(d.radialLen) || 5.0;
        this.mmanaModelIdx = parseInt(d.mmanaModelIdx) || 0; this.antennaRotationY = parseFloat(d.antennaRotationY) || 0;
        this.globalTextScale = parseFloat(d.globalTextScale) || 0.35; this.guyWiresData = d.guyWiresData || [];
        this.calibLocal1 = d.calibLocal1; this.calibLocal2 = d.calibLocal2;

        this.worldContentEl.object3D.position.set(-this.calibLocal1.x, -this.calibLocal1.y, -this.calibLocal1.z);
        this.worldContentEl.setAttribute('visible', 'true'); 
        this.diamondRef1.setAttribute('position', this.calibLocal1); this.diamondRef2.setAttribute('position', this.calibLocal2);
        this.diamondRef1.setAttribute('visible', 'true'); this.diamondRef2.setAttribute('visible', 'true');

        this.state = 'AWAITING_CALIB_PT1'; this.menuUI.setAttribute('visible', true);
        this.updateMenuText(); this.updateGeometriesAndDrawings(); 
        alert("Antenna caricata! Entra in AR e posiziona il Diamante 1.");
      },

      deleteAntennaFromDB: function() { let name = document.querySelector('#load-list').value; if(!name) return; if(confirm("Eliminare '" + name + "'?")) { let db = JSON.parse(localStorage.getItem('antenneAR_DB') || '{}'); delete db[name]; localStorage.setItem('antenneAR_DB', JSON.stringify(db)); this.refreshDBList(); } },
      
      saveToStorage: function() {
        let data = {
          state: this.state, pointA: { base: this.pointA.base, top: this.pointA.top }, pointB: { base: this.pointB.base, top: this.pointB.top }, pointCPercent: this.pointC.percent,
          antIdx: this.antIdx, bandIdx: this.bandIdx, endFed_AC_Len: this.endFed_AC_Len, endFed_CB_Len: this.endFed_CB_Len, longwireLen: this.longwireLen, longwireVertex: this.longwireVertex, numRadials: this.numRadials, radialLen: this.radialLen,
          mmanaModelIdx: this.mmanaModelIdx, antennaRotationY: this.antennaRotationY, globalTextScale: this.globalTextScale,
          pivotPos: this.worldPivotEl.object3D.position, pivotRot: this.worldPivotEl.object3D.rotation, contentPos: this.worldContentEl.object3D.position, guyWiresData: this.guyWiresData
        };
        localStorage.setItem('antennaArProV21', JSON.stringify(data));
      },

      loadFromStorage: function() {
        let saved = localStorage.getItem('antennaArProV21');
        if (saved) {
          try {
            let d = JSON.parse(saved);
            if (d.pointA && d.pointA.base) this.pointA.base = d.pointA.base; if (d.pointA && d.pointA.top) this.pointA.top = d.pointA.top;
            if (d.pointB && d.pointB.base) this.pointB.base = d.pointB.base; if (d.pointB && d.pointB.top) this.pointB.top = d.pointB.top;
            this.pointC.percent = d.pointCPercent !== undefined ? d.pointCPercent : 0.5; this.antIdx = d.antIdx || 0; this.bandIdx = d.bandIdx || 2;
            this.endFed_AC_Len = d.endFed_AC_Len || 10.0; this.endFed_CB_Len = d.endFed_CB_Len || 10.0; this.longwireLen = d.longwireLen || 20.0; this.longwireVertex = d.longwireVertex || 'A';
            this.numRadials = d.numRadials || 4; this.radialLen = d.radialLen || 5.0; this.mmanaModelIdx = d.mmanaModelIdx || 0; this.antennaRotationY = d.antennaRotationY || 0;
            this.globalTextScale = d.globalTextScale || 0.35; this.guyWiresData = d.guyWiresData || [];
            if (d.pivotPos) this.worldPivotEl.object3D.position.copy(d.pivotPos); if (d.pivotRot) this.worldPivotEl.object3D.rotation.copy(d.pivotRot); if (d.contentPos) this.worldContentEl.object3D.position.copy(d.contentPos);
            this.state = d.state || 'IDLE';
            if (this.state.startsWith('PLACE_HEIGHT') || this.state.startsWith('REPOSITION_HEIGHT') || this.state.startsWith('SET_CALIB') || this.state.startsWith('AWAITING_CALIB')) { this.state = 'IDLE'; }
          } catch(e) { console.error(e); }
        }
        this.gwState = 'OFF'; this.activeAnchor = null; if(this.gwUI) this.gwUI.setAttribute('visible', false); this.refreshAll();
      },

      getLocalPoint: function(worldVec) {
        let local = new THREE.Vector3();
        this.worldContentEl.object3D.worldToLocal(local.copy(worldVec));
        return { x: local.x, y: local.y, z: local.z };
      },

      toggleMenu: function() {
        if(this.gwState !== 'OFF') { this.gwState = 'OFF'; this.gwUI.setAttribute('visible', false); }
        let isVisible = this.menuUI.getAttribute('visible') === 'true' || this.menuUI.getAttribute('visible') === true;
        this.menuUI.setAttribute('visible', !isVisible);
      },

      toggleGuyWireMode: function() {
        if (!this.pointA.top && !this.pointB.top) return;
        if (this.state.startsWith('AWAITING') || this.state.startsWith('PLACE_HEIGHT') || this.state.startsWith('SET_CALIB')) return;
        
        if (this.gwState === 'OFF') {
          this.gwState = 'MAIN'; this.menuUI.setAttribute('visible', false); this.gwUI.setAttribute('visible', true);
          this.activeAnchor = null; this.updateGWUI(); this.drawGuyWires();
        } else {
          this.gwState = 'OFF'; this.gwUI.setAttribute('visible', false);
          this.activeAnchor = null; this.drawGuyWires();
        }
      },

      updateGWUI: function() {
        let isMain = (this.gwState === 'MAIN'); let isEdit = (this.gwState === 'EDIT');
        document.querySelector('#gw-page-main').setAttribute('visible', isMain); document.querySelector('#gw-page-edit').setAttribute('visible', isEdit);
        this.toggleButton('#btn-gw-new-a', isMain && this.pointA.top !== null); this.toggleButton('#btn-gw-new-b', isMain && this.pointB.top !== null); this.toggleButton('#btn-gw-done', isEdit);
        if (isMain) document.querySelector('#txt-gw-status').setAttribute('value', 'TOCCA UN COLLARE O CREANE UNO');
        if (isEdit) document.querySelector('#txt-gw-status').setAttribute('value', 'TOCCA PICCHETTO PER ELIMINARLO');
      },

      toggleButton: function(id, isVisible) { let btn = document.querySelector(id); if(btn) { btn.setAttribute('visible', isVisible); if(isVisible) btn.classList.add('clickable'); else btn.classList.remove('clickable'); } },

      initPersistentElements: function() {
        let createPointStructure = (color) => {
          let struct = {};
          struct.sphere = document.createElement('a-sphere'); struct.sphere.setAttribute('radius', '0.05'); struct.sphere.setAttribute('material', `color: ${color}; roughness: 0.3`); struct.sphere.setAttribute('visible', 'false'); this.worldContentEl.appendChild(struct.sphere);
          struct.pole = document.createElement('a-cylinder'); struct.pole.setAttribute('radius', '0.008'); struct.pole.setAttribute('material', 'color: #888888; opacity: 0.6; shader: flat'); struct.pole.setAttribute('visible', 'false'); this.worldContentEl.appendChild(struct.pole);
          struct.label = document.createElement('a-text'); struct.label.setAttribute('align', 'center'); struct.label.setAttribute('color', '#00FF00'); struct.label.setAttribute('look-at-camera', ''); struct.label.setAttribute('visible', 'false'); this.worldContentEl.appendChild(struct.label);
          return struct;
        };

        this.pointA = Object.assign(this.pointA, createPointStructure('#FF1744')); this.pointB = Object.assign(this.pointB, createPointStructure('#2979FF')); this.pointC = Object.assign(this.pointC, createPointStructure('#00E676'));
        this.antennaTube1 = document.createElement('a-cylinder'); this.antennaTube1.setAttribute('radius', '0.015'); this.antennaTube1.setAttribute('material', 'color: #FF5722; shader: flat'); this.antennaTube1.setAttribute('visible', 'false'); this.worldContentEl.appendChild(this.antennaTube1);
        this.antennaTube2 = document.createElement('a-cylinder'); this.antennaTube2.setAttribute('radius', '0.015'); this.antennaTube2.setAttribute('material', 'color: #FF5722; shader: flat'); this.antennaTube2.setAttribute('visible', 'false'); this.worldContentEl.appendChild(this.antennaTube2);
        this.labelSegA = document.createElement('a-text'); this.labelSegA.setAttribute('align', 'center'); this.labelSegA.setAttribute('color', 'yellow'); this.labelSegA.setAttribute('look-at-camera', ''); this.labelSegA.setAttribute('visible', 'false'); this.worldContentEl.appendChild(this.labelSegA);
        this.labelSegB = document.createElement('a-text'); this.labelSegB.setAttribute('align', 'center'); this.labelSegB.setAttribute('color', 'yellow'); this.labelSegB.setAttribute('look-at-camera', ''); this.labelSegB.setAttribute('visible', 'false'); this.worldContentEl.appendChild(this.labelSegB);
        for(let i=0; i<this.maxRadials; i++) { let radCyl = document.createElement('a-cylinder'); radCyl.setAttribute('radius', '0.005'); radCyl.setAttribute('material', 'color: #5D4037; shader: flat'); radCyl.setAttribute('visible', 'false'); this.worldContentEl.appendChild(radCyl); this.radialPool.push(radCyl); }

        let makeLocalDiamond = (color) => {
            let d = document.createElement('a-octahedron'); d.setAttribute('radius', '0.06'); d.setAttribute('material', `color: ${color}; shader: flat; wireframe: true; opacity: 0.5`); d.setAttribute('visible', 'false');
            let core = document.createElement('a-octahedron'); core.setAttribute('radius', '0.03'); core.setAttribute('material', `color: ${color}; shader: flat; opacity: 0.8`); d.appendChild(core);
            this.worldContentEl.appendChild(d); return d;
        };
        this.diamondRef1 = makeLocalDiamond('#00BFFF'); this.diamondRef2 = makeLocalDiamond('#FF00FF');

        this.reticle = document.createElement('a-entity');
        this.reticle.setAttribute('geometry', 'primitive: ring; radiusInner: 0.08; radiusOuter: 0.1; segmentsTheta: 6');
        this.reticle.setAttribute('material', 'color: #00FF00; shader: flat; transparent: true; opacity: 0.9');
        this.reticle.setAttribute('rotation', '-90 0 0');
        this.reticle.setAttribute('visible', 'false');
        this.el.sceneEl.appendChild(this.reticle); 
      },

      getCalculatedLength: function() { let b = parseInt(this.bands[this.bandIdx]); let t = this.antennaTypes[this.antIdx]; if (t === 'Dipolo' || t === 'Verticale') return b / 4; if (t === 'End Fed') return b * 0.45; return b; },
      resetAntennaLengths: function() { let b = this.getCalculatedLength(); this.endFed_AC_Len = b / 2; this.endFed_CB_Len = b / 2; this.longwireLen = b; },

      tick: function (time, frameDelta) {
        let isPlacingMode = this.state.startsWith('PLACE_GROUND') || this.state.startsWith('REPOSITION_GROUND') || this.state.startsWith('AWAITING_CALIB') || this.state.startsWith('SET_CALIB') || this.gwState === 'EDIT';
        let isHeightMode = this.state.includes('HEIGHT');
        let isMenuOpen = this.menuUI.getAttribute('visible') === true || this.menuUI.getAttribute('visible') === 'true';
        let isGwOpen = this.gwUI.getAttribute('visible') === true || this.gwUI.getAttribute('visible') === 'true';

        // GESTIONE VISIBILITA' DEI BOTTONI IN BASSO
        let confirmBtn = document.querySelector('#btn-mobile-confirm');
        let heightControls = document.querySelector('#mobile-height-controls');
        let utilityBtns = document.querySelector('#mobile-utility-btns');
        
        if (confirmBtn) {
            if (isPlacingMode && !isMenuOpen && !isGwOpen) {
                confirmBtn.style.display = 'block'; utilityBtns.style.display = 'none';
                if (this.reticleValid) { confirmBtn.style.background = '#00E676'; confirmBtn.style.color = '#000'; confirmBtn.innerText = "CONFERMA PUNTO A TERRA"; confirmBtn.disabled = false; }
                else { confirmBtn.style.background = '#666'; confirmBtn.style.color = '#ccc'; confirmBtn.innerText = "CERCO PAVIMENTO..."; confirmBtn.disabled = true; }
            } else { 
                confirmBtn.style.display = 'none'; 
                if (!isHeightMode && !isMenuOpen && !isGwOpen) utilityBtns.style.display = 'flex'; 
                else utilityBtns.style.display = 'none';
            }
        }
        if (heightControls) { heightControls.style.display = (isHeightMode && !isMenuOpen && !isGwOpen) ? 'block' : 'none'; }

        let sceneEl = this.el.sceneEl; let frame = sceneEl.frame;
        let cameraPos = new THREE.Vector3(); let cameraDir = new THREE.Vector3();
        let cameraEl = document.querySelector('#camera');
        if (cameraEl && cameraEl.object3D) {
            cameraEl.object3D.getWorldPosition(cameraPos);
            cameraEl.object3D.getWorldDirection(cameraDir);
            cameraDir.negate();
        }
        
        if (isPlacingMode && frame && sceneEl.is('ar-mode')) {
            let session = sceneEl.renderer.xr.getSession(); let refSpace = sceneEl.renderer.xr.getReferenceSpace(); let hitFound = false;
            if (!this.hitTestSource && !this.requestingHitTest) {
                this.requestingHitTest = true;
                session.requestReferenceSpace('viewer').then((viewerSpace) => {
                    session.requestHitTestSource({ space: viewerSpace }).then((source) => { this.hitTestSource = source; this.requestingHitTest = false; }).catch(() => { this.requestingHitTest = false; });
                });
            }
            if (this.hitTestSource) {
                let hitTestResults = frame.getHitTestResults(this.hitTestSource);
                if (hitTestResults.length > 0) {
                    let pose = hitTestResults[0].getPose(refSpace);
                    if (pose) {
                        let hitPos = new THREE.Vector3(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
                        this.targetReticlePos.copy(hitPos); this.targetReticleQuat.copy(pose.transform.orientation); this.lastFloorY = hitPos.y; hitFound = true;
                    }
                }
            }
            
            if (!hitFound) {
                let t = (this.lastFloorY - cameraPos.y) / cameraDir.y;
                if (t > 0 && t < 100) {
                    this.targetReticlePos.copy(cameraPos).addScaledVector(cameraDir, t);
                } else {
                    this.targetReticlePos.copy(cameraPos); this.targetReticlePos.y = this.lastFloorY;
                    this.targetReticlePos.addScaledVector(new THREE.Vector3(cameraDir.x, 0, cameraDir.z).normalize(), 2.0);
                }
                this.targetReticleQuat.setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0)); hitFound = true;
            }

            if (hitFound) {
                this.reticle.object3D.position.lerp(this.targetReticlePos, 0.25); this.reticle.object3D.rotation.set(-Math.PI / 2, 0, 0); 
                this.reticle.setAttribute('visible', 'true'); this.reticleValid = true;
            } else { this.reticle.setAttribute('visible', 'false'); this.reticleValid = false; }
        } else { if(this.reticle) this.reticle.setAttribute('visible', 'false'); this.reticleValid = false; }

          else if (id === 'btn-gw-new-a') { let maxH = this.pointA.top.y - this.pointA.base.y; let newAnchor = { pole: 'A', height: maxH / 2, pegs: [] }; this.guyWiresData.push(newAnchor); this.activeAnchor = newAnchor; this.gwState = 'EDIT'; this.updateGWUI(); this.drawGuyWires(); this.saveToStorage(); }
          else if (id === 'btn-gw-new-b') { let maxH = this.pointB.top.y - this.pointB.base.y; let newAnchor = { pole: 'B', height: maxH / 2, pegs: [] }; this.guyWiresData.push(newAnchor); this.activeAnchor = newAnchor; this.gwState = 'EDIT'; this.updateGWUI(); this.drawGuyWires(); this.saveToStorage(); }
          else if (id === 'btn-gw-done') { this.activeAnchor = null; this.gwState = 'MAIN'; this.updateGWUI(); this.drawGuyWires(); }
          else if (id === 'btn-cal-set-pts') { if (!this.pointA.base) return; this.state = 'SET_CALIB_PT1'; this.menuUI.setAttribute('visible', false); this.updateMenuText(); }
          else if (id === 'btn-cal-recover') { if (!this.calibLocal1 || !this.calibLocal2) return; this.state = 'AWAITING_CALIB_PT1'; this.menuUI.setAttribute('visible', false); this.updateMenuText(); }
          else if (id === 'btn-ar-save') {
              if (!this.pointA.base) return; if (!this.calibLocal1 || !this.calibLocal2) return;
              let type = this.antennaTypes[this.antIdx]; let band = this.bands[this.bandIdx]; let date = new Date(); let timeStr = date.getHours() + "-" + date.getMinutes();
              let autoName = type.toUpperCase() + "_" + band + "_" + timeStr; document.querySelector('#info-text').setAttribute('value', this.executeSave(autoName));
          }
          else if (id === 'btn-height-a') { if(!this.pointA.base) return; this.state = 'REPOSITION_HEIGHT_A'; this.currentHeight = this.pointA.top.y - this.pointA.base.y; this.setupVerticalPreviewMode(this.pointA.base); this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-height-b') { if(!this.pointB.base) return; this.state = 'REPOSITION_HEIGHT_B'; this.currentHeight = this.pointB.top.y - this.pointB.base.y; this.setupVerticalPreviewMode(this.pointB.base); this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-ant') { this.antIdx = (this.antIdx + 1) % this.antennaTypes.length; this.resetAntennaLengths(); this.refreshAll(); } 
          else if (id === 'btn-band') { this.bandIdx = (this.bandIdx + 1) % this.bands.length; this.resetAntennaLengths(); if (this.antennaTypes[this.antIdx] === 'Verticale' && this.pointA.top) { this.pointA.top.y = this.pointA.base.y + this.getCalculatedLength(); } this.refreshAll(); } 
          else if (id === 'btn-c-left') { this.pointC.percent = Math.max(0.02, mathRound(this.pointC.percent - 0.05)); this.refreshAll(); } 
          else if (id === 'btn-c-right') { this.pointC.percent = Math.min(0.98, mathRound(this.pointC.percent + 0.05)); this.refreshAll(); } 
          else if (id === 'btn-lw-vertex') { this.longwireVertex = this.longwireVertex === 'A' ? 'B' : 'A'; this.refreshAll(); } 
          else if (id === 'btn-mmana-model') { this.mmanaModelIdx = (this.mmanaModelIdx + 1) % this.mmanaModels.length; this.loadPreloadedMmanaModel(); this.refreshAll(); } 
          else if (id === 'btn-txt-minus') { this.globalTextScale = Math.max(0.15, mathRound(this.globalTextScale - 0.05)); this.refreshAll(); } 
          else if (id === 'btn-txt-plus') { this.globalTextScale = Math.min(1.2, mathRound(this.globalTextScale + 0.05)); this.refreshAll(); } 
          else if (id === 'btn-ac-m1')   { this.endFed_AC_Len = Math.max(0.1, mathRound(this.endFed_AC_Len - 1.0)); this.refreshAll(); }
          else if (id === 'btn-ac-p1')   { this.endFed_AC_Len = mathRound(this.endFed_AC_Len + 1.0); this.refreshAll(); }
          else if (id === 'btn-cb-m1')   { this.endFed_CB_Len = Math.max(0.1, mathRound(this.endFed_CB_Len - 1.0)); this.refreshAll(); }
          else if (id === 'btn-cb-p1')   { this.endFed_CB_Len = mathRound(this.endFed_CB_Len + 1.0); this.refreshAll(); }
          else if (id === 'btn-lw-m1')   { this.longwireLen = Math.max(0.1, mathRound(this.longwireLen - 1.0)); this.refreshAll(); }
          else if (id === 'btn-lw-p1')   { this.longwireLen = mathRound(this.longwireLen + 1.0); this.refreshAll(); }
          else if (id === 'btn-rad-num-minus') { this.numRadials = Math.max(1, this.numRadials - 1); this.refreshAll(); }
          else if (id === 'btn-rad-num-plus')  { this.numRadials = Math.min(this.maxRadials, this.numRadials + 1); this.refreshAll(); }
          else if (id === 'btn-repo-a') { this.state = 'REPOSITION_GROUND_A'; this.menuUI.setAttribute('visible', false); } 
          else if (id === 'btn-repo-b') { this.state = 'REPOSITION_GROUND_B'; this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-global-reset') { this.triggerGlobalReset(); }
        });
      },

      setupMmanaFileLoader: function() { /* File upload setup */ },
      triggerGlobalReset: function() {
        this.pointA = { base: null, top: null, sphere: this.pointA.sphere, pole: this.pointA.pole, label: this.pointA.label }; this.pointB = { base: null, top: null, sphere: this.pointB.sphere, pole: this.pointB.pole, label: this.pointB.label }; this.pointC.top = null;
        this.hideStructure(this.pointA); this.hideStructure(this.pointB); this.hideStructure(this.pointC); this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false');
        if(this.antennaTube1) this.antennaTube1.setAttribute('visible', 'false'); if(this.antennaTube2) this.antennaTube2.setAttribute('visible', 'false');
        for(let i=0; i<this.maxRadials; i++) { if(this.radialPool[i]) this.radialPool[i].setAttribute('visible', 'false'); }
        this.mmanaContainerEl.innerHTML = ''; this.gwContainerEl.innerHTML = ''; 
        this.worldPivotEl.object3D.position.set(0,0,0); this.worldPivotEl.object3D.rotation.set(0,0,0); this.worldContentEl.object3D.position.set(0,0,0); this.worldContentEl.setAttribute('visible', 'true');
        this.guyWiresData = []; this.gwState = 'OFF'; if(this.gwUI) this.gwUI.setAttribute('visible', false);
        this.calibLocal1 = null; this.calibLocal2 = null; this.diamondRef1.setAttribute('visible', 'false'); this.diamondRef2.setAttribute('visible', 'false');
        this.menuUI.setAttribute('visible', false); this.state = 'PLACE_GROUND_A'; this.antennaRotationY = 0; localStorage.removeItem('antennaArProV21');
      },
      refreshAll: function() { this.updateMenuText(); this.updateGeometriesAndDrawings(); this.saveToStorage(); }
    });
  </script>
</head>
<body>
  
  <!-- DOM OVERLAY -->
  <div id="dom-overlay" style="pointer-events: none; position: absolute; width: 100%; height: 100%; z-index: 9999;">
    
    <div id="ui-2d-container">
      <h3>DATABASE ANTENNE</h3>
      <input type="text" id="save-name" placeholder="Es. Campo Scout">
      <button class="action" onclick="window.saveAntennaToDB()">SALVA ANTENNA NEL VISORE</button>
      <hr>
      <p>Carica un'antenna salvata:</p>
      <select id="load-list"></select>
      <button onclick="window.loadAntennaFromDB()">CARICA ANTENNA</button>
      <button style="background: #D32F2F; color:white;" onclick="window.deleteAntennaFromDB()">ELIMINA ANTENNA</button>
    </div>

    <!-- Controlli in basso in modalità AR -->
    <div id="ar-overlay-controls" style="display: none; position: absolute; bottom: 20px; width: 100%; text-align: center; flex-direction: column; align-items: center; gap: 15px; pointer-events: none;">
        
        <!-- Pannello Altezza -->
        <div id="mobile-height-controls" style="pointer-events: auto; display: none; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid #FFEB3B;">
            <div style="color: #FFEB3B; margin-bottom: 10px; font-weight: bold; font-family: monospace;">REGOLA ALTEZZA</div>
            <button id="btn-h-minus" style="padding: 10px 20px; font-size: 18px; margin-right: 10px; background: #FF1744; color: white; border:none; border-radius: 5px; font-weight: bold;">- 10 cm</button>
            <button id="btn-h-plus" style="padding: 10px 20px; font-size: 18px; margin-left: 10px; background: #00E676; color: black; border:none; border-radius: 5px; font-weight: bold;">+ 10 cm</button>
            <br><br>
            <button id="btn-h-confirm" style="padding: 10px 30px; font-size: 16px; background: #2979FF; color: white; border:none; border-radius: 50px; font-weight: bold;">CONFERMA ALTEZZA</button>
        </div>

        <!-- Tasto CONFERMA -->
        <button id="btn-mobile-confirm" style="pointer-events: auto; display: none; background: #FF1744; color: white; padding: 15px 30px; font-size: 18px; border-radius: 50px; border: 3px solid white; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            CERCO PAVIMENTO...
        </button>
        
        <!-- Tasti dei Menu -->
        <div id="mobile-utility-btns" style="display: flex; gap: 10px; pointer-events: auto;">
            <button id="btn-mobile-menu" class="mobile-btn">MENU IMPOSTAZIONI</button>
            <button id="btn-mobile-gw" class="mobile-btn">MENU TIRANTI</button>
        </div>
    </div>
  </div>

  <a-scene webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #dom-overlay" vr-mode-ui="enabled: true">
    
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable, .gw-collar, .gw-peg; far: 20"></a-entity>

    <a-entity id="cameraRig">
      <a-camera id="camera" position="0 1.6 0">
          
        <!-- MENU IMPOSTAZIONI (HUD) -->
        <a-entity id="menu-ui" visible="false" position="0 0.05 -0.55" scale="0.5 0.5 0.5">
          <a-plane width="0.5" height="0.85" color="#1A1A1A" material="opacity: 0.96; shader: flat"></a-plane>
          
          <a-text value="CONFIGURATORE ANTENNE PRO" position="0 0.40 0.01" align="center" scale="0.12 0.12 0.12" color="#FFEB3B"></a-text>
          
          <a-plane width="0.48" height="0.06" color="#2A2A2A" position="0 0.32 0.01">
            <a-text id="info-text" value="Info pannello" position="0 0 0.01" align="center" scale="0.055 0.055 0.055" color="#00E676"></a-text>
          </a-plane>

          <a-plane id="btn-ant" class="clickable" btn-interaction width="0.2" height="0.04" color="#37474F" position="-0.11 0.23 0.01">
            <a-text value="TIPO ANTENNA:" align="center" scale="0.065 0.065 0.065" position="0 0.008 0.005" color="#B0BEC5"></a-text>
            <a-text id="txt-ant-val" value="-" align="center" scale="0.09 0.09 0.09" position="0 -0.008 0.005" color="#FFFFFF"></a-text>
          </a-plane>

          <a-plane id="btn-band" class="clickable" btn-interaction width="0.2" height="0.04" color="#1A237E" position="0.11 0.23 0.01">
            <a-text value="BANDA RADIO:" align="center" scale="0.065 0.065 0.065" position="0 0.008 0.005" color="#9FA8DA"></a-text>
            <a-text id="txt-band-val" value="-" align="center" scale="0.1 0.1 0.1" position="0 -0.008 0.005" color="#FFFFFF"></a-text>
          </a-plane>

          <!-- Moduli dinamici in base all'antenna selezionata -->
          <a-entity id="sub-dipolo" position="0 0.15 0" visible="false">
            <a-plane id="btn-c-left" class="clickable" btn-interaction width="0.16" height="0.03" color="#004D40" position="-0.09 -0.015 0.01"><a-text value="<- Verso A" align="center" scale="0.065 0.065 0.065"></a-text></a-plane>
            <a-plane id="btn-c-right" class="clickable" btn-interaction width="0.16" height="0.03" color="#004D40" position="0.09 -0.015 0.01"><a-text value="Verso B ->" align="center" scale="0.065 0.065 0.065"></a-text></a-plane>
          </a-entity>

          <a-entity id="sub-endfed" position="0 0.15 0" visible="false">
            <a-plane id="btn-ac-m1" class="clickable" btn-interaction width="0.06" height="0.025" color="#B71C1C" position="-0.15 -0.01 0.01"><a-text value="AC -1m" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
            <a-plane id="btn-ac-p1" class="clickable" btn-interaction width="0.06" height="0.025" color="#1B5E20" position="-0.05 -0.01 0.01"><a-text value="AC +1m" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
            <a-plane id="btn-cb-m1" class="clickable" btn-interaction width="0.06" height="0.025" color="#B71C1C" position="0.05 -0.01 0.01"><a-text value="CB -1m" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
            <a-plane id="btn-cb-p1" class="clickable" btn-interaction width="0.06" height="0.025" color="#1B5E20" position="0.15 -0.01 0.01"><a-text value="CB +1m" align="center" scale="0.05 0.05 0.05"></a-text></a-plane>
            <a-text id="txt-ef-values" value="AC: 10m | CB: 10m" align="center" scale="0.08 0.08 0.08" color="#FFEB3B" position="0 -0.05 0"></a-text>
          </a-entity>

          <a-entity id="sub-longwire" position="0 0.15 0" visible="false">
            <a-plane id="btn-lw-vertex" class="clickable" btn-interaction width="0.14" height="0.025" color="#F57C00" position="-0.14 -0.01 0.01"><a-text id="txt-lw-vertex-val" value="VERTICE: A" align="center" scale="0.055 0.055 0.055"></a-text></a-plane>
            <a-plane id="btn-lw-m1" class="clickable" btn-interaction width="0.06" height="0.025" color="#B71C1C" position="0.05 -0.01 0.01"><a-text value="L -1m" align="center" scale="0.06 0.06 0.06"></a-text></a-plane>
            <a-plane id="btn-lw-p1" class="clickable" btn-interaction width="0.06" height="0.025" color="#1B5E20" position="0.15 -0.01 0.01"><a-text value="L +1m" align="center" scale="0.06 0.06 0.06"></a-text></a-plane>
            <a-text id="txt-lw-len-val" value="LUNGH: 20m" align="center" scale="0.08 0.08 0.08" color="#FFEB3B" position="0 -0.05 0"></a-text>
          </a-entity>

          <a-entity id="sub-verticale" position="0 0.15 0" visible="false">
            <a-plane id="btn-rad-num-minus" class="clickable" btn-interaction width="0.05" height="0.025" color="#B71C1C" position="-0.16 -0.01 0.01"><a-text value="N -" align="center" scale="0.065 0.065 0.065"></a-text></a-plane>
            <a-plane id="btn-rad-num-plus" class="clickable" btn-interaction width="0.05" height="0.025" color="#1B5E20" position="-0.10 -0.01 0.01"><a-text value="N +" align="center" scale="0.065 0.065 0.065"></a-text></a-plane>
            <a-text id="txt-rad-num-val" value="RADIALI: 4" align="center" scale="0.075 0.075 0.075" color="#FFEB3B" position="-0.13 -0.05 0"></a-text>
            <a-text id="txt-rad-len-val" value="LUNGH R: 5.0m" align="center" scale="0.075 0.075 0.075" color="#FFEB3B" position="0.12 -0.05 0"></a-text>
          </a-entity>

          <a-entity id="sub-mmana" position="0 0.15 0" visible="false">
            <a-plane id="btn-mmana-model" class="clickable" btn-interaction width="0.32" height="0.03" color="#006064" position="0 -0.01 0.01"><a-text id="txt-mmana-model-val" value="-" align="center" scale="0.065 0.065 0.065"></a-text></a-plane>
          </a-entity>

          <a-plane id="btn-txt-minus" class="clickable" btn-interaction width="0.1" height="0.022" color="#424242" position="-0.06 0.05 0.01"><a-text value="TESTO [-]" align="center" scale="0.065 0.065 0.065"></a-text></a-plane>
          <a-plane id="btn-txt-plus" class="clickable" btn-interaction width="0.1" height="0.022" color="#424242" position="0.06 0.05 0.01"><a-text value="TESTO [+]" align="center" scale="0.065 0.065 0.065"></a-text></a-plane>

          <a-text value="RIPOSIZIONAMENTO" position="0 0 0.01" align="center" scale="0.065 0.065 0.065" color="#FF1744"></a-text>
          <a-plane id="btn-repo-a" class="clickable" btn-interaction width="0.11" height="0.025" color="#C62828" position="-0.17 -0.04 0.01"><a-text value="SPOSTA A" align="center" scale="0.055 0.055 0.055"></a-text></a-plane>
          <a-plane id="btn-height-a" class="clickable" btn-interaction width="0.11" height="0.025" color="#C62828" position="-0.05 -0.04 0.01"><a-text value="ALTEZZA A" align="center" scale="0.055 0.055 0.055"></a-text></a-plane>
          <a-plane id="btn-repo-b" class="clickable" btn-interaction width="0.11" height="0.025" color="#1565C0" position="0.05 -0.04 0.01"><a-text value="SPOSTA B" align="center" scale="0.055 0.055 0.055"></a-text></a-plane>
          <a-plane id="btn-height-b" class="clickable" btn-interaction width="0.11" height="0.025" color="#1565C0" position="0.17 -0.04 0.01"><a-text value="ALTEZZA B" align="center" scale="0.055 0.055 0.055"></a-text></a-plane>

          <a-plane id="btn-global-reset" class="clickable" btn-interaction width="0.45" height="0.025" color="#D32F2F" position="0 -0.08 0.01">
            <a-text value="RESET COMPLETO (NUOVA ANTENNA)" align="center" scale="0.065 0.065 0.065"></a-text>
          </a-plane>

          <a-text value="CALIBRAZIONE TOPOGRAFICA" position="0 -0.12 0.01" align="center" scale="0.065 0.065 0.065" color="#00E676"></a-text>
          <a-plane id="btn-cal-set-pts" class="clickable" btn-interaction width="0.45" height="0.035" color="#004D40" position="0 -0.17 0.01"><a-text value="[1] IMPOSTA DIAMANTI" align="center" scale="0.06 0.06 0.06"></a-text></a-plane>
          <a-plane id="btn-cal-recover" class="clickable" btn-interaction width="0.45" height="0.035" color="#004D40" position="0 -0.22 0.01"><a-text value="[2] RICALIBRAZIONE (SE SLITTATA)" align="center" scale="0.06 0.06 0.06"></a-text></a-plane>
          <a-plane id="btn-ar-save" class="clickable" btn-interaction width="0.45" height="0.035" color="#FF8F00" position="0 -0.27 0.01"><a-text value="[+] SALVA ANTENNA NEL VISORE" align="center" scale="0.055 0.055 0.055"></a-text></a-plane>
          
          <!-- NUOVO PULSANTE ESCI MENU -->
          <a-plane id="btn-menu-esci" class="clickable" btn-interaction width="0.45" height="0.045" color="#B71C1C" position="0 -0.35 0.01">
            <a-text value="[ X ] CHIUDI MENU" align="center" scale="0.08 0.08 0.08"></a-text>
          </a-plane>
        </a-entity>

        <!-- MENU TIRANTI (HUD) -->
        <a-entity id="guy-wires-ui" visible="false" position="0 0.05 -0.55" scale="0.5 0.5 0.5">
          <a-plane width="0.48" height="0.40" color="#4E342E" material="opacity: 0.98; shader: flat"></a-plane>
          <a-text value="MODALITA' TIRANTI" position="0 0.16 0.01" align="center" scale="0.08 0.08 0.08" color="#FFEB3B"></a-text>
          <a-plane width="0.45" height="0.06" color="#3E2723" position="0 0.09 0.01"><a-text id="txt-gw-status" value="STATUS" position="0 0 0.01" align="center" scale="0.045 0.045 0.045" color="#00E676"></a-text></a-plane>

          <a-entity id="gw-page-main" visible="true">
              <a-plane id="btn-gw-new-a" class="clickable" btn-interaction width="0.38" height="0.035" color="#006064" position="0 0.03 0.01"><a-text value="[+] NUOVO COLLARE SU A" align="center" scale="0.065 0.065 0.065" color="#FFFFFF"></a-text></a-plane>
              <a-plane id="btn-gw-new-b" class="clickable" btn-interaction width="0.38" height="0.035" color="#006064" position="0 -0.02 0.01"><a-text value="[+] NUOVO COLLARE SU B" align="center" scale="0.065 0.065 0.065" color="#FFFFFF"></a-text></a-plane>
          </a-entity>

          <a-entity id="gw-page-edit" visible="false">
              <a-plane id="btn-gw-done" class="clickable" btn-interaction width="0.38" height="0.035" color="#1B5E20" position="0 -0.02 0.01"><a-text value="FINITO (INDIETRO)" align="center" scale="0.06 0.06 0.06" color="#FFFFFF"></a-text></a-plane>
          </a-entity>

          <!-- NUOVO PULSANTE ESCI MENU TIRANTI -->
          <a-plane id="btn-gw-esci" class="clickable" btn-interaction width="0.38" height="0.045" color="#B71C1C" position="0 -0.12 0.01">
            <a-text value="[ X ] CHIUDI MENU" align="center" scale="0.08 0.08 0.08"></a-text>
          </a-plane>
        </a-entity>

      </a-camera>
    </a-entity>

    <a-entity id="world-pivot" position="0 0 0" rotation="0 0 0">
        <a-entity id="world-content" position="0 0 0" rotation="0 0 0">
            <a-entity id="mmana-wires-container"></a-entity>
            <a-entity id="guy-wires-container"></a-entity>
            <a-entity id="vertical-cylinder" geometry="primitive: cylinder" material="color: #FFEB3B; shader: flat" visible="false"></a-entity>
            <a-text id="height-text" value="" align="center" color="#00FF00" scale="0.35 0.35 0.35" visible="false" look-at-camera></a-text>
        </a-entity>
    </a-entity>

    <a-entity ar-antenna-system></a-entity>
  </a-scene>
</body>
</html>
