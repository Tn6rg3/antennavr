<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Antenne AR Pro V38 - Three.js Nativo e Mobile</title>
  
  <style>
    /* CSS STRUTTURALE (Esattamente come il codice funzionante originale) */
    body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; color: white; touch-action: none; }
    
    #ui-container { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 100; pointer-events: none; box-sizing: border-box;
        display: none; /* Fondamentale: Parte nascosto per non rompere il tasto START AR! */
    }
    
    #touchArea { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; z-index: -1; }
    .pointer-auto { pointer-events: auto !important; }
    
    /* STILI PANNELLI E BOTTONI */
    .ui-btn { padding: 10px; border: 1px solid #777; border-radius: 6px; background: rgba(50,50,50,0.9); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; font-family: monospace; touch-action: manipulation; user-select: none; }
    .ui-btn:active { transform: scale(0.95); background: #00E676; color: black; }

    #btn-toggle-db { position: absolute; top: 15px; right: 15px; background: rgba(33, 150, 243, 0.9); border-color: #00BFFF; }
    
    #db-panel { display: none; position: absolute; top: 60px; right: 15px; background: rgba(20,20,20,0.95); padding: 10px; border: 2px solid #FFEB3B; border-radius: 8px; width: 230px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); pointer-events: auto;}
    #db-panel h3 { margin: 0 0 8px 0; font-size: 13px; color: #00E676; text-align: center; border-bottom: 1px solid #444; padding-bottom: 5px; }
    #db-panel input, #db-panel select { width: 90%; padding: 6px; background: #333; color: white; border: 1px solid #00E676; margin-bottom: 8px; border-radius: 4px; font-family: monospace;}
    
    #main-menu-panel { display: none; position: absolute; top: 15px; left: 15px; background: rgba(20,20,20,0.95); padding: 10px; border: 2px solid #00BFFF; border-radius: 8px; width: 280px; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.8); pointer-events: auto;}
    #main-menu-panel h3 { margin: 0 0 5px 0; font-size: 14px; color: #FFEB3B; text-align: center; }
    .menu-section { margin-bottom: 10px; padding: 5px; background: rgba(255,255,255,0.05); border-radius: 6px; }
    
    #gw-menu-panel { display: none; position: absolute; top: 15px; left: 15px; background: rgba(78,52,46,0.95); padding: 10px; border: 2px solid #FFEB3B; border-radius: 8px; width: 250px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); pointer-events: auto;}
    #gw-menu-panel h3 { margin: 0 0 5px 0; font-size: 14px; color: #FFEB3B; text-align: center; }

    /* CONTROLLI MOBILE IN BASSO */
    #mobile-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; width: 96%; max-width: 450px; pointer-events: auto;}
    .mob-btn { flex: 1 1 45%; padding: 12px; font-size: 13px; border: 2px solid #00E676; background: rgba(30,30,30,0.9); touch-action: none; }
    .btn-main-act { background: rgba(0, 150, 136, 0.9); border-color: #00BFFF; }
    .btn-gw-act { background: rgba(211, 47, 47, 0.9); border-color: #FF1744; }
    #info-text { flex: 1 1 100%; background: rgba(0,0,0,0.7); border: 2px dashed #FFEB3B; color: #FFEB3B; padding: 6px; font-size: 11px; text-align: center; border-radius: 6px; pointer-events: none;}

    #browserWarning { display: none; position: absolute; top: 0; left: 0; width: 100%; background: #ff4757; color: white; padding: 10px; text-align: center; font-size: 13px; z-index: 1000; }
  </style>

  <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
  </script>
</head>
<body>

  <div id="browserWarning">⚠️ Attenzione: Usa HTTPS su Google Chrome/Safari per far funzionare la fotocamera AR.</div>

  <!-- INTERFACCIA HTML OVERLAY DOM: Inizia nascosta per non bloccare il pulsante START AR -->
  <div id="ui-container">
      
      <!-- Area trasparente per catturare i tap a vuoto nella stanza -->
      <div id="touchArea"></div>

      <button id="btn-toggle-db" class="ui-btn pointer-auto">💾 MENU DB</button>

      <div id="db-panel">
          <h3>DATABASE SCENE</h3>
          <input type="text" id="save-name" placeholder="Es. Campo Scout">
          <button id="btn-save-db" class="ui-btn" style="width:100%; background:#FFEB3B; color:black; margin-bottom: 10px;">SALVA SCENA</button>
          <hr>
          <select id="load-list"></select>
          <button id="btn-load-db" class="ui-btn" style="width:100%; background:#00E676; color:black; margin-bottom: 5px;">CARICA SCENA</button>
          <button id="btn-delete-db" class="ui-btn" style="width:100%; background:#D32F2F;">ELIMINA SCENA</button>
          <hr>
          <h3 style="margin-top:5px; font-size:11px;">IMPORTA MMANA (.maa)</h3>
          <input type="file" id="file-mmana" accept=".maa" style="font-size:10px;">
      </div>

      <div id="main-menu-panel">
          <h3>CONFIGURATORE V38</h3>
          <div style="display: flex; gap: 5px; margin-bottom: 5px;">
              <button id="btn-scene-prev" class="ui-btn" style="flex:1;"><</button>
              <button id="btn-scene-new" class="ui-btn" style="flex:2; background:#00C853; color:black;">+ NUOVA</button>
              <button id="btn-scene-next" class="ui-btn" style="flex:1;">></button>
          </div>
          <button id="btn-delete-antenna" class="ui-btn" style="width:100%; background:#D32F2F; margin-bottom: 5px;">ELIMINA ANTENNA ATTIVA</button>
          <div id="txt-scene-info" style="text-align:center; font-size:11px; margin-bottom:10px; color:#aaa;">ANTENNA 1 DI 1</div>

          <button id="btn-laser-toggle" class="ui-btn" style="width:100%; background:#D81B60; margin-bottom:10px;">MIRA: LIDAR + TAP</button>

          <div class="menu-section">
              <div style="display:flex; gap:5px;">
                  <div style="flex:1;">
                      <label style="font-size:9px;">TIPO ANTENNA</label>
                      <button id="btn-ant-type" class="ui-btn" style="width:100%; padding:5px; background:#37474F; font-size:12px;">DIPOLO</button>
                  </div>
                  <div style="flex:1;">
                      <label style="font-size:9px;">BANDA RADIO</label>
                      <button id="btn-band" class="ui-btn" style="width:100%; padding:5px; background:#1A237E; font-size:12px;">40m</button>
                  </div>
              </div>
          </div>

          <div id="sub-dipolo" class="menu-section" style="display:none; text-align:center;">
              <label style="font-size:10px; color:#B0BEC5;">SPOSTA CENTRO (PUNTO C)</label>
              <div style="display:flex; gap:5px; margin-top:5px;">
                  <button id="btn-c-left" class="ui-btn" style="flex:1;"><- VERSO A</button>
                  <button id="btn-c-right" class="ui-btn" style="flex:1;">VERSO B -></button>
              </div>
          </div>

          <div id="sub-endfed" class="menu-section" style="display:none; text-align:center;">
              <label style="font-size:10px; color:#B0BEC5;">BRACCI INDIPENDENTI (+/- 1m)</label>
              <div style="display:flex; gap:2px; margin-top:5px; margin-bottom:5px;">
                  <button id="btn-ac-m1" class="ui-btn" style="flex:1; padding:5px;">- AC</button>
                  <button id="btn-ac-p1" class="ui-btn" style="flex:1; padding:5px;">+ AC</button>
                  <button id="btn-cb-m1" class="ui-btn" style="flex:1; padding:5px;">- CB</button>
                  <button id="btn-cb-p1" class="ui-btn" style="flex:1; padding:5px;">+ CB</button>
              </div>
              <div id="txt-ef-values" style="font-size:11px; color:#FFEB3B;">AC: 10m | CB: 10m</div>
          </div>

          <div id="sub-longwire" class="menu-section" style="display:none; text-align:center;">
              <button id="btn-lw-vertex" class="ui-btn" style="width:100%; background:#F57C00; margin-bottom:5px;">VERTICE: DA A</button>
              <div style="display:flex; gap:5px; margin-bottom:5px;">
                  <button id="btn-lw-m1" class="ui-btn" style="flex:1;">- 1m</button>
                  <button id="btn-lw-p1" class="ui-btn" style="flex:1;">+ 1m</button>
              </div>
              <div id="txt-lw-val" style="font-size:11px; color:#FFEB3B;">LUNGH: 20m</div>
          </div>

          <div id="sub-verticale" class="menu-section" style="display:none; text-align:center;">
              <label style="font-size:10px; color:#B0BEC5;">SISTEMA RADIALI</label>
              <div style="display:flex; gap:2px; margin-top:5px; margin-bottom:5px;">
                  <button id="btn-rad-num-m" class="ui-btn" style="flex:1; padding:5px;">N -</button>
                  <button id="btn-rad-num-p" class="ui-btn" style="flex:1; padding:5px;">N +</button>
                  <button id="btn-rad-len-m" class="ui-btn" style="flex:1; padding:5px;">L -</button>
                  <button id="btn-rad-len-p" class="ui-btn" style="flex:1; padding:5px;">L +</button>
              </div>
              <div id="txt-rad-val" style="font-size:11px; color:#FFEB3B;">RADIALI: 4 | L: 5m</div>
          </div>

          <div id="sub-mmana" class="menu-section" style="display:none;">
              <button id="btn-mmana-model" class="ui-btn" style="width:100%; background:#006064;">MODELLO: YAGI 3 EL</button>
          </div>

          <div id="sub-traliccio" class="menu-section" style="display:none;">
              <button id="btn-tral-shape" class="ui-btn" style="width:100%; background:#004D40;">FORMA: QUADRATA</button>
          </div>

          <div style="display:flex; gap:5px; margin-bottom:5px;">
              <button id="btn-txt-m" class="ui-btn" style="flex:1;">TESTO -</button>
              <button id="btn-txt-p" class="ui-btn" style="flex:1;">TESTO +</button>
          </div>

          <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;">
              <button id="btn-repo-a" class="ui-btn" style="flex:1 1 45%; background:#C62828;">SPOSTA A</button>
              <button id="btn-h-a" class="ui-btn" style="flex:1 1 45%; background:#C62828;">ALTEZZA A</button>
              <button id="btn-repo-b" class="ui-btn" style="flex:1 1 45%; background:#1565C0;">SPOSTA B</button>
              <button id="btn-h-b" class="ui-btn" style="flex:1 1 45%; background:#1565C0;">ALTEZZA B</button>
          </div>

          <button id="btn-start-tral" class="ui-btn" style="width:100%; background:#FF8F00; color:black; margin-bottom:10px;">[T] INIZIA CON TRALICCIO A</button>
          <button id="btn-cal-set" class="ui-btn" style="width:100%; background:#455A64; margin-bottom:5px;">[1] IMPOSTA DIAMANTI</button>
          <button id="btn-cal-rec" class="ui-btn" style="width:100%; background:#455A64; margin-bottom:10px;">[2] RECUPERA ALLINEAMENTO</button>
          <button id="btn-reset-all" class="ui-btn" style="width:100%; background:#B71C1C;">RESET COMPLETO SCENA</button>
      </div>

      <div id="gw-menu-panel">
          <h3>MODALITÀ TIRANTI</h3>
          <div id="txt-gw-status" style="font-size:11px; color:#00E676; text-align:center; margin-bottom:10px;">SELEZIONA O CREA</div>
          <div id="gw-main">
              <button id="btn-gw-new-tral" class="ui-btn" style="width:100%; background:#FF8F00; color:black; margin-bottom:5px;">+ TIRANTI TRALICCIO</button>
              <button id="btn-gw-new-a" class="ui-btn" style="width:100%; background:#00838F; margin-bottom:5px;">+ COLLARE PALO A</button>
              <button id="btn-gw-new-b" class="ui-btn" style="width:100%; background:#00838F; margin-bottom:5px;">+ COLLARE PALO B</button>
          </div>
          <div id="gw-edit" style="display:none;">
              <button id="btn-gw-done" class="ui-btn" style="width:100%; background:#2E7D32;">FINE / INDIETRO</button>
          </div>
      </div>

      <div id="mobile-controls">
          <button id="btn-mob-y" class="ui-btn mob-btn btn-main-act">MENU (Y)</button>
          <button id="btn-mob-x" class="ui-btn mob-btn btn-gw-act">TIRANTI (X)</button>
          <button id="btn-mob-rot-sx" class="ui-btn mob-btn">⟲ Ruota SX</button>
          <button id="btn-mob-rot-dx" class="ui-btn mob-btn">Ruota DX ⟳</button>
          <button id="btn-mob-up" class="ui-btn mob-btn">▲ Alza / Ing</button>
          <button id="btn-mob-down" class="ui-btn mob-btn">▼ Abb / Rid</button>
          <div id="info-text">[ TOCCA UNO STRUMENTO O PIAZZA ANTENNA ]</div>
      </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { ARButton } from 'three/addons/webxr/ARButton.js';

    let container, camera, scene, renderer, controller;
    let hitTestSource = null, hitTestSourceRequested = false;
    let reticle, reticleValid = false;
    let lastFloorY = 0;

    let worldPivot = new THREE.Group();
    let worldContent = new THREE.Group();
    let appMeshes = []; 
    let clickableObjects = []; 

    let verticalCylinder, heightTextSprite;
    let beam1, beam2, triangMarker, triangTextSprite;
    let diamondRef1, diamondRef2;

    const antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale', 'MMANA-GAL'];
    const bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
    const mmanaModels = ['Yagi 3 Elementi', 'Delta Loop', 'Dipolo MMANA', 'Modello Importato'];
    
    let antennas = [ createEmptyAntenna() ];
    let activeAntIdx = 0;
    let current = antennas[0];
    
    let pointerMode = /Mobi|Android/i.test(navigator.userAgent) ? 'LIDAR' : 'TOUCH';
    let triangState = 0;
    let triangRay1 = null, triangRay2 = null, triangResult = null;
    
    let globalTextScale = 0.35;
    let currentHeight = 1.0;
    let gwState = 'OFF';
    let activeAnchor = null;
    let calibPt1 = null, calibPt2 = null, calibLocal1 = null, calibLocal2 = null;
    let actionInterval = null;
    let importedMmanaWires = [];
    let lastTriggerTime = 0, lastTapTime = 0;
    let justClicked3DObject = false;

    init();
    animate();

    function init() {
        container = document.createElement('div');
        document.body.appendChild(container);

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 2000);
        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3));

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        container.appendChild(renderer.domElement);

        // IL SEGRETO E' QUI: Ricreato identico al tuo codice funzionante per non rompere la cam AR
        document.body.appendChild(ARButton.createButton(renderer, { 
            requiredFeatures: ['hit-test', 'dom-overlay'],
            optionalFeatures: ['anchors'],
            domOverlay: { root: document.getElementById('ui-container') }
        }));

        // GESTIONE TAP AR NATIVA: Usiamo l'evento standard 'select'
        controller = renderer.xr.getController(0);
        controller.addEventListener('select', onTriggerDown);
        scene.add(controller);

        worldPivot.add(worldContent);
        scene.add(worldPivot);

        initPersistentElements();
        setupMobileUI();
        setupMmanaFileLoader();
        refreshDBList();
        loadFromStorage();
        updateMenuText();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // QUANDO PARTE L'AR, MOSTRA L'UI! E fixa i piani di ritaglio (Bug Fix da te indicato)
        renderer.xr.addEventListener('sessionstart', () => {
            document.getElementById('ui-container').style.display = 'block';
            let session = renderer.xr.getSession();
            if (session) {
                try { session.updateRenderState({ depthNear: 0.1, depthFar: 2500 }); } catch (e) {}
            }
        });
        
        renderer.xr.addEventListener('sessionend', () => { 
            hitTestSource = null; hitTestSourceRequested = false; 
            document.getElementById('ui-container').style.display = 'none';
        });

        // EVITA CONFLITTI: Impedisce ad ARButton di sparare 'select' se l'utente clicca un bottone HTML!
        document.getElementById('ui-container').addEventListener('beforexrselect', (ev) => {
            if (ev.target.id !== 'touchArea') ev.preventDefault();
        });

        // GESTIONE DEL CLICK SU OGGETTI 3D
        document.getElementById('touchArea').addEventListener('pointerdown', (e) => {
            let mouse = new THREE.Vector2();
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            let raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            let intersects = raycaster.intersectObjects(clickableObjects, false);
            
            if (intersects.length > 0) {
                justClicked3DObject = true; // Impedisce a onTriggerDown di piazzare un'antenna nel vuoto
                handle3DClick(intersects[0].object);
                setTimeout(() => justClicked3DObject = false, 300);
            } else {
                // Fallback per Desktop/Non-AR
                if (!renderer.xr.isPresenting) {
                    let now = Date.now();
                    if (now - lastTapTime > 300) {
                        lastTapTime = now;
                        onTriggerDown();
                    }
                }
            }
        });
    }

    function createEmptyAntenna() {
        return {
            state: 'PLACE_GROUND_A', pointA: { base: null, top: null }, pointB: { base: null, top: null }, pointC: { percent: 0.5, top: null, base: null }, 
            traliccio: { active: false, center: null, shape: 'square', radius: 0.3, rotationY: 0, height: 1.0, corners: [], pegs: [] }, 
            antIdx: 3, bandIdx: 2, endFed_AC_Len: 10.0, endFed_CB_Len: 10.0, longwireLen: 20.0, longwireVertex: 'A', numRadials: 4, radialLen: 5.0, mmanaModelIdx: 0, antennaRotationY: 0, mmanaWires: [], guyWiresData: []
        };
    }

    function initPersistentElements() {
        reticle = new THREE.Mesh(new THREE.RingGeometry(0.05, 0.08, 32).rotateX(-Math.PI/2), new THREE.MeshBasicMaterial({color: 0x00FF00}));
        reticle.visible = false; scene.add(reticle);

        beam1 = new THREE.Mesh(new THREE.CylinderGeometry(0.003, 0.003, 1), new THREE.MeshBasicMaterial({color: 0x00BFFF, transparent: true, opacity: 0.6}));
        beam1.geometry.translate(0, 0.5, 0); beam1.visible = false; scene.add(beam1);
        beam2 = new THREE.Mesh(new THREE.CylinderGeometry(0.003, 0.003, 1), new THREE.MeshBasicMaterial({color: 0xFF1744, transparent: true, opacity: 0.6}));
        beam2.geometry.translate(0, 0.5, 0); beam2.visible = false; scene.add(beam2);

        triangMarker = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color: 0x00E676, transparent: true, opacity: 0.8}));
        triangMarker.visible = false; scene.add(triangMarker);
        
        triangTextSprite = makeTextSprite("INTERSEZIONE", "#FFFFFF", 0.6);
        triangTextSprite.position.set(0, 0.3, 0); triangMarker.add(triangTextSprite);

        verticalCylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 1), new THREE.MeshBasicMaterial({color: 0xFFEB3B}));
        verticalCylinder.visible = false; scene.add(verticalCylinder);
        heightTextSprite = makeTextSprite("1.0m", "#00FF00", 0.35);
        heightTextSprite.visible = false; scene.add(heightTextSprite);

        let makeLocalDiamond = (color) => {
            let m = new THREE.Mesh(new THREE.OctahedronGeometry(0.06), new THREE.MeshBasicMaterial({color: color, wireframe: true, transparent: true, opacity: 0.5}));
            m.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.03), new THREE.MeshBasicMaterial({color: color, opacity: 0.8})));
            m.visible = false; worldContent.add(m); return m; 
        };
        diamondRef1 = makeLocalDiamond(0x00BFFF); diamondRef2 = makeLocalDiamond(0xFF00FF);
    }

    function makeTextSprite(message, textColor, scaleMult=1) {
        let canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 256;
        let ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,512,256);
        ctx.fillStyle = textColor; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        let lines = message.split('\n'); let lineH = 40; let startY = 128 - ((lines.length - 1) * lineH) / 2;
        for(let i=0; i<lines.length; i++) ctx.fillText(lines[i], 256, startY + i * lineH);
        let tex = new THREE.CanvasTexture(canvas);
        let mat = new THREE.SpriteMaterial({map: tex, depthTest: false});
        let sprite = new THREE.Sprite(mat);
        sprite.scale.set(0.6 * scaleMult, 0.3 * scaleMult, 1);
        return sprite;
    }

    function setupMobileUI() {
        const attachClick = (id, cb) => { let b = document.getElementById(id); if(b) b.addEventListener('click', (e)=>{e.preventDefault(); cb();}); };
        
        attachClick('btn-mob-y', toggleMenu);
        attachClick('btn-mob-x', toggleGuyWireMode);
        attachClick('btn-toggle-db', () => { let p = document.getElementById('db-panel'); p.style.display = p.style.display==='block'?'none':'block'; });
        
        const attachHold = (id, action) => {
            let b = document.getElementById(id); if(!b) return;
            b.addEventListener('pointerdown', (e) => { e.preventDefault(); startAction(action); });
            b.addEventListener('pointerup', (e) => { e.preventDefault(); stopAction(); });
            b.addEventListener('pointerleave', (e) => { e.preventDefault(); stopAction(); });
        };
        attachHold('btn-mob-rot-sx', 'rot-sx'); attachHold('btn-mob-rot-dx', 'rot-dx');
        attachHold('btn-mob-up', 'up'); attachHold('btn-mob-down', 'down');

        attachClick('btn-scene-prev', () => { if(antennas.length > 1) switchAntenna((activeAntIdx - 1 + antennas.length) % antennas.length); });
        attachClick('btn-scene-next', () => { if(antennas.length > 1) switchAntenna((activeAntIdx + 1) % antennas.length); });
        attachClick('btn-scene-new', () => { antennas.push(createEmptyAntenna()); activeAntIdx = antennas.length - 1; current = antennas[activeAntIdx]; refreshAll(); });
        attachClick('btn-delete-antenna', () => { if(antennas.length > 1){ antennas.splice(activeAntIdx,1); activeAntIdx = Math.max(0, activeAntIdx-1); current = antennas[activeAntIdx]; } else { antennas=[createEmptyAntenna()]; activeAntIdx=0; current=antennas[0]; } refreshAll(); });

        attachClick('btn-laser-toggle', () => {
            let b = document.getElementById('btn-laser-toggle');
            if(pointerMode === 'TOUCH'){ pointerMode = 'LIDAR'; b.innerText="MIRA: LIDAR + TAP"; b.style.background="#D81B60"; }
            else if(pointerMode === 'LIDAR'){ pointerMode = 'TRIANG'; hitTestSource = null; b.innerText="MIRA: TRIANGOLAZIONE"; b.style.background="#FF1744"; }

    function startAction(action) {
        clearInterval(actionInterval);
        let step = () => {
            let valL = (action === 'rot-sx') ? -2.0 : (action === 'rot-dx' ? 2.0 : 0);
            let valR = (action === 'up') ? -1.0 : (action === 'down' ? 1.0 : 0);
            if (valL !== 0) { if (current.state === 'SIZE_ROTATE_TRALICCIO') current.traliccio.rotationY += valL; else current.antennaRotationY += valL; }
            if (valR !== 0) {
                if (current.state === 'SIZE_ROTATE_TRALICCIO') current.traliccio.radius = Math.max(0.15, current.traliccio.radius + (valR < 0 ? 0.05 : -0.05));
                else if (current.state === 'PLACE_HEIGHT_TRALICCIO') current.traliccio.height = Math.max(1.0, current.traliccio.height + (valR < 0 ? 0.2 : -0.2));
                else if (current.state.includes('HEIGHT') && current.state !== 'PLACE_HEIGHT_TRALICCIO') { currentHeight = Math.max(0.0, currentHeight + (valR < 0 ? 0.1 : -0.1)); updateHeightPreview(); }
                else if (gwState === 'EDIT_COLLAR' && activeAnchor) { let maxH = activeAnchor.type === 'traliccio' ? current.traliccio.height : (activeAnchor.pole === 'A' ? (current.pointA.top.y - current.pointA.base.y) : (current.pointB.top.y - current.pointB.base.y)); activeAnchor.height = Math.max(0.1, Math.min(maxH, activeAnchor.height + (valR < 0 ? 0.1 : -0.1))); }
            }
            refreshAll();
        };
        step(); actionInterval = setInterval(step, 150);
    }
    function stopAction() { clearInterval(actionInterval); saveToStorage(); }

    function switchAntenna(idx) {
        gwState = 'OFF'; activeAnchor = null; activeAntIdx = idx; current = antennas[idx]; triangState = 0;
        if (current.pointA.top && (current.state.startsWith('PLACE_') || current.state.startsWith('AWAITING_'))) current.state = 'IDLE';
        document.getElementById('main-menu-panel').style.display='block'; refreshAll();

    function saveToStorage() {
        let d = { antennas: JSON.parse(JSON.stringify(antennas)), activeAntIdx, globalTextScale, pivotPos: worldPivot.position, pivotRot: worldPivot.rotation, contentPos: worldContent.position };
        localStorage.setItem('antennaArProV38_DB', JSON.stringify(d));

    function loadFromStorage() {
        let saved = localStorage.getItem('antennaArProV38_DB');
        if (saved) {
            try {
                let d = JSON.parse(saved);
                if(d.antennas && d.antennas.length>0) { antennas=d.antennas; activeAntIdx=d.activeAntIdx||0; current=antennas[activeAntIdx]; }
                if(d.globalTextScale) globalTextScale = d.globalTextScale;
                if(d.pivotPos) worldPivot.position.copy(d.pivotPos); if(d.pivotRot) worldPivot.rotation.copy(d.pivotRot); if(d.contentPos) worldContent.position.copy(d.contentPos);
                if(current.state.startsWith('PLACE_HEIGHT') || current.state.startsWith('REPOSITION_HEIGHT') || current.state.startsWith('SET_CALIB') || current.state.startsWith('AWAITING_CALIB') || current.state.startsWith('SIZE_ROTATE')) current.state='IDLE';
            } catch(e) {}
        }
        gwState = 'OFF'; activeAnchor = null; document.getElementById('gw-menu-panel').style.display='none'; refreshAll();
    }

    function setupMmanaFileLoader() {
        document.getElementById('file-mmana').addEventListener('change', (evt) => {
            let f = evt.target.files[0]; if(!f) return; let reader = new FileReader();
            reader.onload = (e) => {
                let lines = e.target.result.split('\n'); importedMmanaWires = []; let inWires = false;
                for(let line of lines) {
                    let u = line.trim().toUpperCase();
                    if(inWires && u.startsWith('***')) inWires = false;
                    if(u.includes('***') && u.includes('WIRES')) { inWires = true; continue; }
                    if(inWires && line.trim() !== "") { let tk = line.trim().split(/[\s,]+/).filter(t=>t!==''); if(tk.length>=7) importedMmanaWires.push({x1:parseFloat(tk[0]), y1:parseFloat(tk[1]), z1:parseFloat(tk[2]), x2:parseFloat(tk[3]), y2:parseFloat(tk[4]), z2:parseFloat(tk[5]), radius: parseFloat(tk[6])>0?parseFloat(tk[6])/1000:0.002}); }
                }
                if(importedMmanaWires.length>0) { current.mmanaWires = importedMmanaWires; current.mmanaModelIdx = mmanaModels.indexOf('Modello Importato'); current.antIdx = antennaTypes.indexOf('MMANA-GAL'); refreshAll(); alert(`Importati ${importedMmanaWires.length} fili!`); }
            }; reader.readAsText(f);
        });
    }

    function loadPreloadedMmanaModel(ant) {
        let m = mmanaModels[ant.mmanaModelIdx];
        if (m === 'Yagi 3 Elementi') ant.mmanaWires = [{x1:0,y1:-2.5,z1:0,x2:0,y2:2.5,z2:0,radius:0.004}, {x1:1.5,y1:-2.4,z1:0,x2:1.5,y2:2.4,z2:0,radius:0.004}, {x1:3.2,y1:-2.2,z1:0,x2:3.2,y2:2.2,z2:0,radius:0.004}];
        else if (m === 'Delta Loop') ant.mmanaWires = [{x1:0,y1:-2.0,z1:0,x2:0,y2:2.0,z2:0,radius:0.002}, {x1:0,y1:-2.0,z1:0,x2:0,y2:0,z2:3.5,radius:0.002}, {x1:0,y1:2.0,z1:0,x2:0,y2:0,z2:3.5,radius:0.002}];
        else if (m === 'Dipolo MMANA') ant.mmanaWires = [{x1:0,y1:-5.0,z1:0,x2:0,y2:5.0,z2:0,radius:0.002}];
        else if (m === 'Modello Importato') ant.mmanaWires = importedMmanaWires || [];
    }
    
    function resetAntennaLengths() {
        let bm = parseInt(bands[current.bandIdx]); let t = antennaTypes[current.antIdx];
        let bl = (t==='Dipolo'||t==='Verticale') ? bm/4 : (t==='End Fed' ? bm*0.45 : bm);
        current.endFed_AC_Len = bl/2; current.endFed_CB_Len = bl/2; current.longwireLen = bl;
    }

    function getLocalPoint(v) { return worldContent.worldToLocal(v.clone()); }

    function getHitPoint() {
        if (pointerMode === 'TRIANG' && triangState === 2 && triangResult) return triangResult.point.clone();
        if (reticleValid && reticle.visible) return reticle.position.clone();
        let camPos = new THREE.Vector3(); let camQuat = new THREE.Quaternion(); camera.getWorldPosition(camPos); camera.getWorldQuaternion(camQuat);
        let camDir = new THREE.Vector3(0,0,-1).applyQuaternion(camQuat);
        if (camDir.y < -0.01) { let d = (lastFloorY - camPos.y) / camDir.y; if(d>0 && d<100) return camPos.clone().add(camDir.multiplyScalar(d)); }
        return null;
    }

    function setupHeightMode(basePos) { verticalCylinder.visible = true; heightTextSprite.visible = true; updateHeightPreview(); }
    function resetHeightMode() { verticalCylinder.visible = false; heightTextSprite.visible = false; }
    function updateHeightPreview() {
        let b = current.state.includes('_A') ? current.pointA.base : current.pointB.base; if(!b) return;
        verticalCylinder.position.set(b.x, b.y + currentHeight/2, b.z); verticalCylinder.scale.set(1, currentHeight, 1);
        heightTextSprite.position.set(b.x, b.y + currentHeight + 0.2, b.z);
        heightTextSprite.scale.setScalar(globalTextScale); heightTextSprite.material.map.image.getContext('2d').clearRect(0,0,512,256);
        let t = makeTextSprite(currentHeight.toFixed(1)+"m", "#00FF00", globalTextScale); heightTextSprite.material.map = t.material.map; heightTextSprite.material.needsUpdate=true;
    }

    function handle3DClick(object) {
        let d = object.userData; if(!d || !d.type) return;
        if(d.type === 'selector') switchAntenna(d.antIdx);
        else if(d.type === 'pointC') { current.state = 'REPOSITION_GROUND_C'; document.getElementById('main-menu-panel').style.display='none'; refreshAll(); }
        else if(d.type === 'collar') {
            if(gwState === 'EDIT_TRALICCIO_PEGS' || gwState === 'EDIT_PEGS') {
                if (current.guyWiresData[d.index] === activeAnchor) { current.guyWiresData.splice(d.index,1); activeAnchor=null; gwState='MAIN'; updateGWUI(); refreshAll(); }
            } else if (gwState === 'MAIN') { activeAnchor = current.guyWiresData[d.index]; gwState = 'EDIT_COLLAR'; updateGWUI(); refreshAll(); }
        }
        else if(d.type === 'peg') {
            if(gwState === 'EDIT_TRALICCIO_PEGS') { current.traliccio.pegs.splice(d.index,1); updateGWUI(); refreshAll(); }
            else if(gwState === 'EDIT_PEGS' && activeAnchor) { activeAnchor.pegs.splice(d.index,1); refreshAll(); }
        }
    }

    function onTriggerDown() {
        if (justClicked3DObject) return; // Ha appena cliccato un oggetto, non piazzare punti nel vuoto
        
        let now = Date.now(); if(now - lastTriggerTime < 300) return; lastTriggerTime = now;

        let isP = current.state.startsWith('PLACE_GROUND') || current.state.startsWith('REPOSITION_GROUND') || current.state.startsWith('AWAITING_CALIB') || current.state.startsWith('SET_CALIB') || current.state.startsWith('PLACE_TRALICCIO_CENTER') || (gwState && gwState.includes('PEGS'));
        if(!isP) triangState = 0;

        if (isP && pointerMode === 'TRIANG') {
            let cp = new THREE.Vector3(); let cd = new THREE.Vector3(0,0,-1); camera.getWorldPosition(cp); cd.applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));
            if(triangState === 0) { triangRay1 = {origin:cp, dir:cd}; triangState = 1; refreshAll(); return; }
            if(triangState === 1) { if(triangResult) { triangRay2 = {origin:cp, dir:cd}; triangState = 2; refreshAll(); } return; }
        }

        if (current.state === 'REPOSITION_GROUND_C') { let h=getHitPoint(); if(h){ if(!current.pointC.base) current.pointC.base={}; current.pointC.base.y=getLocalPoint(h).y; current.state='IDLE'; document.getElementById('main-menu-panel').style.display='block'; refreshAll(); } triangState=0; return; }
        if (current.state === 'PLACE_TRALICCIO_CENTER') { let h=getHitPoint(); if(h){ current.traliccio.center=getLocalPoint(h); current.state='SIZE_ROTATE_TRALICCIO'; document.getElementById('main-menu-panel').style.display='block'; refreshAll(); } triangState=0; return; }
        if (current.state === 'SIZE_ROTATE_TRALICCIO') { current.state='PLACE_HEIGHT_TRALICCIO'; document.getElementById('main-menu-panel').style.display='none'; refreshAll(); return; }
        if (current.state === 'PLACE_HEIGHT_TRALICCIO') { current.pointA.base={x:current.traliccio.center.x, y:current.traliccio.center.y+current.traliccio.height, z:current.traliccio.center.z}; currentHeight=1.0; current.state='PLACE_HEIGHT_A'; setupHeightMode(current.pointA.base); refreshAll(); return; }

        if (gwState === 'EDIT_TRALICCIO_PEGS') { let r=current.traliccio.shape==='square'?4:3; if(!current.traliccio.pegs) current.traliccio.pegs=[]; if(current.traliccio.pegs.length < r) { let h=getHitPoint(); if(h){ current.traliccio.pegs.push(getLocalPoint(h)); if(current.traliccio.pegs.length>=r){ gwState='MAIN'; activeAnchor=null; } updateGWUI(); refreshAll(); } } triangState=0; return; }
        if (gwState === 'EDIT_PEGS') { let h=getHitPoint(); if(h){ if(!activeAnchor.pegs) activeAnchor.pegs=[]; activeAnchor.pegs.push(getLocalPoint(h)); refreshAll(); } triangState=0; return; }
        if (gwState === 'EDIT_COLLAR') { if(activeAnchor && activeAnchor.type==='traliccio'){ if(!current.traliccio.pegs) current.traliccio.pegs=[]; gwState='EDIT_TRALICCIO_PEGS'; } else gwState='EDIT_PEGS'; updateGWUI(); refreshAll(); return; }
        
        if (current.state === 'AWAITING_CALIB_PT1') { let h=getHitPoint(); if(h){ calibPt1=h.clone(); worldPivot.position.copy(calibPt1); current.state='AWAITING_CALIB_PT2'; updateMenuText(); } triangState=0; return; }
        if (current.state === 'AWAITING_CALIB_PT2') { let h=getHitPoint(); if(h){ calibPt2=h.clone(); diamondRef1.visible=false; diamondRef2.visible=false; current.state='IDLE'; refreshAll(); } triangState=0; return; }
        if (current.state === 'SET_CALIB_PT1') { let h=getHitPoint(); if(h){ calibLocal1=getLocalPoint(h); diamondRef1.position.copy(calibLocal1); diamondRef1.visible=true; current.state='SET_CALIB_PT2'; updateMenuText(); } triangState=0; return; }
        if (current.state === 'SET_CALIB_PT2') { let h=getHitPoint(); if(h){ calibLocal2=getLocalPoint(h); diamondRef2.position.copy(calibLocal2); diamondRef2.visible=true; setTimeout(()=> {diamondRef1.visible=false; diamondRef2.visible=false;},1000); current.state='IDLE'; updateMenuText(); } triangState=0; return; }

        let t = antennaTypes[current.antIdx];
        if (current.state === 'PLACE_GROUND_A' || current.state === 'REPOSITION_GROUND_A') {
            let h=getHitPoint(); if(!h) return; let n=getLocalPoint(h);
            if(current.state==='REPOSITION_GROUND_A' && current.traliccio.active) { let o=current.traliccio.center; let off={x:n.x-o.x, y:n.y-o.y, z:n.z-o.z}; current.traliccio.center=n; current.pointA.base={x:n.x,y:n.y+current.traliccio.height,z:n.z}; if(current.traliccio.pegs) current.traliccio.pegs.forEach(p=>{p.x+=off.x; p.y+=off.y; p.z+=off.z;}); } else current.pointA.base=n;
            current.state = current.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_A' : 'PLACE_HEIGHT_A'; currentHeight = t==='Verticale'?parseInt(bands[current.bandIdx])/4:1.0; setupHeightMode(current.pointA.base);
        } else if (current.state === 'PLACE_HEIGHT_A' || current.state === 'REPOSITION_HEIGHT_A') {
            current.pointA.top = {x:current.pointA.base.x, y:current.pointA.base.y+currentHeight, z:current.pointA.base.z}; resetHeightMode();
            if(current.state==='REPOSITION_HEIGHT_A'||t==='Verticale'||t==='MMANA-GAL') { current.state='IDLE'; document.getElementById('main-menu-panel').style.display='block'; refreshAll(); } else current.state='PLACE_GROUND_B';
        } else if (current.state === 'PLACE_GROUND_B' || current.state === 'REPOSITION_GROUND_B') {
            let h=getHitPoint(); if(!h) return; current.pointB.base=getLocalPoint(h); current.state = current.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_B' : 'PLACE_HEIGHT_B'; currentHeight=1.0; setupHeightMode(current.pointB.base);
        } else if (current.state === 'PLACE_HEIGHT_B' || current.state === 'REPOSITION_HEIGHT_B') {
            current.pointB.top = {x:current.pointB.base.x, y:current.pointB.base.y+currentHeight, z:current.pointB.base.z}; resetHeightMode(); current.state='IDLE'; document.getElementById('main-menu-panel').style.display='block'; refreshAll(); 
        }
        triangState=0;
    }

    function updateMenuText() {
        let t = antennaTypes[current.antIdx]; let b = bands[current.bandIdx];
        document.getElementById('btn-ant-type').innerText = t.toUpperCase();
        document.getElementById('btn-band').innerText = b;
        document.getElementById('txt-scene-info').innerText = `ANTENNA ${activeAntIdx+1} DI ${antennas.length}`;

        let isTS = current.state === 'SIZE_ROTATE_TRALICCIO';
        document.getElementById('sub-dipolo').style.display = (t==='Dipolo'&&!isTS)?'block':'none';
        document.getElementById('sub-endfed').style.display = (t==='End Fed'&&!isTS)?'block':'none';
        document.getElementById('sub-longwire').style.display = (t==='Longwire'&&!isTS)?'block':'none';
        document.getElementById('sub-verticale').style.display = (t==='Verticale'&&!isTS)?'block':'none';
        document.getElementById('sub-mmana').style.display = (t==='MMANA-GAL'&&!isTS)?'block':'none';
        document.getElementById('sub-traliccio').style.display = isTS?'block':'none';

        document.getElementById('btn-repo-b').style.display = (t!=='Verticale'&&t!=='MMANA-GAL'&&!isTS)?'inline-block':'none';
        document.getElementById('btn-h-b').style.display = (t!=='Verticale'&&t!=='MMANA-GAL'&&!isTS)?'inline-block':'none';

        let info = "";
        if (pointerMode === 'TRIANG' && current.state.includes('GROUND')) {
            if(triangState===0) info="TRIANG: MIRA BERSAGLIO E TAPPA SCHERMO"; else if(triangState===1) info="TRIANG: SPOSTATI, MIRA INCROCIO E TAPPA"; else info="PUNTO TROVATO: TAP PER PIAZZARE";
        }
        else if (current.state === 'REPOSITION_GROUND_C') info = "TAP A TERRA SOTTO AL CENTRO";
        else if (current.state === 'PLACE_TRALICCIO_CENTER') info = "TAP A TERRA PER CENTRO TRALICCIO";
        else if (isTS) { info = "USA BOTTONI PER MISURE. TAP = OK"; document.getElementById('btn-tral-shape').innerText = "FORMA: "+(current.traliccio.shape==='square'?'QUADRATA':'TRIANGOLARE'); }
        else if (current.state === 'PLACE_HEIGHT_TRALICCIO') info = "USA BOTTONI ALZA/ABB. TAP = OK";
        else if (current.state === 'AWAITING_CALIB_PT1') info = "CALIB: SOVRAPPONI DIAMANTE 1 AL REALE E TAPPA";
        else if (current.state === 'AWAITING_CALIB_PT2') info = "CALIB: RUOTA AMBIENTE SU DIAMANTE 2 E TAPPA";
        else if (current.state === 'SET_CALIB_PT1') info = "APPOGGIA DEVICE SU PUNTO 1 E TAPPA";
        else if (current.state === 'SET_CALIB_PT2') info = "APPOGGIA DEVICE SU PUNTO 2 E TAPPA";
        else if (t==='End Fed') { document.getElementById('txt-ef-values').innerText = `AC: ${current.endFed_AC_Len}m | CB: ${current.endFed_CB_Len}m`; }
        else if (t==='Longwire') { document.getElementById('btn-lw-vertex').innerText = "VERTICE DA: "+current.longwireVertex; document.getElementById('txt-lw-val').innerText = `L: ${current.longwireLen}m`; }
        else if (t==='Verticale') { document.getElementById('txt-rad-val').innerText = `RADIALI: ${current.numRadials} | L: ${current.radialLen}m`; }
        else if (t==='MMANA-GAL') { document.getElementById('btn-mmana-model').innerText = "MOD: "+mmanaModels[current.mmanaModelIdx].toUpperCase(); }
        
        if(!info) info = "[ TOCCA UNO STRUMENTO O PIAZZA ANTENNA ]";
        document.getElementById('info-text').innerText = info;
    }

    function createLine(p1, p2, radius, color, isWireframe=false) {
        let dist = p1.distanceTo(p2); if(dist<0.001) return null;
        let m = new THREE.Mesh(new THREE.CylinderGeometry(radius,radius,dist,8), new THREE.MeshBasicMaterial({color:color, wireframe:isWireframe}));
        m.position.copy(p1).lerp(p2, 0.5); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3().subVectors(p2,p1).normalize());
        worldContent.add(m); appMeshes.push(m); return m;
    }

    function drawGeometries() {
        appMeshes.forEach(m => { worldContent.remove(m); if(m.geometry) m.geometry.dispose(); if(m.material){ if(m.material.map) m.material.map.dispose(); m.material.dispose(); } });
        appMeshes = []; clickableObjects = [];

        antennas.forEach((ant, idx) => {
            let isC = (idx === activeAntIdx);
            
            // Traliccio
            if(ant.traliccio && ant.traliccio.active && ant.traliccio.center) {
                let t=ant.traliccio; let sq=t.shape==='square'; let ns=sq?4:3; t.corners=[]; let rot=(t.rotationY||0)*(Math.PI/180); let ba=sq?Math.PI/4:Math.PI/2;
                for(let i=0;i<ns;i++){ t.corners.push(new THREE.Vector3(t.center.x+Math.cos(ba+(i*2*Math.PI/ns)+rot)*t.radius, t.center.y, t.center.z+Math.sin(ba+(i*2*Math.PI/ns)+rot)*t.radius)); }
                let h = t.height||6; if(isC && ant.state==='SIZE_ROTATE_TRALICCIO') h=Math.max(1, t.radius*3);
                t.corners.forEach(pos => createLine(pos, new THREE.Vector3(pos.x, pos.y+h, pos.z), 0.015, 0x90A4AE));
                let sh=Math.max(0.3, t.radius*2.5); let nsec=Math.max(1, Math.floor(h/sh)); let ash=h/nsec;
                for(let i=0;i<nsec;i++){ let yb=t.center.y+(i*ash); let yt=t.center.y+((i+1)*ash);
                    for(let c=0;c<ns;c++){ let nc=(c+1)%ns; createLine(new THREE.Vector3(t.corners[c].x,yb,t.corners[c].z), new THREE.Vector3(t.corners[nc].x,yb,t.corners[nc].z), 0.008, 0xCFD8DC); if(i===nsec-1) createLine(new THREE.Vector3(t.corners[c].x,yt,t.corners[c].z), new THREE.Vector3(t.corners[nc].x,yt,t.corners[nc].z), 0.008, 0xCFD8DC); createLine(new THREE.Vector3(t.corners[c].x,yb,t.corners[c].z), new THREE.Vector3(t.corners[nc].x,yt,t.corners[nc].z), 0.006, 0xCFD8DC); createLine(new THREE.Vector3(t.corners[nc].x,yb,t.corners[nc].z), new THREE.Vector3(t.corners[c].x,yt,t.corners[c].z), 0.006, 0xCFD8DC); }
                }
                let l=t.corners[0].distanceTo(t.corners[1]); let s=makeTextSprite(isC&&ant.state==='SIZE_ROTATE_TRALICCIO'?`MODIFICA LATO: ${l.toFixed(2)}m\nROTAZIONE: ${t.rotationY}°`:(isC&&ant.state==='PLACE_HEIGHT_TRALICCIO'?`IMPOSTA ALTEZZA: ${h.toFixed(2)}m`:`TRALICCIO\nH: ${h.toFixed(2)}m | L: ${l.toFixed(2)}m`), "#FFEB3B", globalTextScale); s.position.set(t.center.x, t.center.y+h+0.2, t.center.z); worldContent.add(s); appMeshes.push(s);
            }

            // Tiranti
            if(ant.guyWiresData) ant.guyWiresData.forEach((anc, aIdx) => {
                let isSel = isC && (activeAnchor === anc);
                if(anc.type === 'traliccio' && ant.traliccio && ant.traliccio.active && ant.traliccio.corners.length>0) {
                    let ty=ant.traliccio.center.y+anc.height; let col=isSel?0x00FF00:0xFF1744;
                    for(let c=0;c<ant.traliccio.corners.length;c++){ 
                        let nc=(c+1)%ant.traliccio.corners.length; let p1=new THREE.Vector3(ant.traliccio.corners[c].x, ty, ant.traliccio.corners[c].z); let p2=new THREE.Vector3(ant.traliccio.corners[nc].x, ty, ant.traliccio.corners[nc].z);
                        let m = createLine(p1, p2, isSel?0.03:0.02, col); if(m){ m.scale.set(1.5,1.5,1.5); m.userData={type:'collar', index:aIdx}; clickableObjects.push(m); }
                        if(ant.traliccio.pegs && ant.traliccio.pegs[c]){ let peg=new THREE.Vector3(ant.traliccio.pegs[c].x, ant.traliccio.pegs[c].y, ant.traliccio.pegs[c].z); createLine(p1, peg, 0.003, 0xB0BEC5); let pM = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.15), new THREE.MeshBasicMaterial({color:0xFF9800})); pM.position.set(peg.x, peg.y+0.075, peg.z); worldContent.add(pM); appMeshes.push(pM); pM.userData={type:'peg', index:c}; clickableObjects.push(pM); }
                    }
                } else if(anc.type !== 'traliccio') {
                    let pD=anc.pole==='A'?ant.pointA:ant.pointB; if(pD&&pD.base&&pD.top){ let h=Math.min(anc.height, pD.top.y-pD.base.y); anc.height=h; let ap=new THREE.Vector3(pD.base.x, pD.base.y+h, pD.base.z);
                        let m = new THREE.Mesh(new THREE.TorusGeometry(0.04, isSel?0.015:0.006), new THREE.MeshBasicMaterial({color:isSel?0x00FF00:0xFF1744})); m.rotation.x=Math.PI/2; m.position.copy(ap); m.userData={type:'collar', index:aIdx}; clickableObjects.push(m); worldContent.add(m); appMeshes.push(m);
                        if(anc.pegs) anc.pegs.forEach((peg, pIdx)=>{ let pVec=new THREE.Vector3(peg.x,peg.y,peg.z); createLine(ap, pVec, 0.002, 0xB0BEC5); let pM=new THREE.Mesh(new THREE.ConeGeometry(0.04,0.15), new THREE.MeshBasicMaterial({color:0xFF9800})); pM.position.set(pVec.x,pVec.y+0.075,pVec.z); pM.userData={type:'peg', index:pIdx}; clickableObjects.push(pM); worldContent.add(pM); appMeshes.push(pM); });
                    }
                }
            });

            // Selezionatore
            if(!isC && (ant.pointA.base || ant.traliccio.center)) {
                let bp = ant.traliccio.active ? ant.traliccio.center : ant.pointA.base;
                let m = new THREE.Mesh(new THREE.OctahedronGeometry(0.08), new THREE.MeshBasicMaterial({color:0xFFEB3B, transparent:true, opacity:0.8})); m.position.set(bp.x, bp.y+0.4, bp.z); m.userData={type:'selector', antIdx:idx}; clickableObjects.push(m); worldContent.add(m); appMeshes.push(m);
                return; // Non renderizzare il resto se non è attiva
            }

            if(!ant.pointA.top) return;
            let type = antennaTypes[ant.antIdx]; let drawP = (top, base, col) => { let m=new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color:col})); m.position.copy(top); worldContent.add(m); appMeshes.push(m); createLine(top, new THREE.Vector3(top.x, base.y, top.z), 0.008, 0x888888); };

            if (type === 'Verticale') {
                drawP(ant.pointA.top, ant.pointA.base, 0xFF1744); createLine(new THREE.Vector3(ant.pointA.base.x, ant.pointA.base.y+0.002, ant.pointA.base.z), ant.pointA.top, 0.018, 0xFF5722);
                if(!ant.traliccio.active) { let rrot=(ant.antennaRotationY*Math.PI/180); for(let i=0;i<ant.numRadials;i++){ let a=(i*2*Math.PI/ant.numRadials)+rrot; createLine(ant.pointA.base, new THREE.Vector3(ant.pointA.base.x+Math.cos(a)*ant.radialLen, ant.pointA.base.y, ant.pointA.base.z+Math.sin(a)*ant.radialLen), 0.004, 0x5D4037); } }
            } else if (type === 'MMANA-GAL') {
                drawP(ant.pointA.top, ant.pointA.base, 0xFF1744);
                let g = new THREE.Group(); g.position.copy(ant.pointA.top); g.rotation.y = ant.antennaRotationY*(Math.PI/180); worldContent.add(g); appMeshes.push(g);
                ant.mmanaWires.forEach(w=>{ let p1=new THREE.Vector3(w.x1,w.z1,w.y1); let p2=new THREE.Vector3(w.x2,w.z2,w.y2); let d=p1.distanceTo(p2); if(d>0.01){ let m=new THREE.Mesh(new THREE.CylinderGeometry(w.radius*2.8,w.radius*2.8,d,8), new THREE.MeshBasicMaterial({color:0x00E676})); m.position.copy(p1).lerp(p2,0.5); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3().subVectors(p2,p1).normalize()); g.add(m); } });
            } else if (ant.pointB.top) {
                drawP(ant.pointA.top, ant.pointA.base, 0xFF1744); drawP(ant.pointB.top, ant.pointB.base, 0x2979FF);
                let vecC = new THREE.Vector3().lerpVectors(new THREE.Vector3(ant.pointA.top.x,ant.pointA.top.y,ant.pointA.top.z), new THREE.Vector3(ant.pointB.top.x,ant.pointB.top.y,ant.pointB.top.z), ant.pointC.percent); ant.pointC.top=vecC;
                if(type !== 'Longwire') { let m=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.4), new THREE.MeshBasicMaterial({color:0x00E676, transparent:true, opacity:0.3})); m.position.copy(vecC); m.userData={type:'pointC'}; clickableObjects.push(m); worldContent.add(m); appMeshes.push(m); }
                
                let dirAB = new THREE.Vector3().subVectors(ant.pointB.top, ant.pointA.top).normalize(); let dirBA = new THREE.Vector3().subVectors(ant.pointA.top, ant.pointB.top).normalize();
                if(type==='Dipolo'){ let l=parseInt(bands[ant.bandIdx])/4; createLine(vecC.clone().add(dirAB.clone().multiplyScalar(-l/2)), vecC.clone().add(dirAB.clone().multiplyScalar(l/2)), 0.015, 0xFF5722); }
                else if(type==='End Fed'){ createLine(vecC, vecC.clone().add(dirBA.clone().multiplyScalar(ant.endFed_AC_Len)), 0.015, 0xFF5722); createLine(vecC, vecC.clone().add(dirAB.clone().multiplyScalar(ant.endFed_CB_Len)), 0.015, 0xFF5722); }
                else if(type==='Longwire'){ let sv=ant.longwireVertex==='A'?ant.pointA.top:ant.pointB.top; let tv=ant.longwireVertex==='A'?ant.pointB.top:ant.pointA.top; createLine(sv, sv.clone().add(new THREE.Vector3().subVectors(tv,sv).normalize().multiplyScalar(ant.longwireLen)), 0.015, 0xFF5722); }
            }
        });
    }

    function updateBeam(mesh, origin, dir, color, len) {
        mesh.visible=true; mesh.material.color.setHex(color);
        let sl = Math.max(0.1, len-0.2); mesh.scale.set(1, sl, 1);
        mesh.position.copy(origin).add(dir.clone().multiplyScalar(0.2 + sl/2));
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    }

    function calculateIntersection(r1, r2) {
        let p1=r1.origin, d1=r1.dir.clone().normalize(), p2=r2.origin, d2=r2.dir.clone().normalize();
        let w0 = new THREE.Vector3().subVectors(p1, p2); let a=d1.dot(d1), b=d1.dot(d2), c=d2.dot(d2), d=d1.dot(w0), e=d2.dot(w0); let denom = a*c-b*b;
        if(denom<1e-5) return null; let t1=(b*e-c*d)/denom; let t2=(a*e-b*d)/denom; if(t1<0||t2<0) return null;
        let pt1=new THREE.Vector3().copy(p1).add(d1.multiplyScalar(t1)); let pt2=new THREE.Vector3().copy(p2).add(d2.multiplyScalar(t2));
        return { point: new THREE.Vector3().lerpVectors(pt1,pt2,0.5), error: pt1.distanceTo(pt2), dist1: t1, dist2: t2 };
    }

    function animate() { renderer.setAnimationLoop(render); }
    
    // Il Try-Catch dentro render garantisce che anche se una stringa dovesse generare un errore 
    // la camera non diventi mai nera e continui a renderizzare l'ambiente
    function render(timestamp, frame) {
        try {
            if(frame) {
                let rs = renderer.xr.getReferenceSpace(); let session = renderer.xr.getSession();
                if(!hitTestSourceRequested) { session.requestReferenceSpace('viewer').then(r=>{ session.requestHitTestSource({space:r}).then(s=>{ hitTestSource=s; }); }); hitTestSourceRequested=true; }
                if(hitTestSource && pointerMode==='LIDAR') {
                    let hits = frame.getHitTestResults(hitTestSource);
                    if(hits.length>0){ 
                        // FIX PER SCHERMO NERO: Protezione null reference su getPose!
                        let p = hits[0].getPose(rs); 
                        if(p) {
                            reticle.position.copy(p.transform.position); 
                            reticle.quaternion.copy(p.transform.orientation); 
                            reticle.visible=true; reticleValid=true; lastFloorY=p.transform.position.y; 
                        } else { reticle.visible=false; reticleValid=false; }
                    } else { reticle.visible=false; reticleValid=false; }
                } else { reticle.visible=false; reticleValid=false; }
            }

            let isP = current.state.startsWith('PLACE') || current.state.startsWith('REPO') || current.state.includes('CALIB');
            
            if (isP && pointerMode === 'TRIANG') {
                triangMarker.visible = true;
                let cp = new THREE.Vector3(); let cd = new THREE.Vector3(0,0,-1); camera.getWorldPosition(cp); cd.applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));
                if(triangState===0){ updateBeam(beam1, cp, cd, 0x00BFFF, 150); beam2.visible=false; triangMarker.visible=false; }
                else if(triangState===1){ triangResult=calculateIntersection(triangRay1, {origin:cp, dir:cd}); if(triangResult){ updateBeam(beam1, triangRay1.origin, triangRay1.dir, 0x00BFFF, triangResult.dist1); updateBeam(beam2, cp, cd, 0xFF1744, triangResult.dist2); triangMarker.position.copy(triangResult.point); let errC = triangResult.error<0.3?0x00E676:(triangResult.error<1.0?0xFFEB3B:0xD50000); triangMarker.material.color.setHex(errC); triangMarker.visible=true; let s=Math.max(1, triangResult.dist2/4); triangMarker.scale.setScalar(s); triangTextSprite.material.map.image.getContext('2d').clearRect(0,0,512,256); let tex=makeTextSprite(`INTERSEZIONE!\nERR: ${triangResult.error.toFixed(2)}m`, "#FFF", 0.6); triangTextSprite.material.map=tex.material.map; triangTextSprite.material.needsUpdate=true; } }
                else if(triangState===2){ if(triangResult){ updateBeam(beam1, triangRay1.origin, triangRay1.dir, 0x00BFFF, triangResult.dist1); updateBeam(beam2, triangRay2.origin, triangRay2.dir, 0xFF1744, triangResult.dist2); triangMarker.position.copy(triangResult.point); let s=Math.max(1, triangResult.dist2/4); triangMarker.scale.setScalar(s); triangTextSprite.material.map.image.getContext('2d').clearRect(0,0,512,256); let tex=makeTextSprite(`PUNTO OK!\nTAP PER PIAZZARE`, "#FFF", 0.6); triangTextSprite.material.map=tex.material.map; triangTextSprite.material.needsUpdate=true; } }
            } else { triangMarker.visible=false; beam1.visible=false; beam2.visible=false; }

            renderer.render(scene, camera);
        } catch (e) {
            console.error("Errore di rendering non fatale:", e);
            renderer.render(scene, camera); // Evita che si spenga lo schermo e rimanga nero in caso di errore logico
        }
    }
  </script>
