<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest 3 - Scanner WebXR</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: white; font-family: sans-serif; }
        #ui-container { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 100; }
        button { padding: 15px 25px; margin: 5px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        #status { margin-top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div id="ui-container">
        <button id="btn-save" style="display: none; background: #28a745;">Salva Stanza</button>
        <button id="btn-load">Carica Stanza e Naviga (VR)</button>
        <div id="status">In attesa...</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { ARButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js';
        import { VRButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer;
        let roomMeshes = []; // Array per contenere le mesh rilevate
        const statusDiv = document.getElementById('status');
        const saveBtn = document.getElementById('btn-save');
        const loadBtn = document.getElementById('btn-load');

        init();
        animate();

        function init() {
            // 1. Setup Base di Three.js
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: true per vedere in passthrough
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Aggiungiamo una luce leggera per vedere le forme
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            // 2. Creiamo il pulsante per scansionare in Realtà Mista (AR)
            // Richiediamo esplicitamente i permessi per la mesh
            const arButton = ARButton.createButton(renderer, { 
                requiredFeatures: ['mesh-detection', 'local-floor'] 
            });
            arButton.innerText = "1. Avvia Scansione (AR)";
            document.getElementById('ui-container').appendChild(arButton);

            // Eventi per mostrare/nascondere il tasto salva
            renderer.xr.addEventListener('sessionstart', () => { saveBtn.style.display = 'inline-block'; });
            renderer.xr.addEventListener('sessionend', () => { saveBtn.style.display = 'none'; });

            // 3. Gestione Pulsanti Custom
            saveBtn.addEventListener('click', saveRoomLocally);
            loadBtn.addEventListener('click', loadRoomLocally);
        }

        // Funzione eseguita ad ogni frame
        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            // SE c'è una sessione WebXR attiva e stiamo scansionando
            if (frame && renderer.xr.getSession().mode === 'immersive-ar') {
                
                // NOTA: Il supporto nativo di Three.js per mesh-detection è in sviluppo.
                // In una vera app di produzione, qui si accede a frame.detectedMeshes
                // e si converte la geometria grezza in THREE.Mesh.
                
                // Per questo esempio, simuliamo che il visore abbia trovato una parete
                // (Nella realtà, itereresti su frame.detectedMeshes)
                statusDiv.innerText = "Scansione attiva: guardati attorno per rilevare le superfici.";
            }

            renderer.render(scene, camera);
        }

        // --- FUNZIONI DI SALVATAGGIO E CARICAMENTO ---

        function saveRoomLocally() {
            // 1. Raccogliamo tutte le geometrie scansionate e le serializziamo in JSON
            // (Qui salveremmo roomMeshes. In questo esempio, creiamo un cubo dummy per test)
            const dummyGeom = new THREE.BoxGeometry(1, 1, 1).toJSON();
            
            // 2. Salviamo nel LocalStorage del browser del visore
            localStorage.setItem('saved_quest_room', JSON.stringify(dummyGeom));
            
            statusDiv.innerText = "Stanza salvata con successo nella memoria del browser!";
            statusDiv.style.color = "#28a745";
        }

        function loadRoomLocally() {
            const savedData = localStorage.getItem('saved_quest_room');
            
            if (!savedData) {
                statusDiv.innerText = "Errore: Nessuna stanza salvata trovata.";
                statusDiv.style.color = "red";
                return;
            }

            // 1. Ripuliamo la scena attuale
            scene.clear();
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
            
            // 2. Ricostruiamo la geometria dal JSON salvato
            const parsedData = JSON.parse(savedData);
            const loader = new THREE.ObjectLoader();
            
            // Creiamo la mesh basata sui dati salvati
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            // Nota: nella realtà useresti un bufferGeometry loader per i dati di WebXR
            const geometry = new THREE.BoxGeometry(1, 1, 1); // Fallback per l'esempio
            const loadedMesh = new THREE.Mesh(geometry, material);
            loadedMesh.position.set(0, 0, -2); // La posizioniamo davanti a noi
            scene.add(loadedMesh);

            statusDiv.innerText = "Stanza caricata! Clicca su Enter VR per esplorarla.";

            // 3. Mostriamo il pulsante per entrare in VR (completamente virtuale, niente passthrough)
            const vrButton = VRButton.createButton(renderer);
            vrButton.innerText = "2. Entra nella Stanza (VR)";
            document.getElementById('ui-container').appendChild(vrButton);
            loadBtn.style.display = 'none'; // Nascondiamo il tasto carica
        }

        // Gestione ridimensionamento finestra
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
