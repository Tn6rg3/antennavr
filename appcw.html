<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sfida Telegrafia</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        /* ... (stessi stili di prima) ... */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; }
        .active-screen { display: flex; }
    </style>
</head>
<body>

    <div id="errorScreen" class="screen active-screen">
        <h2>Accesso Negato 🛑</h2>
        <p>Questo gioco è accessibile <b>solo</b> tramite il Bot Telegram.</p>
    </div>

    <!-- ... (altre schermate identiche) ... -->

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        
        const tgUser = window.Telegram.WebApp.initDataUnsafe?.user;

        // --- BLOCCO FORZATO ---
        if (!tgUser) {
            document.getElementById('errorScreen').classList.add('active-screen');
            throw new Error("Accesso non consentito: non sei in Telegram.");
        }

        // --- CONTINUA SOLO SE SEI IN TELEGRAM ---
        const myName = tgUser.first_name;
        const myId = tgUser.id.toString();

        const firebaseConfig = { /* ... (tua config) ... */ };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const auth = firebase.auth();

        auth.signInAnonymously().then(() => {
            showScreen('setupScreen');
            listenToRooms();
        });

        // --- FUNZIONE CANCELLAZIONE SICURA ---
        document.getElementById('deleteDataBtn').addEventListener('click', async () => {
            if (confirm("Sei sicuro di voler eliminare tutto?")) {
                try {
                    // 1. Elimina da classifica
                    await db.ref(`leaderboard/${myId}`).remove();
                    
                    // 2. Cerca ed elimina l'utente in TUTTE le stanze
                    const roomsSnapshot = await db.ref('rooms').once('value');
                    const updates = {};
                    roomsSnapshot.forEach(room => {
                        if (room.child(`players/${myId}`).exists()) {
                            updates[`rooms/${room.key}/players/${myId}`] = null;
                        }
                    });
                    
                    await db.ref().update(updates);
                    alert("Dati eliminati con successo!");
                    location.reload();
                } catch (e) {
                    alert("Errore permessi: controlla le regole di Firebase. Dettagli: " + e.message);
                }
            }
        });

        // ... (resto della logica gioco) ...
    </script>
</body>
</html>
