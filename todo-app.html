<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List App - Local Storage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header p {
      font-size: 0.9em;
      opacity: 0.9;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 0.9em;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 1.8em;
      font-weight: bold;
      display: block;
    }

    .stat-label {
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .input-section input {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    .input-section input:focus {
      outline: none;
      border-color: #667eea;
    }

    .input-section input::placeholder {
      color: #999;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-add {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-add:active {
      transform: translateY(0);
    }

    .filter-section {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn-filter {
      padding: 8px 15px;
      border: 2px solid #e0e0e0;
      background: white;
      color: #333;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.9em;
      font-weight: 500;
    }

    .btn-filter.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .btn-filter:hover {
      border-color: #667eea;
    }

    .todo-list {
      list-style: none;
    }

    .todo-item {
      background: #f8f9fa;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: all 0.3s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .todo-item:hover {
      background: #f0f1f5;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .todo-item.completed {
      opacity: 0.7;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-text {
      flex: 1;
      font-size: 1em;
      color: #333;
      word-break: break-word;
    }

    .todo-priority {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .priority-high {
      background: #ffebee;
      color: #c62828;
    }

    .priority-medium {
      background: #fff3e0;
      color: #e65100;
    }

    .priority-low {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .todo-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2em;
      padding: 5px 10px;
      border-radius: 4px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-edit {
      color: #667eea;
    }

    .btn-edit:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .btn-delete {
      color: #e74c3c;
    }

    .btn-delete:hover {
      background: rgba(231, 76, 60, 0.1);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 3em;
      margin-bottom: 15px;
    }

    .empty-state-text {
      font-size: 1.1em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .btn-clear {
      flex: 1;
      background: #f8f9fa;
      color: #e74c3c;
      border: 2px solid #e0e0e0;
    }

    .btn-clear:hover {
      background: #ffebee;
      border-color: #e74c3c;
    }

    .btn-export {
      flex: 1;
      background: #f8f9fa;
      color: #667eea;
      border: 2px solid #e0e0e0;
    }

    .btn-export:hover {
      background: #f0f1f5;
      border-color: #667eea;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 90%;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      font-size: 1.5em;
      font-weight: 700;
      margin-bottom: 20px;
      color: #333;
    }

    .modal-body {
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
    }

    .modal-footer .btn {
      flex: 1;
    }

    .btn-cancel {
      background: #f8f9fa;
      color: #333;
      border: 2px solid #e0e0e0;
    }

    .btn-cancel:hover {
      background: #e0e0e0;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 1.8em;
      }

      .stats {
        flex-direction: column;
        gap: 15px;
      }

      .input-section {
        flex-direction: column;
      }

      .filter-section {
        justify-content: center;
      }

      .modal-content {
        width: 95%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 My Todo List</h1>
      <p>Organize your tasks efficiently</p>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-number" id="total-count">0</span>
        <span class="stat-label">Total Tasks</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="completed-count">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="pending-count">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>

    <div class="content">
      <div class="input-section">
        <input 
          type="text" 
          id="todo-input" 
          placeholder="Add a new task..."
          autocomplete="off"
        >
        <button class="btn btn-add" onclick="addTodo()">Add</button>
      </div>

      <div class="filter-section">
        <button class="btn-filter active" onclick="filterTodos('all')">All</button>
        <button class="btn-filter" onclick="filterTodos('pending')">Pending</button>
        <button class="btn-filter" onclick="filterTodos('completed')">Completed</button>
        <button class="btn-filter" onclick="filterTodos('high')">High Priority</button>
      </div>

      <ul class="todo-list" id="todo-list">
        <!-- Todos will be rendered here -->
      </ul>

      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">✨</div>
        <div class="empty-state-text">No tasks yet. Add one to get started!</div>
      </div>

      <div class="controls">
        <button class="btn btn-export" onclick="exportTodos()">📥 Export</button>
        <button class="btn btn-clear" onclick="openClearConfirm()">🗑️ Clear All</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="edit-modal">
    <div class="modal-content">
      <div class="modal-header">Edit Task</div>
      <div class="modal-body">
        <div class="form-group">
          <label for="edit-text">Task Description</label>
          <input type="text" id="edit-text" placeholder="Enter task description">
        </div>
        <div class="form-group">
          <label for="edit-priority">Priority</label>
          <select id="edit-priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-save" onclick="saveEditedTodo()">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm Clear Modal -->
  <div class="modal" id="confirm-clear-modal">
    <div class="modal-content">
      <div class="modal-header">Clear All Tasks?</div>
      <div class="modal-body">
        <p>Are you sure you want to delete all tasks? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeClearConfirm()">Cancel</button>
        <button class="btn btn-clear" onclick="clearAllTodos()">Delete All</button>
      </div>
    </div>
  </div>

  <script>
    // ===================== DATA MANAGEMENT =====================
    const STORAGE_KEY = 'todos';
    const FILTER_KEY = 'current-filter';

    let todos = [];
    let currentFilter = 'all';
    let editingId = null;

    // Load todos from localStorage
    function loadTodos() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        todos = stored ? JSON.parse(stored) : [];
        currentFilter = localStorage.getItem(FILTER_KEY) || 'all';
      } catch (error) {
        console.error('Error loading todos:', error);
        todos = [];
      }
      renderTodos();
      updateStats();
    }

    // Save todos to localStorage
    function saveTodos() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        localStorage.setItem(FILTER_KEY, currentFilter);
      } catch (error) {
        console.error('Error saving todos:', error);
        alert('Failed to save todos. Storage might be full.');
      }
    }

    // ===================== TODO OPERATIONS =====================
    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();

      if (!text) {
        alert('Please enter a task description');
        return;
      }

      if (text.length > 100) {
        alert('Task description is too long (max 100 characters)');
        return;
      }

      const todo = {
        id: Date.now(),
        text: text,
        completed: false,
        priority: 'medium',
        createdAt: new Date().toISOString(),
        completedAt: null
      };

      todos.unshift(todo);
      saveTodos();
      input.value = '';
      input.focus();
      renderTodos();
      updateStats();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.completed = !todo.completed;
        todo.completedAt = todo.completed ? new Date().toISOString() : null;
        saveTodos();
        renderTodos();
        updateStats();
      }
    }

    function deleteTodo(id) {
      if (confirm('Are you sure you want to delete this task?')) {
        todos = todos.filter(t => t.id !== id);
        saveTodos();
        renderTodos();
        updateStats();
      }
    }

    function openEditModal(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        editingId = id;
        document.getElementById('edit-text').value = todo.text;
        document.getElementById('edit-priority').value = todo.priority;
        document.getElementById('edit-modal').classList.add('active');
        document.getElementById('edit-text').focus();
      }
    }

    function closeEditModal() {
      editingId = null;
      document.getElementById('edit-modal').classList.remove('active');
    }

    function saveEditedTodo() {
      const todo = todos.find(t => t.id === editingId);
      if (todo) {
        const newText = document.getElementById('edit-text').value.trim();
        if (!newText) {
          alert('Task description cannot be empty');
          return;
        }
        if (newText.length > 100) {
          alert('Task description is too long (max 100 characters)');
          return;
        }
        todo.text = newText;
        todo.priority = document.getElementById('edit-priority').value;
        saveTodos();
        closeEditModal();
        renderTodos();
        updateStats();
      }
    }

    function clearAllTodos() {
      todos = [];
      saveTodos();
      closeClearConfirm();
      renderTodos();
      updateStats();
    }

    function openClearConfirm() {
      document.getElementById('confirm-clear-modal').classList.add('active');
    }

    function closeClearConfirm() {
      document.getElementById('confirm-clear-modal').classList.remove('active');
    }

    // ===================== FILTERING & RENDERING =====================
    function filterTodos(filter) {
      currentFilter = filter;
      localStorage.setItem(FILTER_KEY, currentFilter);

      // Update active button
      document.querySelectorAll('.btn-filter').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      renderTodos();
    }

    function getFilteredTodos() {
      switch(currentFilter) {
        case 'pending':
          return todos.filter(t => !t.completed);
        case 'completed':
          return todos.filter(t => t.completed);
        case 'high':
          return todos.filter(t => t.priority === 'high' && !t.completed);
        default:
          return todos;
      }
    }

    function renderTodos() {
      const todoList = document.getElementById('todo-list');
      const emptyState = document.getElementById('empty-state');
      const filtered = getFilteredTodos();

      todoList.innerHTML = '';

      if (filtered.length === 0) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      filtered.forEach(todo => {
        const li = document.createElement('li');
        li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
        li.innerHTML = `
          <input 
            type="checkbox" 
            class="checkbox" 
            ${todo.completed ? 'checked' : ''}
            onchange="toggleTodo(${todo.id})"
          >
          <div class="todo-text">${escapeHtml(todo.text)}</div>
          <span class="todo-priority priority-${todo.priority}">${todo.priority}</span>
          <div class="todo-actions">
            <button class="btn-icon btn-edit" onclick="openEditModal(${todo.id})" title="Edit">✏️</button>
            <button class="btn-icon btn-delete" onclick="deleteTodo(${todo.id})" title="Delete">🗑️</button>
          </div>
        `;
        todoList.appendChild(li);
      });
    }

    function updateStats() {
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;
      const pending = total - completed;

      document.getElementById('total-count').textContent = total;
      document.getElementById('completed-count').textContent = completed;
      document.getElementById('pending-count').textContent = pending;
    }

    // ===================== EXPORT & UTILITY =====================
    function exportTodos() {
      if (todos.length === 0) {
        alert('No tasks to export');
        return;
      }

      const dataStr = JSON.stringify(todos, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `todos-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // ===================== EVENT LISTENERS =====================
    document.getElementById('todo-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addTodo();
      }
    });

    document.getElementById('edit-text').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        saveEditedTodo();
      }
    });

    // Close modal on background click
    document.getElementById('edit-modal').addEventListener('click', (e) => {
      if (e.target.id === 'edit-modal') {
        closeEditModal();
      }
    });

    document.getElementById('confirm-clear-modal').addEventListener('click', (e) => {
      if (e.target.id === 'confirm-clear-modal') {
        closeClearConfirm();
      }
    });

    // Initialize app on page load
    window.addEventListener('DOMContentLoaded', () => {
      loadTodos();
      // Update button states
      document.querySelectorAll('.btn-filter').forEach((btn, index) => {
        if ((index === 0 && currentFilter === 'all') ||
            (index === 1 && currentFilter === 'pending') ||
            (index === 2 && currentFilter === 'completed') ||
            (index === 3 && currentFilter === 'high')) {
          btn.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
