<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Scanner Ottimizzato - Quest 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; font-weight: bold; }
    </style>
</head>
<body>
    <div id="info">Usa il raggio del controller DESTRO. Tieni premuto il grilletto per scansionare.</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        let reticle;
        
        let rightController = null;
        let rightInputSource = null;
        let hitTestSource = null;

        // Variabili di scansione
        let isScanning = false;
        const MAX_POINTS = 100000; 
        const MIN_DISTANCE = 0.005; // 5 millimetri di distanza minima per evitare sovrapposizioni
        
        let pointCloud;
        let positions;
        let pointCount = 0;
        let lastPoint = new THREE.Vector3(999, 999, 999);

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // --- GESTIONE CONTROLLER E RAGGIO LASER ---
            
            // Funzione per creare una linea visiva (laser) che esce dal controller
            function buildControllerPointer() {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0, 0, -1) // Raggio lungo 1 metro in avanti
                ]);
                const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
                return new THREE.Line(geometry, material);
            }

            // Inizializziamo entrambi i controller per capire quale è il destro
            for (let i = 0; i < 2; i++) {
                const controller = renderer.xr.getController(i);
                
                controller.addEventListener('connected', function (event) {
                    this.add(buildControllerPointer()); // Aggiunge il laser visivo

                    // Se è il controller DESTRO, lo salviamo e attiviamo l'Hit Test
                    if (event.data.handedness === 'right') {
                        rightController = this;
                        rightInputSource = event.data;
                        requestHitTestSource();
                    }
                });

                // Gestione del grilletto: controlliamo esplicitamente che sia il controller destro
                controller.addEventListener('selectstart', function () {
                    if (this === rightController) isScanning = true;
                });

                controller.addEventListener('selectend', function () {
                    if (this === rightController) isScanning = false;
                });

                scene.add(controller);
            }

            // --- CREAZIONE MIRINO E NUVOLA DI PUNTI ---

            // Mirino
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.015, 0.02, 32).rotateX(- Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ffff }) // Colore Ciano per spiccare
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Nuvola di Punti
            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(MAX_POINTS * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setDrawRange(0, 0);

            // Punti grandi 5mm e verdi
            const material = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.005 });
            pointCloud = new THREE.Points(geometry, material);
            
            // CRITICO: Impedisce che i punti scompaiano quando muovi la testa (Culling disattivato)
            pointCloud.frustumCulled = false; 
            scene.add(pointCloud);

            window.addEventListener('resize', onWindowResize);
        }

        // Funzione per richiedere l'analisi delle superfici basata sul raggio del controller
        function requestHitTestSource() {
            const session = renderer.xr.getSession();
            session.requestHitTestSource({ space: rightInputSource.targetRaySpace }).then((source) => {
                hitTestSource = source;
            }).catch(console.error);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame && hitTestSource) {
                const hitTestResults = frame.getHitTestResults(hitTestSource);

                if (hitTestResults.length > 0) {
                    const hit = hitTestResults[0];
                    const referenceSpace = renderer.xr.getReferenceSpace();
                    const pose = hit.getPose(referenceSpace);

                    // Posiziona il mirino sull'oggetto fisico
                    reticle.visible = true;
                    reticle.matrix.fromArray(pose.transform.matrix);

                    // --- LOGICA DI SCANSIONE CONTINUA ---
                    if (isScanning && pointCount < MAX_POINTS) {
                        const currentPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);

                        // Crea un punto solo se ti sei spostato di almeno 5mm dall'ultimo punto
                        if (currentPos.distanceTo(lastPoint) > MIN_DISTANCE) {
                            positions[pointCount * 3] = currentPos.x;
                            positions[pointCount * 3 + 1] = currentPos.y;
                            positions[pointCount * 3 + 2] = currentPos.z;

                            pointCount++;
                            pointCloud.geometry.setDrawRange(0, pointCount);
                            pointCloud.geometry.attributes.position.needsUpdate = true;

                            // Salva la posizione per il prossimo calcolo di distanza
                            lastPoint.copy(currentPos);
                        }
                    }
                } else {
                    // Nascondi il mirino se stai puntando nel vuoto
                    reticle.visible = false;
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
