<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Scanner Volumetrico - Quest 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
    <div id="info">
        1. Punta il tavolo.<br>
        2. Usa il <b>Joystick DESTRO (su/giù)</b> per ridimensionare il cubo sull'oggetto.<br>
        3. <b>Tieni premuto il grilletto</b> per bloccare il cubo e scansionare girandoci attorno.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        let rightController = null;
        let rightInputSource = null;
        let hitTestSource = null;

        // Variabili del Bounding Box (Il cubo di scansione)
        let boxGroup, scanBox;
        let currentBoxScale = 0.1; // Dimensione iniziale: 10 cm

        // Impostazioni della Nuvola di Punti (Alta Risoluzione)
        let isScanning = false;
        const MAX_POINTS = 500000; 
        const MIN_DISTANCE = 0.001; // 1 millimetro
        
        let pointCloud;
        let positions;
        let pointCount = 0;
        let lastPoint = new THREE.Vector3(999, 999, 999);

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // --- LASER DEL CONTROLLER ---
            function buildControllerPointer() {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0, 0, -1) 
                ]);
                const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
                return new THREE.Line(geometry, material);
            }

            for (let i = 0; i < 2; i++) {
                const controller = renderer.xr.getController(i);
                
                controller.addEventListener('connected', function (event) {
                    this.add(buildControllerPointer());

                    if (event.data.handedness === 'right') {
                        rightController = this;
                        rightInputSource = event.data;
                        requestHitTestSource();
                    }
                });

                // Gestione del grilletto per bloccare il cubo e avviare la scansione
                controller.addEventListener('selectstart', function () {
                    if (this === rightController) {
                        isScanning = true;
                        scanBox.material.color.setHex(0xff0000); // Il cubo diventa rosso quando acquisisce
                    }
                });

                controller.addEventListener('selectend', function () {
                    if (this === rightController) {
                        isScanning = false;
                        scanBox.material.color.setHex(0xffff00); // Torna giallo quando rilasci
                    }
                });

                scene.add(controller);
            }

            // --- CREAZIONE DEL BOUNDING BOX (CUBO) ---
            boxGroup = new THREE.Group();
            boxGroup.matrixAutoUpdate = false;
            boxGroup.visible = false;

            const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
            // Trasliamo la geometria in alto di 0.5 così la base del cubo poggia esattamente sul piano reale
            boxGeometry.translate(0, 0.5, 0); 
            const boxMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true, transparent: true, opacity: 0.6 });
            
            scanBox = new THREE.Mesh(boxGeometry, boxMaterial);
            scanBox.scale.set(currentBoxScale, currentBoxScale, currentBoxScale);
            boxGroup.add(scanBox);
            scene.add(boxGroup);

            // --- NUVOLA DI PUNTI ---
            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(MAX_POINTS * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setDrawRange(0, 0);

            const material = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.002 });
            pointCloud = new THREE.Points(geometry, material);
            pointCloud.frustumCulled = false; 
            scene.add(pointCloud);

            window.addEventListener('resize', onWindowResize);
        }

        function requestHitTestSource() {
            const session = renderer.xr.getSession();
            session.requestHitTestSource({ space: rightInputSource.targetRaySpace }).then((source) => {
                hitTestSource = source;
            }).catch(console.error);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame && hitTestSource) {
                
                // --- LETTURA DEL JOYSTICK PER RIDIMENSIONARE IL CUBO ---
                if (rightInputSource && rightInputSource.gamepad && !isScanning) {
                    const axes = rightInputSource.gamepad.axes;
                    // L'asse Y del thumbstick nel Quest è solitamente l'indice 3
                    const yAxis = axes.length >= 4 ? axes[3] : 0; 
                    
                    // Applica una deadzone per evitare drifting involontario
                    if (Math.abs(yAxis) > 0.1) {
                        currentBoxScale -= yAxis * 0.005; // Velocità di ridimensionamento
                        // Limite: da 2 centimetri a 1 metro
                        currentBoxScale = Math.max(0.02, Math.min(currentBoxScale, 1.0)); 
                        scanBox.scale.set(currentBoxScale, currentBoxScale, currentBoxScale);
                    }
                }

                // --- ESECUZIONE DELL'HIT TEST ---
                const hitTestResults = frame.getHitTestResults(hitTestSource);

                if (hitTestResults.length > 0) {
                    const hit = hitTestResults[0];
                    const referenceSpace = renderer.xr.getReferenceSpace();
                    const pose = hit.getPose(referenceSpace);

                    boxGroup.visible = true;

                    // Se NON stiamo scansionando, il cubo segue il laser sul tavolo
                    if (!isScanning) {
                        boxGroup.matrix.fromArray(pose.transform.matrix);
                    } 
                    // Se STIAMO scansionando, il cubo rimane bloccato e filtriamo i punti
                    else if (isScanning && pointCount < MAX_POINTS) {
                        
                        // Creiamo un oggetto logico "Box3" basato sulla posizione bloccata del nostro cubo
                        const boundingBox = new THREE.Box3().setFromObject(scanBox);
                        
                        // Calcoliamo dove sta colpendo il laser
                        const currentPos = new THREE.Vector3();
                        currentPos.setFromMatrixPosition(new THREE.Matrix4().fromArray(pose.transform.matrix));

                        // --- LA MAGIA: IL PUNTO È DENTRO IL CUBO? ---
                        if (boundingBox.containsPoint(currentPos)) {
                            
                            // Se sì, e se siamo distanti almeno 1mm dall'ultimo punto, lo salviamo
                            if (currentPos.distanceTo(lastPoint) > MIN_DISTANCE) {
                                positions[pointCount * 3] = currentPos.x;
                                positions[pointCount * 3 + 1] = currentPos.y;
                                positions[pointCount * 3 + 2] = currentPos.z;

                                pointCount++;
                                pointCloud.geometry.setDrawRange(0, pointCount);
                                pointCloud.geometry.attributes.position.needsUpdate = true;

                                lastPoint.copy(currentPos);
                            }
                        }
                    }
                } else if (!isScanning) {
                    boxGroup.visible = false;
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
