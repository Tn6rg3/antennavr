<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Scanner Continuo - Meta Quest 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #fff; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div id="info">Punta col controller DESTRO e tieni premuto il grilletto per scansionare.</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        let reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        // Variabili per il tracciamento continuo
        let isScanning = false;
        const MAX_POINTS = 100000; // Massima risoluzione: 100mila punti
        const MIN_DISTANCE = 0.001; // Risoluzione di 1 millimetro
        
        let pointCloud;
        let positions;
        let pointCount = 0;
        let lastPoint = new THREE.Vector3(999, 999, 999);

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // Gestione dei controller in Three.js per intercettare i trigger
            const controller0 = renderer.xr.getController(0);
            controller0.addEventListener('selectstart', () => { isScanning = true; });
            controller0.addEventListener('selectend', () => { isScanning = false; });
            scene.add(controller0);

            const controller1 = renderer.xr.getController(1);
            controller1.addEventListener('selectstart', () => { isScanning = true; });
            controller1.addEventListener('selectend', () => { isScanning = false; });
            scene.add(controller1);

            // Creazione del Reticolo (mirino)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.01, 0.015, 32).rotateX(- Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ffff }) // Ciano per visibilità
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Creazione della Nuvola di Punti (Point Cloud) per la massima risoluzione
            const geometry = new THREE.BufferGeometry();
            positions = new Float32Array(MAX_POINTS * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setDrawRange(0, 0); // Inizia con 0 punti visibili

            // Imposta la dimensione di ogni singolo punto scansionato (2 millimetri)
            const material = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.002 });
            pointCloud = new THREE.Points(geometry, material);
            scene.add(pointCloud);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();

                // Reimposta la sorgente se i controller cambiano (es. si accendono dopo)
                session.addEventListener('inputsourceschange', () => {
                    hitTestSourceRequested = false;
                    hitTestSource = null;
                });

                // 1. Cerca il controller DESTRO e crea la sorgente Hit Test dal suo raggio
                if (!hitTestSourceRequested) {
                    const rightSource = Array.from(session.inputSources).find(s => s.handedness === 'right');
                    
                    if (rightSource && rightSource.targetRaySpace) {
                        hitTestSourceRequested = true;
                        session.requestHitTestSource({ space: rightSource.targetRaySpace }).then(source => {
                            hitTestSource = source;
                        }).catch(console.error);
                    }
                }

                // 2. Esegui l'Hit Test se la sorgente è pronta
                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);

                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const referenceSpace = renderer.xr.getReferenceSpace();
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);

                        // 3. Tracciamento continuo se il grilletto è premuto
                        if (isScanning && pointCount < MAX_POINTS) {
                            const currentPos = new THREE.Vector3();
                            currentPos.setFromMatrixPosition(reticle.matrix);

                            // Aggiunge un punto solo se ti sei mosso di almeno 1mm (ottimizza la risoluzione)
                            if (currentPos.distanceTo(lastPoint) > MIN_DISTANCE) {
                                positions[pointCount * 3] = currentPos.x;
                                positions[pointCount * 3 + 1] = currentPos.y;
                                positions[pointCount * 3 + 2] = currentPos.z;

                                pointCount++;
                                pointCloud.geometry.setDrawRange(0, pointCount);
                                pointCloud.geometry.attributes.position.needsUpdate = true;

                                lastPoint.copy(currentPos);
                            }
                        }
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
