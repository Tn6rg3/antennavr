<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Accesso Fotocamera Raw - Quest 3</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            background-color: #111; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
        }
        #video-container {
            margin-top: 20px;
            padding: 10px;
            background: #222;
            border-radius: 10px;
            display: inline-block;
        }
        video {
            width: 100%;
            max-width: 600px;
            border: 3px solid #ff0044;
            background-color: #000;
            border-radius: 5px;
        }
        #log {
            margin-top: 20px;
            padding: 15px;
            background: #000;
            color: #00ff00;
            font-family: monospace;
            text-align: left;
            border: 1px solid #333;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            overflow-wrap: break-word;
        }
        .error { color: #ff4444 !important; }
    </style>
</head>
<body>
    <h2>Tentativo di Accesso Diretto (getUserMedia)</h2>
    <p>Questo script tenta di bypassare WebXR e chiede al browser l'accesso diretto ai pixel della fotocamera posteriore (environment).</p>

    <div id="video-container">
        <video id="camera-feed" autoplay playsinline></video>
    </div>

    <div id="log">In attesa di richiedere la fotocamera...</div>

    <script>
        const videoElement = document.getElementById('camera-feed');
        const logElement = document.getElementById('log');

        function logMessage(message, isError = false) {
            const span = document.createElement('div');
            span.textContent = '> ' + message;
            if (isError) span.className = 'error';
            logElement.appendChild(span);
        }

        async function initCamera() {
            logMessage("Verifica supporto mediaDevices...");
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                logMessage("ERRORE CRITICO: Il browser non supporta getUserMedia.", true);
                return;
            }

            logMessage("Richiesta permessi video (facingMode: environment)...");

            try {
                // Chiediamo esplicitamente la fotocamera "posteriore/ambientale" a massima risoluzione
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });

                logMessage("Permesso accordato! Flusso video ricevuto.");
                
                // Analizziamo cosa ci ha effettivamente restituito il sistema
                const videoTrack = stream.getVideoTracks()[0];
                logMessage("Nome della traccia hardware fornita: " + videoTrack.label);

                // Mandiamo il video a schermo
                videoElement.srcObject = stream;

            } catch (err) {
                logMessage("ACCESSO NEGATO DAL SISTEMA: " + err.name + " - " + err.message, true);
                logMessage("Meta Horizon OS ha bloccato la richiesta di accesso al feed raw.", true);
            }
        }

        // Avviamo la richiesta appena la pagina è caricata
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
