<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Antenne AR Pro V18 - Sistema Ibrido & Tiranti</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    #ui-2d-container{position:absolute;top:15px;left:15px;z-index:9999;background:#111;color:#00E676;padding:15px;border:2px solid #FFEB3B;border-radius:8px;font-family:monospace;max-width:290px;}
    #ui-2d-container h3{margin:0 0 5px 0;font-size:14px;text-transform:uppercase;}
    #ui-2d-container p{margin:0 0 10px 0;font-size:11px;color:#fff;line-height:1.3;}
    #ui-2d-container input,#ui-2d-container textarea{width:95%;padding:6px;background:#222;color:#fff;border:1px solid #00E676;margin-bottom:10px;}
    #ui-2d-container button{width:100%;padding:6px;background:#00E676;color:#000;border:none;font-weight:bold;cursor:pointer;}
  </style>
  <script>
    // Funzione helper per comprimere il codice HTML generato da JS
    const make = (tag, attrs, parent) => { let el = document.createElement(tag); for (let k in attrs) el.setAttribute(k, attrs[k]); if (parent) parent.appendChild(el); return el; };

    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        let cam = document.querySelector('#camera');
        if (cam && cam.object3D) this.el.object3D.lookAt(cam.object3D.position);
      }
    });

    AFRAME.registerComponent('btn-interaction', {
      init: function () {
        let el = this.el, col = el.getAttribute('material').color;
        el.addEventListener('mouseenter', () => el.setAttribute('material', 'opacity', 0.8));
        el.addEventListener('mouseleave', () => { el.setAttribute('material', 'opacity', 1.0); el.setAttribute('scale', '1 1 1'); el.setAttribute('material', 'color', col); });
        el.addEventListener('mousedown', () => { el.setAttribute('scale', '0.95 0.95 0.8'); el.setAttribute('material', 'color', '#00FFCC'); });
        el.addEventListener('mouseup', () => { el.setAttribute('scale', '1 1 1'); el.setAttribute('material', 'color', col); });
      }
    });

    AFRAME.registerComponent('ar-antenna-system', {
      init: function () {
        this.state = 'PLACE_GROUND_A'; 
        this.pointA = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointB = { base: null, top: null, sphere: null, pole: null, label: null };
        this.pointC = { top: null, sphere: null, pole: null, label: null, percent: 0.5 }; 
        
        this.antennaTypes = ['Dipolo', 'End Fed', 'Longwire', 'Verticale', 'MMANA-GAL'];
        this.bands = ['160m', '80m', '40m', '20m', '15m', '10m', '2m'];
        this.antIdx = 0; this.bandIdx = 2; 
        
        this.endFed_AC_Len = 10.0; this.endFed_CB_Len = 10.0; this.longwireLen = 20.0; this.longwireVertex = 'A'; 
        this.numRadials = 4; this.radialLen = 5.0; this.radialPool = []; this.maxRadials = 16; 
        
        this.mmanaModels = ['Yagi 3 Elementi', 'Delta Loop', 'Dipolo MMANA', 'Modello Importato'];
        this.mmanaModelIdx = 0; this.antennaRotationY = 0; this.globalTextScale = 0.35; this.currentHeight = 0.1; 
        this.mmanaWires = []; this.importedMmanaWires = []; 

        this.guyWiresData = []; this.activeAnchor = null; this.gwState = 'OFF'; this.lastTriggerTime = 0; 
        this.beaconLocalPos = null;
        this.placementMode = 'LASER'; // 'LASER', 'CONTACT', 'SCAN'

        this.raycasterEl = document.querySelector('#right-controller');
        this.leftControllerEl = document.querySelector('#left-controller');
        this.cursorRing = document.querySelector('#cursor-ring');
        this.contactCursor = document.querySelector('#contact-cursor');
        this.hitReticle = document.querySelector('#hit-reticle');
        
        this.worldPivotEl = document.querySelector('#world-pivot');
        this.worldContentEl = document.querySelector('#world-content');
        this.verticalCylinder = document.querySelector('#vertical-cylinder');
        this.heightText = document.querySelector('#height-text');
        this.menuUI = document.querySelector('#menu-ui');
        this.gwUI = document.querySelector('#guy-wires-ui');
        this.mmanaContainerEl = document.querySelector('#mmana-wires-container');
        this.gwContainerEl = document.querySelector('#guy-wires-container');

        this.raycasterEl.addEventListener('triggerdown', this.onTriggerDown.bind(this));
        this.raycasterEl.addEventListener('thumbstickmoved', this.onRightThumbstick.bind(this));
        this.leftControllerEl.addEventListener('ybuttondown', this.toggleMenu.bind(this));
        this.leftControllerEl.addEventListener('xbuttondown', this.toggleGuyWireMode.bind(this));
        this.leftControllerEl.addEventListener('thumbstickmoved', this.onLeftThumbstick.bind(this));

        this.initPersistentElements();
        this.loadPreloadedMmanaModel();
        this.resetAntennaLengths();
        this.setupGlobalEventDelegation();
        this.setupMmanaFileLoader();
        this.updateMenuText();
      },

      getLocalPoint: function(worldVec) {
        let local = new THREE.Vector3();
        this.worldContentEl.object3D.worldToLocal(local.copy(worldVec));
        return { x: local.x, y: local.y, z: local.z };
      },

      getWorldTargetPoint: function() {
        if (this.placementMode === 'CONTACT') {
            let pos = new THREE.Vector3(); this.contactCursor.object3D.getWorldPosition(pos); return pos;
        } else if (this.placementMode === 'SCAN') {
            if (this.hitReticle && this.hitReticle.getAttribute('visible')) {
                let pos = new THREE.Vector3(); this.hitReticle.object3D.getWorldPosition(pos); return pos;
            }
            return null;
        } else {
            let hit = this.raycasterEl.components.raycaster.getIntersection(document.querySelector('#ar-ground'));
            return hit ? hit.point.clone() : null;
        }
      },

      toggleMenu: function() {
        if(this.gwState !== 'OFF') return; 
        if(this.state === 'CALIB_SET' || this.state === 'CALIB_SNAP') { this.state = 'IDLE'; this.menuUI.setAttribute('visible', true); return; }
        if(!this.menuUI) return;
        let isVis = this.menuUI.getAttribute('visible') === 'true' || this.menuUI.getAttribute('visible') === true;
        this.menuUI.setAttribute('visible', !isVis);
      },

      toggleGuyWireMode: function() {
        if (this.state === 'CALIB_SET' || this.state === 'CALIB_SNAP') return;
        
        if (this.gwState === 'OFF') {
          if (!this.pointA.top && !this.pointB.top) {
            document.querySelector('#info-instruction').setAttribute('value', 'ERRORE: PIAZZA PRIMA I PALI!');
            document.querySelector('#info-instruction').setAttribute('color', '#FF0000');
            setTimeout(() => { document.querySelector('#info-instruction').setAttribute('color', '#00E676'); this.updateMenuText(); }, 3000);
            return;
          }
          this.state = 'IDLE'; this.menuUI.setAttribute('visible', false); this.gwUI.setAttribute('visible', true);
          this.cursorRing.setAttribute('visible', 'false'); this.gwState = 'SELECT_POLE';
          this.updateGWStatus("SCEGLI QUALE PALO TIRANTARE DAL MENU");
          this.toggleButton('#btn-gw-new-a', this.pointA.top !== null); this.toggleButton('#btn-gw-new-b', this.pointB.top !== null);
          this.refreshRaycaster();
        } else {
          this.gwUI.setAttribute('visible', false); this.menuUI.setAttribute('visible', true);
          this.gwState = 'OFF'; this.activeAnchor = null;
          this.previewCollar.setAttribute('visible', 'false'); this.previewCollarText.setAttribute('visible', 'false');
          this.refreshAll();
        }
      },

      toggleButton: function(id, isVis) {
        let btn = document.querySelector(id); if(!btn) return;
        btn.setAttribute('visible', isVis);
        if(isVis) btn.classList.add('clickable'); else btn.classList.remove('clickable');
      },

      updateGWStatus: function(msg) { document.querySelector('#txt-gw-status').setAttribute('value', msg); },

      refreshRaycaster: function() {
        setTimeout(() => { if (this.raycasterEl && this.raycasterEl.components.raycaster) this.raycasterEl.components.raycaster.refreshObjects(); }, 50);
      },

      initPersistentElements: function() {
        let cPoint = (col) => {
          let s = {};
          s.sphere = make('a-sphere', {radius:'0.05', material:`color: ${col}; roughness: 0.3`, visible:'false'}, this.worldContentEl);
          s.pole = make('a-cylinder', {radius:'0.008', material:'color: #888888; opacity: 0.6; shader: flat', visible:'false'}, this.worldContentEl);
          s.label = make('a-text', {align:'center', color:'#00FF00', 'look-at-camera':'', visible:'false'}, this.worldContentEl);
          return s;
        };

        this.pointA = Object.assign(this.pointA, cPoint('#FF1744'));
        this.pointB = Object.assign(this.pointB, cPoint('#2979FF'));
        this.pointC = Object.assign(this.pointC, cPoint('#00E676'));

        this.antennaTube1 = make('a-cylinder', {radius:'0.015', material:'color: #FF5722; shader: flat', visible:'false'}, this.worldContentEl);
        this.antennaTube2 = make('a-cylinder', {radius:'0.015', material:'color: #FF5722; shader: flat', visible:'false'}, this.worldContentEl);
        this.labelSegA = make('a-text', {align:'center', color:'yellow', 'look-at-camera':'', visible:'false'}, this.worldContentEl);
        this.labelSegB = make('a-text', {align:'center', color:'yellow', 'look-at-camera':'', visible:'false'}, this.worldContentEl);

        for(let i=0; i<this.maxRadials; i++) {
          this.radialPool.push(make('a-cylinder', {radius:'0.005', material:'color: #5D4037; shader: flat', visible:'false'}, this.worldContentEl));
        }

        this.previewCollar = make('a-torus', {radius:'0.04', 'radius-tubular':'0.006', material:'color: #FFEB3B; shader: flat', rotation:'90 0 0', visible:'false'}, this.worldContentEl);
        this.previewCollarText = make('a-text', {align:'center', color:'#FFEB3B', 'look-at-camera':'', visible:'false'}, this.worldContentEl);

        this.beaconVisual = make('a-entity', {visible:'false'}, this.worldContentEl);
        make('a-octahedron', {radius:'0.08', color:'#00BFFF', material:'shader: flat; wireframe: true'}, this.beaconVisual);
        make('a-octahedron', {radius:'0.04', color:'#00BFFF', material:'shader: flat; opacity: 0.8'}, this.beaconVisual);
      },

      getCalculatedLength: function() {
        let b = parseInt(this.bands[this.bandIdx]), t = this.antennaTypes[this.antIdx];
        if (t === 'Dipolo' || t === 'Verticale') return b / 4; 
        if (t === 'End Fed') return b * 0.45; 
        return b;                                
      },

      resetAntennaLengths: function() {
        let baseLen = this.getCalculatedLength();
        this.endFed_AC_Len = baseLen / 2; this.endFed_CB_Len = baseLen / 2; this.longwireLen = baseLen;
      },

      tick: function () {
        if (this.placementMode === 'SCAN') {
            this.cursorRing.setAttribute('visible', 'false'); this.contactCursor.setAttribute('visible', 'false');
        } else if (this.placementMode === 'CONTACT') {
            this.cursorRing.setAttribute('visible', 'false'); this.contactCursor.setAttribute('visible', 'true');
        } else {
            this.contactCursor.setAttribute('visible', 'false');
            if (this.state.startsWith('PLACE_GROUND') || this.state.startsWith('REPOSITION_GROUND') || this.gwState === 'PLACE_PEGS' || this.state.startsWith('CALIB')) {
                let hit = this.raycasterEl.components.raycaster.getIntersection(document.querySelector('#ar-ground'));
                if (hit) { this.cursorRing.setAttribute('visible', 'true'); this.cursorRing.setAttribute('position', hit.point); } 
                else { this.cursorRing.setAttribute('visible', 'false'); }
            } else { this.cursorRing.setAttribute('visible', 'false'); }
        }
      },

      onLeftThumbstick: function(evt) {
        if (this.gwState !== 'OFF') return;
        if (Math.abs(evt.detail.x) > 0.3) {
            let delta = evt.detail.x > 0 ? 2.0 : -2.0;
            if (this.state === 'CALIB_SNAP') {
                this.worldPivotEl.object3D.rotation.y -= (delta * Math.PI / 180);
            } else {
                this.antennaRotationY += delta; this.updateGeometriesAndDrawings();
            }
        }
      },

      onRightThumbstick: function (evt) {
        let now = Date.now();
        if (!this.lastThumbTime || now - this.lastThumbTime > 110) {
          if (this.state.includes('HEIGHT') && Math.abs(evt.detail.y) > 0.4) {
            this.currentHeight = Math.max(0.0, this.currentHeight + (evt.detail.y < 0 ? 0.1 : -0.1));
            this.updateHeightPreview(); this.lastThumbTime = now;
          } else if (this.gwState === 'ADJUST_HEIGHT' && this.activeAnchor && Math.abs(evt.detail.y) > 0.4) {
            let pData = this.activeAnchor.pole === 'A' ? this.pointA : this.pointB;
            this.activeAnchor.height = Math.max(0.1, Math.min(pData.top.y, this.activeAnchor.height + (evt.detail.y < 0 ? 0.1 : -0.1)));
            this.updateCollarPreview(); this.lastThumbTime = now;
          }
        }
      },

      updateHeightPreview: function() {
        let base = this.state.includes('_A') ? this.pointA.base : this.pointB.base;
        this.verticalCylinder.setAttribute('position', `${base.x} ${this.currentHeight / 2} ${base.z}`);
        this.verticalCylinder.setAttribute('geometry', `primitive: cylinder; radius: 0.01; height: ${this.currentHeight}`);
        this.heightText.setAttribute('position', `${base.x} ${this.currentHeight + 0.2} ${base.z}`);
        this.heightText.setAttribute('value', `${this.currentHeight.toFixed(1)}m`);
      },

      updateCollarPreview: function() {
        if (!this.activeAnchor) return;
        let pData = this.activeAnchor.pole === 'A' ? this.pointA : this.pointB;
        let cy = pData.base.y + this.activeAnchor.height;
        this.previewCollar.setAttribute('position', `${pData.base.x} ${cy} ${pData.base.z}`);
        this.previewCollarText.setAttribute('position', `${pData.base.x + 0.15} ${cy} ${pData.base.z}`);
        this.previewCollarText.setAttribute('value', `H: ${this.activeAnchor.height.toFixed(1)}m`);
      },

      startCollarPlacement: function(poleId) {
        let pData = poleId === 'A' ? this.pointA : this.pointB;
        if (!pData || !pData.top) return;
        this.activeAnchor = { pole: poleId, height: pData.top.y / 2, pegs: [] };
        this.previewCollar.setAttribute('visible', 'true'); this.previewCollarText.setAttribute('visible', 'true');
        this.previewCollar.setAttribute('material', 'color: #FFEB3B');
        this.updateCollarPreview(); this.gwState = 'ADJUST_HEIGHT';
        this.updateGWStatus(`USA JOYSTICK SU/GIU,\nPREMI GRILLETTO PER CONFERMARE ALTEZZA`);
      },

      onTriggerDown: function () {
        let now = Date.now(); if (now - this.lastTriggerTime < 300) return; this.lastTriggerTime = now;

        let intersects = this.raycasterEl.components.raycaster.intersectedEls;
        if (intersects) {
          for (let el of intersects) {
            if (el.classList && el.classList.contains('clickable')) return;
            if (el.closest && (el.closest('#menu-ui') || el.closest('#guy-wires-ui'))) return;
          }
        }

        if (this.state === 'CALIB_SET') {
            let wp = this.getWorldTargetPoint();
            if (wp) {
                let lp = this.getLocalPoint(wp); this.beaconLocalPos = lp;
                this.worldPivotEl.object3D.position.copy(wp);
                this.worldContentEl.object3D.position.set(-lp.x, -lp.y, -lp.z);
                this.beaconVisual.setAttribute('visible', 'true'); this.beaconVisual.setAttribute('position', `${lp.x} 0.08 ${lp.z}`);
                this.state = 'IDLE'; this.menuUI.setAttribute('visible', true);
            }
            return;
        }

        if (this.state === 'CALIB_SNAP') {
            let wp = this.getWorldTargetPoint();
            if (wp) {
                this.worldPivotEl.object3D.position.copy(wp);
                document.querySelector('#info-instruction').setAttribute('value', 'RIALLINEATO. Usa Joystick SX per ruotare.');
            }
            return;
        }

        if (this.gwState !== 'OFF') {
          if (this.gwState === 'ADJUST_HEIGHT') {
            this.gwState = 'PLACE_PEGS'; this.guyWiresData.push(this.activeAnchor); 
            this.previewCollar.setAttribute('material', 'color: #FF0000');
            this.updateGWStatus("PUNTA IL TERRENO E PREMI IL GRILLETTO PER I PICCHETTI");
          } else if (this.gwState === 'PLACE_PEGS') {
            let wp = this.getWorldTargetPoint();
            if (wp) { this.activeAnchor.pegs.push(this.getLocalPoint(wp)); this.drawGuyWires(); }
          }
          return; 
        }

        let type = this.antennaTypes[this.antIdx];
        if (this.state === 'PLACE_GROUND_A' || this.state === 'REPOSITION_GROUND_A') {
          let wp = this.getWorldTargetPoint(); if(!wp) return;
          this.pointA.base = this.getLocalPoint(wp);
          this.state = this.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_A' : 'PLACE_HEIGHT_A';
          this.currentHeight = type === 'Verticale' ? this.getCalculatedLength() : 0.1;
          this.verticalCylinder.setAttribute('visible', 'true'); this.heightText.setAttribute('visible', 'true');
          this.updateHeightPreview();
        } 
        else if (this.state === 'PLACE_HEIGHT_A' || this.state === 'REPOSITION_HEIGHT_A') {
          this.pointA.top = { x: this.pointA.base.x, y: this.pointA.base.y + this.currentHeight, z: this.pointA.base.z };
          this.verticalCylinder.setAttribute('visible', 'false'); this.heightText.setAttribute('visible', 'false');
          this.renderPoleAndLabel(this.pointA, this.pointA.top, type === 'Verticale' ? 'STILO VERTICALE' : (type === 'MMANA-GAL' ? 'PILONE MMANA' : 'PUNTO A'));

          if(this.state === 'REPOSITION_HEIGHT_A' || type === 'Verticale' || type === 'MMANA-GAL') {
            this.state = 'IDLE'; this.updateGeometriesAndDrawings(); this.menuUI.setAttribute('visible', true);
          } else { this.state = 'PLACE_GROUND_B'; }
        } 
        else if (this.state === 'PLACE_GROUND_B' || this.state === 'REPOSITION_GROUND_B') {
          let wp = this.getWorldTargetPoint(); if(!wp) return;
          this.pointB.base = this.getLocalPoint(wp);
          this.state = this.state.startsWith('REPOSITION') ? 'REPOSITION_HEIGHT_B' : 'PLACE_HEIGHT_B';
          this.currentHeight = 0.1; 
          this.verticalCylinder.setAttribute('visible', 'true'); this.heightText.setAttribute('visible', 'true');
          this.updateHeightPreview();
        } 
        else if (this.state === 'PLACE_HEIGHT_B' || this.state === 'REPOSITION_HEIGHT_B') {
          this.pointB.top = { x: this.pointB.base.x, y: this.pointB.base.y + this.currentHeight, z: this.pointB.base.z };
          this.verticalCylinder.setAttribute('visible', 'false'); this.heightText.setAttribute('visible', 'false');
          this.state = 'IDLE'; this.updateGeometriesAndDrawings(); this.menuUI.setAttribute('visible', true);
        }
      },

      renderPoleAndLabel: function(struct, topPos, labelName) {
        if (!topPos) return;
        let realHeight = topPos.y - struct.base.y; 
        struct.sphere.setAttribute('visible', 'true'); struct.pole.setAttribute('visible', 'true'); struct.label.setAttribute('visible', 'true');
        struct.sphere.setAttribute('position', topPos);
        struct.pole.setAttribute('position', `${topPos.x} ${struct.base.y + (realHeight / 2)} ${topPos.z}`);
        struct.pole.setAttribute('geometry', `primitive: cylinder; radius: 0.008; height: ${realHeight}`);
        struct.label.setAttribute('position', `${topPos.x} ${struct.base.y + (realHeight / 2)} ${topPos.z}`);
        struct.label.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`);
        struct.label.setAttribute('value', `${labelName}\nH: ${realHeight.toFixed(1)}m`);
      },

      hideStructure: function(s) { s.sphere.setAttribute('visible', 'false'); s.pole.setAttribute('visible', 'false'); s.label.setAttribute('visible', 'false'); },

      loadPreloadedMmanaModel: function() {
        let m = this.mmanaModels[this.mmanaModelIdx];
        if (m === 'Yagi 3 Elementi') this.mmanaWires = [{x1:0,y1:-2.5,z1:0,x2:0,y2:2.5,z2:0,radius:0.004}, {x1:1.5,y1:-2.4,z1:0,x2:1.5,y2:2.4,z2:0,radius:0.004}, {x1:3.2,y1:-2.2,z1:0,x2:3.2,y2:2.2,z2:0,radius:0.004}];
        else if (m === 'Delta Loop') this.mmanaWires = [{x1:0,y1:-2.0,z1:0,x2:0,y2:2.0,z2:0,radius:0.002}, {x1:0,y1:-2.0,z1:0,x2:0,y2:0,z2:3.5,radius:0.002}, {x1:0,y1:2.0,z1:0,x2:0,y2:0,z2:3.5,radius:0.002}];
        else if (m === 'Dipolo MMANA') this.mmanaWires = [{x1:0,y1:-5.0,z1:0,x2:0,y2:5.0,z2:0,radius:0.002}];
        else if (m === 'Modello Importato') this.mmanaWires = this.importedMmanaWires;
      },

      updateMenuText: function() {
        let type = this.antennaTypes[this.antIdx], band = this.bands[this.bandIdx];
        document.querySelector('#txt-ant-val').setAttribute('value', type.toUpperCase());
        document.querySelector('#txt-band-val').setAttribute('value', band);

        let toggle = (id, vis) => {
          let el = document.querySelector(id); el.setAttribute('visible', vis);
          el.querySelectorAll('[btn-interaction]').forEach(b => vis ? b.classList.add('clickable') : b.classList.remove('clickable'));
        };

        toggle('#sub-dipolo', type === 'Dipolo'); toggle('#sub-endfed', type === 'End Fed'); toggle('#sub-longwire', type === 'Longwire');
        toggle('#sub-verticale', type === 'Verticale'); toggle('#sub-mmana', type === 'MMANA-GAL');
        document.querySelector('#btn-repo-b').setAttribute('visible', type !== 'Verticale' && type !== 'MMANA-GAL');
        this.refreshRaycaster();

        let instText = this.placementMode === 'LASER' ? "Usa il laser a distanza e premi grilletto." : (this.placementMode === 'CONTACT' ? "Tocca il suolo col controller e premi." : "Guarda l'erba vera (anello fucsia) e premi.");
        document.querySelector('#info-instruction').setAttribute('value', instText);

        let infoTextStr = "";
        if (this.state === 'IDLE') {
            if (type === 'Dipolo') infoTextStr = `ANTENNA: DIPOLO | BANDA: ${band}\nLUNGHEZZA: ${this.getCalculatedLength().toFixed(2)}m`;
            else if (type === 'End Fed') {
              infoTextStr = `ANTENNA: END FED | BANDA: ${band}\nAC: ${this.endFed_AC_Len.toFixed(2)}m | CB: ${this.endFed_CB_Len.toFixed(2)}m`;
              document.querySelector('#txt-ef-values').setAttribute('value', `AC: ${this.endFed_AC_Len.toFixed(2)}m | CB: ${this.endFed_CB_Len.toFixed(2)}m`);
            } else if (type === 'Longwire') {
              infoTextStr = `ANTENNA: LONGWIRE | BANDA: ${band}\nVERTICE: DA ${this.longwireVertex} | LUNGH: ${this.longwireLen.toFixed(2)}m`;
              document.querySelector('#txt-lw-vertex-val').setAttribute('value', `VERTICE: DA ${this.longwireVertex}`);
              document.querySelector('#txt-lw-len-val').setAttribute('value', `LUNGH: ${this.longwireLen.toFixed(2)}m`);
            } else if (type === 'Verticale') {
              infoTextStr = `ANTENNA: VERTICALE | BANDA: ${band}\nSTILO: ${this.pointA.top ? (this.pointA.top.y - this.pointA.base.y).toFixed(2) : 0}m | RADIALI: ${this.numRadials} da ${this.radialLen.toFixed(1)}m`;
              document.querySelector('#txt-rad-num-val').setAttribute('value', `RADIALI: ${this.numRadials}`);
              document.querySelector('#txt-rad-len-val').setAttribute('value', `LUNGH R: ${this.radialLen.toFixed(1)}m`);
            } else if (type === 'MMANA-GAL') { 
              infoTextStr = `MMANA: ${this.mmanaModels[this.mmanaModelIdx]}\nFili: ${this.mmanaWires.length} | Ruota col joystick SX.`; 
              document.querySelector('#txt-mmana-model-val').setAttribute('value', this.mmanaModels[this.mmanaModelIdx].toUpperCase());
            }
        }
        document.querySelector('#info-antenna-data').setAttribute('value', infoTextStr);
      },

      drawGuyWires: function() {
        while (this.gwContainerEl.firstChild) this.gwContainerEl.removeChild(this.gwContainerEl.firstChild);
        this.guyWiresData.forEach((anchor) => {
          let pData = anchor.pole === 'A' ? this.pointA : this.pointB;
          if (!pData.base || !pData.top) return;
          let h = Math.min(anchor.height, pData.top.y - pData.base.y), aPos = new THREE.Vector3(pData.base.x, pData.base.y + h, pData.base.z);
          make('a-torus', {radius:'0.04', 'radius-tubular':'0.006', material:'color: #FF1744; shader: flat', rotation:'90 0 0', position:`${aPos.x} ${aPos.y} ${aPos.z}`}, this.gwContainerEl);
          anchor.pegs.forEach((pegPos) => {
            let pVec = new THREE.Vector3(pegPos.x, pegPos.y, pegPos.z), dist = aPos.distanceTo(pVec);
            make('a-cone', { 'radius-bottom':'0.04', 'radius-top':'0.005', height:'0.15', material:'color: #FF9800; shader: flat', position:`${pVec.x} ${pVec.y + 0.075} ${pVec.z}` }, this.gwContainerEl);
            let wire = make('a-cylinder', {radius:'0.002', height:dist, material:'color: #B0BEC5; shader: flat'}, this.gwContainerEl);
            let mid = new THREE.Vector3().lerpVectors(aPos, pVec, 0.5);
            wire.object3D.position.copy(mid); wire.object3D.lookAt(pVec); wire.object3D.rotateX(Math.PI / 2);
            let txtP = new THREE.Vector3().lerpVectors(pVec, aPos, 0.3);
            make('a-text', {value:`${dist.toFixed(2)}m`, align:'center', color:'#FFEB3B', scale:`${this.globalTextScale*0.8} ${this.globalTextScale*0.8} ${this.globalTextScale*0.8}`, position:`${txtP.x} ${txtP.y+0.1} ${txtP.z}`, 'look-at-camera':''}, this.gwContainerEl);
          });
        });
      },

      updateGeometriesAndDrawings: function() {
        this.mmanaContainerEl.innerHTML = ''; this.drawGuyWires();
        if (!this.pointA.top) return;
        let type = this.antennaTypes[this.antIdx];

        if (type === 'Verticale') {
          this.hideStructure(this.pointB); this.hideStructure(this.pointC); this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false'); this.antennaTube2.setAttribute('visible', 'false');
          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'STILO VERTICALE');
          let h = this.pointA.top.y - this.pointA.base.y;
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.018; height: ${h}`);
          this.antennaTube1.object3D.position.set(this.pointA.top.x, this.pointA.base.y + (h / 2), this.pointA.top.z); this.antennaTube1.object3D.rotation.set(0, 0, 0);
          let base = new THREE.Vector3(this.pointA.base.x, this.pointA.base.y + 0.002, this.pointA.base.z), radRot = this.antennaRotationY * Math.PI / 180;
          for (let i = 0; i < this.maxRadials; i++) {
            if (i < this.numRadials) {
              this.radialPool[i].setAttribute('visible', 'true'); this.radialPool[i].setAttribute('geometry', `primitive: cylinder; radius: 0.004; height: ${this.radialLen}`);
              let angle = ((i * 2 * Math.PI) / this.numRadials) + radRot, targetVec = new THREE.Vector3(base.x + Math.cos(angle) * this.radialLen, base.y, base.z + Math.sin(angle) * this.radialLen);
              let midPoint = new THREE.Vector3().lerpVectors(base, targetVec, 0.5);
              this.radialPool[i].object3D.position.copy(midPoint); this.radialPool[i].object3D.lookAt(targetVec); this.radialPool[i].object3D.rotateX(Math.PI / 2);
            } else this.radialPool[i].setAttribute('visible', 'false');
          }
          return;
        }

        if (type === 'MMANA-GAL') {
          this.antennaTube1.setAttribute('visible', 'false'); this.antennaTube2.setAttribute('visible', 'false');
          for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
          this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false');
          this.hideStructure(this.pointB); this.hideStructure(this.pointC);
          if (this.mmanaWires.length === 0) return;
          this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PILONE MMANA');
          let vecA = new THREE.Vector3(this.pointA.top.x, this.pointA.top.y, this.pointA.top.z);
          this.mmanaContainerEl.object3D.position.copy(vecA); this.mmanaContainerEl.object3D.rotation.set(0, this.antennaRotationY * Math.PI / 180, 0);
          this.mmanaWires.forEach((w) => {
            let p1 = new THREE.Vector3(w.x1, w.z1, w.y1), p2 = new THREE.Vector3(w.x2, w.z2, w.y2), d = p1.distanceTo(p2); if(d < 0.01) return;
            let cyl = make('a-cylinder', {geometry: `primitive: cylinder; radius: ${Math.max(0.005, w.radius * 2.8)}; height: ${d}`, material: 'color: #00E676; shader: flat'}, this.mmanaContainerEl);
            cyl.object3D.position.copy(new THREE.Vector3().lerpVectors(p1, p2, 0.5)); cyl.object3D.lookAt(p2); cyl.object3D.rotateX(Math.PI / 2);
          });
          return;
        }

        for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
        if (!this.pointB.top) return;
        this.renderPoleAndLabel(this.pointA, this.pointA.top, 'PUNTO A'); this.renderPoleAndLabel(this.pointB, this.pointB.top, 'PUNTO B');
        let vecA = new THREE.Vector3(this.pointA.top.x, this.pointA.top.y, this.pointA.top.z), vecB = new THREE.Vector3(this.pointB.top.x, this.pointB.top.y, this.pointB.top.z);
        let dirAB = new THREE.Vector3().subVectors(vecB, vecA).normalize(), dirBA = new THREE.Vector3().subVectors(vecA, vecB).normalize();
        this.pointC.top = new THREE.Vector3().lerpVectors(vecA, vecB, this.pointC.percent);
        this.renderPoleAndLabel(this.pointC, this.pointC.top, 'CENTRO C');

        if (type === 'Dipolo') {
          this.antennaTube2.setAttribute('visible', 'false'); let antLen = this.getCalculatedLength();
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${antLen}`);
          this.antennaTube1.object3D.position.copy(this.pointC.top); this.antennaTube1.object3D.lookAt(vecB); this.antennaTube1.object3D.rotateX(Math.PI / 2);
          let extA = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, -(antLen / 2)), extB = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, antLen / 2);
          this.labelSegA.setAttribute('visible', 'true'); this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extA, 0.5)); this.labelSegA.setAttribute('value', `A-Ant:\n${vecA.distanceTo(extA).toFixed(2)}m`);
          this.labelSegB.setAttribute('visible', 'true'); this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extB, vecB, 0.5)); this.labelSegB.setAttribute('value', `Ant-B:\n${extB.distanceTo(vecB).toFixed(2)}m`);
        } else if (type === 'End Fed') {
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_AC_Len}`);
          this.antennaTube1.object3D.position.copy(new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirBA, this.endFed_AC_Len / 2)); this.antennaTube1.object3D.lookAt(vecA); this.antennaTube1.object3D.rotateX(Math.PI / 2);
          this.antennaTube2.setAttribute('visible', 'true'); this.antennaTube2.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.endFed_CB_Len}`);
          this.antennaTube2.object3D.position.copy(new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, this.endFed_CB_Len / 2)); this.antennaTube2.object3D.lookAt(vecB); this.antennaTube2.object3D.rotateX(Math.PI / 2);
          let extAC = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirBA, this.endFed_AC_Len), extCB = new THREE.Vector3().copy(this.pointC.top).addScaledVector(dirAB, this.endFed_CB_Len);
          this.labelSegA.setAttribute('visible', 'true'); this.labelSegA.setAttribute('position', new THREE.Vector3().lerpVectors(vecA, extAC, 0.5)); this.labelSegA.setAttribute('value', `Vuoto AC:\n${vecA.distanceTo(extAC).toFixed(2)}m`);
          this.labelSegB.setAttribute('visible', 'true'); this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extCB, vecB, 0.5)); this.labelSegB.setAttribute('value', `Vuoto CB:\n${extCB.distanceTo(vecB).toFixed(2)}m`);
        } else if (type === 'Longwire') {
          this.hideStructure(this.pointC); this.antennaTube2.setAttribute('visible', 'false');
          let sVec = this.longwireVertex === 'A' ? vecA : vecB, tVec = this.longwireVertex === 'A' ? vecB : vecA, dirLW = new THREE.Vector3().subVectors(tVec, sVec).normalize();
          this.antennaTube1.setAttribute('visible', 'true'); this.antennaTube1.setAttribute('geometry', `primitive: cylinder; radius: 0.015; height: ${this.longwireLen}`);
          this.antennaTube1.object3D.position.copy(new THREE.Vector3().copy(sVec).addScaledVector(dirLW, this.longwireLen / 2)); this.antennaTube1.object3D.lookAt(tVec); this.antennaTube1.object3D.rotateX(Math.PI / 2);
          let extLW = new THREE.Vector3().copy(sVec).addScaledVector(dirLW, this.longwireLen);
          this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'true'); this.labelSegB.setAttribute('position', new THREE.Vector3().lerpVectors(extLW, tVec, 0.5)); this.labelSegB.setAttribute('value', `Restante:\n${extLW.distanceTo(tVec).toFixed(2)}m`);
        }
        this.labelSegA.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`); this.labelSegB.setAttribute('scale', `${this.globalTextScale} ${this.globalTextScale} ${this.globalTextScale}`);
      },

      setupGlobalEventDelegation: function() {
        let scene = this.el.sceneEl; this.lastClickTime = 0; 
        scene.addEventListener('mousedown', (evt) => {
          let now = Date.now(); if (now - this.lastClickTime < 250) return; 
          let t = evt.target.closest('.clickable'); if(!t) return;
          if (t.getAttribute('visible') === false || t.getAttribute('visible') === 'false') return;
          if (t.parentElement && (t.parentElement.getAttribute('visible') === false || t.parentElement.getAttribute('visible') === 'false')) return;

          this.lastClickTime = now; let id = t.id, mR = (n) => Math.round(n * 100) / 100;

          if (id === 'btn-mode-placement') {
            let m = ['LASER', 'CONTACT', 'SCAN']; this.placementMode = m[(m.indexOf(this.placementMode) + 1) % 3];
            if (this.placementMode === 'LASER') { this.hitReticle.removeAttribute('ar-hit-test'); this.hitReticle.setAttribute('visible', 'false'); }
            else if (this.placementMode === 'CONTACT') { this.hitReticle.removeAttribute('ar-hit-test'); this.hitReticle.setAttribute('visible', 'false'); }
            else { this.hitReticle.setAttribute('ar-hit-test', ''); }
            document.querySelector('#txt-placement-mode').setAttribute('value', this.placementMode === 'LASER' ? "MODALITA' POSA: LASER (A DISTANZA)" : (this.placementMode === 'CONTACT' ? "MODALITA' POSA: REALE (TOCCA TERRA)" : "MODALITA' POSA: SCANSIONE 3D (GUARDA)"));
            document.querySelector('#btn-mode-placement').setAttribute('color', this.placementMode === 'LASER' ? "#4A148C" : (this.placementMode === 'CONTACT' ? "#00695C" : "#E65100"));
            this.updateMenuText();
          }
          else if (id === 'btn-open-gw') this.toggleGuyWireMode();
          else if (id === 'btn-cal-set') { this.state = 'CALIB_SET'; this.menuUI.setAttribute('visible', false); document.querySelector('#info-instruction').setAttribute('value', 'Piazza il Faro col sistema di posa scelto.'); }
          else if (id === 'btn-cal-snap') { if (!this.beaconLocalPos) return; this.state = 'CALIB_SNAP'; this.menuUI.setAttribute('visible', false); document.querySelector('#info-instruction').setAttribute('value', 'Aggancia il Faro reale per riallineare.'); }
          else if (id === 'btn-gw-new-a') this.startCollarPlacement('A');
          else if (id === 'btn-gw-new-b') this.startCollarPlacement('B');
          else if (id === 'btn-gw-undo') {
            if (this.activeAnchor && this.activeAnchor.pegs.length > 0) { this.activeAnchor.pegs.pop(); this.drawGuyWires(); } 
            else if (this.activeAnchor && this.activeAnchor.pegs.length === 0) { this.guyWiresData = this.guyWiresData.filter(a => a !== this.activeAnchor); this.activeAnchor = null; this.previewCollar.setAttribute('visible', 'false'); this.previewCollarText.setAttribute('visible', 'false'); this.gwState = 'SELECT_POLE'; this.updateGWStatus("SCEGLI QUALE PALO TIRANTARE DAL MENU"); this.drawGuyWires(); }
          }
          else if (id === 'btn-gw-close') this.toggleGuyWireMode();
          else if (id === 'btn-ant') { this.antIdx = (this.antIdx + 1) % this.antennaTypes.length; this.resetAntennaLengths(); this.refreshAll(); } 
          else if (id === 'btn-band') { this.bandIdx = (this.bandIdx + 1) % this.bands.length; this.resetAntennaLengths(); if (this.antennaTypes[this.antIdx] === 'Verticale' && this.pointA.top) this.pointA.top.y = this.getCalculatedLength(); this.refreshAll(); } 
          else if (id === 'btn-c-left') { this.pointC.percent = Math.max(0.02, mR(this.pointC.percent - 0.05)); this.updateGeometriesAndDrawings(); } 
          else if (id === 'btn-c-right') { this.pointC.percent = Math.min(0.98, mR(this.pointC.percent + 0.05)); this.updateGeometriesAndDrawings(); } 
          else if (id === 'btn-lw-vertex') { this.longwireVertex = this.longwireVertex === 'A' ? 'B' : 'A'; this.refreshAll(); } 
          else if (id === 'btn-mmana-model') { this.mmanaModelIdx = (this.mmanaModelIdx + 1) % this.mmanaModels.length; this.loadPreloadedMmanaModel(); this.refreshAll(); } 
          else if (id === 'btn-txt-minus') { this.globalTextScale = Math.max(0.15, mR(this.globalTextScale - 0.05)); this.updateGeometriesAndDrawings(); } 
          else if (id === 'btn-txt-plus') { this.globalTextScale = Math.min(1.2, mR(this.globalTextScale + 0.05)); this.updateGeometriesAndDrawings(); } 
          else if (id === 'btn-ac-m1')   { this.endFed_AC_Len = Math.max(0.1, mR(this.endFed_AC_Len - 1.0)); this.refreshAll(); }
          else if (id === 'btn-ac-m01')  { this.endFed_AC_Len = Math.max(0.01, mR(this.endFed_AC_Len - 0.01)); this.refreshAll(); }
          else if (id === 'btn-ac-p01')  { this.endFed_AC_Len = mR(this.endFed_AC_Len + 0.01); this.refreshAll(); }
          else if (id === 'btn-ac-p1')   { this.endFed_AC_Len = mR(this.endFed_AC_Len + 1.0); this.refreshAll(); }
          else if (id === 'btn-cb-m1')   { this.endFed_CB_Len = Math.max(0.1, mR(this.endFed_CB_Len - 1.0)); this.refreshAll(); }
          else if (id === 'btn-cb-m01')  { this.endFed_CB_Len = Math.max(0.01, mR(this.endFed_CB_Len - 0.01)); this.refreshAll(); }
          else if (id === 'btn-cb-p01')  { this.endFed_CB_Len = mR(this.endFed_CB_Len + 0.01); this.refreshAll(); }
          else if (id === 'btn-cb-p1')   { this.endFed_CB_Len = mR(this.endFed_CB_Len + 1.0); this.refreshAll(); }
          else if (id === 'btn-lw-m1')   { this.longwireLen = Math.max(0.1, mR(this.longwireLen - 1.0)); this.refreshAll(); }
          else if (id === 'btn-lw-m01')  { this.longwireLen = Math.max(0.01, mR(this.longwireLen - 0.01)); this.refreshAll(); }
          else if (id === 'btn-lw-p01')  { this.longwireLen = mR(this.longwireLen + 0.01); this.refreshAll(); }
          else if (id === 'btn-lw-p1')   { this.longwireLen = mR(this.longwireLen + 1.0); this.refreshAll(); }
          else if (id === 'btn-rad-num-minus') { this.numRadials = Math.max(1, this.numRadials - 1); this.refreshAll(); }
          else if (id === 'btn-rad-num-plus')  { this.numRadials = Math.min(this.maxRadials, this.numRadials + 1); this.refreshAll(); }
          else if (id === 'btn-rad-m1')   { this.radialLen = Math.max(0.1, mR(this.radialLen - 1.0)); this.refreshAll(); }
          else if (id === 'btn-rad-m01')  { this.radialLen = Math.max(0.1, mR(this.radialLen - 0.1)); this.refreshAll(); }
          else if (id === 'btn-rad-p01')  { this.radialLen = mR(this.radialLen + 0.1); this.refreshAll(); }
          else if (id === 'btn-rad-p1')   { this.radialLen = mR(this.radialLen + 1.0); this.refreshAll(); }
          else if (id === 'btn-repo-a') { this.state = 'REPOSITION_GROUND_A'; this.menuUI.setAttribute('visible', false); } 
          else if (id === 'btn-repo-b') { this.state = 'REPOSITION_GROUND_B'; this.menuUI.setAttribute('visible', false); }
          else if (id === 'btn-global-reset') this.triggerGlobalReset();
        });
      },

      parseMmanaText: function(text) {
        let lines = text.split('\n'); this.importedMmanaWires = []; let inWires = false;
        for(let i=0; i<lines.length; i++) {
          let l = lines[i].trim(), uL = l.toUpperCase();
          if(inWires && uL.startsWith('***')) inWires = false;
          if(uL.includes('***') && uL.includes('WIRES')) { inWires = true; continue; }
          if(inWires && l !== "") {
            let tok = l.split(/[\s,]+/).filter(t => t !== '');
            if(tok.length >= 7) this.importedMmanaWires.push({ x1:parseFloat(tok[0]), y1:parseFloat(tok[1]), z1:parseFloat(tok[2]), x2:parseFloat(tok[3]), y2:parseFloat(tok[4]), z2:parseFloat(tok[5]), radius:parseFloat(tok[6])>0?parseFloat(tok[6])/1000:0.002 });
          }
        }
        let aBox = document.querySelector('#alert-msg');
        if (this.importedMmanaWires.length > 0) {
          this.mmanaWires = this.importedMmanaWires; this.mmanaModelIdx = this.mmanaModels.indexOf('Modello Importato');
          this.antIdx = this.antennaTypes.indexOf('MMANA-GAL'); this.refreshAll();
          aBox.style.color = "#00FF00"; aBox.innerText = `Caricati ${this.mmanaWires.length} fili! Entra in AR e posiziona.`;
        } else { aBox.style.color = "#FF0000"; aBox.innerText = "Errore: Nessun filo trovato."; }
      },

      setupMmanaFileLoader: function() {
        let fileInput = document.querySelector('#file-mmana'); if(!fileInput) return;
        fileInput.addEventListener('change', (evt) => { let file = evt.target.files[0]; if(!file) return; let reader = new FileReader(); reader.onload = (e) => { this.parseMmanaText(e.target.result); }; reader.readAsText(file); });
        let btnPaste = document.querySelector('#btn-load-paste');
        if(btnPaste) btnPaste.addEventListener('click', () => { let textData = document.querySelector('#text-mmana-paste').value; if(textData.trim() !== "") this.parseMmanaText(textData); });
      },

      triggerGlobalReset: function() {
        this.hideStructure(this.pointA); this.hideStructure(this.pointB); this.hideStructure(this.pointC);
        this.pointA.top = null; this.pointA.base = null; this.pointB.top = null; this.pointB.base = null;
        this.labelSegA.setAttribute('visible', 'false'); this.labelSegB.setAttribute('visible', 'false');
        this.antennaTube1.setAttribute('visible', 'false'); this.antennaTube2.setAttribute('visible', 'false');
        for(let i=0; i<this.maxRadials; i++) this.radialPool[i].setAttribute('visible', 'false');
        this.mmanaContainerEl.innerHTML = ''; this.state = 'PLACE_GROUND_A'; this.antennaRotationY = 0; 
        
        this.guyWiresData = []; this.drawGuyWires(); this.gwState = 'OFF'; this.gwUI.setAttribute('visible', false);
        this.previewCollar.setAttribute('visible', 'false'); this.previewCollarText.setAttribute('visible', 'false');

        this.worldPivotEl.object3D.position.set(0,0,0); this.worldPivotEl.object3D.rotation.set(0,0,0); this.worldContentEl.object3D.position.set(0,0,0);
        this.beaconLocalPos = null; this.beaconVisual.setAttribute('visible', 'false');
        this.cursorRing.setAttribute('visible', 'false'); this.menuUI.setAttribute('visible', false);
      },

      refreshAll: function() { this.updateMenuText(); this.updateGeometriesAndDrawings(); }
    });
  </script>
</head>
<body>
  <div id="ui-2d-container">
    <h3>MMANA-GAL (.maa)</h3>
    <p><b>Opzione A:</b> Carica file dal visore:</p>
    <input type="file" id="file-mmana" accept=".maa">
    <p style="margin-top:10px;"><b>Opzione B:</b> O incolla qui il testo:</p>
    <textarea id="text-mmana-paste" rows="3" placeholder="Incolla le righe..."></textarea>
    <button id="btn-load-paste" class="clickable">INIETTA ANTENNA</button>
    <p id="alert-msg" style="color:yellow; margin-top:5px; font-weight:bold;"></p>
  </div>

  <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor" vr-mode-ui="enabled: true">
    <a-entity id="cameraRig">
      <a-camera id="camera" position="0 1.6 0"></a-camera>
      <a-entity id="left-controller" oculus-touch-controls="hand: left">
        
        <!-- MENU PRINCIPALE -->
        <a-entity id="menu-ui" visible="false" position="0 0.35 -0.4" rotation="-30 0 0">
          <a-plane width="0.5" height="0.86" color="#1A1A1A" material="opacity: 0.96; shader: flat"></a-plane>
          <a-text value="CONFIGURATORE ANTENNE PRO" position="0 0.38 0.01" align="center" scale="0.12 0.12 0.12" color="#FFEB3B"></a-text>
          
          <a-plane width="0.46" height="0.04" color="#2A2A2A" position="0 0.31 0.01">
            <a-text id="info-instruction" value="-" position="0 0 0.01" align="center" scale="0.065 0.065 0.065" color="#00E676"></a-text>
          </a-plane>

          <a-plane id="btn-mode-placement" class="clickable" btn-interaction width="0.46" height="0.04" color="#4A148C" position="0 0.25 0.01">
            <a-text id="txt-placement-mode" value="MODALITA' POSA: LASER (A DISTANZA)" align="center" scale="0.065 0.065 0.065" color="#FFFFFF"></a-text>
          </a-plane>

          <a-plane id="btn-ant" class="clickable" btn-interaction width="0.22" height="0.04" color="#37474F" position="-0.12 0.19 0.01">
            <a-text value="TIPO ANTENNA:" align="center" scale="0.065 0.065 0.065" position="0 0.008 0.005" color="#B0BEC5"></a-text>
            <a-text id="txt-ant-val" value="-" align="center" scale="0.09 0.09 0.09" position="0 -0.008 0.005" color="#FFFFFF"></a-text>
          </a-plane>

          <a-plane id="btn-band" class="clickable" btn-interaction width="0.22" height="0.04" color="#1A237E" position="0.12 0.19 0.01">
            <a-text value="BANDA RADIO:" align="center" scale="0.065 0.065 0.065" position="0 0.008 0.005" color="#9FA8DA"></a-text>
